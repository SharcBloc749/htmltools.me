<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Puter AI Test</title>
<script src="https://js.puter.com/v2/"></script>
</head>
<body style="background:#111;color:#eee;font-family:sans-serif;padding:40px;max-width:600px;margin:0 auto">
  <h2>Puter AI Test</h2>
  <textarea id="prompt" style="width:100%;height:80px;background:#222;color:#eee;border:1px solid #444;padding:10px;font-size:14px;border-radius:6px" placeholder="Ask anything..."></textarea>
  <br><br>
  <button onclick="run()" style="background:#fff;color:#000;border:none;padding:10px 24px;font-size:14px;font-weight:700;border-radius:6px;cursor:pointer">Send</button>
  <pre id="out" style="margin-top:24px;background:#1a1a1a;padding:16px;border-radius:6px;white-space:pre-wrap;min-height:60px;font-size:13px;border:1px solid #333"></pre>

  <script>
    async function run() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return;
      document.getElementById('out').textContent = 'Thinking...';
      try {
        const response = await puter.ai.chat(prompt, { model: 'claude-sonnet-4-6' });
        document.getElementById('out').textContent = response.message.content[0].text;
      } catch(e) {
        document.getElementById('out').textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
