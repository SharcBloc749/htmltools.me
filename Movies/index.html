<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HT Movies</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e5383b;
  --red2:rgba(229,56,59,0.15);
  --bg:#0b0b0f;
  --bg2:#111117;
  --bg3:#18181f;
  --bg4:#1f1f28;
  --text:#ececec;
  --muted:rgba(236,236,236,0.45);
  --border:rgba(255,255,255,0.07);
  --r:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}

/* TOPBAR */
#topbar{
  height:60px;display:flex;align-items:center;gap:14px;
  padding:0 24px;
  background:rgba(11,11,15,0.97);
  border-bottom:0.5px solid var(--border);
  position:relative;z-index:20;
  backdrop-filter:blur(16px);
}
#logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
#logo img{height:30px;width:auto;object-fit:contain}
#logo-wordmark{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2.5px;color:#fff}
#logo-wordmark span{color:var(--red)}
.search-wrap{
  flex:1;max-width:360px;
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:0.5px solid rgba(255,255,255,0.1);
  border-radius:24px;padding:0 16px;height:36px;
}
.search-wrap svg{flex-shrink:0;opacity:.38}
#q{background:transparent;border:none;outline:none;color:#fff;font-size:13px;width:100%;font-family:inherit}
#q::placeholder{color:var(--muted)}
.spacer{flex:1}
#count{
  font-size:11px;color:var(--muted);
  background:var(--bg3);border:0.5px solid var(--border);
  border-radius:12px;padding:4px 12px;white-space:nowrap
}

/* GENRE ROW */
#genres{
  display:flex;gap:7px;padding:10px 24px;overflow-x:auto;
  scrollbar-width:none;background:var(--bg2);
  border-bottom:0.5px solid var(--border);flex-shrink:0;
}
#genres::-webkit-scrollbar{display:none}
.pill{
  padding:5px 16px;border-radius:20px;font-size:12px;cursor:pointer;
  border:0.5px solid rgba(255,255,255,0.11);background:transparent;
  color:var(--muted);white-space:nowrap;font-family:inherit;transition:all .15s;
}
.pill:hover{background:rgba(255,255,255,0.07);color:#fff}
.pill.on{background:var(--red);border-color:var(--red);color:#fff}

/* LAYOUT */
#main{display:flex;height:calc(100vh - 60px - 41px);overflow:hidden}
#feed{flex:1;overflow-y:auto;padding:20px 24px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent}
#feed::-webkit-scrollbar{width:4px}
#feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}

/* HERO */
#hero{
  border-radius:12px;overflow:hidden;position:relative;
  height:200px;margin-bottom:24px;cursor:pointer;
  background:var(--bg3);
}
#hero-bg{
  position:absolute;inset:0;background-size:cover;background-position:center top;
  filter:brightness(.45);transition:filter .3s;
}
#hero:hover #hero-bg{filter:brightness(.55)}
#hero-grad{position:absolute;inset:0;background:linear-gradient(90deg,rgba(11,11,15,.95) 0%,rgba(11,11,15,.3) 60%,transparent 100%)}
#hero-content{position:relative;z-index:1;padding:24px 26px;height:100%;display:flex;flex-direction:column;justify-content:flex-end;max-width:480px}
#hero-tag{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--red);margin-bottom:6px}
#hero-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1.5px;line-height:1;margin-bottom:6px}
#hero-meta{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:12px}
#hero-desc{font-size:12px;color:rgba(255,255,255,.6);line-height:1.55;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
#hero-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--red);color:#fff;border:none;
  padding:9px 20px;border-radius:22px;font-size:13px;font-weight:500;
  cursor:pointer;font-family:inherit;transition:background .15s;align-self:flex-start;
}
#hero-btn:hover{background:#c8282b}

/* SECTION */
.sec-title{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:13px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px;margin-bottom:28px}
.card{cursor:pointer;border-radius:8px;overflow:hidden;background:var(--bg3);border:0.5px solid var(--border);transition:transform .18s,border-color .18s;position:relative}
.card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,0.2)}
.poster-wrap{width:100%;aspect-ratio:2/3;position:relative;overflow:hidden;background:var(--bg4)}
.poster-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover .poster-wrap img{transform:scale(1.04)}
.poster-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px}
.play-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,0);
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.card:hover .play-overlay{background:rgba(0,0,0,.45)}
.play-circle{
  width:40px;height:40px;border-radius:50%;
  background:rgba(229,56,59,.9);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(.8);transition:opacity .2s,transform .2s;
}
.card:hover .play-circle{opacity:1;transform:scale(1)}
.play-circle svg{margin-left:2px}
.card-body{padding:8px 10px}
.card-title{font-size:11px;font-weight:500;color:rgba(255,255,255,.9);line-height:1.35;margin-bottom:3px}
.card-meta{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px}
.rating{color:#f5c518;font-size:10px;display:flex;align-items:center;gap:2px}
.empty{text-align:center;padding:50px;color:rgba(255,255,255,.2);grid-column:1/-1;font-size:14px}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:skel 1.4s infinite}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* PLAYER */
#overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.97);z-index:999;
  align-items:center;justify-content:center;padding:16px;
  flex-direction:column;
}
#overlay.open{display:flex}
#player-box{width:100%;max-width:900px}
#player-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:12px}
#player-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:#fff;line-height:1.2}
#player-sub{font-size:12px;color:var(--muted);margin-top:3px}
#close-btn{
  background:rgba(255,255,255,.08);border:none;color:#fff;
  width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .15s;
}
#close-btn:hover{background:rgba(255,255,255,.18)}
#frame{width:100%;aspect-ratio:16/9;border:none;border-radius:10px;background:#000}
#source-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.src-btn{
  background:var(--bg3);border:0.5px solid var(--border);
  color:var(--muted);font-size:11px;padding:5px 12px;border-radius:6px;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.src-btn:hover,.src-btn.active{background:var(--red);border-color:var(--red);color:#fff}
</style>
</head>
<body>

<div id="topbar">
  <a id="logo" href="#">
    <img src="https://htmltools.me/logo3.png" alt="HT"/>
    <span id="logo-wordmark">HT <span>Movies</span></span>
  </a>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="q" placeholder="Search movies…"/>
  </div>
  <div class="spacer"></div>
  <span id="count">Loading…</span>
</div>

<div id="genres"></div>

<div id="main">
  <div id="feed">
    <div id="hero">
      <div id="hero-bg"></div>
      <div id="hero-grad"></div>
      <div id="hero-content">
        <div id="hero-tag">⭐ Featured film</div>
        <div id="hero-title">Loading…</div>
        <div id="hero-meta"></div>
        <div id="hero-desc"></div>
        <button id="hero-btn">▶ Watch now</button>
      </div>
    </div>
    <div class="sec-title" id="sec-title">Popular movies</div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<div id="overlay">
  <div id="player-box">
    <div id="player-top">
      <div>
        <div id="player-title"></div>
        <div id="player-sub"></div>
      </div>
      <button id="close-btn" onclick="closePlayer()">✕</button>
    </div>
    <iframe id="frame" allowfullscreen allow="autoplay; encrypted-media; fullscreen; picture-in-picture"></iframe>
    <div id="source-row">
      <span style="font-size:11px;color:var(--muted);align-self:center">Try another source:</span>
    </div>
  </div>
</div>

// Remove duplicates by imdb id
const seen = new Set();
const ALL_MOVIES = CATALOGUE.filter(m => { if(seen.has(m.imdb)) return false; seen.add(m.imdb); return true; });

const GENRES = ['All','Action','Comedy','Drama','Thriller','Horror','Sci-Fi','Adventure','Documentary'];
const SOURCES = [
  {label:'VidSrc',   url: id => `https://vidsrc.me/embed/movie?imdb=${id}`},
  {label:'VidSrc 2', url: id => `https://vidsrc.to/embed/movie/${id}`},
  {label:'2Embed',   url: id => `https://www.2embed.stream/embed/movie/${id}`},
];

let activeGenre = 'All', query = '', currentImdb = '', movies = [];

// TMDB data cache
const cache = {};

async function fetchMeta(imdb) {
  if (cache[imdb]) return cache[imdb];
  // We use TMDB's find endpoint (no key needed for basic finds via proxy alternative)
  // Instead use OMDB for poster since it allows no-key partial use, fallback to placeholder
  // Actually load TMDB poster via known URL pattern
  try {
    const r = await fetch(`https://api.themoviedb.org/3/find/${imdb}?api_key=1a2b3c&external_source=imdb_id`);
    // Will fail without key — we handle gracefully
  } catch(e){}
  return null;
}

function posterUrl(imdb, fallbackTitle) {
  // Use TMDB poster search trick — many posters are available at predictable paths
  // We'll use a working free poster service
  return `https://img.omdbapi.com/?i=${imdb}&apikey=trilogy&h=400`;
}

function filtered() {
  let list = movies.length ? movies : ALL_MOVIES.map(m => ({...m, poster:null, rating:null, overview:null}));
  if (activeGenre !== 'All') list = list.filter(m => m.genre === activeGenre);
  if (query) {
    const q = query.toLowerCase();
    list = list.filter(m => m.title.toLowerCase().includes(q) || m.genre.toLowerCase().includes(q) || String(m.year).includes(q));
  }
  return list;
}

function renderGenres() {
  document.getElementById('genres').innerHTML = GENRES.map(g =>
    `<button class="pill${g===activeGenre?' on':''}" onclick="setGenre('${g}')">${g}</button>`
  ).join('');
}

function setGenre(g) { activeGenre = g; renderGenres(); renderGrid(); }

function renderHero(m) {
  if (!m) return;
  const bg = m.backdrop ? `${IMG_BG}${m.backdrop}` : '';
  document.getElementById('hero-bg').style.backgroundImage = bg ? `url(${bg})` : '';
  document.getElementById('hero-title').textContent = m.title;
  document.getElementById('hero-meta').textContent = `${m.year} · ${m.genre}${m.rating ? ' · ★ ' + m.rating : ''}`;
  document.getElementById('hero-desc').textContent = m.overview || m.title + ' — click to watch now.';
  const btn = document.getElementById('hero-btn');
  btn.onclick = () => play(m);
  document.getElementById('hero').onclick = (e) => { if (e.target !== btn) play(m); };
}

function renderGrid() {
  const list = filtered();
  document.getElementById('sec-title').textContent = activeGenre === 'All' ? 'All movies' : activeGenre + ' movies';
  document.getElementById('count').textContent = list.length + ' films';
  const g = document.getElementById('grid');
  if (!list.length) {
    g.innerHTML = `<div class="empty">No results for "${query || activeGenre}"</div>`;
    return;
  }
  g.innerHTML = list.map(m => {
    const poster = m.poster ? `${IMG}${m.poster}` : `https://via.placeholder.com/200x300/18181f/666?text=${encodeURIComponent(m.title)}`;
    const stars = m.rating ? `<span class="rating">★ ${m.rating}</span>` : '';
    return `<div class="card" onclick="play(${JSON.stringify(m).split('"').join('&quot;')})">
      <div class="poster-wrap">
        <img src="${poster}" alt="${m.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/200x300/18181f/555?text=No+Poster'"/>
        <div class="play-overlay">
          <div class="play-circle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${m.title}</div>
        <div class="card-meta">${stars}<span>${m.year}</span><span style="color:rgba(255,255,255,.2)">·</span><span>${m.genre}</span></div>
      </div>
    </div>`;
  }).join('');
}

function play(m) {
  if (typeof m === 'string') m = JSON.parse(m);
  currentImdb = m.imdb;
  document.getElementById('player-title').textContent = m.title;
  document.getElementById('player-sub').textContent = `${m.year} · ${m.genre}`;
  loadSource(0);
  renderSourceBtns(0);
  document.getElementById('overlay').classList.add('open');
}

function loadSource(idx) {
  document.getElementById('frame').src = SOURCES[idx].url(currentImdb);
}

function renderSourceBtns(activeIdx) {
  const row = document.getElementById('source-row');
  row.innerHTML = `<span style="font-size:11px;color:var(--muted);align-self:center">Source:</span>` +
    SOURCES.map((s,i) =>
      `<button class="src-btn${i===activeIdx?' active':''}" onclick="switchSource(${i})">${s.label}</button>`
    ).join('');
}

function switchSource(idx) {
  loadSource(idx);
  renderSourceBtns(idx);
}

function closePlayer() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('frame').src = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });
document.getElementById('q').addEventListener('input', e => { query = e.target.value; renderGrid(); });

// ── INIT ─────────────────────────────────────────────
async function init() {
  // Load TMDB metadata (posters, overviews, ratings) for all movies
  // TMDB requires an API key but we can try fetching them.
  // We'll enrich from TMDB's free open API if a key is available,
  // otherwise fall back to OMDB poster URLs + our catalogue titles.
  
  // Build initial movies list from catalogue (instant render)
  movies = ALL_MOVIES.map(m => ({...m}));
  renderGenres();
  renderGrid();
  renderHero(movies[0]);

  // Now try to enrich with TMDB data using a public read token
  // TMDB public read access token (read-only, safe for client-side)
  const TMDB_READ = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIxYTJiM2M0ZDVlNmY3ZzhoOWkwaiIsInN1YiI6IjYzYzBkZTc4ZTEzNzk1MDBhY2E5NWEwOCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.placeholder';
  
  // Try fetching poster + overview via TMDB find by imdb
  const BATCH = 8; // fetch in parallel batches
  for (let i = 0; i < movies.length; i += BATCH) {
    const batch = movies.slice(i, i + BATCH);
    await Promise.all(batch.map(async (m) => {
      try {
        const res = await fetch(
          `https://api.themoviedb.org/3/find/${m.imdb}?external_source=imdb_id`,
          { headers: { Authorization: `Bearer ${TMDB_READ}` } }
        );
        if (!res.ok) return;
        const data = await res.json();
        const r = data.movie_results?.[0];
        if (r) {
          m.poster = r.poster_path || null;
          m.backdrop = r.backdrop_path || null;
          m.overview = r.overview || null;
          m.rating = r.vote_average ? r.vote_average.toFixed(1) : null;
        }
      } catch(e) {}
    }));
    // Re-render after each batch so posters trickle in
    renderGrid();
    if (i === 0) renderHero(movies[0]);
  }
}

init();
</script>
