<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HT Movies</title>
  <link rel="icon" type="image/png" href="/logo3.png?v=2"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e5383b;--bg:#0b0b0f;--bg2:#111117;--bg3:#18181f;--bg4:#1f1f28;
  --text:#ececec;--muted:rgba(236,236,236,0.42);--border:rgba(255,255,255,0.07);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}

/* TOPBAR */
#topbar{
  height:60px;display:flex;align-items:center;gap:14px;padding:0 24px;
  background:rgba(11,11,15,0.97);border-bottom:0.5px solid var(--border);
  position:relative;z-index:20;backdrop-filter:blur(16px);
}
#logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
#logo img{height:30px;object-fit:contain}
#logo-wm{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:2.5px;color:#fff}
#logo-wm span{color:var(--red)}
.sw{flex:1;max-width:360px;display:flex;align-items:center;gap:8px;background:var(--bg3);border:0.5px solid rgba(255,255,255,0.1);border-radius:24px;padding:0 16px;height:36px}
.sw svg{flex-shrink:0;opacity:.38}
#q{background:transparent;border:none;outline:none;color:#fff;font-size:13px;width:100%;font-family:inherit}
#q::placeholder{color:var(--muted)}
#cnt{font-size:11px;color:var(--muted);background:var(--bg3);border:0.5px solid var(--border);border-radius:12px;padding:4px 12px;white-space:nowrap;margin-left:auto}

/* GENRES */
#gnr{display:flex;gap:7px;padding:10px 24px;overflow-x:auto;scrollbar-width:none;background:var(--bg2);border-bottom:0.5px solid var(--border);flex-shrink:0}
#gnr::-webkit-scrollbar{display:none}
.pill{padding:5px 16px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid rgba(255,255,255,0.11);background:transparent;color:var(--muted);white-space:nowrap;font-family:inherit;transition:all .15s}
.pill:hover{background:rgba(255,255,255,0.07);color:#fff}
.pill.on{background:var(--red);border-color:var(--red);color:#fff}

/* LAYOUT */
#main{display:flex;height:calc(100vh - 101px);overflow:hidden}
#feed{flex:1;overflow-y:auto;padding:20px 24px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.08) transparent}
#feed::-webkit-scrollbar{width:4px}
#feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}

/* HERO */
#hero{border-radius:12px;overflow:hidden;position:relative;height:210px;margin-bottom:24px;cursor:pointer;background:var(--bg3)}
#hbg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.4);transition:filter .3s}
#hero:hover #hbg{filter:brightness(.5)}
#hgrad{position:absolute;inset:0;background:linear-gradient(90deg,rgba(11,11,15,.96) 0%,rgba(11,11,15,.35) 65%,transparent 100%)}
#hcont{position:relative;z-index:1;padding:0 26px;height:100%;display:flex;flex-direction:column;justify-content:center;max-width:520px}
#htag{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--red);margin-bottom:6px}
#htitle{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1.5px;line-height:1;margin-bottom:5px}
#hmeta{font-size:12px;color:rgba(255,255,255,.45);margin-bottom:8px}
#hdesc{font-size:12px;color:rgba(255,255,255,.58);line-height:1.55;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
#hbtn{display:inline-flex;align-items:center;gap:7px;background:var(--red);color:#fff;border:none;padding:9px 20px;border-radius:22px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:background .15s;align-self:flex-start}
#hbtn:hover{background:#bf2b2e}
.sec-t{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:13px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(142px,1fr));gap:12px;margin-bottom:28px}
.card{cursor:pointer;border-radius:8px;overflow:hidden;background:var(--bg3);border:0.5px solid var(--border);transition:transform .18s,border-color .18s;position:relative}
.card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,0.2)}
.pw{width:100%;aspect-ratio:2/3;position:relative;overflow:hidden;background:var(--bg4)}
.pw img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card:hover .pw img{transform:scale(1.05)}
.po{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:center;justify-content:center;transition:background .2s}
.card:hover .po{background:rgba(0,0,0,.5)}
.pc{width:42px;height:42px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.75);transition:opacity .2s,transform .2s}
.card:hover .pc{opacity:1;transform:scale(1)}
.pc svg{margin-left:3px}
.cb{padding:8px 10px}
.ct{font-size:11px;font-weight:500;color:rgba(255,255,255,.9);line-height:1.35;margin-bottom:3px}
.cm{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.rt{color:#f5c518}
.empty{text-align:center;padding:50px;color:rgba(255,255,255,.2);grid-column:1/-1}

/* PLAYER */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:999;align-items:center;justify-content:center;padding:16px;flex-direction:column}
#ov.open{display:flex}
#pbox{width:100%;max-width:920px}
#ptop{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:12px}
#ptitle{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:#fff;line-height:1.2}
#psub{font-size:12px;color:var(--muted);margin-top:3px}
#xcl{background:rgba(255,255,255,.08);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
#xcl:hover{background:rgba(255,255,255,.18)}
#frm{width:100%;aspect-ratio:16/9;border:none;border-radius:10px;background:#000}
#srcrow{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap;align-items:center}
.sb{background:var(--bg3);border:0.5px solid var(--border);color:var(--muted);font-size:11px;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .15s}
.sb:hover,.sb.on{background:var(--red);border-color:var(--red);color:#fff}
#snote{font-size:11px;color:var(--muted)}
</style>
</head>
<body>

<div id="topbar">
  <a id="logo" href="#">
    <img src="https://htmltools.me/logo3.png" alt="HT"/>
    <span id="logo-wm">HT <span>Movies</span></span>
  </a>
  <div class="sw">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="q" placeholder="Search title, genre, year…"/>
  </div>
  <span id="cnt">— films</span>
</div>

<div id="gnr"></div>

<div id="main">
  <div id="feed">
    <div id="hero" onclick="heroClick()">
      <div id="hbg"></div>
      <div id="hgrad"></div>
      <div id="hcont">
        <div id="htag">⭐ Featured</div>
        <div id="htitle">Loading…</div>
        <div id="hmeta"></div>
        <div id="hdesc"></div>
        <button id="hbtn" onclick="event.stopPropagation();heroPlay()">▶ Watch now</button>
      </div>
    </div>
    <div class="sec-t" id="sect">All movies</div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<div id="ov">
  <div id="pbox">
    <div id="ptop">
      <div>
        <div id="ptitle"></div>
        <div id="psub"></div>
      </div>
      <button id="xcl" onclick="closePlayer()">✕</button>
    </div>
    <iframe id="frm" allowfullscreen allow="autoplay; encrypted-media; fullscreen; picture-in-picture"></iframe>
    <div id="srcrow">
      <span id="snote">Try another server if it doesn't load:</span>
    </div>
  </div>
</div>

<script>
// ── CATALOGUE ──────────────────────────────────────────
const CAT = [
  {i:'tt1745960',t:'Top Gun: Maverick',y:2022,g:'Action'},
  {i:'tt10872600',t:'Spider-Man: No Way Home',y:2021,g:'Action'},
  {i:'tt9376612',t:'Shang-Chi',y:2021,g:'Action'},
  {i:'tt6334354',t:'The Suicide Squad',y:2021,g:'Action'},
  {i:'tt10640346',t:'Bullet Train',y:2022,g:'Action'},
  {i:'tt12361974',t:'The Gray Man',y:2022,g:'Action'},
  {i:'tt11138512',t:'Uncharted',y:2022,g:'Action'},
  {i:'tt9376562',t:'Ambulance',y:2022,g:'Action'},
  {i:'tt9114286',t:'Black Adam',y:2022,g:'Action'},
  {i:'tt3480822',t:'Black Panther: Wakanda Forever',y:2022,g:'Action'},
  {i:'tt10648342',t:'Thor: Love and Thunder',y:2022,g:'Action'},
  {i:'tt9288408',t:'The Father',y:2020,g:'Drama'},
  {i:'tt10160678',t:'The Gentlemen',y:2020,g:'Action'},
  {i:'tt10370822',t:'Nobody',y:2021,g:'Action'},
  {i:'tt14444726',t:'Glass Onion',y:2022,g:'Thriller'},
  {i:'tt9179892',t:'The Menu',y:2022,g:'Thriller'},
  {i:'tt8946378',t:'Knives Out',y:2019,g:'Thriller'},
  {i:'tt6751668',t:'Parasite',y:2019,g:'Thriller'},
  {i:'tt6710474',t:'Everything Everywhere All at Once',y:2022,g:'Sci-Fi'},
  {i:'tt1745016',t:'Dune',y:2021,g:'Sci-Fi'},
  {i:'tt15239678',t:'Dune: Part Two',y:2024,g:'Sci-Fi'},
  {i:'tt9603212',t:'Tenet',y:2020,g:'Sci-Fi'},
  {i:'tt10954984',t:'Barbarian',y:2022,g:'Horror'},
  {i:'tt7349950',t:'Nope',y:2022,g:'Horror'},
  {i:'tt10720892',t:'Smile',y:2022,g:'Horror'},
  {i:'tt6316138',t:'Midsommar',y:2019,g:'Horror'},
  {i:'tt7286456',t:'Joker',y:2019,g:'Drama'},
  {i:'tt10683552',t:'The Power of the Dog',y:2021,g:'Drama'},
  {i:'tt8521718',t:'Marriage Story',y:2019,g:'Drama'},
  {i:'tt7529770',t:'1917',y:2019,g:'Drama'},
  {i:'tt6264654',t:'Free Guy',y:2021,g:'Comedy'},
  {i:'tt9484998',t:'Palm Springs',y:2020,g:'Comedy'},
  {i:'tt11951276',t:'The Unbearable Weight of Massive Talent',y:2022,g:'Comedy'},
  {i:'tt2278388',t:'The Grand Budapest Hotel',y:2014,g:'Comedy'},
  {i:'tt7131622',t:'Once Upon a Time in Hollywood',y:2019,g:'Drama'},
  {i:'tt4154796',t:'Avengers: Endgame',y:2019,g:'Action'},
  {i:'tt4154756',t:'Avengers: Infinity War',y:2018,g:'Action'},
  {i:'tt3501632',t:'Thor: Ragnarok',y:2017,g:'Action'},
  {i:'tt2015381',t:'Guardians of the Galaxy',y:2014,g:'Action'},
  {i:'tt3498820',t:'Captain America: Civil War',y:2016,g:'Action'},
  {i:'tt1843866',t:'Captain America: The Winter Soldier',y:2014,g:'Action'},
  {i:'tt0816711',t:'John Wick',y:2014,g:'Action'},
  {i:'tt4425200',t:'John Wick: Chapter 2',y:2017,g:'Action'},
  {i:'tt6146586',t:'John Wick: Chapter 3',y:2019,g:'Action'},
  {i:'tt3315342',t:'Logan',y:2017,g:'Action'},
  {i:'tt4912910',t:'Mission: Impossible – Fallout',y:2018,g:'Action'},
  {i:'tt2381249',t:'Mission: Impossible – Rogue Nation',y:2015,g:'Action'},
  {i:'tt1270797',t:'The Revenant',y:2015,g:'Drama'},
  {i:'tt2562232',t:'Birdman',y:2014,g:'Drama'},
  {i:'tt3783958',t:'La La Land',y:2016,g:'Drama'},
  {i:'tt5013056',t:'Dunkirk',y:2017,g:'Drama'},
  {i:'tt6966692',t:'Green Book',y:2018,g:'Drama'},
  {i:'tt4925292',t:'Moonlight',y:2016,g:'Drama'},
  {i:'tt4903820',t:'Hacksaw Ridge',y:2016,g:'Drama'},
  {i:'tt4729430',t:'The Florida Project',y:2017,g:'Drama'},
  {i:'tt1853728',t:'Django Unchained',y:2012,g:'Drama'},
  {i:'tt5052448',t:'Get Out',y:2017,g:'Horror'},
  {i:'tt7784604',t:'Us',y:2019,g:'Horror'},
  {i:'tt2543164',t:'Arrival',y:2016,g:'Sci-Fi'},
  {i:'tt3659388',t:'The Martian',y:2015,g:'Sci-Fi'},
  {i:'tt0816692',t:'Interstellar',y:2014,g:'Sci-Fi'},
  {i:'tt1375666',t:'Inception',y:2010,g:'Sci-Fi'},
  {i:'tt0910970',t:'WALL-E',y:2008,g:'Sci-Fi'},
  {i:'tt3460252',t:'The Hateful Eight',y:2015,g:'Thriller'},
  {i:'tt2737304',t:'Prisoners',y:2013,g:'Thriller'},
  {i:'tt1843241',t:'The Lego Movie',y:2014,g:'Comedy'},
  {i:'tt0468569',t:'The Dark Knight',y:2008,g:'Action'},
  {i:'tt0371746',t:'Iron Man',y:2008,g:'Action'},
  {i:'tt0120737',t:'The Lord of the Rings: Fellowship',y:2001,g:'Adventure'},
  {i:'tt0167261',t:'The Lord of the Rings: Two Towers',y:2002,g:'Adventure'},
  {i:'tt0167260',t:'The Lord of the Rings: Return of the King',y:2003,g:'Adventure'},
  {i:'tt0209144',t:'Memento',y:2000,g:'Thriller'},
  {i:'tt0137523',t:'Fight Club',y:1999,g:'Thriller'},
  {i:'tt0435761',t:'Toy Story 3',y:2010,g:'Comedy'},
  {i:'tt0892769',t:'How to Train Your Dragon',y:2010,g:'Comedy'},
];

const SEEN = new Set();
const ALL = CAT.filter(m => { if(SEEN.has(m.i)) return false; SEEN.add(m.i); return true; });
const GENRES = ['All','Action','Drama','Comedy','Thriller','Horror','Sci-Fi','Adventure'];

const SRCS = [
  {n:'Server 1', u: id => `https://vidsrc.me/embed/movie?imdb=${id}`},
  {n:'Server 2', u: id => `https://vidsrc.to/embed/movie/${id}`},
  {n:'Server 3', u: id => `https://www.2embed.stream/embed/movie/${id}`},
  {n:'Server 4', u: id => `https://multiembed.mov/?video_id=${id}`},
];

const TMDB_IMG   = 'https://image.tmdb.org/t/p/w342';
const TMDB_BG    = 'https://image.tmdb.org/t/p/w780';
// FIX 1: Use Bearer token auth instead of api_key query param
const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiIzZTg0ODcyOTBkNGFmOTBjNTA2MjEwNDY5OTc5Y2QzNSIsIm5iZiI6MTc3OTMwNzc0NS4xMTksInN1YiI6IjZhMGUxNGUxY2EyYmQ0MTk1YzViY2ZjYyIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.8tivOVBq_VYSvglCbL7d-uzfBDDrSB4NM0XgJukGGsY';

let genre = 'All', q = '', movies = [], heroM = null, curImdb = '';

// movieMap for fast lookup by imdb id
const movieMap = {};

function gfilter() {
  return movies.filter(m => {
    const gok = genre === 'All' || m.g === genre;
    const sq = q.toLowerCase();
    const qok = !q || m.t.toLowerCase().includes(sq) || m.g.toLowerCase().includes(sq) || String(m.y).includes(sq);
    return gok && qok;
  });
}

function gnrs() {
  document.getElementById('gnr').innerHTML = GENRES.map(g =>
    `<button class="pill${g===genre?' on':''}" onclick="sg('${g}')">${g}</button>`
  ).join('');
}
function sg(v) { genre = v; gnrs(); renderGrid(); }

function renderHero(m) {
  if (!m) return;
  heroM = m;
  document.getElementById('hbg').style.backgroundImage = m.bd ? `url(${TMDB_BG}${m.bd})` : '';
  document.getElementById('htitle').textContent = m.t;
  document.getElementById('hmeta').textContent = `${m.y} · ${m.g}${m.r ? ' · ★ '+m.r : ''}`;
  document.getElementById('hdesc').textContent = m.ov || 'Click to watch this film now — free, no sign-up.';
}
function heroClick() { if(heroM) play(heroM); }
function heroPlay()  { if(heroM) play(heroM); }

// FIX 2: renderGrid builds the DOM once; subsequent metadata updates patch individual cards
function renderGrid() {
  const list = gfilter();
  document.getElementById('sect').textContent = genre === 'All' ? 'All movies' : genre + ' movies';
  document.getElementById('cnt').textContent = list.length + ' films';
  const g = document.getElementById('grid');
  if (!list.length) { g.innerHTML = `<div class="empty">No results for "${q||genre}"</div>`; return; }
  g.innerHTML = list.map(m => {
    const src = m.p
      ? `${TMDB_IMG}${m.p}`
      : `https://placehold.co/200x300/18181f/555555?text=${encodeURIComponent(m.t)}`;
    return `<div class="card" id="card-${m.i}" onclick='play(${JSON.stringify({i:m.i,t:m.t,y:m.y,g:m.g,r:m.r,ov:m.ov})})'>
      <div class="pw">
        <img id="img-${m.i}" src="${src}" alt="${m.t}" loading="lazy" onerror="this.src='https://placehold.co/200x300/1f1f28/555555?text=No+Poster'"/>
        <div class="po"><div class="pc"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
      </div>
      <div class="cb">
        <div class="ct">${m.t}</div>
        <div class="cm" id="meta-${m.i}">${m.r?`<span class="rt">★ ${m.r}</span>`:''}<span>${m.y}</span><span style="opacity:.3">·</span><span>${m.g}</span></div>
      </div>
    </div>`;
  }).join('');
}

// FIX 2 cont: patch only the card that received new metadata — no full re-render
function patchCard(m) {
  const img = document.getElementById(`img-${m.i}`);
  if (img && m.p) img.src = `${TMDB_IMG}${m.p}`;

  const meta = document.getElementById(`meta-${m.i}`);
  if (meta) {
    meta.innerHTML = `${m.r?`<span class="rt">★ ${m.r}</span>`:''}<span>${m.y}</span><span style="opacity:.3">·</span><span>${m.g}</span>`;
  }

  // Update onclick payload on the card too (for rating/overview)
  const card = document.getElementById(`card-${m.i}`);
  if (card) card.setAttribute('onclick', `play(${JSON.stringify({i:m.i,t:m.t,y:m.y,g:m.g,r:m.r,ov:m.ov})})`);
}

function play(m) {
  if (typeof m === 'string') m = JSON.parse(m);
  curImdb = m.i;
  document.getElementById('ptitle').textContent = m.t;
  document.getElementById('psub').textContent = `${m.y} · ${m.g}${m.r ? ' · ★ '+m.r:''}`;
  loadSrc(0);
  renderSrcs(0);
  document.getElementById('ov').classList.add('open');
}

function loadSrc(idx) { document.getElementById('frm').src = SRCS[idx].u(curImdb); }
function renderSrcs(ai) {
  document.getElementById('srcrow').innerHTML =
    `<span id="snote" style="font-size:11px;color:var(--muted)">Server:</span>` +
    SRCS.map((s,i)=>`<button class="sb${i===ai?' on':''}" onclick="sw(${i})">${s.n}</button>`).join('');
}
function sw(i) { loadSrc(i); renderSrcs(i); }
function closePlayer() {
  document.getElementById('ov').classList.remove('open');
  document.getElementById('frm').src = '';
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closePlayer(); });
document.getElementById('q').addEventListener('input', e => { q = e.target.value; renderGrid(); });

// ── INIT ──────────────────────────────────────────────
async function init() {
  movies = ALL.map(m => ({...m}));
  gnrs();
  renderGrid();        // single initial render — no flicker from here on
  renderHero(movies[0]);

  const HEADERS = {
    'Authorization': `Bearer ${TMDB_TOKEN}`,
    'Content-Type': 'application/json'
  };

  const B = 10;
  for (let i = 0; i < movies.length; i += B) {
    await Promise.all(movies.slice(i, i + B).map(async m => {
      try {
        // FIX 1: Bearer auth — no api_key param needed
        const res = await fetch(
          `https://api.themoviedb.org/3/find/${m.i}?external_source=imdb_id`,
          { headers: HEADERS }
        );
        if (!res.ok) return;
        const d = await res.json();
        const r = d.movie_results?.[0];
        if (r) {
          m.p  = r.poster_path   || null;
          m.bd = r.backdrop_path || null;
          m.ov = r.overview      || null;
          m.r  = r.vote_average ? (+r.vote_average).toFixed(1) : null;

          // FIX 2: patch just this card, don't re-render the whole grid
          patchCard(m);
        }
      } catch(e) {}
    }));
  }

  // Hero gets updated once all metadata is in
  renderHero(movies[0]);
}

init();
</script>
</body>
</html>
