<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TikTok Feed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

  /* ── START SCREEN ── */
  #start-screen {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    z-index: 999;
  }
  #start-screen h1 { font-size: 2rem; }
  #start-screen p  { color: #aaa; font-size: 0.9rem; }
  #start-btn {
    padding: 14px 40px; background: #fe2c55; color: #fff;
    border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer;
  }

  /* ── FEED ── */
  #feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  #feed::-webkit-scrollbar { display: none; }

  /* ── SLIDE ── */
  .slide {
    height: 100vh;
    scroll-snap-align: start;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    overflow: hidden;
  }

  /* Native video — fills height, letterboxes width */
  .slide video {
    height: 100%;
    width: 100%;
    object-fit: contain;
    display: block;
    cursor: pointer;
  }

  /* Tap-to-pause icon */
  .pause-icon {
    position: absolute;
    font-size: 4rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    z-index: 5;
  }
  .pause-icon.show { opacity: 1; }

  /* ── BOTTOM INFO ── */
  .slide-info {
    position: absolute; bottom: 0; left: 0; right: 64px;
    padding: 14px 14px 20px;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    z-index: 4; pointer-events: none;
  }
  .slide-author { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
  .slide-music  { font-size: 0.75rem; color: #ccc; margin-bottom: 5px; }
  .slide-desc   {
    font-size: 0.8rem; color: #ddd; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* ── RIGHT ACTIONS ── */
  .slide-actions {
    position: absolute; right: 0; bottom: 70px;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    padding: 0 10px;
    z-index: 4;
  }
  .action {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 0.68rem; color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    cursor: pointer; user-select: none;
  }
  .action .icon { font-size: 1.8rem; line-height: 1; }

  /* ── PROGRESS BAR ── */
  .progress-wrap {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px; background: rgba(255,255,255,0.2);
    z-index: 5; cursor: pointer;
  }
  .progress-bar {
    height: 100%; background: #fe2c55;
    width: 0%; transition: width 0.1s linear;
    pointer-events: none;
  }

  /* ── LOADER / ERROR ── */
  #loader {
    height: 100vh; scroll-snap-align: start;
    display: flex; align-items: center; justify-content: center;
    color: #aaa; font-size: 0.9rem;
  }
  #error-msg {
    color: #fe2c55; padding: 20px; font-size: 0.85rem;
    font-family: monospace; white-space: pre-wrap;
  }

  /* ── COMMENTS PANEL ── */
  #comments-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 60vh;
    background: #1a1a1a;
    border-radius: 16px 16px 0 0;
    z-index: 100;
    display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  }
  #comments-panel.open { transform: translateY(0); }
  #comments-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 16px 12px;
    border-bottom: 1px solid #333;
    font-weight: 700; font-size: 1rem;
  }
  #comments-close {
    background: none; border: none; color: #fff;
    font-size: 1.4rem; cursor: pointer; line-height: 1;
  }
  #comments-list {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 14px;
  }
  #comments-list::-webkit-scrollbar { display: none; }
  .comment {
    display: flex; gap: 10px; align-items: flex-start;
  }
  .comment-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: #333; flex-shrink: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; color: #aaa;
  }
  .comment-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .comment-body { flex: 1; }
  .comment-user { font-weight: 600; font-size: 0.82rem; color: #fff; margin-bottom: 2px; }
  .comment-text { font-size: 0.85rem; color: #ddd; line-height: 1.4; }
  .comment-likes { font-size: 0.75rem; color: #888; margin-top: 3px; }
  .comment-loading { color: #888; font-size: 0.85rem; text-align: center; padding: 20px; }
  #comments-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
    display: none;
  }
  #comments-overlay.show { display: block; }
</style>
</head>
<body>

<div id="start-screen">
  <h1>🎵 TikTok Feed</h1>
  <p>Scroll through trending TikTok videos</p>
  <button id="start-btn">▶ Start Scrolling</button>
</div>

<div id="feed"></div>

<!-- Comments -->
<div id="comments-overlay"></div>
<div id="comments-panel">
  <div id="comments-header">
    <span id="comments-title">Comments</span>
    <button id="comments-close">✕</button>
  </div>
  <div id="comments-list"></div>
</div>

<script>
const KEY  = 'IZqo3P4uw2P5wnNvQD5q0GH9f5i1';
const BASE = 'https://api.scrapecreators.com';

let cursor = 0, loading = false, started = false;
let currentVideoEl = null;
let currentAwemeId = null;

const feed = document.getElementById('feed');
const commentsPanel   = document.getElementById('comments-panel');
const commentsOverlay = document.getElementById('comments-overlay');
const commentsList    = document.getElementById('comments-list');
const commentsTitle   = document.getElementById('comments-title');

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmt(n) {
  if (!n && n !== 0) return '0';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return '' + n;
}

// ── Comments panel ───────────────────────────────────────────────────────────
async function openComments(awemeId, commentCount) {
  commentsTitle.textContent = `${fmt(commentCount)} Comments`;
  commentsList.innerHTML = '<div class="comment-loading">Loading comments…</div>';
  commentsPanel.classList.add('open');
  commentsOverlay.classList.add('show');

  // Pause current video while comments are open
  if (currentVideoEl) currentVideoEl.pause();

  try {
    const r = await fetch(`${BASE}/v1/tiktok/video/comments?aweme_id=${awemeId}&count=30`, {
      headers: { 'x-api-key': KEY }
    });
    const data = await r.json();
    const comments = data.comments || [];
    if (!comments.length) {
      commentsList.innerHTML = '<div class="comment-loading">No comments found.</div>';
      return;
    }
    commentsList.innerHTML = '';
    comments.forEach(c => {
      const user   = c.user?.unique_id || c.user?.uniqueId || 'user';
      const avatar = c.user?.avatar_thumb?.url_list?.[0] || '';
      const text   = c.text || '';
      const likes  = c.digg_count || 0;
      const el = document.createElement('div');
      el.className = 'comment';
      el.innerHTML = `
        <div class="comment-avatar">
          ${avatar ? `<img src="${avatar}" alt="${user}">` : user[0].toUpperCase()}
        </div>
        <div class="comment-body">
          <div class="comment-user">@${user}</div>
          <div class="comment-text">${text}</div>
          <div class="comment-likes">❤️ ${fmt(likes)}</div>
        </div>`;
      commentsList.appendChild(el);
    });
  } catch(e) {
    commentsList.innerHTML = `<div class="comment-loading">Could not load comments.</div>`;
  }
}

function closeComments() {
  commentsPanel.classList.remove('open');
  commentsOverlay.classList.remove('show');
  // Resume video
  if (currentVideoEl) currentVideoEl.play().catch(() => {});
}

document.getElementById('comments-close').onclick = closeComments;
commentsOverlay.onclick = closeComments;

// ── Build a slide ─────────────────────────────────────────────────────────────
function addSlide(v) {
  const author   = v.author?.unique_id || v.author?.uniqueId || '?';
  const nickname = v.author?.nickname  || '@' + author;
  const desc     = v.desc  || '';
  const music    = v.music?.title ? `🎵 ${v.music.title}` : '';
  const views    = v.statistics?.play_count    || 0;
  const likes    = v.statistics?.digg_count    || 0;
  const comments = v.statistics?.comment_count || 0;
  const awemeId  = v.aweme_id;

  // Prefer H264 play URL (widest browser support)
  const videoUrl = v.video?.play_addr_h264?.url_list?.[0]
                || v.video?.play_addr?.url_list?.[0]
                || '';

  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.dataset.awemeId = awemeId;

  slide.innerHTML = `
    <video
      src="${videoUrl}"
      loop
      playsinline
      preload="none"
      webkit-playsinline
    ></video>
    <div class="pause-icon">⏸</div>
    <div class="slide-info">
      <div class="slide-author">@${author} · ${nickname}</div>
      ${music ? `<div class="slide-music">${music}</div>` : ''}
      <div class="slide-desc">${desc}</div>
    </div>
    <div class="slide-actions">
      <div class="action like-btn">
        <span class="icon">❤️</span>${fmt(likes)}
      </div>
      <div class="action comment-btn">
        <span class="icon">💬</span>${fmt(comments)}
      </div>
      <div class="action">
        <span class="icon">▶️</span>${fmt(views)}
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>`;

  const video    = slide.querySelector('video');
  const pauseIcon = slide.querySelector('.pause-icon');
  const progressBar = slide.querySelector('.progress-bar');

  // Tap to pause/resume
  video.addEventListener('click', () => {
    if (video.paused) {
      video.play().catch(() => {});
      pauseIcon.textContent = '▶';
    } else {
      video.pause();
      pauseIcon.textContent = '⏸';
    }
    pauseIcon.classList.add('show');
    setTimeout(() => pauseIcon.classList.remove('show'), 600);
  });

  // Progress bar
  video.addEventListener('timeupdate', () => {
    if (video.duration) {
      progressBar.style.width = (video.currentTime / video.duration * 100) + '%';
    }
  });

  // Seek by clicking progress bar
  slide.querySelector('.progress-wrap').addEventListener('click', e => {
    if (!video.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pct  = (e.clientX - rect.left) / rect.width;
    video.currentTime = pct * video.duration;
  });

  // Comments button
  slide.querySelector('.comment-btn').addEventListener('click', () => {
    openComments(awemeId, comments);
  });

  const loader = document.getElementById('loader');
  if (loader) feed.insertBefore(slide, loader);
  else feed.appendChild(slide);
}

// ── Intersection Observer: play visible, pause hidden ────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    const slide = entry.target;
    const video = slide.querySelector('video');
    if (!video) return;

    if (entry.isIntersecting) {
      // Load src lazily on first view
      if (!video.src || video.src === window.location.href) {
        video.src = video.dataset.src || video.src;
      }
      video.play().catch(() => {});
      currentVideoEl  = video;
      currentAwemeId  = slide.dataset.awemeId;
    } else {
      video.pause();
      video.currentTime = 0;
    }
  });
}, { threshold: 0.6 });

// ── Load batch from API ───────────────────────────────────────────────────────
function showLoader() {
  const el = document.createElement('div');
  el.id = 'loader';
  el.textContent = 'Loading more…';
  feed.appendChild(el);
}
function removeLoader() {
  document.getElementById('loader')?.remove();
}

async function load() {
  if (loading) return;
  loading = true;
  showLoader();

  try {
    const r = await fetch(`${BASE}/v1/tiktok/get-trending-feed?cursor=${cursor}`, {
      headers: { 'x-api-key': KEY }
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const videos = data.aweme_list || [];
    removeLoader();
    videos.forEach(v => {
      if (v.video?.play_addr_h264?.url_list?.[0] || v.video?.play_addr?.url_list?.[0]) {
        addSlide(v);
        observer.observe(feed.lastElementChild);
      }
    });
    cursor = data.nextCursor ?? data.cursor ?? (cursor + videos.length);
  } catch(e) {
    removeLoader();
    const err = document.createElement('div');
    err.id = 'error-msg';
    err.textContent = 'Error: ' + e.message;
    feed.appendChild(err);
  }

  loading = false;
}

// ── Infinite scroll ───────────────────────────────────────────────────────────
feed.addEventListener('scroll', () => {
  if (!started) return;
  const nearBottom = feed.scrollTop + feed.clientHeight >= feed.scrollHeight - feed.clientHeight;
  if (nearBottom) load();
});

// ── Start ─────────────────────────────────────────────────────────────────────
document.getElementById('start-btn').onclick = () => {
  document.getElementById('start-screen').style.display = 'none';
  started = true;
  load();
};
</script>
</body>
</html>
