<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>TikTok Debug</title>
<style>
  body { background: #111; color: #0f0; font-family: monospace; padding: 20px; }
  pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; }
  button { padding: 10px 20px; background: #fe2c55; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 20px; font-size: 1rem; }
</style>
</head>
<body>
<h2>TikTok API Debug - Video URL Finder</h2>
<button onclick="load()">Fetch First Video & Log Structure</button>
<pre id="out">Click the button...</pre>
<script>
async function load() {
  const out = document.getElementById('out');
  out.textContent = 'Fetching...';
  try {
    const r = await fetch('https://api.scrapecreators.com/v1/tiktok/get-trending-feed?cursor=0', {
      headers: { 'x-api-key': 'IZqo3P4uw2P5wnNvQD5q0GH9f5i1' }
    });
    const data = await r.json();
    const v = data.aweme_list[0];

    // Extract all keys that look URL-related
    const urls = [];
    function walk(obj, path) {
      if (!obj || typeof obj !== 'object') return;
      for (const [k, val] of Object.entries(obj)) {
        const p = path + '.' + k;
        if (typeof val === 'string' && (val.startsWith('http') || val.includes('url'))) {
          urls.push(p + ' = ' + val.substring(0, 100));
        } else if (Array.isArray(val) && val.length > 0 && typeof val[0] === 'string' && val[0].startsWith('http')) {
          urls.push(p + '[0] = ' + val[0].substring(0, 100));
        } else if (typeof val === 'object') {
          walk(val, p);
        }
      }
    }
    walk(v, 'video');

    // Also show full video object
    out.textContent = '=== URL-like fields ===\n' + urls.join('\n') + '\n\n=== Full video object ===\n' + JSON.stringify(v.video, null, 2);
  } catch(e) {
    out.textContent = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
