<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>TikTok Browser</title>
<style>
  body { font-family: sans-serif; background: #111; color: #eee; margin: 0; padding: 0; }
  #top { position: sticky; top: 0; background: #111; padding: 10px; display: flex; gap: 8px; z-index: 10; border-bottom: 1px solid #333; }
  #top input { flex: 1; padding: 8px; background: #222; color: #eee; border: 1px solid #444; border-radius: 4px; font-size: 14px; }
  #top button { padding: 8px 14px; background: #fe2c55; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
  #top select { padding: 8px; background: #222; color: #eee; border: 1px solid #444; border-radius: 4px; }
  #status { padding: 8px 10px; font-size: 13px; color: #aaa; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 10px; }
  .card { background: #1a1a1a; border-radius: 8px; overflow: hidden; cursor: pointer; }
  .card img { width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block; background: #222; }
  .card-info { padding: 6px 8px 8px; }
  .card-author { font-size: 12px; color: #25f4ee; font-weight: bold; }
  .card-desc { font-size: 11px; color: #aaa; margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-stats { font-size: 11px; color: #888; margin-top: 3px; }
  #sentinel { height: 40px; }
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; }
  #overlay.on { display: flex; }
  #modal { background: #1a1a1a; border-radius: 10px; max-width: 360px; width: 90%; max-height: 90vh; overflow-y: auto; }
  #modal-head { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid #333; }
  #modal-author { color: #25f4ee; font-weight: bold; }
  #modal-close { background: #333; border: none; color: #eee; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 16px; }
  #modal-thumb { position: relative; }
  #modal-img { width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block; }
  #modal-watch { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); }
  #modal-watch a { background: #fe2c55; color: #fff; text-decoration: none; padding: 12px 24px; border-radius: 25px; font-weight: bold; font-size: 15px; }
  #modal-body { padding: 12px 14px; }
  #modal-desc { font-size: 13px; color: #eee; margin-bottom: 10px; line-height: 1.5; }
  #modal-stats { display: flex; gap: 16px; margin-bottom: 12px; font-size: 13px; color: #aaa; }
  #modal-stats span b { display: block; color: #eee; font-size: 15px; }
  .ctitle { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .comment { background: #222; border-radius: 6px; padding: 8px; margin-bottom: 6px; }
  .comment-user { font-size: 11px; color: #25f4ee; font-weight: bold; }
  .comment-text { font-size: 12px; color: #ddd; margin-top: 3px; }
  .comment-likes { font-size: 11px; color: #888; margin-top: 2px; }
  #raw-error { color: #fe2c55; font-size: 12px; padding: 4px 10px; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
</style>
</head>
<body>

<div id="top">
  <select id="mode">
    <option value="trending">🔥 Trending</option>
    <option value="keyword">🔍 Keyword</option>
    <option value="hashtag"># Hashtag</option>
    <option value="user">👤 Creator</option>
  </select>
  <input id="query" type="text" placeholder="Type and press Go..." />
  <button id="go">Go</button>
</div>

<div id="status">Loading...</div>
<div id="raw-error"></div>
<div id="grid"></div>
<div id="sentinel"></div>

<div id="overlay">
  <div id="modal">
    <div id="modal-head">
      <span id="modal-author"></span>
      <button id="modal-close">✕</button>
    </div>
    <div id="modal-thumb">
      <img id="modal-img" src="" alt="" />
      <div id="modal-watch"><a id="modal-link" href="#" target="_blank">▶ Watch on TikTok</a></div>
    </div>
    <div id="modal-body">
      <div id="modal-desc"></div>
      <div id="modal-stats"></div>
      <div class="ctitle">💬 Comments</div>
      <div id="comments-list"></div>
    </div>
  </div>
</div>

<script>
const KEY = 'IZqo3P4uw2P5wnNvQD5q0GH9f5i1';
const BASE = 'https://api.scrapecreators.com';

let mode = 'trending', query = '', cursor = 0, loading = false, done = false;

const grid   = document.getElementById('grid');
const status = document.getElementById('status');
const errBox = document.getElementById('raw-error');

function fmt(n) {
  if (!n) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return ''+n;
}

async function apiFetch(url) {
  errBox.textContent = '';
  const r = await fetch(url, { headers: { 'x-api-key': KEY } });
  const text = await r.text();
  if (!r.ok) {
    errBox.textContent = `API Error ${r.status} on:\n${url}\n\nResponse: ${text}`;
    throw new Error('HTTP ' + r.status);
  }
  try { return JSON.parse(text); }
  catch(e) { errBox.textContent = 'Bad JSON:\n' + text.slice(0, 300); throw e; }
}

function buildUrl() {
  const q = encodeURIComponent(query);
  if (mode === 'trending') return `${BASE}/v1/tiktok/get-trending-feed?cursor=${cursor}`;
  if (mode === 'keyword')  return `${BASE}/v1/tiktok/search/keyword?query=${q}&cursor=${cursor}`;
  if (mode === 'hashtag')  return `${BASE}/v1/tiktok/search/hashtag?hashtag=${encodeURIComponent(query.replace(/^#/,''))}&cursor=${cursor}`;
  if (mode === 'user')     return `${BASE}/v3/tiktok/profile/videos?handle=${encodeURIComponent(query.replace(/^@/,''))}&cursor=${cursor}`;
}

function extractVideos(data) {
  return data.videos || data.itemList || data.items
      || data.data?.videos || data.data?.itemList || data.result?.videos || [];
}

function addCard(v) {
  const author = v.author?.uniqueId || v.authorMeta?.name || v.username || '?';
  const desc   = v.desc || v.title || '';
  const views  = v.stats?.playCount  || v.statsV2?.playCount  || v.playCount  || 0;
  const likes  = v.stats?.diggCount  || v.statsV2?.diggCount  || v.diggCount  || 0;
  const comms  = v.stats?.commentCount || v.statsV2?.commentCount || 0;
  const thumb  = v.video?.cover || v.cover || v.originCover || v.dynamicCover || '';
  const vid    = v.id || v.video?.id || '';
  const url    = v.webVideoUrl || `https://www.tiktok.com/@${author}/video/${vid}`;

  const el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = `
    <img src="${thumb}" loading="lazy" onerror="this.style.background='#333'" />
    <div class="card-info">
      <div class="card-author">@${author}</div>
      <div class="card-desc">${desc || '—'}</div>
      <div class="card-stats">▶ ${fmt(views)} &nbsp; ♥ ${fmt(likes)}</div>
    </div>`;
  el.onclick = () => openModal(v, url, author, thumb, desc, views, likes, comms);
  grid.appendChild(el);
}

async function load(reset = false) {
  if (loading || done) return;
  loading = true;
  if (reset) { grid.innerHTML = ''; cursor = 0; done = false; errBox.textContent = ''; }
  status.textContent = 'Loading...';

  try {
    const data = await apiFetch(buildUrl());
    const videos = extractVideos(data);

    // Log full response shape to console so we can debug
    console.log('API response:', data);

    if (!videos.length) {
      done = true;
      status.textContent = reset ? 'No videos found.' : 'No more videos.';
      loading = false;
      return;
    }
    videos.forEach(v => addCard(v));
    cursor = data.nextCursor ?? data.cursor ?? data.data?.nextCursor ?? (cursor + videos.length);
    status.textContent = `${grid.querySelectorAll('.card').length} videos`;
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
  }
  loading = false;
}

// Infinite scroll
new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) load();
}).observe(document.getElementById('sentinel'));

// Controls
document.getElementById('go').onclick = () => {
  mode  = document.getElementById('mode').value;
  query = document.getElementById('query').value.trim();
  load(true);
};
document.getElementById('query').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('go').click();
});

// Modal
async function openModal(v, url, author, thumb, desc, views, likes, comms) {
  document.getElementById('modal-author').textContent = '@' + author;
  document.getElementById('modal-img').src = thumb;
  document.getElementById('modal-link').href = url;
  document.getElementById('modal-desc').textContent = desc || '';
  document.getElementById('modal-stats').innerHTML =
    `<span><b>${fmt(views)}</b>Views</span><span><b>${fmt(likes)}</b>Likes</span><span><b>${fmt(comms)}</b>Comments</span>`;
  document.getElementById('comments-list').innerHTML = '<span style="color:#888;font-size:12px">Loading...</span>';
  document.getElementById('overlay').classList.add('on');

  try {
    const cData = await apiFetch(`${BASE}/v1/tiktok/video/comments?videoUrl=${encodeURIComponent(url)}`);
    console.log('Comments response:', cData);
    const comments = cData.comments || cData.data?.comments || [];
    const list = document.getElementById('comments-list');
    list.innerHTML = '';
    if (!comments.length) { list.innerHTML = '<span style="color:#888;font-size:12px">No comments.</span>'; return; }
    comments.slice(0, 20).forEach(c => {
      const el = document.createElement('div');
      el.className = 'comment';
      el.innerHTML = `<div class="comment-user">@${c.user?.uniqueId || c.uniqueId || 'user'}</div>
        <div class="comment-text">${c.text || c.comment || ''}</div>
        <div class="comment-likes">♥ ${fmt(c.diggCount || c.likes || 0)}</div>`;
      list.appendChild(el);
    });
  } catch(e) {
    document.getElementById('comments-list').innerHTML = '<span style="color:#888;font-size:12px">Could not load comments.</span>';
  }
}

document.getElementById('modal-close').onclick = () => document.getElementById('overlay').classList.remove('on');
document.getElementById('overlay').onclick = e => {
  if (e.target === document.getElementById('overlay')) document.getElementById('overlay').classList.remove('on');
};

load(true);
</script>
</body>
</html>
