<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TikTok Feed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }

  /* START SCREEN */
  #start-screen {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    z-index: 999;
  }
  #start-screen h1 { font-size: 2rem; }
  #start-screen p { color: #aaa; font-size: 0.9rem; }
  #start-btn {
    padding: 14px 40px; background: #fe2c55; color: #fff;
    border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer;
  }

  /* FEED */
  #feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scrollbar-width: none;
  }
  #feed::-webkit-scrollbar { display: none; }

  /* EACH VIDEO SLIDE */
  .slide {
    height: 100vh;
    scroll-snap-align: start;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
  }

  /* THUMBNAIL (shown when no video) */
  .slide-thumb {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    filter: blur(0px);
  }

  /* WATCH BUTTON overlay */
  .watch-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.35);
  }
  .watch-btn {
    background: #fe2c55; color: #fff;
    text-decoration: none; padding: 13px 28px;
    border-radius: 30px; font-weight: bold; font-size: 1rem;
  }

  /* BOTTOM INFO */
  .slide-info {
    position: absolute; bottom: 0; left: 0; right: 60px;
    padding: 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
  }
  .slide-author { font-weight: bold; font-size: 1rem; margin-bottom: 4px; }
  .slide-desc { font-size: 0.82rem; color: #ddd; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  /* RIGHT SIDE ACTIONS */
  .slide-actions {
    position: absolute; right: 0; bottom: 80px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    padding: 0 12px;
  }
  .action { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.7rem; color: #fff; }
  .action span { font-size: 1.6rem; }

  /* LOADING SPINNER */
  #loader {
    height: 100vh; scroll-snap-align: start;
    display: flex; align-items: center; justify-content: center;
    color: #aaa; font-size: 0.9rem;
  }

  #error { color: #fe2c55; padding: 20px; font-size: 0.85rem; font-family: monospace; white-space: pre-wrap; }
</style>
</head>
<body>

<div id="start-screen">
  <h1>🎵 TikTok Feed</h1>
  <p>Scroll through trending TikTok videos</p>
  <button id="start-btn">▶ Start Scrolling</button>
</div>

<div id="feed"></div>

<script>
const KEY = 'IZqo3P4uw2P5wnNvQD5q0GH9f5i1';
const BASE = 'https://api.scrapecreators.com';

let cursor = 0, loading = false, started = false;
const feed = document.getElementById('feed');

function fmt(n) {
  if (!n && n !== 0) return '0';
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return ''+n;
}

function addSlide(v) {
  const author   = v.author?.unique_id || v.author?.uniqueId || '?';
  const nickname = v.author?.nickname || '@' + author;
  const desc     = v.desc || '';
  const thumb    = v.video?.cover?.url_list?.[0] || '';
  const views    = v.statistics?.play_count  || 0;
  const likes    = v.statistics?.digg_count  || 0;
  const comments = v.statistics?.comment_count || 0;
  const url      = v.url || `https://www.tiktok.com/@${author}/video/${v.aweme_id}`;

  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.innerHTML = `
    <div class="slide-thumb" style="background-image:url('${thumb}')"></div>
    <div class="watch-overlay">
      <a class="watch-btn" href="${url}" target="_blank">▶ Watch on TikTok</a>
    </div>
    <div class="slide-info">
      <div class="slide-author">@${author} · ${nickname}</div>
      <div class="slide-desc">${desc}</div>
    </div>
    <div class="slide-actions">
      <div class="action"><span>❤️</span>${fmt(likes)}</div>
      <div class="action"><span>💬</span>${fmt(comments)}</div>
      <div class="action"><span>▶️</span>${fmt(views)}</div>
    </div>`;

  // Insert before the loader
  const loader = document.getElementById('loader');
  if (loader) feed.insertBefore(slide, loader);
  else feed.appendChild(slide);
}

function showLoader() {
  const el = document.createElement('div');
  el.id = 'loader';
  el.textContent = 'Loading more...';
  feed.appendChild(el);
}

function removeLoader() {
  document.getElementById('loader')?.remove();
}

async function load() {
  if (loading) return;
  loading = true;
  showLoader();

  try {
    const r = await fetch(`${BASE}/v1/tiktok/get-trending-feed?cursor=${cursor}`, {
      headers: { 'x-api-key': KEY }
    });
    const text = await r.text();
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${text}`);
    const data = JSON.parse(text);
    const videos = data.aweme_list || [];
    removeLoader();
    videos.forEach(v => addSlide(v));
    cursor = data.nextCursor ?? data.cursor ?? (cursor + videos.length);
  } catch(e) {
    removeLoader();
    const err = document.createElement('div');
    err.id = 'error';
    err.textContent = 'Error: ' + e.message;
    feed.appendChild(err);
  }

  loading = false;
}

// Load more when near bottom
feed.addEventListener('scroll', () => {
  if (!started) return;
  const nearBottom = feed.scrollTop + feed.clientHeight >= feed.scrollHeight - feed.clientHeight;
  if (nearBottom) load();
});

document.getElementById('start-btn').onclick = function() {
  document.getElementById('start-screen').style.display = 'none';
  started = true;
  load();
};
</script>
</body>
</html>
