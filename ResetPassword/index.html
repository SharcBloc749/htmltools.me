<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - HTMLTools</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #222; padding: 2rem; border-radius: 12px; width: 320px; display: flex; flex-direction: column; gap: 12px; }
        h2 { margin: 0; text-align: center; }
        input { padding: 10px; border-radius: 8px; border: 1px solid #444; background: #111; color: #fff; font-size: 14px; outline: none; width: 100%; box-sizing: border-box; }
        button { padding: 10px; border-radius: 8px; border: none; background: #4da6ff; color: #fff; font-weight: 700; cursor: pointer; font-size: 14px; }
        .msg { font-size: 12px; text-align: center; color: #30d97a; display: none; padding: 8px; background: rgba(48,217,122,.1); border-radius: 6px; }
        .err { font-size: 12px; text-align: center; color: #f04060; display: none; padding: 8px; background: rgba(240,64,96,.1); border-radius: 6px; }
        .back { font-size: 12px; text-align: center; color: #4da6ff; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
<div class="box">
    <h2>Reset Password</h2>
    <p style="font-size:13px;color:#888;text-align:center;margin:0;">Enter your new password below.</p>
    <input type="password" id="password" placeholder="New password" />
    <input type="password" id="confirm" placeholder="Confirm new password" />
    <button id="resetBtn" onclick="doReset()">Reset Password</button>
    <div class="msg" id="msg">✅ Password reset! <span style="color:#4da6ff;cursor:pointer;text-decoration:underline;" onclick="window.location.href='https://htmltools.me/login'">Log in</span></div>
    <div class="err" id="err"></div>
    <div class="back" onclick="window.location.href='https://htmltools.me'">← Back to HTMLTools</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDke6bGfoJdP4U5lfA9hWHGFFTcDpWNNC8",
        authDomain: "htmltools-library.firebaseapp.com",
        databaseURL: "https://htmltools-library-default-rtdb.firebaseio.com",
        projectId: "htmltools-library",
        storageBucket: "htmltools-library.firebasestorage.app",
        messagingSenderId: "973699554480",
        appId: "1:973699554480:web:33ed9d341fc48ed8092f75"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Get the oobCode from the URL (Firebase puts it there automatically)
    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get('oobCode');

    if (!oobCode) {
        const err = document.getElementById('err');
        err.textContent = 'Invalid or expired reset link. Please request a new one.';
        err.style.display = 'block';
        document.getElementById('resetBtn').disabled = true;
    }

    window.doReset = async function() {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        const msg = document.getElementById('msg');
        const err = document.getElementById('err');
        const btn = document.getElementById('resetBtn');
        msg.style.display = 'none';
        err.style.display = 'none';

        if (!password) {
            err.textContent = 'Please enter a new password.';
            err.style.display = 'block';
            return;
        }
        if (password.length < 6) {
            err.textContent = 'Password must be at least 6 characters.';
            err.style.display = 'block';
            return;
        }
        if (password !== confirm) {
            err.textContent = 'Passwords do not match.';
            err.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting...';

        try {
            await verifyPasswordResetCode(auth, oobCode);
            await confirmPasswordReset(auth, oobCode, password);
            msg.style.display = 'block';
            document.getElementById('password').value = '';
            document.getElementById('confirm').value = '';
        } catch(e) {
            if (e.code === 'auth/expired-action-code') {
                err.textContent = 'Reset link has expired. Please request a new one.';
            } else if (e.code === 'auth/invalid-action-code') {
                err.textContent = 'Invalid reset link. Please request a new one.';
            } else {
                err.textContent = e.message;
            }
            err.style.display = 'block';
        }

        btn.disabled = false;
        btn.textContent = 'Reset Password';
    }
</script>
</body>
</html>
