<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - HTMLTools</title>
    <link rel="icon" type="image/png" href="/logo3.png?v=2" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d0d0d; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #161616; border: 1px solid #2a2a2a; border-radius: 16px; width: 360px; padding: 2.5rem; display: flex; flex-direction: column; gap: 16px; }
        .brand { text-align: center; font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
        .brand span { color: #4da6ff; }
        h2 { text-align: center; font-size: 18px; font-weight: 600; }
        p.sub { font-size: 13px; color: #666; text-align: center; line-height: 1.5; }
        .divider { height: 1px; background: #222; }
        label { font-size: 12px; color: #888; font-weight: 500; margin-bottom: -8px; }
        .input-wrap { position: relative; }
        input { padding: 11px 14px; border-radius: 10px; border: 1px solid #2a2a2a; background: #111; color: #fff; font-size: 14px; outline: none; width: 100%; transition: border-color .2s; }
        input:focus { border-color: #4da6ff; }
        .toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 16px; user-select: none; }
        button { padding: 11px; border-radius: 10px; border: none; background: #4da6ff; color: #fff; font-weight: 600; cursor: pointer; font-size: 14px; transition: background .2s, opacity .2s; }
        button:hover { background: #3d95ee; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg { font-size: 12px; text-align: center; color: #30d97a; display: none; padding: 10px; background: rgba(48,217,122,.08); border: 1px solid rgba(48,217,122,.2); border-radius: 8px; line-height: 1.5; }
        .err { font-size: 12px; text-align: center; color: #f04060; display: none; padding: 10px; background: rgba(240,64,96,.08); border: 1px solid rgba(240,64,96,.2); border-radius: 8px; }
        .strength { height: 3px; border-radius: 99px; background: #222; overflow: hidden; display: none; }
        .strength-bar { height: 100%; width: 0%; border-radius: 99px; transition: width .3s, background .3s; }
        .back { font-size: 12px; text-align: center; color: #555; }
        .back a { color: inherit; text-decoration: none; }
        .back a:hover { color: #4da6ff; }
        .login-link { color: #4da6ff; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">⚒️ HTML<span>Tools</span></div>
    <div class="divider"></div>
    <h2>Set new password</h2>
    <p class="sub">Choose a strong password for your account.</p>
    <label>New password</label>
    <div class="input-wrap">
        <input type="password" id="password" placeholder="Min. 6 characters" oninput="checkStrength()" />
        <span class="toggle" onclick="toggleVis('password', this)">👁️</span>
    </div>
    <div class="strength" id="strengthBar"><div class="strength-bar" id="bar"></div></div>
    <label>Confirm password</label>
    <div class="input-wrap">
        <input type="password" id="confirm" placeholder="Repeat your password" />
        <span class="toggle" onclick="toggleVis('confirm', this)">👁️</span>
    </div>
    <button id="resetBtn" onclick="doReset()">Reset Password</button>
    <div class="msg" id="msg">✅ Password updated!<br><span style="color:#888">You can now <span class="login-link" onclick="window.location.href='https://htmltools.me/'">log in</span> with your new password.</span></div>
    <div class="err" id="err"></div>
    <div class="back">← <a href="https://htmltools.me/ForgotPassword">Request a new link</a></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

    const app = initializeApp({
        apiKey: "AIzaSyDke6bGfoJdP4U5lfA9hWHGFFTcDpWNNC8",
        authDomain: "htmltools-library.firebaseapp.com",
        databaseURL: "https://htmltools-library-default-rtdb.firebaseio.com",
        projectId: "htmltools-library",
        storageBucket: "htmltools-library.firebasestorage.app",
        messagingSenderId: "973699554480",
        appId: "1:973699554480:web:33ed9d341fc48ed8092f75"
    });
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get('oobCode');

    if (!oobCode) {
        const err = document.getElementById('err');
        err.textContent = 'Invalid or expired reset link. Please request a new one.';
        err.style.display = 'block';
        document.getElementById('resetBtn').disabled = true;
    }

    window.toggleVis = function(id, el) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
        el.textContent = input.type === 'password' ? '👁️' : '🙈';
    }

    window.checkStrength = function() {
        const val = document.getElementById('password').value;
        const bar = document.getElementById('bar');
        const wrap = document.getElementById('strengthBar');
        wrap.style.display = val.length ? 'block' : 'none';
        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const colors = ['#f04060', '#f04060', '#f0a040', '#4da6ff', '#30d97a'];
        const widths = ['20%', '35%', '55%', '75%', '100%'];
        bar.style.width = widths[score - 1] || '0%';
        bar.style.background = colors[score - 1] || '#222';
    }

    window.doReset = async function() {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm').value;
        const msg = document.getElementById('msg');
        const err = document.getElementById('err');
        const btn = document.getElementById('resetBtn');
        msg.style.display = 'none';
        err.style.display = 'none';

        if (!password) { err.textContent = 'Please enter a new password.'; err.style.display = 'block'; return; }
        if (password.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = 'block'; return; }
        if (password !== confirm) { err.textContent = 'Passwords do not match.'; err.style.display = 'block'; return; }

        btn.disabled = true;
        btn.textContent = 'Updating...';

        try {
            await verifyPasswordResetCode(auth, oobCode);
            await confirmPasswordReset(auth, oobCode, password);
            msg.style.display = 'block';
            btn.style.display = 'none';
            document.getElementById('password').value = '';
            document.getElementById('confirm').value = '';
        } catch(e) {
            if (e.code === 'auth/expired-action-code') {
                err.textContent = 'Reset link has expired. Please request a new one.';
            } else if (e.code === 'auth/invalid-action-code') {
                err.textContent = 'Invalid reset link. Please request a new one.';
            } else {
                err.textContent = e.message;
            }
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Reset Password';
        }
    }
</script>
</body>
</html>
