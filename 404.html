<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — HTMLTools</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .logo { width: 80px; margin-bottom: 32px; filter: invert(1); }
    .code {
      font-size: 96px;
      font-weight: 700;
      letter-spacing: -4px;
      line-height: 1;
      border-bottom: 2px solid #fff;
      padding-bottom: 16px;
      margin-bottom: 24px;
    }
    .msg { font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: #888; margin-bottom: 8px; }
    .sub { font-size: 12px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 48px; }
    .btn {
      display: inline-block;
      border: 1px solid #fff;
      color: #fff;
      text-decoration: none;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 12px 28px;
      transition: background 0.2s, color 0.2s;
    }
    .btn:hover { background: #fff; color: #000; }
  </style>
  <script>
    const routes = {
      'mattube': 'MatTube',
      'email': 'Email',
      'forgotpassword': 'ForgotPassword',
      'meet': 'Meet',
      'movies': 'Movies',
      'removebg': 'Removebg',
      'resetpassword': 'ResetPassword',
      'sms': 'SMS',
      'url': 'URL',
      'sitelaunch': 'SiteLaunch',
      'library': 'Library',
      'advanced': 'Advanced',
    };

    const subRoutes = {
      'sitelaunch/discover': 'SiteLaunch/Discover',
      'advanced/download': 'Advanced/Download',
      'library/studio': 'Library/Studio',
    };

    const path = window.location.pathname;
    const stripped = path.replace(/^\//, '').toLowerCase();
    const match = subRoutes[stripped] || routes[stripped];

    if (match) {
      window.location.replace(
        '/' + match + window.location.search + window.location.hash
      );
    }
  </script>
</head>
<body>
  <img src="/logo3.png" class="logo" alt="HTMLTools">
  <div class="code">404</div>
  <p class="msg">Page not found</p>
  <p class="sub">The page you're looking for doesn't exist</p>
  <a href="/" class="btn">Return home</a>
</body>
</html>
