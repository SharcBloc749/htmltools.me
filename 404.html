<!DOCTYPE html>
<html>
<head>
  <script>
    // Capitalize the first letter of each path segment
    const path = window.location.pathname;
    const fixed = path.replace(/\/([a-z])/g, (_, c) => '/' + c.toUpperCase());

    if (fixed !== path) {
      // Redirect preserving query string and hash
      window.location.replace(
        fixed + window.location.search + window.location.hash
      );
    } else {
      // Truly a 404 — show your normal not-found content
      document.write('<h1>Page not found</h1>');
    }
  </script>
</head>
</html>
