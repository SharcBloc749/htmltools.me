<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloudflare AI Image Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #111; color: #eee; min-height: 100vh; display: flex; justify-content: center; padding: 2rem 1rem; }
    .container { width: 100%; max-width: 620px; }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; color: #fff; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; }
    input, select, textarea {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1px solid #333; background: #1e1e1e; color: #eee;
      font-size: 14px; font-family: sans-serif; margin-bottom: 14px;
    }
    textarea { resize: vertical; }
    button {
      width: 100%; padding: 12px; background: #f6821f; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
    }
    button:hover { background: #d9700f; }
    button:disabled { background: #444; cursor: not-allowed; }
    #status { font-size: 13px; color: #aaa; margin: 12px 0; min-height: 18px; }
    #result { display: none; margin-top: 1rem; }
    #output { width: 100%; border-radius: 10px; border: 1px solid #333; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .btn-sm {
      padding: 8px; background: #1e1e1e; border: 1px solid #333;
      border-radius: 8px; color: #ccc; font-size: 13px;
      text-align: center; text-decoration: none; display: block;
    }
    .btn-sm:hover { background: #2a2a2a; }
  </style>
</head>
<body>
<div class="container">
  <h1>☁️ Cloudflare AI Image Generator</h1>

  <label>Prompt</label>
  <textarea id="prompt" rows="3" placeholder="a futuristic city at night, cyberpunk style">a futuristic city at night, cyberpunk style</textarea>

  <label>Model</label>
  <select id="model">
    <option value="@cf/stabilityai/stable-diffusion-xl-base-1.0">Stable Diffusion XL (best quality)</option>
    <option value="@cf/runwayml/stable-diffusion-v1-5-inpainting">Stable Diffusion 1.5</option>
    <option value="@cf/lykon/dreamshaper-8-lcm">Dreamshaper 8 (fast)</option>
    <option value="@cf/bytedance/stable-diffusion-xl-lightning">SDXL Lightning (fastest)</option>
  </select>

  <button id="btn" onclick="generate()">Generate Image</button>
  <div id="status"></div>

  <div id="result">
    <img id="output" alt="Generated image" />
    <div class="btn-row">
      <a id="downloadLink" class="btn-sm" download="image.png">⬇ Download</a>
      <button class="btn-sm" onclick="generate()">🔄 Regenerate</button>
    </div>
  </div>
</div>

<script>
  const ACCOUNT_ID = "b0ac0676bf0675c799a564aaed1eda73";
  const API_TOKEN = "cfut_70U6YuBMjMnW02sGpE6RiWBpZbcGsuMUb2lnM0cyf983d071";

  async function generate() {
    const prompt = document.getElementById('prompt').value.trim();
    const model = document.getElementById('model').value;
    const status = document.getElementById('status');
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');

    if (!prompt) { status.textContent = 'Please enter a prompt.'; return; }

    btn.disabled = true;
    btn.textContent = 'Generating...';
    result.style.display = 'none';
    status.textContent = 'Generating your image... ⏳';

    try {
      const response = await fetch(
        `https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/ai/run/${model}`,
        {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${API_TOKEN}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ prompt })
        }
      );

      if (!response.ok) {
        const err = await response.json();
        status.textContent = '❌ Error: ' + (err?.errors?.[0]?.message || response.statusText);
        btn.disabled = false;
        btn.textContent = 'Generate Image';
        return;
      }

      const blob = await response.blob();
      const imageUrl = URL.createObjectURL(blob);

      document.getElementById('output').src = imageUrl;
      document.getElementById('downloadLink').href = imageUrl;
      result.style.display = 'block';
      status.textContent = '✅ Done!';

    } catch (err) {
      status.textContent = '❌ Error: ' + err.message;
    }

    btn.disabled = false;
    btn.textContent = 'Generate Again';
  }
</script>
</body>
</html>
