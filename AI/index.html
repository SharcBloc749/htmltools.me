<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Featured App</title>
  <link rel="icon" type="image/png" href="/logo3.png?v=2"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;width:100%;overflow:hidden;background:#080810;}

    /* ── FULL-PAGE IFRAME ── */
    #app-frame{
      position:fixed;inset:0;width:100%;height:100%;
      border:none;display:none;
      background:#fff;
    }

    /* ── LOADING SCREEN ── */
    #loading{
      position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:14px;
      background:#080810;z-index:10;
    }
    .ld-logo{width:48px;height:48px;border-radius:12px;overflow:hidden;}
    .ld-logo img{width:100%;height:100%;object-fit:contain;}
    .ld-spin{
      width:28px;height:28px;border-radius:50%;
      border:2px solid #1e1e32;border-top-color:#00e5ff;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .ld-text{font-family:monospace;font-size:.7rem;color:#44445a;letter-spacing:.1em;}

    /* ── EMPTY STATE (no app uploaded yet) ── */
    #empty{
      position:fixed;inset:0;display:none;flex-direction:column;
      align-items:center;justify-content:center;gap:12px;
      background:#080810;
    }
    .em-icon{font-size:2.5rem;margin-bottom:4px;}
    .em-title{font-family:monospace;font-size:1rem;font-weight:700;color:#e8e8f0;letter-spacing:.04em;}
    .em-sub{font-size:.78rem;color:#44445a;text-align:center;max-width:280px;line-height:1.7;}

    /* ── OWNER CONTROLS (hidden until logged in) ── */
    #owner-bar{
      position:fixed;bottom:16px;right:16px;z-index:9999;
      display:none;flex-direction:column;gap:6px;align-items:flex-end;
    }
    #owner-bar.show{display:flex;}

    .ob-btn{
      background:rgba(8,8,16,.92);
      border:1px solid #262640;
      color:#8888aa;
      font-family:monospace;font-size:.65rem;font-weight:600;
      letter-spacing:.06em;text-transform:uppercase;
      padding:.4rem .8rem;border-radius:4px;
      cursor:pointer;transition:all .15s;
      backdrop-filter:blur(12px);
    }
    .ob-btn:hover{border-color:#00e5ff;color:#00e5ff;}
    .ob-btn.danger:hover{border-color:#f87171;color:#f87171;}
    .ob-btn.accent{
      background:linear-gradient(135deg,#00e5ff,#a855f7);
      color:#080810;border:none;font-weight:700;
    }
    .ob-btn.accent:hover{opacity:.88;}

    /* ── LOGIN OVERLAY ── */
    #login-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.88);
      backdrop-filter:blur(12px);z-index:8000;
      display:none;align-items:center;justify-content:center;
    }
    #login-overlay.open{display:flex;}
    .login-box{
      background:#0e0e1a;border:1px solid #262640;
      border-radius:10px;padding:28px 24px;width:100%;max-width:360px;
      box-shadow:0 24px 80px rgba(0,0,0,.9);
    }
    .login-box h3{
      font-family:monospace;font-size:.9rem;font-weight:700;
      letter-spacing:.06em;text-transform:uppercase;
      color:#e8e8f0;margin-bottom:18px;
    }
    .lf-label{display:block;font-size:.6rem;font-weight:700;color:#44445a;
      text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
    .lf-input{
      width:100%;background:#131320;border:1px solid #262640;
      color:#e8e8f0;font-family:monospace;font-size:.78rem;
      padding:.5rem .75rem;border-radius:4px;outline:none;
      transition:border-color .13s;margin-bottom:12px;
    }
    .lf-input:focus{border-color:#00e5ff;}
    .lf-input::placeholder{color:#44445a;}
    .lf-err{font-size:.7rem;color:#f87171;margin-bottom:10px;display:none;}
    .lf-row{display:flex;gap:6px;margin-top:4px;}
    .lf-btn{
      flex:1;padding:.55rem;border-radius:4px;font-family:monospace;
      font-size:.72rem;font-weight:700;letter-spacing:.05em;
      text-transform:uppercase;cursor:pointer;transition:all .15s;
    }
    .lf-btn.cancel{background:transparent;border:1px solid #262640;color:#44445a;}
    .lf-btn.cancel:hover{border-color:#44445a;color:#8888aa;}
    .lf-btn.submit{
      background:linear-gradient(135deg,#00e5ff,#a855f7);
      color:#080810;border:none;
    }
    .lf-btn.submit:hover{opacity:.88;}

    /* ── UPLOAD OVERLAY ── */
    #upload-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.92);
      backdrop-filter:blur(16px);z-index:8000;
      display:none;align-items:center;justify-content:center;padding:1rem;
    }
    #upload-overlay.open{display:flex;}
    .upload-box{
      background:#0e0e1a;border:1px solid #262640;
      border-radius:10px;width:100%;max-width:560px;
      box-shadow:0 24px 80px rgba(0,0,0,.95);overflow:hidden;
    }
    .ub-hdr{
      padding:14px 18px;border-bottom:1px solid #1e1e32;
      display:flex;align-items:center;justify-content:space-between;
    }
    .ub-hdr h3{font-family:monospace;font-size:.82rem;font-weight:700;
      text-transform:uppercase;letter-spacing:.06em;color:#e8e8f0;}
    .ub-close{background:none;border:none;color:#44445a;font-size:1rem;
      cursor:pointer;padding:2px 6px;border-radius:3px;transition:color .13s;}
    .ub-close:hover{color:#e8e8f0;}
    .ub-body{padding:18px;}

    .drop-zone{
      border:1px dashed #262640;border-radius:6px;
      padding:2rem 1rem;text-align:center;cursor:pointer;
      transition:all .15s;background:#131320;position:relative;
      overflow:hidden;
    }
    .drop-zone:hover,.drop-zone.drag{border-color:#00e5ff;background:#0d1f22;}
    .drop-zone input[type=file]{
      position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
    }
    .dz-icon{font-size:1.8rem;margin-bottom:.5rem;}
    .dz-text{font-size:.75rem;color:#44445a;line-height:1.7;}
    .dz-text strong{color:#8888aa;}

    .file-chosen{
      display:none;align-items:center;gap:10px;
      padding:.6rem .9rem;background:#131320;border:1px solid #1e1e32;
      border-radius:6px;margin-top:10px;font-size:.72rem;
    }
    .file-chosen.show{display:flex;}
    .fc-name{flex:1;color:#e8e8f0;font-family:monospace;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .fc-size{color:#44445a;font-family:monospace;flex-shrink:0;}
    .fc-clear{background:none;border:none;color:#44445a;cursor:pointer;
      font-size:.9rem;transition:color .13s;flex-shrink:0;}
    .fc-clear:hover{color:#f87171;}

    .ub-warn{
      font-size:.68rem;color:#fbbf24;padding:.5rem .75rem;
      background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.15);
      border-radius:4px;margin-top:10px;line-height:1.6;display:none;
    }
    .ub-warn.show{display:block;}

    .ub-foot{
      padding:12px 18px;border-top:1px solid #1e1e32;
      display:flex;gap:6px;justify-content:flex-end;
    }
    .ub-btn{
      padding:.45rem 1rem;border-radius:4px;font-family:monospace;
      font-size:.7rem;font-weight:700;letter-spacing:.05em;
      text-transform:uppercase;cursor:pointer;transition:all .15s;
    }
    .ub-btn.cancel{background:transparent;border:1px solid #262640;color:#44445a;}
    .ub-btn.cancel:hover{color:#8888aa;border-color:#44445a;}
    .ub-btn.publish{
      background:linear-gradient(135deg,#00e5ff,#a855f7);
      color:#080810;border:none;
    }
    .ub-btn.publish:hover{opacity:.88;}
    .ub-btn:disabled{opacity:.4;cursor:not-allowed;}

    /* ── TOAST ── */
    #toast{
      position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(12px);
      background:#131320;border:1px solid #262640;border-radius:5px;
      padding:.45rem 1rem;font-family:monospace;font-size:.7rem;color:#e8e8f0;
      opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;
      box-shadow:0 8px 28px rgba(0,0,0,.7);z-index:9999;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    #toast.ok{border-color:rgba(34,197,94,.35);color:#22c55e;}
    #toast.err{border-color:rgba(248,113,113,.35);color:#f87171;}

    /* ── SECRET LOGIN TRIGGER ── */
    #secret-trigger{
      position:fixed;bottom:0;right:0;width:40px;height:40px;
      z-index:7000;cursor:pointer;opacity:0;
    }
  </style>
</head>
<body>

<!-- App renders here -->
<iframe id="app-frame" sandbox="allow-scripts allow-forms allow-modals allow-popups allow-same-origin"></iframe>

<!-- Loading -->
<div id="loading">
  <div class="ld-logo"><img src="/logo3.png?v=2" alt="logo"/></div>
  <div class="ld-spin"></div>
  <div class="ld-text">Loading...</div>
</div>

<!-- Empty state -->
<div id="empty">
  <div class="em-icon">📭</div>
  <div class="em-title">Nothing here yet</div>
  <div class="em-sub">The owner hasn't published an app yet. Check back soon.</div>
</div>

<!-- Owner bar (only visible when logged in as owner) -->
<div id="owner-bar">
  <span style="font-family:monospace;font-size:.55rem;color:#44445a;letter-spacing:.1em;text-transform:uppercase">Owner mode</span>
  <button class="ob-btn accent" onclick="openUpload()">⬆ Upload new app</button>
  <button class="ob-btn danger" onclick="clearApp()">✕ Remove app</button>
  <button class="ob-btn" onclick="signOutOwner()">Sign out</button>
</div>

<!-- Secret login trigger (bottom-right corner, invisible) -->
<div id="secret-trigger" onclick="openLogin()" title=""></div>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-box">
    <h3>🔐 Owner Login</h3>
    <label class="lf-label">Email</label>
    <input type="email" class="lf-input" id="login-email" placeholder="owner@example.com"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <label class="lf-label">Password</label>
    <input type="password" class="lf-input" id="login-pass" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="lf-err" id="login-err"></div>
    <div class="lf-row">
      <button class="lf-btn cancel" onclick="closeLogin()">Cancel</button>
      <button class="lf-btn submit" id="login-btn" onclick="doLogin()">Sign In</button>
    </div>
  </div>
</div>

<!-- Upload overlay -->
<div id="upload-overlay">
  <div class="upload-box">
    <div class="ub-hdr">
      <h3>⬆ Upload App</h3>
      <button class="ub-close" onclick="closeUpload()">✕</button>
    </div>
    <div class="ub-body">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".html,text/html" onchange="handleFile(this.files[0])"/>
        <div class="dz-icon">📄</div>
        <div class="dz-text"><strong>Click to choose</strong> or drag & drop an HTML file<br>
        The file will be stored in Firebase and served to all visitors.</div>
      </div>
      <div class="file-chosen" id="file-chosen">
        <span class="fc-name" id="fc-name"></span>
        <span class="fc-size" id="fc-size"></span>
        <button class="fc-clear" onclick="clearFile()">✕</button>
      </div>
      <div class="ub-warn" id="ub-warn"></div>
    </div>
    <div class="ub-foot">
      <button class="ub-btn cancel" onclick="closeUpload()">Cancel</button>
      <button class="ub-btn publish" id="publish-btn" onclick="publishApp()" disabled>Publish</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import{getDatabase,ref,set,get,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import{getAuth,signInWithEmailAndPassword,onAuthStateChanged,signOut as fbSignOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import{initializeAppCheck,ReCaptchaV3Provider}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check.js";

  // ── FIREBASE CONFIG (same as your library) ──────────────────────────────
  const firebaseConfig={
    apiKey:"AIzaSyD8KINd1CV5wl3TEisGliE4R5ng_w-apjA",
    authDomain:"htmltools2.firebaseapp.com",
    databaseURL:"https://htmltools2-default-rtdb.firebaseio.com",
    projectId:"htmltools2",
    storageBucket:"htmltools2.firebasestorage.app",
    messagingSenderId:"61467480060",
    appId:"1:61467480060:web:4f964a671a5623d10e2c79"
  };

  const app=initializeApp(firebaseConfig);
  initializeAppCheck(app,{provider:new ReCaptchaV3Provider('6LeRK88sAAAAAG_yDwCD-DIfZdl6oqWAYCTJRdmhb'),isTokenAutoRefreshEnabled:true});
  const db=getDatabase(app);
  const auth=getAuth(app);

  const OWNER_EMAIL='matthewbozhe@gmail.com';

  // ── STATE ────────────────────────────────────────────────────────────────
  let currentUser=null;
  let selectedFile=null;
  let selectedHtml=null;

  // ── AUTH ─────────────────────────────────────────────────────────────────
  onAuthStateChanged(auth,user=>{
    currentUser=user;
    const isOwner=user&&user.email.toLowerCase()===OWNER_EMAIL.toLowerCase();
    document.getElementById('owner-bar').classList.toggle('show',!!isOwner);
  });

  // ── LOAD FEATURED APP ────────────────────────────────────────────────────
  onValue(ref(db,'featuredApp/html'),snap=>{
    const html=snap.val();
    const loading=document.getElementById('loading');
    const frame=document.getElementById('app-frame');
    const empty=document.getElementById('empty');

    loading.style.display='none';

    if(html){
      empty.style.display='none';
      frame.style.display='block';
      // Write HTML into iframe via srcdoc so it renders fully self-contained
      frame.srcdoc=html;
    }else{
      frame.style.display='none';
      empty.style.display='flex';
    }
  });

  // ── LOGIN ────────────────────────────────────────────────────────────────
  window.openLogin=()=>{
    if(currentUser)return; // already signed in
    document.getElementById('login-email').value='';
    document.getElementById('login-pass').value='';
    document.getElementById('login-err').style.display='none';
    document.getElementById('login-overlay').classList.add('open');
    setTimeout(()=>document.getElementById('login-email').focus(),50);
  };

  window.closeLogin=()=>document.getElementById('login-overlay').classList.remove('open');

  window.doLogin=async()=>{
    const email=document.getElementById('login-email').value.trim();
    const pass=document.getElementById('login-pass').value;
    const errEl=document.getElementById('login-err');
    const btn=document.getElementById('login-btn');
    errEl.style.display='none';
    if(!email||!pass){errEl.textContent='Fill in both fields.';errEl.style.display='block';return;}
    btn.disabled=true;btn.textContent='...';
    try{
      await signInWithEmailAndPassword(auth,email,pass);
      closeLogin();showToast('Owner mode active','ok');
    }catch(e){
      let msg='Invalid email or password.';
      if(e.code==='auth/too-many-requests')msg='Too many attempts. Try later.';
      errEl.textContent=msg;errEl.style.display='block';
    }
    btn.disabled=false;btn.textContent='Sign In';
  };

  window.signOutOwner=async()=>{
    await fbSignOut(auth);showToast('Signed out','ok');
  };

  // ── UPLOAD ───────────────────────────────────────────────────────────────
  window.openUpload=()=>{
    clearFile();
    document.getElementById('upload-overlay').classList.add('open');
  };
  window.closeUpload=()=>document.getElementById('upload-overlay').classList.remove('open');

  window.handleFile=function(file){
    if(!file)return;
    if(!file.name.endsWith('.html')&&file.type!=='text/html'){
      showWarn('Only .html files are supported.');return;
    }
    // Firebase RTDB has a 10MB node limit — warn if large
    if(file.size>8*1024*1024){
      showWarn('File is very large ('+Math.round(file.size/1024/1024)+'MB). Max recommended is 8MB.');
    }else{
      hideWarn();
    }
    selectedFile=file;
    document.getElementById('fc-name').textContent=file.name;
    document.getElementById('fc-size').textContent=Math.round(file.size/1024)+' KB';
    document.getElementById('file-chosen').classList.add('show');
    document.getElementById('publish-btn').disabled=false;

    const reader=new FileReader();
    reader.onload=e=>{selectedHtml=e.target.result;};
    reader.readAsText(file);
  };

  window.clearFile=function(){
    selectedFile=null;selectedHtml=null;
    document.getElementById('file-input').value='';
    document.getElementById('file-chosen').classList.remove('show');
    document.getElementById('publish-btn').disabled=true;
    hideWarn();
  };

  window.publishApp=async function(){
    if(!selectedHtml){showToast('No file selected','err');return;}
    if(!currentUser||currentUser.email.toLowerCase()!==OWNER_EMAIL.toLowerCase()){
      showToast('Not authorised','err');return;
    }
    const btn=document.getElementById('publish-btn');
    btn.disabled=true;btn.textContent='Publishing...';
    try{
      await set(ref(db,'featuredApp/html'),selectedHtml);
      await set(ref(db,'featuredApp/updatedAt'),Date.now());
      await set(ref(db,'featuredApp/filename'),selectedFile?.name||'app.html');
      closeUpload();showToast('App published! ✓','ok');
    }catch(e){
      showToast('Error: '+e.message,'err');
    }
    btn.disabled=false;btn.textContent='Publish';
  };

  window.clearApp=async function(){
    if(!confirm('Remove the current app? Visitors will see the empty state.'))return;
    if(!currentUser||currentUser.email.toLowerCase()!==OWNER_EMAIL.toLowerCase())return;
    await set(ref(db,'featuredApp/html'),null);
    showToast('App removed','ok');
  };

  // ── DRAG & DROP ──────────────────────────────────────────────────────────
  const dz=document.getElementById('drop-zone');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{
    e.preventDefault();dz.classList.remove('drag');
    const f=e.dataTransfer.files[0];if(f)handleFile(f);
  });

  // ── HELPERS ──────────────────────────────────────────────────────────────
  function showWarn(msg){const w=document.getElementById('ub-warn');w.textContent=msg;w.classList.add('show');}
  function hideWarn(){document.getElementById('ub-warn').classList.remove('show');}

  window.showToast=function(msg,type=''){
    const t=document.getElementById('toast');
    t.textContent=msg;t.className='show'+(type?' '+type:'');
    clearTimeout(window._tt);window._tt=setTimeout(()=>t.className='',3000);
  };

  // Close overlays on backdrop click
  document.getElementById('login-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeLogin();});
  document.getElementById('upload-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeUpload();});

  // Keyboard: Escape closes overlays
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){closeLogin();closeUpload();}
  });
</script>
</body>
</html>
