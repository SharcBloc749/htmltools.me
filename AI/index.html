<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Site</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #admin-panel { display: none; margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; background: #f9f9f9; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; }
        #injected-content { margin-top: 30px; border-top: 2px solid #333; padding-top: 20px; }
    </style>
</head>
<body>

    <div id="login-section">
        <button id="login-btn">Admin Login (Google)</button>
    </div>

    <div id="admin-panel">
        <h3>Admin Panel</h3>
        <p>Welcome, <span id="user-email"></span></p>
        <textarea id="html-input" placeholder="Paste safe HTML here..."></textarea>
        <button id="upload-btn">Publish HTML</button>
        <button id="logout-btn">Logout</button>
    </div>

    <div id="injected-content">
        Loading content...
    </div>

    <script>
        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyD8KINd1CV5wl3TEisGliE4R5ng_w-apjA",
            authDomain: "htmltools2.firebaseapp.com",
            databaseURL: "https://htmltools2-default-rtdb.firebaseio.com",
            projectId: "htmltools2",
            storageBucket: "htmltools2.firebasestorage.app",
            messagingSenderId: "61467480060",
            appId: "1:61467480060:web:4f964a671a5623d10e2c79",
            measurementId: "G-5KJ8DE63ZC"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();

        // DOM Elements
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const adminPanel = document.getElementById('admin-panel');
        const loginSection = document.getElementById('login-section');
        const htmlInput = document.getElementById('html-input');
        const uploadBtn = document.getElementById('upload-btn');
        const injectedContent = document.getElementById('injected-content');
        const userEmailSpan = document.getElementById('user-email');

        // Target Email
        const ADMIN_EMAIL = "matthewbozhe@gmail.com";

        // 1. Authentication State Listener
        auth.onAuthStateChanged(user => {
            if (user && user.email === ADMIN_EMAIL) {
                // User is logged in AND is the admin
                adminPanel.style.display = 'block';
                loginSection.style.display = 'none';
                userEmailSpan.innerText = user.email;
            } else {
                // Not logged in or not admin
                adminPanel.style.display = 'none';
                loginSection.style.display = 'block';
                if (user) auth.signOut(); // Kick out non-admins
            }
        });

        // 2. Login / Logout functions
        loginBtn.addEventListener('click', () => {
            auth.signInWithPopup(provider).catch(error => console.error(error));
        });

        logoutBtn.addEventListener('click', () => {
            auth.signOut();
        });

        // 3. Upload HTML to Database
        uploadBtn.addEventListener('click', () => {
            const htmlToUpload = htmlInput.value;
            db.ref('public_html').set({
                content: htmlToUpload
            }).then(() => {
                alert("HTML Published!");
            }).catch(error => {
                console.error("Upload failed: ", error);
                alert("Upload failed. Check console or Database rules.");
            });
        });

        // 4. Fetch and Display HTML (For Everyone)
        db.ref('public_html').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.content) {
                injectedContent.innerHTML = data.content;
            } else {
                injectedContent.innerHTML = "<p>No content available right now.</p>";
            }
        });
    </script>
</body>
</html>
