<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make Your Own AI - HTMLTools</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; height: 100vh; }
  #loading { color: #555; font-family: monospace; font-size: 13px; }
  iframe { display: none; position: fixed; inset: 0; width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<div id="loading">loading…</div>
<iframe id="frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const app = initializeApp({
    apiKey: "AIzaSyD8KINd1CV5wl3TEisGliE4R5ng_w-apjA",
    authDomain: "htmltools2.firebaseapp.com",
    databaseURL: "https://htmltools2-default-rtdb.firebaseio.com",
    projectId: "htmltools2",
    storageBucket: "htmltools2.firebasestorage.app",
    messagingSenderId: "61467480060",
    appId: "1:61467480060:web:4f964a671a5623d10e2c79"
  });

  const db = getDatabase(app);

  try {
    const snap = await get(ref(db, 'Or4Nffq6BbgFHr9BrWr'));
    const html = snap.val();

    if (!html) {
      document.getElementById('loading').textContent = 'nothing found at that path.';
      return;
    }

    const frame = document.getElementById('frame');
    const blob = new Blob([html], { type: 'text/html' });
    frame.src = URL.createObjectURL(blob);
    frame.style.display = 'block';
    document.getElementById('loading').style.display = 'none';

  } catch(e) {
    document.getElementById('loading').textContent = 'error: ' + e.message;
  }
</script>
</body>
</html>
