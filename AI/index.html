<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0a0a0a; --surface: #111111; --border: #222222; --accent: #e8ff47; --text: #f0f0f0; --muted: #555; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  #signin-screen { width: 100%; max-width: 360px; padding: 2rem; animation: fadeUp .4s ease both; }
  .signin-label { font-family: 'Syne', sans-serif; font-size: .65rem; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: .4rem; }
  .signin-title { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; line-height: 1; margin-bottom: 2.5rem; }
  .signin-title span { color: var(--accent); }
  .field { margin-bottom: 1.2rem; }
  .field label { display: block; font-size: .72rem; color: var(--muted); margin-bottom: .4rem; letter-spacing: .08em; }
  .field input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: .9rem; padding: .75rem 1rem; outline: none; transition: border-color .2s; }
  .field input:focus { border-color: var(--accent); }
  .btn-signin { width: 100%; margin-top: .5rem; background: var(--accent); color: #0a0a0a; border: none; font-family: 'Syne', sans-serif; font-weight: 700; font-size: .85rem; letter-spacing: .1em; text-transform: uppercase; padding: .85rem; cursor: pointer; transition: opacity .15s; }
  .btn-signin:hover { opacity: .85; }
  .btn-signin:disabled { opacity: .4; cursor: not-allowed; }
  #signin-error { margin-top: .9rem; font-size: .78rem; color: #ff6b6b; min-height: 1.2rem; text-align: center; }
  #admin-bar { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 9999; background: #0a0a0acc; border-bottom: 1px solid #333; backdrop-filter: blur(8px); padding: .6rem 1.2rem; align-items: center; gap: 1rem; }
  #admin-bar.visible { display: flex; }
  #admin-bar span { font-size: .72rem; color: var(--muted); flex: 1; }
  #admin-bar span b { color: var(--accent); }
  .btn-upload { background: var(--accent); color: #0a0a0a; border: none; font-family: 'Syne', sans-serif; font-weight: 700; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; padding: .45rem .9rem; cursor: pointer; }
  .btn-upload:hover { opacity: .8; }
  .btn-signout { background: transparent; color: var(--muted); border: 1px solid #333; font-family: 'DM Mono', monospace; font-size: .72rem; padding: .4rem .8rem; cursor: pointer; }
  .btn-signout:hover { color: var(--text); }
  #file-input { display: none; }
  #empty-state { display: none; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; color: var(--muted); font-size: .85rem; text-align: center; min-height: 100vh; }
  #empty-state.visible { display: flex; }
  .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 1.4s ease infinite; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .2; } }
</style>
</head>
<body>

<div id="signin-screen">
  <p class="signin-label">access</p>
  <h1 class="signin-title">Sign<span>.</span>in</h1>
  <div class="field"><label>email</label><input id="email" type="email" placeholder="you@example.com" autocomplete="email"></div>
  <div class="field"><label>password</label><input id="password" type="password" placeholder="••••••••"></div>
  <button class="btn-signin" id="signin-btn" onclick="doSignIn()">Enter</button>
  <p id="signin-error"></p>
</div>

<div id="admin-bar">
  <span>admin: <b id="admin-email-label"></b></span>
  <button class="btn-upload" onclick="document.getElementById('file-input').click()">↑ Upload HTML</button>
  <button class="btn-signout" onclick="doSignOut()">sign out</button>
  <input id="file-input" type="file" accept=".html,text/html" onchange="uploadHTML(this)">
</div>

<div id="empty-state">
  <div class="dot"></div>
  <p>Nothing uploaded yet.</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getDatabase, ref, set, onValue }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const ADMIN = "matthewbozhe@gmail.com";

  const app = initializeApp({
    apiKey: "AIzaSyD8KINd1CV5wl3TEisGliE4R5ng_w-apjA",
    authDomain: "htmltools2.firebaseapp.com",
    databaseURL: "https://htmltools2-default-rtdb.firebaseio.com",
    projectId: "htmltools2",
    storageBucket: "htmltools2.firebasestorage.app",
    messagingSenderId: "61467480060",
    appId: "1:61467480060:web:4f964a671a5623d10e2c79"
  });

  const auth = getAuth(app);
  const db = getDatabase(app);
  const contentRef = ref(db, 'site/html');

  let currentHTML = null;
  let currentUser = null;

  // Watch for content changes in realtime
  onValue(contentRef, snap => {
    currentHTML = snap.val();
    if (currentUser && currentHTML) injectHTML(currentHTML);
  });

  function injectHTML(html) {
    // Parse the uploaded HTML
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Update <title> if the uploaded page has one
    const newTitle = doc.querySelector('title');
    if (newTitle) document.title = newTitle.textContent;

    // Replace <head> styles/links (but keep our Firebase scripts)
    const uploadedStyles = [...doc.querySelectorAll('style, link[rel="stylesheet"]')];
    uploadedStyles.forEach(el => document.head.appendChild(el.cloneNode(true)));

    // Replace <body> content entirely, but re-attach admin bar first
    const adminBar = document.getElementById('admin-bar');
    const adminBarHTML = adminBar ? adminBar.outerHTML : '';

    document.body.innerHTML = doc.body.innerHTML;
    document.body.style = doc.body.getAttribute('style') || '';

    // Re-inject admin bar for admin user (floats on top via fixed positioning)
    if (currentUser && currentUser.email === ADMIN) {
      document.body.insertAdjacentHTML('afterbegin', adminBarHTML);
      // Re-attach event listeners since innerHTML nuked them
      document.getElementById('file-input').addEventListener('change', function() { uploadHTML(this); });
    }

    // Re-run any scripts from the uploaded HTML
    [...doc.querySelectorAll('script')].forEach(oldScript => {
      const s = document.createElement('script');
      if (oldScript.src) {
        s.src = oldScript.src;
        s.async = false;
      } else {
        s.textContent = oldScript.textContent;
      }
      [...oldScript.attributes].forEach(a => { if (a.name !== 'src') s.setAttribute(a.name, a.value); });
      document.body.appendChild(s);
    });
  }

  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) {
      document.getElementById('signin-screen').style.display = 'none';

      if (user.email === ADMIN) {
        document.getElementById('admin-bar').classList.add('visible');
        document.getElementById('admin-email-label').textContent = user.email;
      }

      if (currentHTML) {
        injectHTML(currentHTML);
      } else {
        document.getElementById('empty-state').classList.add('visible');
      }
    } else {
      // Reload page cleanly on sign out so we get back to the login screen
      location.reload();
    }
  });

  window.doSignIn = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('signin-btn');
    const err = document.getElementById('signin-error');
    err.textContent = '';
    btn.disabled = true;
    btn.textContent = 'signing in…';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch(e) {
      err.textContent = 'invalid email or password';
      btn.disabled = false;
      btn.textContent = 'Enter';
    }
  };

  window.doSignOut = async function() {
    await signOut(auth);
  };

  window.uploadHTML = function(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async e => {
      await set(contentRef, e.target.result);
      input.value = '';
    };
    reader.readAsText(file);
  };

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doSignIn();
  });
</script>
</body>
</html>
