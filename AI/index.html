<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading…</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
  #loading { color: #555; font-size: 13px; }
  #err { color: #ff6b6b; font-size: 13px; display: none; }
</style>
</head>
<body>
<div id="loading">loading…</div>
<div id="err"></div>

<script>
  fetch('https://htmltools2-default-rtdb.firebaseio.com/aiCode.json')
    .then(r => r.json())
    .then(html => {
      if (!html) throw new Error('no data at aiCode');
      document.open();
      document.write(html);
      document.close();
    })
    .catch(e => {
      document.getElementById('loading').style.display = 'none';
      const err = document.getElementById('err');
      err.style.display = 'block';
      err.textContent = 'error: ' + e.message;
    });
</script>
</body>
</html>
