<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud PC – HTMLTools</title>
  <link rel="icon" type="image/png" href="/logo3.png?v=2" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
    .container { padding: 2rem 1rem; max-width: 860px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-size: 26px; font-weight: 500; margin-bottom: 8px; }
    .header p { font-size: 15px; color: #666; }
    .warning { background: #fef9ec; border: 1px solid #f5c842; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #7a5c00; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
    .vm-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .vm-info { display: flex; align-items: center; gap: 12px; }
    .vm-icon { width: 42px; height: 42px; border-radius: 10px; background: #e8f0fe; display: flex; align-items: center; justify-content: center; }
    .vm-icon i { font-size: 22px; color: #1a73e8; }
    .vm-name { font-size: 15px; font-weight: 500; }
    .vm-status { font-size: 13px; color: #666; margin-top: 3px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: #34a853; }
    .connect-btn { background: #fff; border: 1px solid #d0d0d0; border-radius: 8px; padding: 9px 22px; font-size: 14px; color: #1a1a1a; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .connect-btn:hover { background: #f5f5f3; }
    .frame-container { display: none; border-radius: 12px; overflow: hidden; border: 1px solid #e5e5e5; background: #fff; }
    .frame-header { padding: 12px 16px; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; gap: 12px; background: #f9f9f9; }
    .back-btn { background: none; border: none; color: #666; font-size: 13px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 4px; }
    .back-btn:hover { color: #1a1a1a; }
    #vnc-frame { width: 100%; height: 620px; border: none; display: block; }
    .note { text-align: center; font-size: 12px; color: #999; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <div id="home-view">
      <div class="header">
        <h1><i class="ti ti-device-desktop" style="font-size:28px; vertical-align:-5px; margin-right:8px;"></i>Cloud PC</h1>
        <p>Pick a server below and connect to a full browser in your browser</p>
      </div>

      <div class="warning">
        <i class="ti ti-alert-triangle"></i>
        Heads up: users on the same server share the same screen. Add more VMs for private sessions.
      </div>

      <div id="vm-list">
        <div class="vm-card">
          <div class="vm-info">
            <div class="vm-icon"><i class="ti ti-server"></i></div>
            <div>
              <div class="vm-name">Server 1</div>
              <div class="vm-status"><span class="status-dot"></span>Online · US</div>
            </div>
          </div>
          <button class="connect-btn" onclick="connect('https://vm.htmltools.me/vnc.html', 'Server 1')">Connect</button>
        </div>

        <!-- Add more VM cards here when you set up more servers -->
        <!-- Example:
        <div class="vm-card">
          <div class="vm-info">
            <div class="vm-icon"><i class="ti ti-server"></i></div>
            <div>
              <div class="vm-name">Server 2</div>
              <div class="vm-status"><span class="status-dot"></span>Online · US</div>
            </div>
          </div>
          <button class="connect-btn" onclick="connect('http://YOUR_VM2_IP:6080/vnc.html', 'Server 2')">Connect</button>
        </div>
        -->
      </div>

      <p class="note">Powered by noVNC · Runs on Google Cloud</p>
    </div>

    <div id="frame-view" class="frame-container">
      <div class="frame-header">
        <button class="back-btn" onclick="disconnect()">
          <i class="ti ti-arrow-left"></i> Back to servers
        </button>
        <span style="font-size: 13px; color: #666;" id="connected-label"></span>
      </div>
      <iframe id="vnc-frame" src="" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    function connect(url, name) {
      document.getElementById('home-view').style.display = 'none';
      document.getElementById('connected-label').textContent = 'Connected to ' + name;
      document.getElementById('vnc-frame').src = url;
      document.getElementById('frame-view').style.display = 'block';
    }
    function disconnect() {
      document.getElementById('vnc-frame').src = '';
      document.getElementById('frame-view').style.display = 'none';
      document.getElementById('home-view').style.display = 'block';
    }
  </script>
</body>
</html>
