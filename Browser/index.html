<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud PC – HTMLTools</title>
  <link rel="icon" type="image/png" href="/logo3.png?v=2" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }

    /* Auth */
    #auth-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .auth-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; }
    .auth-card h1 { font-size: 22px; font-weight: 500; margin-bottom: 6px; text-align: center; }
    .auth-card p { font-size: 14px; color: #666; text-align: center; margin-bottom: 1.5rem; }
    .auth-tabs { display: flex; border: 1px solid #e5e5e5; border-radius: 8px; margin-bottom: 1.5rem; overflow: hidden; }
    .auth-tab { flex: 1; padding: 9px; font-size: 14px; background: none; border: none; cursor: pointer; font-family: inherit; color: #666; transition: all 0.15s; }
    .auth-tab.active { background: #1a1a1a; color: #fff; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
    .field input { width: 100%; padding: 10px 12px; border: 1px solid #e5e5e5; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; transition: border 0.15s; }
    .field input:focus { border-color: #1a73e8; }
    .auth-btn { width: 100%; padding: 11px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-family: inherit; cursor: pointer; transition: background 0.15s; }
    .auth-btn:hover { background: #333; }
    .auth-error { font-size: 13px; color: #c62828; margin-top: 10px; text-align: center; min-height: 18px; }

    /* Home */
    #home-view { display: none; padding: 2rem 1rem; max-width: 860px; margin: 0 auto; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
    .top-bar h1 { font-size: 22px; font-weight: 500; }
    .signout-btn { background: none; border: 1px solid #e5e5e5; border-radius: 8px; padding: 7px 14px; font-size: 13px; color: #666; cursor: pointer; font-family: inherit; }
    .signout-btn:hover { background: #f5f5f3; color: #1a1a1a; }
    .user-info { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
    .vm-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; transition: opacity 0.2s; }
    .vm-info { display: flex; align-items: center; gap: 12px; }
    .vm-icon { width: 42px; height: 42px; border-radius: 10px; background: #e8f0fe; display: flex; align-items: center; justify-content: center; }
    .vm-icon i { font-size: 22px; color: #1a73e8; }
    .vm-icon.busy { background: #fce8e8; }
    .vm-icon.busy i { color: #c62828; }
    .vm-name { font-size: 15px; font-weight: 500; }
    .vm-status { font-size: 13px; color: #666; margin-top: 3px; display: flex; align-items: center; gap: 6px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #34a853; flex-shrink: 0; }
    .status-dot.busy { background: #c62828; }
    .connect-btn { background: #fff; border: 1px solid #d0d0d0; border-radius: 8px; padding: 9px 22px; font-size: 14px; color: #1a1a1a; cursor: pointer; font-family: inherit; transition: background 0.15s; white-space: nowrap; }
    .connect-btn:hover:not(:disabled) { background: #f5f5f3; }
    .connect-btn.busy { background: #fce8e8; border-color: #f5c6c6; color: #c62828; cursor: not-allowed; }
    .connect-btn.active-session { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; cursor: not-allowed; }
    .note { text-align: center; font-size: 12px; color: #999; margin-top: 1.5rem; }

    /* Frame */
    #frame-view { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; flex-direction: column; }
    #frame-view.active { display: flex; }
    .frame-header { padding: 8px 16px; background: #1a1a1a; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .frame-header-left { display: flex; align-items: center; gap: 12px; }
    .back-btn { background: none; border: none; color: #aaa; font-size: 13px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 4px; }
    .back-btn:hover { color: #fff; }
    #connected-label { font-size: 13px; color: #aaa; }
    .icon-btn { background: none; border: 1px solid #444; border-radius: 6px; color: #aaa; font-size: 13px; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; padding: 6px 12px; transition: all 0.15s; }
    .icon-btn:hover { background: #333; color: #fff; border-color: #666; }
    #vnc-frame { width: 100%; flex: 1; border: none; display: block; background: #000; }
  </style>
</head>
<body>

  <!-- Auth View -->
  <div id="auth-view">
    <div class="auth-card">
      <h1><i class="ti ti-device-desktop" style="font-size:26px; vertical-align:-5px; margin-right:8px;"></i>Cloud PC</h1>
      <p>Sign in to access a cloud desktop</p>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Sign in</button>
        <button class="auth-tab" onclick="switchTab('signup')">Sign up</button>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <button class="auth-btn" onclick="handleAuth()">Sign in</button>
      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>

  <!-- Home View -->
  <div id="home-view">
    <div class="top-bar">
      <h1><i class="ti ti-device-desktop" style="font-size:24px; vertical-align:-4px; margin-right:8px;"></i>Cloud PC</h1>
      <button class="signout-btn" onclick="signOut()"><i class="ti ti-logout" style="vertical-align:-2px; margin-right:4px;"></i>Sign out</button>
    </div>
    <div class="user-info" id="user-info"></div>
    <div id="vm-list"></div>
    <p class="note">Powered by noVNC · Runs on Google Cloud</p>
  </div>

  <!-- Frame View -->
  <div id="frame-view">
    <div class="frame-header">
      <div class="frame-header-left">
        <button class="back-btn" onclick="disconnect()">
          <i class="ti ti-arrow-left"></i> Back
        </button>
        <span id="connected-label"></span>
      </div>
      <button class="icon-btn" onclick="toggleFullscreen()">
        <i class="ti ti-maximize" id="fs-icon"></i> Fullscreen
      </button>
    </div>
    <iframe id="vnc-frame" src="" allowfullscreen></iframe>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, set, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCAtRRv7hxrBKxeJdh4VsL7j0jh5kf2X1U",
      authDomain: "htmltools-main.firebaseapp.com",
      databaseURL: "https://htmltools-main-default-rtdb.firebaseio.com",
      projectId: "htmltools-main",
      storageBucket: "htmltools-main.firebasestorage.app",
      messagingSenderId: "692809314189",
      appId: "1:692809314189:web:c386a54b41af7c867657c4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const servers = [
      { id: "vm1", name: "Server 1", url: "https://vm.htmltools.me/vnc.html" },
      { id: "vm2", name: "Server 2", url: "https://vm2.htmltools.me/vnc.html" },
      { id: "vm3", name: "Server 3", url: "https://vm3.htmltools.me/vnc.html" },
      { id: "vm4", name: "Server 4", url: "https://vm4.htmltools.me/vnc.html" },
      { id: "vm5", name: "Server 5", url: "https://vm5.htmltools.me/vnc.html" }
    ];

    let currentUser = null;
    let currentSession = null;
    let serverStates = {};

    window.switchTab = (tab) => {
      const tabs = document.querySelectorAll('.auth-tab');
      tabs[0].classList.toggle('active', tab === 'login');
      tabs[1].classList.toggle('active', tab === 'signup');
      window._authTab = tab;
      document.querySelector('.auth-btn').textContent = tab === 'login' ? 'Sign in' : 'Sign up';
      document.getElementById('auth-error').textContent = '';
    };
    window._authTab = 'login';

    window.handleAuth = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('auth-error');
      errEl.textContent = '';
      try {
        if (window._authTab === 'login') {
          await signInWithEmailAndPassword(auth, email, password);
        } else {
          await createUserWithEmailAndPassword(auth, email, password);
        }
      } catch (e) {
        errEl.textContent = e.message.replace('Firebase: ', '').replace(/\(auth.*\)\.?/, '');
      }
    };

    window.signOut = async () => {
      if (currentSession) await releaseServer(currentSession);
      await fbSignOut(auth);
    };

    async function claimServer(vmId) {
      const sessionRef = ref(db, `sessions/${vmId}`);
      await set(sessionRef, { uid: currentUser.uid, email: currentUser.email, connectedAt: Date.now() });
      onDisconnect(sessionRef).remove();
      currentSession = vmId;
    }

    async function releaseServer(vmId) {
      const sessionRef = ref(db, `sessions/${vmId}`);
      await remove(sessionRef);
      currentSession = null;
    }

    window.connect = async (vmId, name, url) => {
      if (currentSession) return;
      await claimServer(vmId);
      document.getElementById('home-view').style.display = 'none';
      document.getElementById('connected-label').textContent = name;
      document.getElementById('vnc-frame').src = url;
      document.getElementById('frame-view').classList.add('active');
    };

    window.disconnect = async () => {
      if (document.fullscreenElement) document.exitFullscreen();
      if (currentSession) await releaseServer(currentSession);
      document.getElementById('vnc-frame').src = '';
      document.getElementById('frame-view').classList.remove('active');
      document.getElementById('home-view').style.display = 'block';
    };

    window.toggleFullscreen = () => {
      const frameView = document.getElementById('frame-view');
      if (!document.fullscreenElement) {
        frameView.requestFullscreen();
        document.getElementById('fs-icon').className = 'ti ti-minimize';
      } else {
        document.exitFullscreen();
        document.getElementById('fs-icon').className = 'ti ti-maximize';
      }
    };

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) document.getElementById('fs-icon').className = 'ti ti-maximize';
    });

    function renderServers() {
      const list = document.getElementById('vm-list');
      list.innerHTML = servers.map(s => {
        const state = serverStates[s.id];
        const isBusy = state && state.uid !== currentUser?.uid;
        const isMySession = state && state.uid === currentUser?.uid;
        const hasAnySession = !!currentSession;

        let btnClass = 'connect-btn';
        let btnText = 'Connect';
        let btnDisabled = '';
        let dotClass = 'status-dot';
        let statusText = 'Available';
        let iconClass = 'vm-icon';

        if (isBusy) {
          btnClass += ' busy';
          btnText = 'In use';
          btnDisabled = 'disabled';
          dotClass += ' busy';
          statusText = 'In use';
          iconClass += ' busy';
        } else if (isMySession) {
          btnClass += ' active-session';
          btnText = 'Your session';
          btnDisabled = 'disabled';
          statusText = 'Your session';
        } else if (hasAnySession && !isMySession) {
          btnDisabled = 'disabled';
        }

        return `
          <div class="vm-card">
            <div class="vm-info">
              <div class="${iconClass}"><i class="ti ti-server"></i></div>
              <div>
                <div class="vm-name">${s.name}</div>
                <div class="vm-status"><span class="${dotClass}"></span>${statusText}</div>
              </div>
            </div>
            <button class="${btnClass}" ${btnDisabled} onclick="connect('${s.id}', '${s.name}', '${s.url}')">${btnText}</button>
          </div>
        `;
      }).join('');
    }

    function watchSessions() {
      const sessionsRef = ref(db, 'sessions');
      onValue(sessionsRef, (snapshot) => {
        serverStates = snapshot.val() || {};
        renderServers();
      });
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('auth-view').style.display = 'none';
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('user-info').textContent = `Signed in as ${user.email}`;
        watchSessions();
      } else {
        currentUser = null;
        currentSession = null;
        document.getElementById('auth-view').style.display = 'flex';
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('frame-view').classList.remove('active');
      }
    });
  </script>
</body>
</html>
