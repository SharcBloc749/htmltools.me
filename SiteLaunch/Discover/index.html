<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover — htmltools.me</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, get, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDJR71PzrgQans3qOc0N1mI2vD4wFg1iV4",
    authDomain: "htmltools-website-hoster.firebaseapp.com",
    databaseURL: "https://htmltools-website-hoster-default-rtdb.firebaseio.com",
    projectId: "htmltools-website-hoster",
    storageBucket: "htmltools-website-hoster.firebasestorage.app",
    messagingSenderId: "234189976540",
    appId: "1:234189976540:web:4fa38db41cf745ada91519"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getDatabase(app);
  const auth = getAuth(app);

  let currentUid      = null;
  let currentUsername = null;
  let allSites  = [];
  let filtered  = [];

  // ── AUTH: detect login so we can show the privacy toggle ──
  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    currentUid = user.uid;
    try {
      const snap = await get(ref(db, `users/${user.uid}`));
      if (!snap.exists()) return;
      currentUsername = snap.val().username;
      // Read their hidden list (stored under their own user node — they can read it)
      const hidSnap = await get(ref(db, `users/${user.uid}/hidden`));
      const isHidden = hidSnap.exists() && hidSnap.val() === true;
      showBanner(isHidden);
    } catch(_) {}
  });

  // ── LOAD: reads usernames/ which is .read:true in your existing rules ──
  async function load() {
    skeleton();
    try {
      const snap = await get(ref(db, 'usernames'));
      if (!snap.exists()) { empty(); return; }

      // Also try to read hidden list — it's under users/{uid} so only works when logged in.
      // For the public list we just get all usernames and filter by hidden flag stored
      // in a public-readable spot: users/{uid}/hidden won't be readable publicly.
      // Instead, store a public "hidden" flag under usernames/{username}/hidden
      // which IS readable since usernames is already public.
      allSites = Object.entries(snap.val()).map(([username, info]) => ({
        username,
        hidden: info.hidden === true
      })).filter(s => !s.hidden);

      // shuffle so it's not always alphabetical on first load
      allSites.sort(() => Math.random() - 0.5);
      filtered = [...allSites];
      render();
    } catch(e) {
      document.getElementById('grid').innerHTML =
        `<div class="msg"><span>⚠️</span><p>Could not load sites.<br><small>${e.message}</small></p></div>`;
    }
  }

  // ── RENDER ──
  function render() {
    document.getElementById('count').textContent = filtered.length;
    if (!filtered.length) {
      document.getElementById('grid').innerHTML = `<div class="msg"><span>🔍</span><p>No sites match.</p></div>`;
      return;
    }
    document.getElementById('grid').innerHTML = filtered.map(card).join('');
    requestAnimationFrame(() => {
      document.querySelectorAll('iframe[data-src]').forEach(f => {
        f.src = f.dataset.src;
        f.onload = () => {
          f.classList.add('loaded');
          const pl = f.closest('.preview')?.querySelector('.pl');
          if (pl) pl.style.display = 'none';
        };
      });
    });
  }

  function card(s) {
    const url = `https://${s.username}.htmltools.me`;
    return `<div class="card">
      <div class="preview" onclick="window.open('${url}','_blank')">
        <div class="pl">loading preview…</div>
        <iframe data-src="${url}" sandbox="allow-scripts allow-same-origin" scrolling="no" tabindex="-1"></iframe>
      </div>
      <div class="info">
        <div class="uname">${s.username}<span class="tld">.htmltools.me</span></div>
        <a class="visit" href="${url}" target="_blank" rel="noopener">Visit →</a>
      </div>
    </div>`;
  }

  // ── PRIVACY BANNER ──
  function showBanner(isHidden) {
    document.getElementById('banner').style.display = 'flex';
    setBannerUI(isHidden);
  }

  function setBannerUI(isHidden) {
    const tog = document.getElementById('tog');
    const lbl = document.getElementById('tlbl');
    tog.className    = 'tog' + (isHidden ? '' : ' on');
    lbl.textContent  = isHidden ? '🔒 Hidden from Discover' : '🌍 Visible in Discover';
  }

  window.togglePrivacy = async function() {
    if (!currentUsername) return;
    const isCurrentlyOn = document.getElementById('tog').classList.contains('on'); // on = public
    const makeHidden    = isCurrentlyOn; // clicking while public → hide
    setBannerUI(makeHidden);
    try {
      // Write hidden flag to usernames/{username}/hidden — readable publicly since usernames is public
      await set(ref(db, `usernames/${currentUsername}/hidden`), makeHidden);
      toast(makeHidden ? '🔒 Hidden from Discover' : '🌍 Now visible in Discover');
      await load(); // refresh grid
    } catch(e) {
      setBannerUI(!makeHidden); // revert on fail
      toast('Failed: ' + e.message, true);
    }
  };

  // ── SEARCH / SORT ──
  window.doSearch = q => {
    const ql = q.toLowerCase().trim();
    filtered = ql ? allSites.filter(s => s.username.toLowerCase().includes(ql)) : [...allSites];
    render();
  };

  window.doSort = v => {
    if (v === 'random') filtered.sort(() => Math.random() - 0.5);
    if (v === 'alpha')  filtered.sort((a,b) => a.username.localeCompare(b.username));
    if (v === 'zalpha') filtered.sort((a,b) => b.username.localeCompare(a.username));
    render();
  };

  window.toast = (msg, err=false) => {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (err ? ' err' : '');
    clearTimeout(window._tt);
    window._tt = setTimeout(() => t.className = '', 3200);
  };

  load();
</script>

<style>
  :root {
    --bg:#0d0d0f; --surf:#141416; --surf2:#1a1a1e; --surf3:#222228;
    --bdr:#2a2a32; --acc:#7c6aff; --acc2:#ff6a9b;
    --tx:#e8e8f0; --tx2:#8888a0; --tx3:#555568;
    --green:#4ade80; --red:#f87171;
    --mono:'JetBrains Mono',monospace; --disp:'Syne',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--tx);font-family:var(--mono);min-height:100vh}

  header{
    position:sticky;top:0;z-index:50;background:var(--surf);
    border-bottom:1px solid var(--bdr);height:52px;
    display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  }
  .logo{
    font-family:var(--disp);font-size:16px;font-weight:800;
    background:linear-gradient(135deg,var(--acc),var(--acc2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;
  }
  nav{display:flex;gap:18px;font-size:12px}
  nav a{color:var(--tx2);text-decoration:none;transition:color .2s}
  nav a:hover{color:var(--tx)}
  nav a.cur{color:var(--acc)}

  .hero{max-width:820px;margin:0 auto;padding:56px 28px 32px;text-align:center}
  .pill{
    display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.14em;
    color:var(--acc);background:#7c6aff14;border:1px solid #7c6aff33;
    border-radius:999px;padding:4px 14px;margin-bottom:18px;
  }
  .hero h1{
    font-family:var(--disp);font-size:clamp(26px,5vw,50px);
    font-weight:800;letter-spacing:-.02em;line-height:1.1;margin-bottom:12px;
  }
  .gr{background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .hero p{font-size:13px;color:var(--tx2);line-height:1.75}

  #banner{
    display:none;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
    max-width:820px;margin:0 auto 18px;padding:11px 18px;
    background:var(--surf);border:1px solid var(--bdr);border-radius:10px;font-size:12px;
  }
  #banner > span{color:var(--tx2)}
  .tog-row{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
  #tlbl{font-size:11px;color:var(--tx2)}
  .tog{
    width:38px;height:20px;border-radius:999px;
    background:var(--surf3);border:1px solid var(--bdr);
    position:relative;cursor:pointer;transition:background .2s,border-color .2s;flex-shrink:0;
  }
  .tog::after{
    content:'';position:absolute;width:14px;height:14px;border-radius:50%;
    background:var(--tx3);top:2px;left:2px;transition:left .2s,background .2s;
  }
  .tog.on{background:var(--acc);border-color:var(--acc)}
  .tog.on::after{left:20px;background:#fff}

  .ctrl{
    max-width:820px;margin:0 auto 26px;padding:0 28px;
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  }
  .sw{flex:1;min-width:180px;position:relative}
  .sw::before{content:'⌕';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--tx3);font-size:15px;pointer-events:none}
  .si{
    width:100%;background:var(--surf);border:1px solid var(--bdr);border-radius:8px;
    padding:8px 12px 8px 30px;color:var(--tx);font-family:var(--mono);font-size:12px;
    outline:none;transition:border-color .2s;
  }
  .si:focus{border-color:var(--acc)}
  .si::placeholder{color:var(--tx3)}
  .ss{
    background:var(--surf);border:1px solid var(--bdr);border-radius:8px;
    padding:8px 12px;color:var(--tx2);font-family:var(--mono);font-size:12px;outline:none;cursor:pointer;
  }
  .cnt{font-size:11px;color:var(--tx3);white-space:nowrap}
  .cnt span{color:var(--acc)}

  .gw{max-width:820px;margin:0 auto;padding:0 28px 80px}
  #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(228px,1fr));gap:18px}

  .card{
    background:var(--surf);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;
    animation:up .38s ease both;transition:border-color .2s,transform .2s,box-shadow .2s;
  }
  .card:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 10px 28px #7c6aff18}
  @keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .card:nth-child(1){animation-delay:.00s}.card:nth-child(2){animation-delay:.04s}
  .card:nth-child(3){animation-delay:.08s}.card:nth-child(4){animation-delay:.12s}
  .card:nth-child(5){animation-delay:.16s}.card:nth-child(6){animation-delay:.20s}
  .card:nth-child(7){animation-delay:.24s}.card:nth-child(8){animation-delay:.28s}

  .preview{
    height:168px;background:var(--surf2);border-bottom:1px solid var(--bdr);
    position:relative;overflow:hidden;cursor:pointer;
  }
  .pl{
    position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;
    font-size:10px;color:var(--tx3);background:var(--surf2);
  }
  .preview iframe{
    position:absolute;top:0;left:0;width:150%;height:150%;
    transform:scale(.667);transform-origin:0 0;
    border:none;pointer-events:none;opacity:0;transition:opacity .5s;z-index:2;
  }
  .preview iframe.loaded{opacity:1}

  .info{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .uname{font-family:var(--disp);font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .tld{color:var(--tx3);font-weight:400;font-family:var(--mono);font-size:11px}
  .visit{
    display:inline-flex;align-items:center;flex-shrink:0;
    padding:5px 12px;background:var(--acc);color:#fff;border-radius:6px;
    font-family:var(--mono);font-size:11px;text-decoration:none;
    transition:background .2s,transform .15s;
  }
  .visit:hover{background:#6b5ce7;transform:translateY(-1px)}

  .sk{pointer-events:none}
  .sk-img{height:168px;background:var(--surf2);border-bottom:1px solid var(--bdr)}
  .sk-line{background:var(--surf3);border-radius:4px;animation:pulse 1.4s ease infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}

  .msg{
    grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:80px 20px;gap:14px;color:var(--tx3);font-size:13px;text-align:center;
  }
  .msg span{font-size:38px;opacity:.3}

  footer{
    border-top:1px solid var(--bdr);padding:20px 28px;
    display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);flex-wrap:wrap;gap:8px;
  }
  footer a{color:var(--tx3);text-decoration:none}
  footer a:hover{color:var(--acc)}

  #toast{
    position:fixed;bottom:22px;right:22px;background:var(--surf2);border:1px solid var(--bdr);
    border-radius:8px;padding:9px 15px;font-size:12px;color:var(--tx);z-index:9999;
    transform:translateY(60px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none;max-width:300px;
  }
  #toast.show{transform:translateY(0);opacity:1;border-color:var(--green);color:var(--green)}
  #toast.show.err{border-color:var(--red);color:var(--red)}

  @media(max-width:600px){
    header,.hero,.ctrl,.gw,footer{padding-left:16px;padding-right:16px}
    .hero{padding-top:36px}
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="/SiteLaunch">htmltools.me</a>
  <nav>
    <a href="/SiteLaunch">Dashboard</a>
    <a href="/discover" class="cur">Discover</a>
  </nav>
</header>

<section class="hero">
  <div class="pill">// explore the web</div>
  <h1>Discover sites on<br><span class="gr">htmltools.me</span></h1>
  <p>Browse live websites made by real people. Click any preview to visit.</p>
</section>

<div id="banner">
  <span>Your visibility on Discover</span>
  <div class="tog-row" onclick="togglePrivacy()">
    <span id="tlbl">🌍 Visible in Discover</span>
    <div class="tog on" id="tog"></div>
  </div>
</div>

<div class="ctrl">
  <div class="sw">
    <input class="si" type="text" placeholder="search by username…" oninput="doSearch(this.value)">
  </div>
  <select class="ss" onchange="doSort(this.value)">
    <option value="random">Sort: Random</option>
    <option value="alpha">Sort: A → Z</option>
    <option value="zalpha">Sort: Z → A</option>
  </select>
  <div class="cnt"><span id="count">—</span> sites</div>
</div>

<div class="gw"><div id="grid"></div></div>

<footer>
  <span>htmltools.me — your corner of the web</span>
  <span><a href="/SiteLaunch">Dashboard</a> · <a href="/discover">Discover</a></span>
</footer>

<div id="toast"></div>
</body>
</html>
