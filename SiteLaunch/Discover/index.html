<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover — htmltools.me</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, get, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
  import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDJR71PzrgQans3qOc0N1mI2vD4wFg1iV4",
    authDomain: "htmltools-website-hoster.firebaseapp.com",
    databaseURL: "https://htmltools-website-hoster-default-rtdb.firebaseio.com",
    projectId: "htmltools-website-hoster",
    storageBucket: "htmltools-website-hoster.firebasestorage.app",
    messagingSenderId: "234189976540",
    appId: "1:234189976540:web:4fa38db41cf745ada91519"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getDatabase(app);
  const auth = getAuth(app);

  window._fb = { db, auth, ref, get, set };

  let currentUser = null;
  let currentUsername = null;
  let allSites = [];
  let filtered = [];

  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      const snap = await get(ref(db, `users/${user.uid}`));
      if (snap.exists()) {
        currentUsername = snap.val().username;
        renderPrivacyBanner();
      }
    }
  });

  async function loadSites() {
    showSkeleton();
    try {
      const snap = await get(ref(db, 'sites'));
      if (!snap.exists()) { showEmpty(); return; }

      const sitesData = snap.val();
      allSites = [];

      for (const [username, data] of Object.entries(sitesData)) {
        if (data.private === true) continue;
        const files = data.files || {};
        const fileCount = Object.keys(files).length;
        const lastUpdated = Math.max(...Object.values(files).map(f => f.updatedAt || 0).filter(Boolean));
        allSites.push({ username, fileCount, lastUpdated });
      }

      allSites.sort((a, b) => b.lastUpdated - a.lastUpdated);
      filtered = [...allSites];
      render();
    } catch(e) {
      document.getElementById('grid').innerHTML = `<div class="load-err">Failed to load sites: ${e.message}</div>`;
    }
  }

  function showSkeleton() {
    const g = document.getElementById('grid');
    g.innerHTML = Array(9).fill(0).map(() => `
      <div class="card skeleton">
        <div class="card-preview skel-preview"></div>
        <div class="card-info">
          <div class="skel-line" style="width:60%;height:14px"></div>
          <div class="skel-line" style="width:40%;height:10px;margin-top:6px"></div>
        </div>
      </div>`).join('');
  }

  function showEmpty() {
    document.getElementById('grid').innerHTML = `<div class="empty-msg"><span>🌐</span><p>No public sites yet.<br>Be the first to create one!</p><a class="btn-visit" href="/SiteLaunch">Open Dashboard →</a></div>`;
  }

  function render() {
    updateCount(filtered.length);
    if (!filtered.length) {
      document.getElementById('grid').innerHTML = `<div class="empty-msg"><span>🔍</span><p>No sites match your search.</p></div>`;
      return;
    }
    document.getElementById('grid').innerHTML = filtered.map(s => siteCard(s)).join('');
    // Load iframes lazily after cards are in DOM
    setTimeout(() => {
      document.querySelectorAll('.card-preview iframe').forEach(iframe => {
        iframe.addEventListener('load', () => {
          iframe.classList.add('loaded');
          iframe.parentElement.querySelector('.preview-overlay')?.remove();
        });
        iframe.src = iframe.dataset.src;
      });
    }, 50);
  }

  function siteCard(site) {
    const ago = timeAgo(site.lastUpdated);
    const url = `https://${site.username}.htmltools.me`;
    return `
      <div class="card" data-username="${site.username}">
        <div class="card-preview">
          <div class="preview-loading">⏳ loading preview…</div>
          <iframe
            data-src="${url}"
            title="${site.username}'s site"
            sandbox="allow-scripts allow-same-origin"
            scrolling="no"
            loading="lazy"
          ></iframe>
          <div class="preview-click-shield" onclick="window.open('${url}','_blank')"></div>
        </div>
        <div class="card-info">
          <div class="card-name">${site.username}<span class="domain">.htmltools.me</span></div>
          <div class="card-meta">
            <span>📄 ${site.fileCount} file${site.fileCount !== 1 ? 's' : ''}</span>
            <span>🕓 ${ago}</span>
          </div>
          <div class="card-actions">
            <a class="btn-visit" href="${url}" target="_blank">Visit →</a>
            <a class="btn-edit" href="/SiteLaunch" title="Open dashboard">Edit</a>
          </div>
        </div>
      </div>`;
  }

  function timeAgo(ts) {
    if (!ts) return 'unknown';
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return `${Math.floor(s/60)}m ago`;
    if (s < 86400) return `${Math.floor(s/3600)}h ago`;
    if (s < 2592000) return `${Math.floor(s/86400)}d ago`;
    return `${Math.floor(s/2592000)}mo ago`;
  }

  function updateCount(n) {
    document.getElementById('site-count').textContent = `${n} site${n !== 1 ? 's' : ''}`;
  }

  window.doSearch = function(q) {
    const query = q.toLowerCase().trim();
    filtered = query ? allSites.filter(s => s.username.toLowerCase().includes(query)) : [...allSites];
    render();
  };

  window.doSort = function(val) {
    if (val === 'recent') filtered.sort((a, b) => b.lastUpdated - a.lastUpdated);
    if (val === 'files')  filtered.sort((a, b) => b.fileCount - a.fileCount);
    if (val === 'alpha')  filtered.sort((a, b) => a.username.localeCompare(b.username));
    render();
  };

  async function renderPrivacyBanner() {
    if (!currentUsername) return;
    const snap = await get(ref(db, `sites/${currentUsername}/private`));
    const isPrivate = snap.exists() && snap.val() === true;
    const banner = document.getElementById('privacy-banner');
    banner.style.display = 'flex';
    banner.innerHTML = `
      <span class="banner-label">Your site: <strong>${currentUsername}.htmltools.me</strong></span>
      <label class="toggle-wrap" title="${isPrivate ? 'Site is hidden from discovery' : 'Site is visible in discovery'}">
        <span class="toggle-label">${isPrivate ? '🔒 Hidden from discover' : '🌍 Visible in discover'}</span>
        <div class="toggle ${isPrivate ? '' : 'on'}" onclick="togglePrivacy(this)"></div>
      </label>`;
  }

  window.togglePrivacy = async function(el) {
    if (!currentUsername) return;
    const isNowOn = !el.classList.contains('on');
    el.classList.toggle('on');
    const isPrivate = !el.classList.contains('on');
    const label = el.previousElementSibling;
    label.textContent = isPrivate ? '🔒 Hidden from discover' : '🌍 Visible in discover';
    try {
      await set(ref(db, `sites/${currentUsername}/private`), isPrivate);
      showToast(isPrivate ? '🔒 Your site is now hidden from Discover' : '🌍 Your site is now public on Discover');
      // Refresh grid
      await loadSites();
    } catch(e) {
      showToast('Failed to save privacy setting', true);
    }
  };

  function showToast(msg, err=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (err ? ' err' : '');
    clearTimeout(window._tt);
    window._tt = setTimeout(() => t.className = '', 3500);
  }

  loadSites();
</script>

<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --surface2: #1a1a1e;
    --surface3: #222228;
    --border: #2a2a32;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --text: #e8e8f0;
    --text2: #8888a0;
    --text3: #555568;
    --green: #4ade80;
    --red: #f87171;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-decoration: none;
  }

  .header-nav {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 12px;
    color: var(--text2);
  }

  .header-nav a {
    color: var(--text2);
    text-decoration: none;
    transition: color 0.2s;
  }

  .header-nav a:hover { color: var(--text); }

  .nav-active {
    color: var(--accent) !important;
    font-weight: 700;
  }

  /* ─── HERO ─── */
  .hero {
    padding: 64px 32px 40px;
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
  }

  .hero-tag {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--accent);
    background: #7c6aff18;
    border: 1px solid #7c6aff44;
    border-radius: 999px;
    padding: 4px 14px;
    margin-bottom: 20px;
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }

  .hero h1 .grad {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero p {
    color: var(--text2);
    font-size: 14px;
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ─── PRIVACY BANNER ─── */
  #privacy-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    max-width: 860px;
    margin: 0 auto 24px;
    font-size: 12px;
    flex-wrap: wrap;
  }

  .banner-label { color: var(--text2); }
  .banner-label strong { color: var(--text); }

  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .toggle-label { font-size: 11px; color: var(--text2); }

  .toggle {
    width: 40px;
    height: 22px;
    border-radius: 999px;
    background: var(--surface3);
    border: 1px solid var(--border);
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--text3);
    top: 2px;
    left: 2px;
    transition: all 0.2s;
  }

  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle.on::after { left: 20px; background: #fff; }

  /* ─── CONTROLS ─── */
  .controls {
    max-width: 860px;
    margin: 0 auto 32px;
    padding: 0 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 16px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px 9px 34px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .sort-select:focus { border-color: var(--accent); }

  .count-badge {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
  }

  #site-count { color: var(--accent); }

  /* ─── GRID ─── */
  .grid-wrap {
    max-width: 860px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.4s ease both;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px #7c6aff22;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* stagger */
  .card:nth-child(1)  { animation-delay: 0.00s; }
  .card:nth-child(2)  { animation-delay: 0.04s; }
  .card:nth-child(3)  { animation-delay: 0.08s; }
  .card:nth-child(4)  { animation-delay: 0.12s; }
  .card:nth-child(5)  { animation-delay: 0.16s; }
  .card:nth-child(6)  { animation-delay: 0.20s; }
  .card:nth-child(7)  { animation-delay: 0.24s; }
  .card:nth-child(8)  { animation-delay: 0.28s; }
  .card:nth-child(9)  { animation-delay: 0.32s; }

  .card-preview {
    height: 180px;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
  }

  .preview-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text3);
    z-index: 1;
    background: var(--surface2);
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .card-preview iframe {
    width: 150%;
    height: 150%;
    transform: scale(0.667);
    transform-origin: 0 0;
    border: none;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    position: relative;
    z-index: 2;
  }

  .card-preview iframe.loaded {
    opacity: 1;
  }

  .card-preview iframe.loaded + .preview-loading,
  .preview-loading:has(+ iframe.loaded) {
    opacity: 0;
  }

  /* Invisible shield so clicking preview opens site */
  .preview-click-shield {
    position: absolute;
    inset: 0;
    z-index: 3;
    cursor: pointer;
  }

  .card-info {
    padding: 14px 16px;
  }

  .card-name {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .domain {
    color: var(--text3);
    font-weight: 400;
    font-family: var(--font-mono);
    font-size: 12px;
  }

  .card-meta {
    display: flex;
    gap: 12px;
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 12px;
  }

  .card-actions {
    display: flex;
    gap: 8px;
  }

  .btn-visit {
    display: inline-flex;
    align-items: center;
    padding: 6px 14px;
    background: var(--accent);
    color: #fff;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s;
  }

  .btn-visit:hover { background: #6b5ce7; transform: translateY(-1px); }

  .btn-edit {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    text-decoration: none;
    transition: all 0.2s;
  }

  .btn-edit:hover { background: var(--surface2); color: var(--text); }

  /* ─── SKELETONS ─── */
  .skeleton { pointer-events: none; }
  .skel-preview { background: var(--surface2); height: 180px; border-bottom: 1px solid var(--border); }
  .skel-line {
    background: var(--surface3);
    border-radius: 4px;
    animation: shimmer 1.4s ease infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ─── EMPTY / ERROR ─── */
  .empty-msg, .load-err {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 14px;
    color: var(--text3);
    font-size: 13px;
    text-align: center;
  }

  .empty-msg span { font-size: 40px; opacity: 0.4; }
  .empty-msg p { line-height: 1.7; }

  /* ─── FOOTER ─── */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    flex-wrap: wrap;
    gap: 8px;
  }

  footer a { color: var(--text3); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  /* ─── TOAST ─── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text);
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    max-width: 320px;
  }

  #toast.show { transform: translateY(0); opacity: 1; border-color: var(--green); color: var(--green); }
  #toast.show.err { border-color: var(--red); color: var(--red); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .hero { padding: 40px 20px 28px; }
    .controls, .grid-wrap { padding: 0 16px 60px; }
    header { padding: 0 16px; }
    .header-nav { gap: 12px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="/SiteLaunch">htmltools.me</a>
  <nav class="header-nav">
    <a href="/SiteLaunch">Dashboard</a>
    <a href="/discover" class="nav-active">Discover</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-tag">// explore the web</div>
  <h1>Discover sites on<br><span class="grad">htmltools.me</span></h1>
  <p>Browse live websites made by real people on this platform. Click any preview to visit.</p>
</section>

<div class="controls" style="padding-bottom:0;margin-bottom:16px">
  <div id="privacy-banner"></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="search by username…" oninput="doSearch(this.value)">
  </div>
  <select class="sort-select" onchange="doSort(this.value)">
    <option value="recent">Sort: Recent</option>
    <option value="files">Sort: Most files</option>
    <option value="alpha">Sort: A → Z</option>
  </select>
  <div class="count-badge"><span id="site-count">—</span> found</div>
</div>

<div class="grid-wrap">
  <div id="grid"></div>
</div>

<footer>
  <span>htmltools.me — your corner of the web</span>
  <span>
    <a href="/SiteLaunch">Dashboard</a> &nbsp;·&nbsp;
    <a href="/discover">Discover</a>
  </span>
</footer>

<div id="toast"></div>

</body>
</html>
