<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Site Unavailable</title>
		<link rel="icon" type="image/png" href="/logo3.png?v=2" />
		<style>
			* {
			    margin: 0;
			    padding: 0;
			    box-sizing: border-box;
			    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
			}

			body {
			    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
			    height: 100vh;
			    display: flex;
			    align-items: center;
			    justify-content: center;
			    color: #333;
			}

			.container {
			    text-align: center;
			    padding: 3rem;
			    background: rgba(255, 255, 255, 0.8);
			    backdrop-filter: blur(10px);
			    border-radius: 20px;
			    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
			    max-width: 500px;
			    width: 90%;
			}

			.icon {
			    font-size: 4rem;
			    margin-bottom: 1rem;
			    display: inline-block;
			}

			h1 {
			    font-size: 1.8rem;
			    margin-bottom: 1rem;
			    color: #2c3e50;
			    font-weight: 600;
			}

			p {
			    font-size: 1.1rem;
			    line-height: 1.6;
			    color: #5a6772;
			    margin-bottom: 2rem;
			}

			.loader {
			    border: 3px solid #f3f3f3;
			    border-top: 3px solid #3498db;
			    border-radius: 50%;
			    width: 30px;
			    height: 30px;
			    animation: spin 2s linear infinite;
			    margin: 0 auto;
			}

			@keyframes spin {
			    0% { transform: rotate(0deg); }
			    100% { transform: rotate(360deg); }
			}

			.status-tag {
			    display: inline-block;
			    background: #e1f5fe;
			    color: #0288d1;
			    padding: 5px 15px;
			    border-radius: 50px;
			    font-size: 0.8rem;
			    font-weight: bold;
			    text-transform: uppercase;
			    letter-spacing: 1px;
			    margin-top: 1rem;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="icon">🛠️</div>
			<h1>This Website is Currently Unavailable</h1>
			<p>
				We’re currently working on an exciting new update to improve
				your experience. We'll be back online shortly!
			</p>

			<div class="loader"></div>
			<div class="status-tag">Maintenance in Progress</div>
		</div>
	</body>
</html>
