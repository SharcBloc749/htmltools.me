<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTMLTools Sandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0c0f;
      --surface:  #13151a;
      --border:   #1f2230;
      --accent:   #00e5ff;
      --accent2:  #7c3aed;
      --text:     #e2e8f0;
      --muted:    #4a5568;
      --danger:   #fc8181;
      --success:  #68d391;
      --radius:   10px;
      --mono:     'DM Mono', monospace;
      --sans:     'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* glow blobs */
    body::after {
      content: '';
      position: fixed;
      top: -120px; left: -120px;
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(0,229,255,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(11,12,15,0.85);
      backdrop-filter: blur(12px);
      flex-wrap: wrap;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      white-space: nowrap;
    }

    .logo span { color: var(--accent); }

    .url-bar {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .url-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0,229,255,0.12);
    }

    .url-label {
      padding: 0 12px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      white-space: nowrap;
      border-right: 1px solid var(--border);
      height: 38px;
      display: flex;
      align-items: center;
      background: rgba(0,229,255,0.05);
    }

    #urlInput {
      flex: 1;
      height: 38px;
      background: transparent;
      border: none;
      outline: none;
      padding: 0 14px;
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--text);
    }

    #urlInput::placeholder { color: var(--muted); }

    .header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      height: 38px;
      padding: 0 18px;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-run {
      background: var(--accent);
      color: #000;
    }

    .btn-run:hover { background: #33ecff; transform: translateY(-1px); }
    .btn-run:active { transform: translateY(0); }

    .btn-clear {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-clear:hover { color: var(--danger); border-color: var(--danger); }

    /* status pill */
    #statusPill {
      font-family: var(--mono);
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid var(--border);
      color: var(--muted);
      white-space: nowrap;
      transition: all 0.2s;
    }

    #statusPill.ready  { color: var(--success); border-color: var(--success); }
    #statusPill.error  { color: var(--danger);  border-color: var(--danger);  }
    #statusPill.running { color: var(--accent); border-color: var(--accent); animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* ── Main split ─────────────────────────────────────────────────── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    /* ── Editor pane ────────────────────────────────────────────────── */
    .editor-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .pane-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .pane-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .line-count {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
    }

    .editor-wrap {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* line numbers */
    #lineNumbers {
      padding: 16px 0 16px 12px;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--muted);
      user-select: none;
      text-align: right;
      min-width: 44px;
      overflow: hidden;
      background: var(--surface);
      border-right: 1px solid var(--border);
    }

    #codeEditor {
      flex: 1;
      padding: 16px;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--mono);
      font-size: 0.78rem;
      line-height: 1.6;
      color: var(--text);
      tab-size: 2;
      white-space: pre;
      overflow-wrap: normal;
      overflow-x: auto;
      overflow-y: auto;
    }

    #codeEditor::placeholder { color: var(--muted); }

    /* ── Preview pane ───────────────────────────────────────────────── */
    .preview-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    /* fake browser dots */
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.red    { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green  { background: #28c840; }

    .fake-url-bar {
      flex: 1;
      height: 26px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #previewFrame {
      flex: 1;
      border: none;
      background: #fff;
    }

    /* ── Empty state ────────────────────────────────────────────────── */
    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .empty-icon {
      font-size: 3rem;
      opacity: 0.15;
    }

    .empty-text {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
      opacity: 0.6;
    }

    /* ── Toast ──────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.8rem;
      font-family: var(--mono);
      color: var(--text);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 760px) {
      .workspace { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .editor-pane { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Header ── -->
  <header>
    <div class="logo">html<span>tools</span>.me <span style="color:var(--muted);font-weight:400;font-size:0.75rem">/ sandbox</span></div>

    <div class="url-bar">
      <div class="url-label">origin →</div>
      <input
        id="urlInput"
        type="url"
        placeholder="https://example.com  (spoof this origin)"
        value="https://htmltools.me"
        spellcheck="false"
        autocomplete="off"
      />
    </div>

    <div class="header-actions">
      <span id="statusPill">idle</span>
      <button class="btn btn-clear" onclick="clearAll()">✕ Clear</button>
      <button class="btn btn-run" onclick="runCode()">▶ Run</button>
    </div>
  </header>

  <!-- ── Workspace ── -->
  <div class="workspace">

    <!-- Editor -->
    <div class="editor-pane">
      <div class="pane-header">
        <span class="pane-title">HTML Editor</span>
        <span class="line-count" id="lineCount">0 lines</span>
      </div>
      <div class="editor-wrap">
        <div id="lineNumbers">1</div>
        <textarea
          id="codeEditor"
          spellcheck="false"
          placeholder="<!-- Paste your HTML here, then click ▶ Run -->&#10;&#10;<!DOCTYPE html>&#10;<html>&#10;  <body>&#10;    <h1>Hello!</h1>&#10;  </body>&#10;</html>"
        ></textarea>
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-pane">
      <div class="preview-toolbar">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
        <div class="fake-url-bar" id="fakeUrlDisplay">about:blank</div>
      </div>

      <div class="empty-state" id="emptyState">
        <div class="empty-icon">⬡</div>
        <div class="empty-text">Paste HTML on the left<br>and hit ▶ Run to preview</div>
      </div>

      <iframe
        id="previewFrame"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
        style="opacity:0;"
      ></iframe>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  // Change this if you deploy the worker to a custom route
  const PROXY_WORKER = "https://wispy-hat-9611.bozhetarnikmatthew.workers.dev/";

  // ── Line numbers ──────────────────────────────────────────────────────────
  const editor     = document.getElementById("codeEditor");
  const lineNums   = document.getElementById("lineNumbers");
  const lineCount  = document.getElementById("lineCount");

  function updateLineNumbers() {
    const lines = editor.value.split("\n").length;
    lineNums.textContent = Array.from({length: lines}, (_, i) => i + 1).join("\n");
    lineCount.textContent = `${lines} line${lines !== 1 ? "s" : ""}`;
  }

  editor.addEventListener("input", updateLineNumbers);
  editor.addEventListener("scroll", () => { lineNums.scrollTop = editor.scrollTop; });

  // Tab key support
  editor.addEventListener("keydown", e => {
    if (e.key === "Tab") {
      e.preventDefault();
      const s = editor.selectionStart;
      editor.value = editor.value.slice(0, s) + "  " + editor.value.slice(editor.selectionEnd);
      editor.selectionStart = editor.selectionEnd = s + 2;
      updateLineNumbers();
    }
    // Ctrl/Cmd+Enter to run
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) runCode();
  });

  updateLineNumbers();

  // ── Status helpers ────────────────────────────────────────────────────────
  const pill = document.getElementById("statusPill");

  function setStatus(state, text) {
    pill.className = state;
    pill.textContent = text;
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
  }

  // ── Main run logic ────────────────────────────────────────────────────────
  async function runCode() {
    const html    = editor.value.trim();
    const rawUrl  = document.getElementById("urlInput").value.trim();

    if (!html) { showToast("✗ Nothing to run — paste some HTML first"); return; }

    let origin;
    try {
      origin = new URL(rawUrl).origin;
    } catch {
      showToast("✗ Enter a valid URL first (e.g. https://example.com)");
      return;
    }

    setStatus("running", "running…");
    document.getElementById("fakeUrlDisplay").textContent = rawUrl;

    // Rewrite the HTML so every fetch/XHR goes through the proxy
    // and the document base URL looks like the spoofed origin.
    const injected = rewriteHTML(html, origin, rawUrl);

    const frame = document.getElementById("previewFrame");
    const empty = document.getElementById("emptyState");

    frame.style.opacity = "0";
    frame.srcdoc = injected;

    frame.onload = () => {
      empty.style.opacity = "0";
      frame.style.opacity = "1";
      setStatus("ready", "ready");
    };
  }

  /**
   * Rewrites an HTML string so that:
   *  1. A <base href="..."> is injected → relative URLs resolve to target origin
   *  2. A service-worker-style fetch interceptor is injected that routes all
   *     network calls through our Cloudflare proxy worker, adding the spoofed
   *     Origin & Referer headers.
   */
  function rewriteHTML(html, origin, fullUrl) {
    const proxyScript = `
<script>
(function() {
  const PROXY    = ${JSON.stringify(PROXY_WORKER)};
  const ORIGIN   = ${JSON.stringify(origin)};
  const BASE_URL = ${JSON.stringify(fullUrl)};

  function proxyUrl(url) {
    try {
      const abs = new URL(url, BASE_URL).href;
      // Don't proxy data: or blob: URLs
      if (abs.startsWith("data:") || abs.startsWith("blob:")) return url;
      return PROXY + "?url=" + encodeURIComponent(abs);
    } catch { return url; }
  }

  // ── Patch fetch ──────────────────────────────────────────────────────────
  const _fetch = window.fetch;
  window.fetch = function(input, init = {}) {
    let url = (typeof input === "string") ? input : input.url;
    url = proxyUrl(url);
    const headers = new Headers(init.headers || {});
    headers.set("Origin",  ORIGIN);
    headers.set("Referer", BASE_URL);
    init = { ...init, headers };
    if (typeof input === "string") return _fetch(url, init);
    return _fetch(new Request(url, init));
  };

  // ── Patch XMLHttpRequest ─────────────────────────────────────────────────
  const _open = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(method, url, ...rest) {
    this._url = url;
    return _open.call(this, method, proxyUrl(url), ...rest);
  };

  const _setHeader = XMLHttpRequest.prototype.setRequestHeader;
  XMLHttpRequest.prototype.setRequestHeader = function(name, value) {
    // Let the browser set origin-sensitive headers; we'll add ours after send
    return _setHeader.call(this, name, value);
  };

  // ── Firebase / WebSocket note ────────────────────────────────────────────
  // WebSocket connections can't be proxied purely client-side.
  // For Firebase Realtime Database REST calls (fetch-based) the proxy works.
  // For Firebase Auth you may need to add your domain to Firebase console.
  console.info("[sandbox] Proxy active → all fetch/XHR routed via", PROXY);
})();
<\/script>`;

    // Inject base tag + proxy script right after <head> or at the very top
    const baseTag = `<base href="${fullUrl}">`;

    if (/<head[\s>]/i.test(html)) {
      return html.replace(/(<head[^>]*>)/i, `$1\n${baseTag}\n${injected}`);
    } else if (/<html[\s>]/i.test(html)) {
      return html.replace(/(<html[^>]*>)/i, `$1\n<head>${baseTag}\n${proxyScript}\n</head>`);
    } else {
      return baseTag + "\n" + proxyScript + "\n" + html;
    }

    function injected() { return proxyScript; } // shadowed, see below
    return html; // unreachable safety

    // re-declare so the replace closure above actually works
    var injected = proxyScript;
  }

  // Fix: rewrite without the closure bug
  function rewriteHTML(html, origin, fullUrl) {
    const proxyScript = `<script>
(function() {
  const PROXY    = ${JSON.stringify(PROXY_WORKER)};
  const ORIGIN   = ${JSON.stringify(origin)};
  const BASE_URL = ${JSON.stringify(fullUrl)};

  function proxyUrl(url) {
    try {
      const abs = new URL(url, BASE_URL).href;
      if (abs.startsWith("data:") || abs.startsWith("blob:")) return url;
      return PROXY + "?url=" + encodeURIComponent(abs);
    } catch { return url; }
  }

  const _fetch = window.fetch;
  window.fetch = function(input, init) {
    init = init || {};
    let url = (typeof input === "string") ? input : input.url;
    url = proxyUrl(url);
    const headers = new Headers(init.headers || {});
    headers.set("Origin",  ORIGIN);
    headers.set("Referer", BASE_URL);
    init = Object.assign({}, init, { headers });
    if (typeof input === "string") return _fetch(url, init);
    return _fetch(new Request(url, { method: input.method, body: input.body, headers, mode: "cors" }));
  };

  const _open = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(method, url, async, user, pass) {
    return _open.call(this, method, proxyUrl(url),
      async === undefined ? true : async, user, pass);
  };

  console.info("[htmltools sandbox] proxy active →", PROXY);
})();
<\/script>`;

    const baseTag = '<base href="' + fullUrl + '">';
    const inject  = baseTag + "\n" + proxyScript;

    if (/<head[\s>]/i.test(html)) {
      return html.replace(/(<head[^>]*>)/i, "$1\n" + inject);
    } else if (/<html[\s>]/i.test(html)) {
      return html.replace(/(<html[^>]*>)/i, "$1\n<head>" + inject + "</head>");
    } else {
      return inject + "\n" + html;
    }
  }

  // ── Clear ─────────────────────────────────────────────────────────────────
  function clearAll() {
    editor.value = "";
    updateLineNumbers();
    const frame = document.getElementById("previewFrame");
    frame.srcdoc = "";
    frame.style.opacity = "0";
    document.getElementById("emptyState").style.opacity = "1";
    document.getElementById("fakeUrlDisplay").textContent = "about:blank";
    setStatus("", "idle");
  }
</script>
</body>
</html>
