<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>MatTok - HTMLTools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --red: #fe2c55; --red2: #ff4d6d;
  --bg: #000; --surface: #111; --surface2: #1a1a1a;
  --border: #2a2a2a; --tx: #fff; --tx2: #aaa; --tx3: #555;
  --font: 'DM Sans', sans-serif;
  --nav-h: 56px; --bottom-h: 60px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--tx); font-family:var(--font); }
button { font-family:var(--font); cursor:pointer; border:none; background:none; color:inherit; }

/* ── AUTH ── */
#auth-screen {
  position:fixed; inset:0; background:var(--bg); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px;
}
#auth-screen.hidden { display:none; }
.auth-logo { display:flex; align-items:center; gap:10px; margin-bottom:32px; }
.auth-logo img { width:44px; height:44px; border-radius:12px; object-fit:contain; }
.auth-logo-name {
  font-size:2rem; font-weight:700; letter-spacing:-.04em;
  background:linear-gradient(135deg,#fff 0%,var(--red) 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.auth-card {
  width:100%; max-width:360px; background:var(--surface);
  border:1px solid var(--border); border-radius:20px; padding:28px; position:relative;
}
.auth-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:20px 20px 0 0;
  background:linear-gradient(90deg,var(--red),var(--red2),transparent);
}
.auth-tabs { display:flex; background:var(--surface2); border-radius:10px; padding:3px; gap:2px; margin-bottom:22px; }
.auth-tab { flex:1; padding:9px; border-radius:8px; font-size:.8rem; font-weight:600; color:var(--tx2); letter-spacing:.04em; text-transform:uppercase; transition:all .18s; }
.auth-tab.active { background:var(--red); color:#fff; }
.auth-field { margin-bottom:14px; }
.auth-field label { display:block; font-size:.73rem; color:var(--tx2); margin-bottom:6px; font-weight:500; }
.auth-field input {
  width:100%; background:var(--surface2); border:1px solid var(--border);
  color:var(--tx); padding:11px 14px; border-radius:10px; font-size:.9rem;
  font-family:var(--font); outline:none; transition:border-color .15s;
}
.auth-field input:focus { border-color:var(--red); }
.auth-field input::placeholder { color:var(--tx3); }
.auth-submit {
  width:100%; padding:13px; background:var(--red); color:#fff;
  border-radius:10px; font-size:.9rem; font-weight:700; margin-top:6px; transition:opacity .15s;
}
.auth-submit:hover { opacity:.88; }
.auth-err {
  margin-top:12px; padding:10px 12px; background:rgba(254,44,85,.1);
  border:1px solid rgba(254,44,85,.3); border-radius:8px; color:var(--red2);
  font-size:.78rem; display:none;
}
.auth-err.show { display:block; }

/* ── APP ── */
#app { position:fixed; inset:0; display:none; flex-direction:column; }
#app.show { display:flex; }

/* ── TOP NAV ── */
#top-nav {
  position:fixed; top:0; left:0; right:0; height:var(--nav-h); z-index:50;
  display:flex; align-items:center; justify-content:space-between; padding:0 14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.8) 0%,transparent 100%);
  pointer-events:none;
}
#top-nav > * { pointer-events:auto; }
.nav-logo { display:flex; align-items:center; gap:8px; }
.nav-logo img { width:30px; height:30px; border-radius:8px; object-fit:contain; }
.nav-logo-text {
  font-size:1.25rem; font-weight:700; letter-spacing:-.03em;
  background:linear-gradient(135deg,#fff,var(--red));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.nav-right { display:flex; align-items:center; gap:8px; }
.nav-icon-btn {
  width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; color:#fff; background:rgba(0,0,0,.35);
  backdrop-filter:blur(8px); transition:background .13s;
}
.nav-icon-btn:hover { background:rgba(255,255,255,.15); }

/* ── USER MENU ── */
#user-menu {
  position:fixed; top:62px; right:14px; background:var(--surface);
  border:1px solid var(--border); border-radius:14px; padding:6px;
  z-index:100; min-width:190px; display:none;
  box-shadow:0 20px 60px rgba(0,0,0,.8);
  animation:pop .15s cubic-bezier(.22,1,.36,1);
}
#user-menu.show { display:block; }
@keyframes pop { from{opacity:0;transform:scale(.95) translateY(-4px)} to{opacity:1;transform:scale(1) translateY(0)} }
.um-header { padding:10px 12px 8px; border-bottom:1px solid var(--border); margin-bottom:4px; }
.um-name { font-weight:600; font-size:.88rem; }
.um-email { font-size:.72rem; color:var(--tx2); margin-top:2px; }
.um-item { display:flex; align-items:center; gap:9px; padding:9px 12px; border-radius:9px; font-size:.85rem; color:var(--tx2); cursor:pointer; transition:background .12s; width:100%; }
.um-item:hover { background:var(--surface2); color:var(--tx); }
.um-signout { color:#f87171; }
.um-signout:hover { background:rgba(248,113,113,.1); color:#f87171; }

/* ── FEED ── */
#feed { position:fixed; inset:0; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
#feed::-webkit-scrollbar { display:none; }

.slide {
  height:100dvh; scroll-snap-align:start;
  position:relative; display:flex; align-items:center; justify-content:center;
  background:#000; overflow:hidden;
}
.slide video { height:100%; width:100%; object-fit:contain; display:block; cursor:pointer; }
.slide::before {
  content:''; position:absolute; top:0; left:0; right:0; height:180px;
  background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent); z-index:2; pointer-events:none;
}
.slide::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:280px;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent); z-index:2; pointer-events:none;
}

.pause-flash {
  position:absolute; z-index:10; width:72px; height:72px; border-radius:50%;
  background:rgba(0,0,0,.5); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.pause-flash.show { opacity:1; }

/* ── SLIDE INFO ── */
.slide-info {
  position:absolute; bottom:calc(var(--bottom-h) + 12px); left:0; right:72px;
  padding:0 14px; z-index:5;
}
.si-author { display:flex; align-items:center; gap:9px; margin-bottom:8px; }
.si-avatar {
  width:38px; height:38px; border-radius:50%; border:2px solid var(--red);
  object-fit:cover; background:var(--surface2); flex-shrink:0;
  overflow:hidden; display:flex; align-items:center; justify-content:center;
  font-size:.95rem; font-weight:700; cursor:pointer;
}
.si-avatar img { width:100%; height:100%; object-fit:cover; }
.si-name { font-weight:700; font-size:.92rem; cursor:pointer; }
.si-name:hover { text-decoration:underline; }
.si-follow {
  background:transparent; border:1px solid rgba(255,255,255,.5);
  color:#fff; font-size:.72rem; font-weight:600; padding:4px 10px; border-radius:4px; transition:all .15s;
}
.si-follow.active { background:var(--red); border-color:var(--red); }
.si-desc { font-size:.83rem; color:#e0e0e0; line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:6px; }
.si-music { display:flex; align-items:center; gap:6px; font-size:.78rem; color:#ccc; }
.si-music-disc { width:22px; height:22px; border-radius:50%; background:var(--surface2); border:2px solid #444; flex-shrink:0; display:flex; align-items:center; justify-content:center; animation:spin 4s linear infinite; }
.si-music-disc.paused { animation-play-state:paused; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* ── SLIDE ACTIONS ── */
.slide-actions {
  position:absolute; right:0; bottom:calc(var(--bottom-h) + 12px);
  display:flex; flex-direction:column; align-items:center; gap:16px;
  padding:0 10px; z-index:5;
}
.sa-btn { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; }
.sa-icon {
  width:46px; height:46px; border-radius:50%;
  background:rgba(255,255,255,.1); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; transition:transform .15s,background .15s;
}
.sa-btn:active .sa-icon { transform:scale(.88); }
.sa-icon.liked { background:rgba(254,44,85,.25); }
.sa-icon svg { color:#fff; }
.sa-icon.liked svg { color:var(--red); }
.sa-count { font-size:.68rem; color:#fff; font-weight:500; text-shadow:0 1px 4px rgba(0,0,0,.7); }

.slide-progress {
  position:absolute; bottom:var(--bottom-h); left:0; right:0;
  height:2px; background:rgba(255,255,255,.15); z-index:5; cursor:pointer;
}
.slide-progress-bar { height:100%; background:var(--red); width:0; pointer-events:none; transition:width .1s linear; }

/* ── BOTTOM NAV ── */
#bottom-nav {
  position:fixed; bottom:0; left:0; right:0; height:var(--bottom-h);
  background:rgba(0,0,0,.95); backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,.06);
  display:flex; align-items:center; justify-content:space-around;
  z-index:50; padding-bottom:env(safe-area-inset-bottom);
}
.bn-item { display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 14px; cursor:pointer; color:var(--tx3); transition:color .15s; }
.bn-item.active { color:#fff; }
.bn-item.active svg { color:var(--red); }
.bn-label { font-size:.6rem; font-weight:600; letter-spacing:.04em; }
.bn-refresh {
  width:40px; height:40px; background:var(--red); border-radius:8px;
  display:flex; align-items:center; justify-content:center; color:#fff;
  transition:transform .2s, opacity .15s;
}
.bn-refresh:hover { opacity:.85; }
.bn-refresh.spinning svg { animation:rotateSpin .6s linear; }
@keyframes rotateSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* ── SEARCH ── */
#search-bar {
  display:none; position:fixed; inset:0; z-index:200; background:var(--bg); flex-direction:column;
}
#search-bar.show { display:flex; }
.search-top {
  display:flex; align-items:center; gap:10px; padding:12px 14px;
  padding-top:calc(14px + env(safe-area-inset-top));
  border-bottom:1px solid var(--border); background:var(--bg);
}
.search-input-wrap {
  flex:1; display:flex; align-items:center; gap:8px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:22px; padding:9px 14px; transition:border-color .15s;
}
.search-input-wrap:focus-within { border-color:var(--red); }
#search-input {
  flex:1; background:transparent; border:none; color:var(--tx);
  font-size:.92rem; font-family:var(--font); outline:none;
}
#search-input::placeholder { color:var(--tx3); }
.search-cancel { color:var(--tx2); font-size:.9rem; font-weight:500; flex-shrink:0; padding:4px 2px; }
.search-cancel:hover { color:var(--tx); }
#search-go {
  background:var(--red); color:#fff; border-radius:8px;
  padding:8px 14px; font-size:.82rem; font-weight:700; flex-shrink:0;
  transition:opacity .15s;
}
#search-go:hover { opacity:.85; }

.search-body { flex:1; overflow-y:auto; }
#search-feed { }
.search-video-card {
  display:flex; gap:12px; padding:12px 14px; border-bottom:1px solid var(--border);
  cursor:pointer; transition:background .13s;
}
.search-video-card:hover { background:var(--surface); }
.svc-thumb {
  width:72px; height:100px; border-radius:8px; object-fit:cover;
  background:var(--surface2); flex-shrink:0;
}
.svc-info { flex:1; min-width:0; display:flex; flex-direction:column; justify-content:space-between; }
.svc-author { font-size:.78rem; color:var(--tx2); margin-bottom:4px; }
.svc-desc { font-size:.85rem; font-weight:500; line-height:1.4; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.svc-stats { display:flex; gap:10px; font-size:.75rem; color:var(--tx2); margin-top:6px; }
.search-section { padding:14px 14px 6px; font-size:.72rem; font-weight:700; color:var(--tx2); text-transform:uppercase; letter-spacing:.08em; border-bottom:1px solid var(--border); }
.search-empty { text-align:center; padding:60px 20px; color:var(--tx2); font-size:.88rem; }
.search-loading { display:flex; align-items:center; justify-content:center; gap:6px; padding:40px; }

/* ── COMMENTS ── */
#comments-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:199; display:none; }
#comments-overlay.show { display:block; }
#comments-panel {
  position:fixed; bottom:0; left:0; right:0; height:65vh;
  background:var(--surface); border-radius:18px 18px 0 0;
  z-index:200; display:flex; flex-direction:column;
  transform:translateY(110%); transition:transform .32s cubic-bezier(.32,.72,0,1);
  border-top:1px solid var(--border);
}
#comments-panel.open { transform:translateY(0); }
.cp-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:10px auto 0; }
.cp-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); }
.cp-title { font-weight:700; font-size:.95rem; }
.cp-close { width:30px; height:30px; border-radius:50%; background:var(--surface2); display:flex; align-items:center; justify-content:center; color:var(--tx2); font-size:1rem; cursor:pointer; }
#comments-list { flex:1; overflow-y:auto; padding:12px 16px; display:flex; flex-direction:column; gap:14px; }
#comments-list::-webkit-scrollbar { display:none; }
.comment { display:flex; gap:10px; }
.c-avatar { width:34px; height:34px; border-radius:50%; background:var(--surface2); flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:.82rem; font-weight:700; color:var(--tx2); }
.c-avatar img { width:100%; height:100%; object-fit:cover; }
.c-body { flex:1; min-width:0; }
.c-user { font-weight:600; font-size:.82rem; margin-bottom:2px; }
.c-text { font-size:.85rem; color:#ddd; line-height:1.45; }
.c-meta { font-size:.72rem; color:var(--tx3); margin-top:4px; display:flex; gap:10px; }
.c-loading { color:var(--tx2); font-size:.85rem; text-align:center; padding:28px; }

/* ── LOADER DOTS ── */
.loader-dots { display:flex; align-items:center; gap:6px; }
.loader-dot { width:6px; height:6px; border-radius:50%; background:var(--red); animation:bounce .8s infinite; }
.loader-dot:nth-child(2){animation-delay:.15s} .loader-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ── TOAST ── */
.toast {
  position:fixed; bottom:calc(var(--bottom-h) + 14px); left:50%;
  transform:translateX(-50%) translateY(8px); opacity:0;
  background:rgba(25,25,25,.96); border:1px solid var(--border);
  color:#fff; padding:9px 18px; border-radius:22px; font-size:.82rem; font-weight:500;
  z-index:999; transition:all .2s; pointer-events:none; white-space:nowrap; backdrop-filter:blur(8px);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── VIDEO REDIRECT BANNER ── */
#redirect-banner {
  position:fixed; top:0; left:0; right:0; z-index:80;
  background:rgba(254,44,85,.95); backdrop-filter:blur(8px);
  padding:10px 16px; display:none; align-items:center; justify-content:space-between;
  font-size:.82rem; font-weight:600;
}
#redirect-banner.show { display:flex; }
#redirect-banner button { background:rgba(255,255,255,.2); color:#fff; padding:4px 10px; border-radius:6px; font-size:.78rem; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">
    <img src="logo3.png" alt="MatTok"/>
    <span class="auth-logo-name">MatTok</span>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="authTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="authTab('register')">Register</button>
    </div>
    <div id="name-field" class="auth-field" style="display:none">
      <label>Display Name</label>
      <input type="text" id="auth-name" placeholder="Your name"/>
    </div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doAuth()"/>
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="auth-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"/>
    </div>
    <button class="auth-submit" id="auth-btn" onclick="doAuth()">Sign In</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="redirect-banner">
    <span id="redirect-text">🎬 Jumping to shared video…</span>
    <button onclick="document.getElementById('redirect-banner').classList.remove('show')">✕</button>
  </div>

  <!-- TOP NAV -->
  <div id="top-nav">
    <div class="nav-logo">
      <img src="logo3.png" alt="MatTok"/>
      <span class="nav-logo-text">MatTok</span>
    </div>
    <div class="nav-right">
      <button class="nav-icon-btn" onclick="openSearch()" title="Search">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
      <button class="nav-icon-btn" onclick="toggleUserMenu()" id="user-avatar-btn" title="Account">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </button>
    </div>
  </div>

  <!-- USER MENU -->
  <div id="user-menu">
    <div class="um-header">
      <div class="um-name" id="um-name">—</div>
      <div class="um-email" id="um-email">—</div>
    </div>
    <button class="um-item um-signout" onclick="doSignOut()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>

  <!-- SEARCH -->
  <div id="search-bar">
    <div class="search-top">
      <div class="search-input-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search videos, creators…" onkeydown="if(event.key==='Enter')doSearch()"/>
      </div>
      <button id="search-go" onclick="doSearch()">Search</button>
      <button class="search-cancel" onclick="closeSearch()">Cancel</button>
    </div>
    <div class="search-body">
      <div id="search-feed">
        <div class="search-empty" id="search-placeholder">
          <div style="font-size:2rem;margin-bottom:10px">🔍</div>
          Search for videos by keyword, hashtag, or creator username
        </div>
      </div>
    </div>
  </div>

  <!-- FEED -->
  <div id="feed"></div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav">
    <div class="bn-item active" id="bn-home">
      <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span class="bn-label">For You</span>
    </div>
    <div class="bn-item" onclick="openSearch()">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span class="bn-label">Discover</span>
    </div>
    <!-- REFRESH -->
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer" onclick="refreshFeed()">
      <div class="bn-refresh" id="refresh-btn">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </div>
      <span class="bn-label" style="color:var(--tx3);font-size:.6rem;font-weight:600;letter-spacing:.04em">Refresh</span>
    </div>
    <div class="bn-item" onclick="showToast('Upload coming soon!')">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span class="bn-label">Upload</span>
    </div>
    <div class="bn-item" id="bn-profile" onclick="toggleUserMenu()">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span class="bn-label">Profile</span>
    </div>
  </div>
</div>

<script>
const API_KEY = 'IZqo3P4uw2P5wnNvQD5q0GH9f5i1';
const BASE    = 'https://api.scrapecreators.com';

let cursor   = 0;
let loading  = false;
let seenIds  = new Set();
let currentVideoEl = null;
let likedVideos = new Set(JSON.parse(localStorage.getItem('mattok_likes')||'[]'));

const feed = document.getElementById('feed');

// ── HELPERS ──────────────────────────────────────────────────────────────────
function fmt(n) {
  if (!n) return '0';
  if (n>=1e6) return (n/1e6).toFixed(1)+'M';
  if (n>=1e3) return (n/1e3).toFixed(1)+'K';
  return ''+n;
}
function timeAgo(ms) {
  const d = Date.now()-ms;
  if (d<60000) return 'Just now';
  if (d<3600000) return Math.floor(d/60000)+'m ago';
  if (d<86400000) return Math.floor(d/3600000)+'h ago';
  return Math.floor(d/86400000)+'d ago';
}
function showToast(msg, dur=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.classList.remove('show'), dur);
}
window.showToast = showToast;

// ── USER MENU ──────────────────────────────────────────────────────────────
let menuOpen = false;
window.toggleUserMenu = () => {
  menuOpen = !menuOpen;
  document.getElementById('user-menu').classList.toggle('show', menuOpen);
};
document.addEventListener('click', e => {
  if (!document.getElementById('user-menu').contains(e.target) &&
      !document.getElementById('user-avatar-btn').contains(e.target)) {
    menuOpen = false;
    document.getElementById('user-menu').classList.remove('show');
  }
});

// ── URL ROUTING ───────────────────────────────────────────────────────────
function getVideoIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('video') || params.get('id');
}

function setVideoURL(videoId) {
  const url = new URL(window.location.href);
  url.searchParams.set('video', videoId);
  history.replaceState({}, '', url.toString());
}

// ── SEARCH ────────────────────────────────────────────────────────────────
window.openSearch = () => {
  document.getElementById('search-bar').classList.add('show');
  setTimeout(() => document.getElementById('search-input').focus(), 100);
  if (currentVideoEl) currentVideoEl.pause();
};
window.closeSearch = () => {
  document.getElementById('search-bar').classList.remove('show');
  if (currentVideoEl) currentVideoEl.play().catch(()=>{});
};

window.doSearch = async () => {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const sf = document.getElementById('search-feed');
  sf.innerHTML = `<div class="search-loading"><div class="loader-dots"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div></div>`;

  try {
    // Try TikTok search API
    const r = await fetch(`${BASE}/v1/tiktok/search?keyword=${encodeURIComponent(q)}&count=20`, {
      headers: { 'x-api-key': API_KEY }
    });
    const data = await r.json();
    let videos = data.aweme_list || data.data || data.videos || [];

    // Fallback: search via hashtag endpoint if no results
    if (!videos.length) {
      const r2 = await fetch(`${BASE}/v1/tiktok/hashtag/videos?hashtag=${encodeURIComponent(q)}&count=20`, {
        headers: { 'x-api-key': API_KEY }
      });
      const d2 = await r2.json();
      videos = d2.aweme_list || d2.data || [];
    }

    if (!videos.length) {
      sf.innerHTML = `<div class="search-empty"><div style="font-size:2rem;margin-bottom:10px">😶</div>No results found for "<strong>${q}</strong>"</div>`;
      return;
    }

    sf.innerHTML = `<div class="search-section">${videos.length} results for "${q}"</div>`;
    videos.forEach(v => {
      const author  = v.author?.unique_id || v.author?.uniqueId || '?';
      const nick    = v.author?.nickname || author;
      const desc    = v.desc || '(no description)';
      const thumb   = v.video?.cover?.url_list?.[0] || '';
      const views   = v.statistics?.play_count || 0;
      const likes   = v.statistics?.digg_count || 0;
      const awemeId = v.aweme_id;

      const card = document.createElement('div');
      card.className = 'search-video-card';
      card.innerHTML = `
        <img class="svc-thumb" src="${thumb}" alt="" loading="lazy"/>
        <div class="svc-info">
          <div class="svc-author">@${author} · ${nick}</div>
          <div class="svc-desc">${desc}</div>
          <div class="svc-stats">
            <span>▶ ${fmt(views)}</span>
            <span>❤ ${fmt(likes)}</span>
          </div>
        </div>`;
      card.addEventListener('click', () => {
        closeSearch();
        playSearchResult(v);
      });
      sf.appendChild(card);
    });

  } catch(e) {
    sf.innerHTML = `<div class="search-empty">Search failed: ${e.message}</div>`;
  }
};

// Play a video from search results — inject it at top of feed
function playSearchResult(v) {
  const videoUrl = v.video?.play_addr_h264?.url_list?.[0] || v.video?.play_addr?.url_list?.[0] || '';
  if (!videoUrl) { showToast('Video not available.'); return; }
  // Stop current
  if (currentVideoEl) { currentVideoEl.pause(); currentVideoEl.currentTime=0; }
  // Build a temporary slide and prepend it
  const existing = document.querySelector('.slide[data-aweme="'+v.aweme_id+'"]');
  if (existing) { existing.scrollIntoView({behavior:'smooth'}); return; }
  const slide = buildSlide(v);
  const firstSlide = feed.querySelector('.slide');
  if (firstSlide) feed.insertBefore(slide, firstSlide);
  else feed.prepend(slide);
  observer.observe(slide);
  slide.scrollIntoView({behavior:'smooth'});
}

// ── SLIDE BUILDER ─────────────────────────────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    const slide = entry.target;
    const video = slide.querySelector('video');
    if (!video) return;
    if (entry.isIntersecting) {
      video.play().catch(()=>{});
      currentVideoEl = video;
      const disc = slide.querySelector('.si-music-disc');
      if (disc) disc.classList.remove('paused');
      const awemeId = slide.dataset.aweme;
      if (awemeId) {
        setVideoURL(awemeId);
        if (window._currentUser && window._saveVideoMeta) {
          window._saveVideoMeta(awemeId, slide._videoData || {});
        }
      }
    } else {
      video.pause();
      video.currentTime = 0;
      const disc = slide.querySelector('.si-music-disc');
      if (disc) disc.classList.add('paused');
    }
  });
}, { threshold: 0.6 });

function buildSlide(v) {
  const author   = v.author?.unique_id || v.author?.uniqueId || '?';
  const nickname = v.author?.nickname || author;
  const desc     = v.desc || '';
  const music    = v.music?.title || '';
  const views    = v.statistics?.play_count    || 0;
  const likes    = v.statistics?.digg_count    || 0;
  const comments = v.statistics?.comment_count || 0;
  const shares   = v.statistics?.share_count   || 0;
  const awemeId  = v.aweme_id;
  const thumb    = v.video?.cover?.url_list?.[0] || '';
  const avatar   = v.author?.avatar_thumb?.url_list?.[0] || '';
  const videoUrl = v.video?.play_addr_h264?.url_list?.[0] || v.video?.play_addr?.url_list?.[0] || '';
  const liked    = likedVideos.has(awemeId);

  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.dataset.aweme  = awemeId;
  slide.dataset.author = author;
  slide._videoData = v;

  slide.innerHTML = `
    <video src="${videoUrl}" loop playsinline preload="none" webkit-playsinline poster="${thumb}"></video>
    <div class="pause-flash">
      <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
    </div>
    <div class="slide-info">
      <div class="si-author">
        <div class="si-avatar">${avatar?`<img src="${avatar}" alt="" loading="lazy">`:`<span>${author[0].toUpperCase()}</span>`}</div>
        <span class="si-name">@${author}</span>
        <button class="si-follow">Follow</button>
      </div>
      <div class="si-desc">${desc}</div>
      ${music?`<div class="si-music"><div class="si-music-disc">🎵</div><span>${music}</span></div>`:''}
    </div>
    <div class="slide-actions">
      <div class="sa-btn" id="like-${awemeId}">
        <div class="sa-icon${liked?' liked':''}">
          <svg width="24" height="24" fill="${liked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <span class="sa-count">${fmt(likes)}</span>
      </div>
      <div class="sa-btn sa-comment-btn">
        <div class="sa-icon">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span class="sa-count">${fmt(comments)}</span>
      </div>
      <div class="sa-btn sa-share-btn">
        <div class="sa-icon">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </div>
        <span class="sa-count">${fmt(shares)}</span>
      </div>
      <div class="sa-btn">
        <div class="sa-icon">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <span class="sa-count">${fmt(views)}</span>
      </div>
    </div>
    <div class="slide-progress">
      <div class="slide-progress-bar"></div>
    </div>`;

  const video      = slide.querySelector('video');
  const pauseFlash = slide.querySelector('.pause-flash');
  const progressBar= slide.querySelector('.slide-progress-bar');
  const likeBtn    = slide.querySelector(`#like-${awemeId}`);
  const commentBtn = slide.querySelector('.sa-comment-btn');
  const shareBtn   = slide.querySelector('.sa-share-btn');
  const followBtn  = slide.querySelector('.si-follow');
  const nameEl     = slide.querySelector('.si-name');

  // tap to pause
  video.addEventListener('click', () => {
    const isPaused = video.paused;
    if (isPaused) { video.play().catch(()=>{}); pauseFlash.querySelector('svg').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>'; }
    else { video.pause(); pauseFlash.querySelector('svg').innerHTML='<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>'; }
    pauseFlash.classList.add('show');
    clearTimeout(pauseFlash._tid);
    pauseFlash._tid = setTimeout(()=>pauseFlash.classList.remove('show'), 500);
  });

  // progress
  video.addEventListener('timeupdate', () => {
    if (video.duration) progressBar.style.width=(video.currentTime/video.duration*100)+'%';
  });
  slide.querySelector('.slide-progress').addEventListener('click', e => {
    if (!video.duration) return;
    const r = e.currentTarget.getBoundingClientRect();
    video.currentTime = ((e.clientX-r.left)/r.width)*video.duration;
  });

  // like
  likeBtn.addEventListener('click', () => {
    const icon = likeBtn.querySelector('.sa-icon');
    const svg  = likeBtn.querySelector('svg');
    const isLiked = likedVideos.has(awemeId);
    if (isLiked) { likedVideos.delete(awemeId); icon.classList.remove('liked'); svg.setAttribute('fill','none'); }
    else { likedVideos.add(awemeId); icon.classList.add('liked'); svg.setAttribute('fill','currentColor'); icon.animate([{transform:'scale(1)'},{transform:'scale(1.4)'},{transform:'scale(1)'}],{duration:280,easing:'ease-out'}); }
    localStorage.setItem('mattok_likes', JSON.stringify([...likedVideos]));
  });

  // comments
  commentBtn.addEventListener('click', () => openComments(awemeId, comments));

  // share — copy MatTok link
  shareBtn.addEventListener('click', () => {
    const url = new URL(window.location.href);
    url.searchParams.set('video', awemeId);
    const shareUrl = url.toString();
    if (navigator.clipboard) {
      navigator.clipboard.writeText(shareUrl).then(()=>showToast('✅ Link copied!')).catch(()=>showToast(shareUrl));
    } else { showToast('Copy: ' + shareUrl); }
  });

  // follow
  followBtn.addEventListener('click', e => {
    e.stopPropagation();
    const on = followBtn.classList.toggle('active');
    followBtn.textContent = on ? 'Following' : 'Follow';
    followBtn.style.background = on ? 'var(--red)' : '';
    followBtn.style.borderColor= on ? 'var(--red)' : '';
    showToast(on ? `Following @${author}` : `Unfollowed @${author}`);
  });

  // click author name → search that creator
  nameEl.addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('search-input').value = '@'+author;
    openSearch();
    doSearch();
  });

  return slide;
}

function addSlide(v) {
  if (!v.aweme_id) return;
  if (seenIds.has(v.aweme_id)) return; // skip dupes
  const videoUrl = v.video?.play_addr_h264?.url_list?.[0] || v.video?.play_addr?.url_list?.[0] || '';
  if (!videoUrl) return;
  seenIds.add(v.aweme_id);

  const slide = buildSlide(v);
  const loader = document.getElementById('loader');
  if (loader) feed.insertBefore(slide, loader);
  else feed.appendChild(slide);
  observer.observe(slide);
}

// ── LOAD ─────────────────────────────────────────────────────────────────
function makeLoader() {
  const el = document.createElement('div');
  el.id = 'loader';
  el.style.cssText = 'height:100dvh;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;';
  el.innerHTML = `<div class="loader-dots"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>`;
  return el;
}

async function loadFeed() {
  if (loading) return;
  loading = true;
  const loaderEl = makeLoader();
  feed.appendChild(loaderEl);
  try {
    const r = await fetch(`${BASE}/v1/tiktok/get-trending-feed?cursor=${cursor}`, { headers:{'x-api-key':API_KEY} });
    if (!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    const videos = data.aweme_list || [];
    loaderEl.remove();
    videos.forEach(v => addSlide(v));
    cursor = data.nextCursor ?? data.cursor ?? (cursor + videos.length);
  } catch(e) {
    loaderEl.remove();
    const err = document.createElement('div');
    err.style.cssText = 'height:100dvh;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;color:#f87171;font-size:.85rem;padding:20px;text-align:center;flex-direction:column;gap:12px;';
    err.innerHTML = `<div>Could not load videos</div><div style="font-size:.75rem;color:var(--tx3)">${e.message}</div>`;
    feed.appendChild(err);
  }
  loading = false;
}

// ── REFRESH ──────────────────────────────────────────────────────────────
window.refreshFeed = () => {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  setTimeout(()=>btn.classList.remove('spinning'), 650);

  // Reset state
  cursor = 0;
  seenIds.clear();
  if (currentVideoEl) { currentVideoEl.pause(); currentVideoEl = null; }

  // Clear all slides
  Array.from(feed.querySelectorAll('.slide')).forEach(s => { observer.unobserve(s); s.remove(); });
  Array.from(feed.querySelectorAll('#loader')).forEach(s => s.remove());
  loading = false;

  // Update URL
  const url = new URL(window.location.href);
  url.searchParams.delete('video');
  history.replaceState({}, '', url.toString());

  loadFeed();
};

// ── COMMENTS ─────────────────────────────────────────────────────────────
window.openComments = async (awemeId, count) => {
  document.getElementById('cp-title').textContent = fmt(count) + ' Comments';
  document.getElementById('comments-list').innerHTML = '<div class="c-loading">Loading comments…</div>';
  document.getElementById('comments-panel').classList.add('open');
  document.getElementById('comments-overlay').classList.add('show');
  if (currentVideoEl) currentVideoEl.pause();

  try {
    const r = await fetch(`${BASE}/v1/tiktok/video/comments?aweme_id=${awemeId}&count=30`, { headers:{'x-api-key':API_KEY} });
    const data = await r.json();
    const comments = data.comments || [];
    if (!comments.length) { document.getElementById('comments-list').innerHTML='<div class="c-loading">No comments found.</div>'; return; }
    document.getElementById('comments-list').innerHTML = comments.map(c => {
      const user   = c.user?.unique_id || 'user';
      const avatar = c.user?.avatar_thumb?.url_list?.[0] || '';
      const txt    = (c.text || '').replace(/</g,'&lt;');
      const likes  = c.digg_count || 0;
      const t      = c.create_time ? timeAgo(c.create_time*1000) : '';
      return `<div class="comment">
        <div class="c-avatar">${avatar?`<img src="${avatar}" loading="lazy">`:`<span>${user[0].toUpperCase()}</span>`}</div>
        <div class="c-body">
          <div class="c-user">@${user}</div>
          <div class="c-text">${txt}</div>
          <div class="c-meta"><span>${t}</span><span>❤️ ${fmt(likes)}</span></div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('comments-list').innerHTML = `<div class="c-loading">Could not load comments: ${e.message}</div>`;
  }
};

window.closeComments = () => {
  document.getElementById('comments-panel').classList.remove('open');
  document.getElementById('comments-overlay').classList.remove('show');
  if (currentVideoEl) currentVideoEl.play().catch(()=>{});
};

// ── INFINITE SCROLL ───────────────────────────────────────────────────────
feed.addEventListener('scroll', () => {
  const nearBottom = feed.scrollTop + feed.clientHeight >= feed.scrollHeight - feed.clientHeight * 1.5;
  if (nearBottom) loadFeed();
});

// ── INIT ──────────────────────────────────────────────────────────────────
window.initApp = async () => {
  // Check URL for shared video
  const sharedId = getVideoIdFromURL();
  if (sharedId) {
    const banner = document.getElementById('redirect-banner');
    banner.classList.add('show');
    document.getElementById('redirect-text').textContent = '🎬 Loading shared video…';
    // Load feed first, then try to jump
    await loadFeed();
    // Check if the video is already in feed
    let slide = feed.querySelector(`.slide[data-aweme="${sharedId}"]`);
    if (slide) {
      slide.scrollIntoView({behavior:'smooth'});
    } else {
      // Try to fetch the video directly
      try {
        const r = await fetch(`${BASE}/v1/tiktok/video?aweme_id=${sharedId}`, { headers:{'x-api-key':API_KEY} });
        const data = await r.json();
        const v = data.aweme_detail || data.video || data;
        if (v && v.aweme_id) {
          playSearchResult(v);
        } else {
          showToast('Shared video not found.');
        }
      } catch(e) { showToast('Could not load shared video.'); }
    }
    setTimeout(()=>banner.classList.remove('show'), 3000);
  } else {
    loadFeed();
  }
};
</script>
</body>
</html>
