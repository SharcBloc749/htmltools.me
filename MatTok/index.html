<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>MatTok</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --accent: #ffffff;
  --accent2: #e8e8e8;
  --accent-text: #0a0a0a;
  --bg: #000000;
  --surface: #0a0a0a;
  --surface2: #141414;
  --surface3: #1f1f1f;
  --border: #242424;
  --border2: #363636;
  --tx: #ffffff;
  --tx2: #a8a8a8;
  --tx3: #5a5a5a;
  --tx-muted: #737373;
  --font: 'DM Sans', sans-serif;
  --nav-h: 60px;
  --bottom-h: 68px;
  --shadow-md: 0 4px 20px rgba(0,0,0,.4);
  --shadow-lg: 0 12px 48px rgba(0,0,0,.55);
  --ring: 0 0 0 1px rgba(255,255,255,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--font);font-feature-settings:"ss01","cv11";-webkit-font-smoothing:antialiased;}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit;}
img{display:block;}
::selection{background:rgba(255,255,255,.18);color:#fff;}

/* ── LOADING SCREEN ── */
#loading-screen {
  position:fixed;inset:0;background:radial-gradient(ellipse at center,#0a0a0a 0%,#000 70%);z-index:99999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  transition:opacity 0.5s ease;
}
#loading-screen.fade-out{opacity:0;pointer-events:none;}
.ls-logo{display:flex;flex-direction:column;align-items:center;gap:8px;}
.ls-logo-name{
  font-size:2.6rem;font-weight:900;letter-spacing:-.07em;color:#fff;line-height:1;
}
.ls-tagline{
  font-size:.7rem;color:var(--tx-muted);letter-spacing:.32em;text-transform:uppercase;font-weight:600;
}
.ls-bars{display:flex;align-items:flex-end;gap:5px;height:28px;}
.ls-bar{
  width:4px;border-radius:2px;background:var(--accent);
  animation:barPulse 1.2s ease-in-out infinite;
}
.ls-bar:nth-child(1){height:40%;animation-delay:0s;}
.ls-bar:nth-child(2){height:70%;animation-delay:.1s;}
.ls-bar:nth-child(3){height:100%;animation-delay:.2s;}
.ls-bar:nth-child(4){height:55%;animation-delay:.3s;}
.ls-bar:nth-child(5){height:80%;animation-delay:.4s;}
.ls-bar:nth-child(6){height:35%;animation-delay:.5s;}
@keyframes barPulse{
  0%,100%{transform:scaleY(.4);opacity:.4;}
  50%{transform:scaleY(1);opacity:1;}
}
.ls-text{font-size:.75rem;color:var(--tx3);letter-spacing:.14em;text-transform:uppercase;font-weight:600;}

/* ── AUTH ── */
#auth-screen{
  position:fixed;inset:0;background:radial-gradient(ellipse at top,#0a0a0a 0%,#000 60%);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
}
#auth-screen.hidden{display:none;}
.auth-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:30px;text-align:center;}
.auth-logo-name{
  font-size:2.2rem;font-weight:900;letter-spacing:-.06em;color:#fff;line-height:1;
}
.auth-tagline{
  font-size:.78rem;color:var(--tx-muted);font-weight:500;max-width:280px;line-height:1.5;
}
.auth-tagline strong{color:#fff;font-weight:700;}
.auth-card{
  width:100%;max-width:380px;background:var(--surface);
  border:1px solid var(--border);border-radius:20px;padding:28px;position:relative;overflow:hidden;
  box-shadow:var(--shadow-lg);
}
.auth-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
}
.auth-tabs{display:flex;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:3px;gap:2px;margin-bottom:22px;}
.auth-tab{flex:1;padding:10px;border-radius:9px;font-size:.78rem;font-weight:700;color:var(--tx2);letter-spacing:.02em;transition:all .18s;}
.auth-tab.active{background:var(--accent);color:var(--accent-text);box-shadow:0 1px 3px rgba(0,0,0,.3);}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:.7rem;color:var(--tx2);margin-bottom:6px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.auth-field input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--tx);padding:13px 14px;border-radius:11px;font-size:.92rem;
  font-family:var(--font);outline:none;transition:border-color .18s,background .18s;
}
.auth-field input:focus{border-color:rgba(255,255,255,.45);background:var(--surface3);}
.auth-field input::placeholder{color:var(--tx3);}
.auth-submit{
  width:100%;padding:14px;background:var(--accent);color:var(--accent-text);
  border-radius:11px;font-size:.92rem;font-weight:700;margin-top:8px;transition:transform .12s,opacity .15s;
  letter-spacing:.01em;
}
.auth-submit:hover{opacity:.92;}
.auth-submit:active{transform:scale(.98);}
.auth-foot{
  margin-top:18px;text-align:center;font-size:.72rem;color:var(--tx3);letter-spacing:.04em;
}
.auth-err{
  margin-top:12px;padding:11px 13px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.16);border-radius:10px;color:#fff;
  font-size:.78rem;display:none;line-height:1.4;
}
.auth-err.show{display:block;}

/* ── APP ── */
#app{position:fixed;inset:0;display:none;flex-direction:column;}
#app.show{display:flex;}

/* ── TOP NAV ── */
#top-nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:50;
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  background:linear-gradient(to bottom,rgba(0,0,0,.92) 0%,rgba(0,0,0,.55) 65%,transparent 100%);
  pointer-events:none;
}
#top-nav>*{pointer-events:auto;}
.nav-logo{display:flex;align-items:center;gap:10px;}
.nav-logo-text{
  font-size:1.35rem;font-weight:900;letter-spacing:-.05em;color:#fff;line-height:1;
}
.nav-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);
  border-radius:999px;font-size:.66rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;color:#fff;backdrop-filter:blur(12px);
}
.nav-chip-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:dotPulse 1.6s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{opacity:.4;transform:scale(.85);}50%{opacity:1;transform:scale(1.15);}}
.nav-tabs{
  display:flex;align-items:center;gap:6px;
  padding:5px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);
  border-radius:999px;backdrop-filter:blur(16px);
}
.nav-tab{
  padding:6px 14px;font-size:.72rem;font-weight:700;color:var(--tx2);letter-spacing:.04em;
  border-radius:999px;transition:all .18s;
}
.nav-tab.active{background:rgba(255,255,255,.95);color:#000;}

/* ── FEED ── */
#feed{position:fixed;inset:0;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;}
#feed::-webkit-scrollbar{display:none;}

.slide{
  height:100dvh;scroll-snap-align:start;
  position:relative;display:flex;align-items:center;justify-content:center;
  background:#000;overflow:hidden;
}
.slide video{height:100%;width:100%;object-fit:contain;display:block;cursor:pointer;}
.slide::before{
  content:'';position:absolute;top:0;left:0;right:0;height:200px;
  background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);z-index:2;pointer-events:none;
}
.slide::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:300px;
  background:linear-gradient(to top,rgba(0,0,0,.85),transparent);z-index:2;pointer-events:none;
}

.pause-flash{
  position:absolute;z-index:10;width:72px;height:72px;border-radius:50%;
  background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.pause-flash.show{opacity:1;}

/* ── SLIDE INFO ── */
.slide-info{
  position:absolute;bottom:calc(var(--bottom-h) + 18px);left:0;right:84px;
  padding:0 18px;z-index:5;
}
.si-author{display:flex;align-items:center;gap:11px;margin-bottom:12px;}
.si-avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--surface3),var(--surface2));
  border:2px solid rgba(255,255,255,.85);box-shadow:0 2px 8px rgba(0,0,0,.5);
  flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:800;color:#fff;letter-spacing:-.02em;
}
.si-name{font-weight:800;font-size:.95rem;letter-spacing:-.01em;text-shadow:0 1px 6px rgba(0,0,0,.8);}
.si-follow{
  background:var(--accent);
  color:var(--accent-text);font-size:.72rem;font-weight:800;padding:6px 14px;border-radius:999px;transition:opacity .15s,transform .12s;
  letter-spacing:.02em;
}
.si-follow:hover{opacity:.9;}
.si-follow:active{transform:scale(.95);}
.si-follow.active{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.35);color:#fff;}
.si-desc{font-size:.86rem;color:#f0f0f0;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;text-shadow:0 1px 4px rgba(0,0,0,.85);font-weight:500;}
.si-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.si-tag{
  padding:3px 9px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);
  border-radius:999px;font-size:.7rem;font-weight:600;color:#fff;backdrop-filter:blur(8px);
  text-shadow:0 1px 2px rgba(0,0,0,.6);
}
.si-music{display:flex;align-items:center;gap:8px;font-size:.78rem;color:#d4d4d4;font-weight:500;}
.si-music-disc{
  width:24px;height:24px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#444,#1a1a1a);
  border:1.5px solid rgba(255,255,255,.4);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:.6rem;
  animation:spin 5s linear infinite;
}
.si-music-disc.paused{animation-play-state:paused;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── SLIDE ACTIONS ── */
.slide-actions{
  position:absolute;right:0;bottom:calc(var(--bottom-h) + 18px);
  display:flex;flex-direction:column;align-items:center;gap:18px;
  padding:0 12px;z-index:5;
}
.sa-btn{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;}
.sa-icon{
  width:50px;height:50px;border-radius:50%;
  background:rgba(20,20,20,.55);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s,background .2s,border-color .2s;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.sa-btn:hover .sa-icon{background:rgba(40,40,40,.7);border-color:rgba(255,255,255,.22);}
.sa-btn:active .sa-icon{transform:scale(.9);}
.sa-icon.liked{background:rgba(255,255,255,.95);border-color:#fff;}
.sa-icon.liked svg{color:#000;}
.sa-icon.saved{background:rgba(255,255,255,.95);border-color:#fff;}
.sa-icon.saved svg{color:#000;}
.sa-icon svg{color:#fff;}
.sa-count{font-size:.7rem;color:#fff;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.85);letter-spacing:.01em;}

.slide-progress{
  position:absolute;bottom:var(--bottom-h);left:0;right:0;
  height:3px;background:rgba(255,255,255,.1);z-index:5;cursor:pointer;
}
.slide-progress-bar{height:100%;background:linear-gradient(90deg,#fff,#e0e0e0);width:0;pointer-events:none;transition:width .1s linear;box-shadow:0 0 8px rgba(255,255,255,.4);}

/* ── BOTTOM NAV ── */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:var(--bottom-h);
  background:rgba(0,0,0,.94);backdrop-filter:blur(24px) saturate(140%);
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-around;
  z-index:50;padding-bottom:env(safe-area-inset-bottom);
}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:7px 18px;cursor:pointer;color:var(--tx3);transition:color .15s,transform .12s;
  border-radius:12px;position:relative;
}
.bn-item:active{transform:scale(.92);}
.bn-item.active{color:#fff;}
.bn-item.active svg{color:#fff;}
.bn-item.active::before{
  content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);
  width:24px;height:2px;background:#fff;border-radius:0 0 2px 2px;
}
.bn-label{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.bn-refresh{
  width:46px;height:46px;background:var(--accent);border-radius:14px;
  display:flex;align-items:center;justify-content:center;color:var(--accent-text);
  transition:transform .2s,opacity .15s,box-shadow .2s;
  box-shadow:0 4px 14px rgba(255,255,255,.18),0 0 0 1px rgba(0,0,0,.4);
}
.bn-refresh:hover{opacity:.95;box-shadow:0 6px 20px rgba(255,255,255,.28);}
.bn-refresh:active{transform:scale(.92);}
.bn-refresh.spinning svg{animation:rotateSpin .6s linear;}
@keyframes rotateSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── PROFILE PANEL ── */
#profile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:199;display:none;opacity:0;transition:opacity .25s;}
#profile-overlay.show{display:block;opacity:1;}
#profile-panel{
  position:fixed;bottom:0;left:0;right:0;height:88vh;
  background:var(--surface);border-radius:24px 24px 0 0;
  z-index:200;display:flex;flex-direction:column;
  transform:translateY(110%);transition:transform .4s cubic-bezier(.32,.72,0,1);
  border-top:1px solid var(--border);
  box-shadow:0 -20px 60px rgba(0,0,0,.6);
}
#profile-panel.open{transform:translateY(0);}
.pp-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 4px;}
.pp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.pp-user{display:flex;align-items:center;gap:14px;min-width:0;}
.pp-avatar{
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,#2a2a2a,#1a1a1a);
  border:2px solid rgba(255,255,255,.85);
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;font-weight:800;color:#fff;letter-spacing:-.02em;
  box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.pp-name{font-weight:800;font-size:1.05rem;letter-spacing:-.01em;}
.pp-email{font-size:.78rem;color:var(--tx2);margin-top:2px;}
.pp-close{
  width:36px;height:36px;border-radius:50%;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:1rem;cursor:pointer;
  border:1px solid var(--border);transition:all .15s;
}
.pp-close:hover{background:var(--surface3);color:var(--tx);border-color:var(--border2);}
.pp-signout{
  background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.18);
  padding:8px 14px;border-radius:9px;font-size:.78rem;font-weight:700;transition:all .15s;
  letter-spacing:.02em;
}
.pp-signout:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.28);}
.pp-tabs{display:flex;padding:0 20px;gap:0;border-bottom:1px solid var(--border);}
.pp-tab{flex:1;padding:14px 4px;font-size:.82rem;font-weight:600;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;text-align:center;transition:all .18s;letter-spacing:.01em;}
.pp-tab:hover{color:var(--tx);}
.pp-tab.active{color:#fff;border-bottom-color:#fff;font-weight:700;}
.pp-body{flex:1;overflow-y:auto;}
.pp-section{display:none;flex-direction:column;}
.pp-section.active{display:flex;}
.pp-empty{text-align:center;padding:60px 24px;color:var(--tx-muted);font-size:.88rem;line-height:1.5;}
.pp-empty-icon{
  width:56px;height:56px;border-radius:50%;background:var(--surface2);
  border:1px solid var(--border);margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;color:var(--tx3);
}
.pp-empty-title{font-weight:700;color:var(--tx);font-size:.95rem;margin-bottom:6px;}
.following-item{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);transition:background .15s;}
.following-item:hover{background:var(--surface2);}
.fi-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#2a2a2a,#1a1a1a);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:1rem;font-weight:800;border:1.5px solid rgba(255,255,255,.5);color:#fff;
}
.fi-name{flex:1;font-size:.92rem;font-weight:700;letter-spacing:-.01em;}
.fi-unfollow{background:transparent;border:1px solid var(--border2);color:var(--tx2);padding:7px 14px;border-radius:8px;font-size:.76rem;font-weight:700;transition:all .15s;}
.fi-unfollow:hover{border-color:#fff;color:#fff;background:rgba(255,255,255,.04);}
.saved-thumb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px;}
.saved-thumb{aspect-ratio:9/16;background:var(--surface2);overflow:hidden;cursor:pointer;position:relative;border-radius:6px;}
.saved-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .25s,opacity .2s;}
.saved-thumb:hover img{transform:scale(1.04);opacity:.85;}
.liked-thumb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px;}
.liked-thumb{aspect-ratio:9/16;background:var(--surface2);overflow:hidden;cursor:pointer;position:relative;border-radius:6px;}
.liked-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .25s,opacity .2s;}
.liked-thumb:hover img{transform:scale(1.04);opacity:.85;}

/* ── LOADER DOTS ── */
.loader-dots{display:flex;align-items:center;gap:6px;}
.loader-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bounce .8s infinite;}
.loader-dot:nth-child(2){animation-delay:.15s}
.loader-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--bottom-h) + 16px);left:50%;
  transform:translateX(-50%) translateY(10px);opacity:0;
  background:rgba(20,20,20,.98);border:1px solid var(--border);
  color:#fff;padding:10px 20px;border-radius:24px;font-size:.82rem;font-weight:600;
  z-index:999;transition:all .2s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(12px);
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="ls-logo">
    <span class="ls-logo-name">MatTok</span>
    <span class="ls-tagline">English Comedy Feed</span>
  </div>
  <div class="ls-bars">
    <div class="ls-bar"></div>
    <div class="ls-bar"></div>
    <div class="ls-bar"></div>
    <div class="ls-bar"></div>
    <div class="ls-bar"></div>
    <div class="ls-bar"></div>
  </div>
  <div class="ls-text">Curating funny videos</div>
</div>

<!-- AUTH -->
<div id="auth-screen" class="hidden">
  <div class="auth-logo">
    <span class="auth-logo-name">MatTok</span>
    <span class="auth-tagline">The funniest <strong>English</strong> short-form videos &mdash; one endless feed.</span>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="authTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="authTab('register')">Create Account</button>
    </div>
    <div id="name-field" class="auth-field" style="display:none">
      <label>Display Name</label>
      <input type="text" id="auth-name" placeholder="Your name"/>
    </div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doAuth()"/>
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="auth-pass" placeholder="At least 6 characters" onkeydown="if(event.key==='Enter')doAuth()"/>
    </div>
    <button class="auth-submit" id="auth-btn" onclick="doAuth()">Sign In</button>
    <div class="auth-err" id="auth-err"></div>

<script>
const API_KEY = 'IZqo3P4uw2P5wnNvQD5q0GH9f5i1';
const BASE    = 'https://api.scrapecreators.com';

let cursor    = 0;
let loading   = false;
let seenIds   = new Set();
let currentVideoEl = null;

// Persistent data (localStorage)
let likedVideos   = new Set(JSON.parse(localStorage.getItem('mattok_likes')  ||'[]'));
let savedVideos   = new Set(JSON.parse(localStorage.getItem('mattok_saves')  ||'[]'));
let savedVideoData= JSON.parse(localStorage.getItem('mattok_saved_data')     ||'{}');
let likedVideoData= JSON.parse(localStorage.getItem('mattok_liked_data')     ||'{}');
let followingList = JSON.parse(localStorage.getItem('mattok_following')      ||'{}');

const feed = document.getElementById('feed');

// ── HELPERS ──
function fmt(n) {
  if (!n) return '0';
  if (n>=1e6) return (n/1e6).toFixed(1)+'M';
  if (n>=1e3) return (n/1e3).toFixed(1)+'K';
  return ''+n;
}
function showToast(msg, dur=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.classList.remove('show'), dur);
}
window.showToast = showToast;

// ── URL ROUTING ──
function getVideoIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('video') || params.get('id');
}
function setVideoURL(videoId) {
  const url = new URL(window.location.href);
  url.searchParams.set('video', videoId);
  history.replaceState({}, '', url.toString());
}
function clearVideoURL() {
  const url = new URL(window.location.href);
  if (url.searchParams.has('video') || url.searchParams.has('id')) {
    url.searchParams.delete('video');
    url.searchParams.delete('id');
    history.replaceState({}, '', url.toString());
  }
}
window.clearVideoURL = clearVideoURL;

// ── PROFILE ──
window.openProfile = () => {
  document.getElementById('profile-panel').classList.add('open');
  document.getElementById('profile-overlay').classList.add('show');
  if (currentVideoEl) currentVideoEl.pause();
  // Clear video id from URL when user opens profile
  clearVideoURL();
  renderProfileTab('following');
};
window.closeProfile = () => {
  document.getElementById('profile-panel').classList.remove('open');
  document.getElementById('profile-overlay').classList.remove('show');
  if (currentVideoEl) {
    currentVideoEl.play().catch(()=>{});
    // Restore URL based on whichever slide is currently showing
    const activeSlide = currentVideoEl.closest('.slide');
    if (activeSlide && activeSlide.dataset.aweme) setVideoURL(activeSlide.dataset.aweme);
  }
};

let currentProfileTab = 'following';
window.switchProfileTab = (tab) => {
  currentProfileTab = tab;
  const tabs = ['following','liked','saved'];
  document.querySelectorAll('.pp-tab').forEach((el, i) => {
    el.classList.toggle('active', tabs[i]===tab);
  });
  document.querySelectorAll('.pp-section').forEach(el => el.classList.remove('active'));
  document.getElementById('pp-'+tab).classList.add('active');
  renderProfileTab(tab);
};

function renderProfileTab(tab) {
  if (tab==='following') renderFollowingTab();
  else if (tab==='liked') renderLikedTab();
  else if (tab==='saved') renderSavedTab();
}

const ICON_USERS = `<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`;
const ICON_HEART = `<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
const ICON_BOOKMARK = `<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>`;

function renderFollowingTab() {
  const list = document.getElementById('following-list');
  const keys = Object.keys(followingList);
  if (!keys.length) {
    list.innerHTML = `<div class="pp-empty"><div class="pp-empty-icon">${ICON_USERS}</div><div class="pp-empty-title">No follows yet</div>Tap “Follow” on any creator to see them here.</div>`;
    return;
  }
  list.innerHTML = keys.map(author => `
    <div class="following-item">
      <div class="fi-avatar">${author[0].toUpperCase()}</div>
      <div class="fi-name">@${author}</div>
      <button class="fi-unfollow" onclick="unfollowUser('${author}')">Unfollow</button>
    </div>`).join('');
}

function renderLikedTab() {
  const grid = document.getElementById('liked-grid');
  if (!likedVideos.size) {
    grid.innerHTML = `<div style="grid-column:1/-1" class="pp-empty"><div class="pp-empty-icon">${ICON_HEART}</div><div class="pp-empty-title">Nothing liked yet</div>Double-tap the heart on videos that make you laugh.</div>`;
    return;
  }
  grid.innerHTML = [...likedVideos].reverse().map(id => {
    const d = likedVideoData[id] || {};
    const thumb = d.thumb || '';
    return `<div class="liked-thumb" onclick="jumpToVideo('${id}','liked')">
      ${thumb ? `<img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'"/>` : ''}
    </div>`;
  }).join('');
}

function renderSavedTab() {
  const grid = document.getElementById('saved-grid');
  if (!savedVideos.size) {
    grid.innerHTML = `<div style="grid-column:1/-1" class="pp-empty"><div class="pp-empty-icon">${ICON_BOOKMARK}</div><div class="pp-empty-title">No saves yet</div>Bookmark videos to revisit them anytime.</div>`;
    return;
  }
  grid.innerHTML = [...savedVideos].reverse().map(id => {
    const d = savedVideoData[id] || {};
    const thumb = d.thumb || '';
    return `<div class="saved-thumb" onclick="jumpToVideo('${id}','saved')">
      ${thumb ? `<img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'"/>` : ''}
    </div>`;
  }).join('');
}

window.jumpToVideo = (awemeId, from) => {
  closeProfile();
  const existing = document.querySelector(`.slide[data-aweme="${awemeId}"]`);
  if (existing) { existing.scrollIntoView({behavior:'smooth'}); return; }
  showToast('Scroll your feed to find this video');
};

window.unfollowUser = (author) => {
  delete followingList[author];
  localStorage.setItem('mattok_following', JSON.stringify(followingList));
  document.querySelectorAll(`.slide[data-author="${author}"] .si-follow`).forEach(btn => {
    btn.textContent = 'Follow';
    btn.classList.remove('active');
  });
  renderFollowingTab();
  showToast(`Unfollowed @${author}`);
};

// ── INTERSECTION OBSERVER ──
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    const slide = entry.target;
    const video = slide.querySelector('video');
    if (!video) return;
    if (entry.isIntersecting) {
      video.play().catch(()=>{});
      currentVideoEl = video;
      const disc = slide.querySelector('.si-music-disc');
      if (disc) disc.classList.remove('paused');
      const awemeId = slide.dataset.aweme;
      if (awemeId) setVideoURL(awemeId);
    } else {
      video.pause();
      video.currentTime = 0;
      const disc = slide.querySelector('.si-music-disc');
      if (disc) disc.classList.add('paused');
      // Clear video id from URL when this video leaves the screen
      // (only if it was the one currently tracked in the URL)
      const awemeId = slide.dataset.aweme;
      const urlId = getVideoIdFromURL();
      if (awemeId && urlId === awemeId) {
        clearVideoURL();
      }
      if (currentVideoEl === video) currentVideoEl = null;
    }
  });
}, { threshold: 0.6 });

// ── BUILD SLIDE ──
function buildSlide(v) {
  const author   = v.author?.unique_id || v.author?.uniqueId || '?';
  const nickname = v.author?.nickname || author;
  const desc     = v.desc || '';
  const music    = v.music?.title || '';
  const likes    = v.statistics?.digg_count    || 0;
  const shares   = v.statistics?.share_count   || 0;
  const views    = v.statistics?.play_count    || 0;
  const awemeId  = v.aweme_id;
  const thumb    = v.video?.cover?.url_list?.[0] || v.video?.cover?.url || '';
  const videoUrl = v.video?.play_addr_h264?.url_list?.[0] || v.video?.play_addr?.url_list?.[0] || '';
  const isLiked  = likedVideos.has(awemeId);
  const isSaved  = savedVideos.has(awemeId);
  const isFollowing = !!followingList[author];

  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.dataset.aweme  = awemeId;
  slide.dataset.author = author;
  slide._videoData = v;

  // Avatar always shows the first letter (no images)
  const avatarHTML = `<span>${author[0]?.toUpperCase()||'?'}</span>`;

  slide.innerHTML = `
    <video src="${videoUrl}" loop playsinline preload="none" webkit-playsinline poster="${thumb}"></video>
    <div class="pause-flash">
      <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
    </div>
    <div class="slide-info">
      <div class="si-author">
        <div class="si-avatar">${avatarHTML}</div>
        <span class="si-name">@${author}</span>
        <button class="si-follow${isFollowing?' active':''}">
          ${isFollowing?'Following':'Follow'}
        </button>
      </div>
      ${desc?`<div class="si-desc">${desc}</div>`:''}
      ${music?`<div class="si-music"><div class="si-music-disc">🎵</div><span>${music}</span></div>`:''}
    </div>
    <div class="slide-actions">
      <div class="sa-btn" id="like-${awemeId}">
        <div class="sa-icon${isLiked?' liked':''}">
          <svg width="24" height="24" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <span class="sa-count">${fmt(likes)}</span>
      </div>
      <div class="sa-btn sa-save-btn">
        <div class="sa-icon${isSaved?' saved':''}">
          <svg width="22" height="22" fill="${isSaved?'currentColor':'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span class="sa-count">${isSaved?'Saved':'Save'}</span>
      </div>
      <div class="sa-btn sa-share-btn">
        <div class="sa-icon">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </div>
        <span class="sa-count">${fmt(shares)}</span>
      </div>
      <div class="sa-btn">
        <div class="sa-icon">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <span class="sa-count">${fmt(views)}</span>
      </div>
    </div>
    <div class="slide-progress">
      <div class="slide-progress-bar"></div>
    </div>`;

  const video       = slide.querySelector('video');
  const pauseFlash  = slide.querySelector('.pause-flash');
  const progressBar = slide.querySelector('.slide-progress-bar');
  const likeBtn     = slide.querySelector(`#like-${awemeId}`);
  const saveBtn     = slide.querySelector('.sa-save-btn');
  const shareBtn    = slide.querySelector('.sa-share-btn');
  const followBtn   = slide.querySelector('.si-follow');

  // Tap to pause/play
  video.addEventListener('click', () => {
    const isPaused = video.paused;
    if (isPaused) {
      video.play().catch(()=>{});
      pauseFlash.querySelector('svg').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
    } else {
      video.pause();
      pauseFlash.querySelector('svg').innerHTML='<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>';
    }
    pauseFlash.classList.add('show');
    clearTimeout(pauseFlash._tid);
    pauseFlash._tid = setTimeout(()=>pauseFlash.classList.remove('show'), 500);
  });

  // Progress bar
  video.addEventListener('timeupdate', () => {
    if (video.duration) progressBar.style.width=(video.currentTime/video.duration*100)+'%';
  });
  slide.querySelector('.slide-progress').addEventListener('click', e => {
    if (!video.duration) return;
    const r = e.currentTarget.getBoundingClientRect();
    video.currentTime = ((e.clientX-r.left)/r.width)*video.duration;
  });

  // Like
  likeBtn.addEventListener('click', () => {
    const icon = likeBtn.querySelector('.sa-icon');
    const svg  = likeBtn.querySelector('svg');
    const isLk = likedVideos.has(awemeId);
    if (isLk) {
      likedVideos.delete(awemeId);
      delete likedVideoData[awemeId];
      icon.classList.remove('liked');
      svg.setAttribute('fill','none');
    } else {
      likedVideos.add(awemeId);
      likedVideoData[awemeId] = { thumb, author, desc };

      svg.setAttribute('fill','currentColor');
      icon.animate([{transform:'scale(1)'},{transform:'scale(1.4)'},{transform:'scale(1)'}],{duration:280,easing:'ease-out'});
    }
    localStorage.setItem('mattok_likes', JSON.stringify([...likedVideos]));
    localStorage.setItem('mattok_liked_data', JSON.stringify(likedVideoData));
  });

  // Save
  saveBtn.addEventListener('click', () => {
    const icon = saveBtn.querySelector('.sa-icon');
    const svg  = saveBtn.querySelector('svg');
    const cnt  = saveBtn.querySelector('.sa-count');
    const isSv = savedVideos.has(awemeId);
    if (isSv) {
      savedVideos.delete(awemeId);
      delete savedVideoData[awemeId];
      icon.classList.remove('saved');
      svg.setAttribute('fill','none');
      cnt.textContent = 'Save';
      showToast('Removed from saved');
    } else {
      savedVideos.add(awemeId);
      savedVideoData[awemeId] = { thumb, author, desc, videoUrl };
      icon.classList.add('saved');
      svg.setAttribute('fill','currentColor');
      cnt.textContent = 'Saved';
      icon.animate([{transform:'scale(1)'},{transform:'scale(1.35)'},{transform:'scale(1)'}],{duration:260,easing:'ease-out'});
      showToast('Video saved');
    }
    localStorage.setItem('mattok_saves', JSON.stringify([...savedVideos]));
    localStorage.setItem('mattok_saved_data', JSON.stringify(savedVideoData));
  });

  // Share — copy link
  shareBtn.addEventListener('click', () => {
    const url = new URL(window.location.href);
    url.searchParams.set('video', awemeId);
    const shareUrl = url.toString();
    if (navigator.clipboard) {
      navigator.clipboard.writeText(shareUrl).then(()=>showToast('Link copied!')).catch(()=>showToast(shareUrl));
    } else showToast('Copy: '+shareUrl);
  });

  // Follow
  followBtn.addEventListener('click', e => {
    e.stopPropagation();
    const on = !followingList[author];
    if (on) {
      followingList[author] = { ts: Date.now() };
      followBtn.textContent = 'Following';
      followBtn.classList.add('active');
    } else {
      delete followingList[author];
      followBtn.textContent = 'Follow';
      followBtn.classList.remove('active');
    }
    localStorage.setItem('mattok_following', JSON.stringify(followingList));
    showToast(on ? `Following @${author}` : `Unfollowed @${author}`);
  });

  return slide;
}

function addSlide(v) {
  if (!v.aweme_id) return;
  if (seenIds.has(v.aweme_id)) return;
  const videoUrl = v.video?.play_addr_h264?.url_list?.[0] || v.video?.play_addr?.url_list?.[0] || '';
  if (!videoUrl) return;
  seenIds.add(v.aweme_id);

  const slide = buildSlide(v);
  const loader = document.getElementById('loader');
  if (loader) feed.insertBefore(slide, loader);
  else feed.appendChild(slide);
  observer.observe(slide);
}

// Used to inject a shared video into the feed
function playSharedVideo(v) {
  const videoUrl = v.video?.play_addr_h264?.url_list?.[0] || v.video?.play_addr?.url_list?.[0] || '';
  if (!videoUrl) { showToast('Video not available.'); return; }
  if (currentVideoEl) { currentVideoEl.pause(); currentVideoEl.currentTime=0; }
  const existing = document.querySelector(`.slide[data-aweme="${v.aweme_id}"]`);
  if (existing) { existing.scrollIntoView({behavior:'smooth'}); return; }
  const slide = buildSlide(v);
  const firstSlide = feed.querySelector('.slide');
  if (firstSlide) feed.insertBefore(slide, firstSlide);
  else feed.prepend(slide);
  observer.observe(slide);
  slide.scrollIntoView({behavior:'smooth'});
}

// ── LOADER ──
function makeLoader() {
  const el = document.createElement('div');
  el.id = 'loader';
  el.style.cssText = 'height:100dvh;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;';
  el.innerHTML = `<div class="loader-dots"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>`;
  return el;
}

async function loadFeed() {
  if (loading) return;
  loading = true;
  const loaderEl = makeLoader();
  feed.appendChild(loaderEl);
  try {
    const r = await fetch(`${BASE}/v1/tiktok/get-trending-feed?cursor=${cursor}`, { headers:{'x-api-key':API_KEY} });
    if (!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    const videos = data.aweme_list || [];
    loaderEl.remove();
    const fresh = videos.filter(v => v.aweme_id && !seenIds.has(v.aweme_id));
    fresh.forEach(v => addSlide(v));
    cursor = data.nextCursor ?? data.cursor ?? (cursor + videos.length);
    if (cursor === 0) cursor = Date.now();
  } catch(e) {
    loaderEl.remove();
    const err = document.createElement('div');
    err.style.cssText = 'height:100dvh;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:.85rem;padding:20px;text-align:center;flex-direction:column;gap:12px;';
    err.innerHTML = `<div>Could not load videos</div><div style="font-size:.75rem;color:var(--tx3)">${e.message}</div>`;
    feed.appendChild(err);
  }
  loading = false;
}

// ── REFRESH ──
window.refreshFeed = () => {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  setTimeout(()=>btn.classList.remove('spinning'), 650);

  cursor = 0;
  seenIds.clear();
  if (currentVideoEl) { currentVideoEl.pause(); currentVideoEl = null; }
  Array.from(feed.querySelectorAll('.slide')).forEach(s => { observer.unobserve(s); s.remove(); });
  Array.from(feed.querySelectorAll('#loader')).forEach(s => s.remove());
  loading = false;

  clearVideoURL();

  loadFeed();
};

// ── INFINITE SCROLL ──
feed.addEventListener('scroll', () => {
  const nearBottom = feed.scrollTop + feed.clientHeight >= feed.scrollHeight - feed.clientHeight * 1.5;
  if (nearBottom) loadFeed();
});

// ── INIT ──
window.initApp = async () => {
  const sharedId = getVideoIdFromURL();
  if (sharedId) {
    await loadFeed();
    let slide = feed.querySelector(`.slide[data-aweme="${sharedId}"]`);
    if (slide) { slide.scrollIntoView({behavior:'smooth'}); }
    else {
      try {
        const r = await fetch(`${BASE}/v1/tiktok/video?aweme_id=${sharedId}`, { headers:{'x-api-key':API_KEY} });
        const data = await r.json();
        const v = data.aweme_detail || data.video || data;
        if (v && v.aweme_id) playSharedVideo(v);
        else showToast('Shared video not found.');
      } catch(e) { showToast('Could not load shared video.'); }
    }
  } else {
    loadFeed();
  }
};
</script>
