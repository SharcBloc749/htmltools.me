<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>MatTok</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --red: #fe2c55;
  --red2: #ff4d6d;
  --bg: #000;
  --surface: #0e0e0e;
  --surface2: #181818;
  --surface3: #222;
  --border: #2a2a2a;
  --tx: #fff;
  --tx2: #999;
  --tx3: #444;
  --font: 'DM Sans', sans-serif;
  --nav-h: 56px;
  --bottom-h: 64px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--font);}
button{font-family:var(--font);cursor:pointer;border:none;background:none;color:inherit;}
img{display:block;}

/* ── LOADING SCREEN ── */
#loading-screen {
  position:fixed;inset:0;background:#000;z-index:99999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;
  transition:opacity 0.5s ease;
}
#loading-screen.fade-out{opacity:0;pointer-events:none;}
.ls-logo{display:flex;align-items:center;gap:12px;}
.ls-logo img{width:52px;height:52px;border-radius:14px;object-fit:contain;}
.ls-logo-name{
  font-size:2.4rem;font-weight:900;letter-spacing:-.06em;
  background:linear-gradient(135deg,#fff 0%,var(--red) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.ls-bars{display:flex;align-items:flex-end;gap:5px;height:32px;}
.ls-bar{
  width:5px;border-radius:3px;background:var(--red);
  animation:barPulse 1.2s ease-in-out infinite;
}
.ls-bar:nth-child(1){height:40%;animation-delay:0s;}
.ls-bar:nth-child(2){height:70%;animation-delay:.1s;}
.ls-bar:nth-child(3){height:100%;animation-delay:.2s;}
.ls-bar:nth-child(4){height:55%;animation-delay:.3s;}
.ls-bar:nth-child(5){height:80%;animation-delay:.4s;}
.ls-bar:nth-child(6){height:35%;animation-delay:.5s;}
@keyframes barPulse{
  0%,100%{transform:scaleY(.4);opacity:.4;}
  50%{transform:scaleY(1);opacity:1;}
}
.ls-text{font-size:.8rem;color:var(--tx3);letter-spacing:.12em;text-transform:uppercase;font-weight:500;}

/* ── AUTH ── */
#auth-screen{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
}
#auth-screen.hidden{display:none;}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
.auth-logo img{width:44px;height:44px;border-radius:12px;object-fit:contain;}
.auth-logo-name{
  font-size:2rem;font-weight:900;letter-spacing:-.05em;
  background:linear-gradient(135deg,#fff 0%,var(--red) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.auth-card{
  width:100%;max-width:360px;background:var(--surface);
  border:1px solid var(--border);border-radius:18px;padding:28px;position:relative;overflow:hidden;
}
.auth-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--red),var(--red2),transparent);
}
.auth-tabs{display:flex;background:var(--surface2);border-radius:10px;padding:3px;gap:2px;margin-bottom:22px;}
.auth-tab{flex:1;padding:9px;border-radius:8px;font-size:.75rem;font-weight:700;color:var(--tx2);letter-spacing:.06em;text-transform:uppercase;transition:all .18s;}
.auth-tab.active{background:var(--red);color:#fff;}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:.72rem;color:var(--tx2);margin-bottom:6px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.auth-field input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  color:var(--tx);padding:12px 14px;border-radius:10px;font-size:.9rem;
  font-family:var(--font);outline:none;transition:border-color .15s;
}
.auth-field input:focus{border-color:rgba(254,44,85,.5);}
.auth-field input::placeholder{color:var(--tx3);}
.auth-submit{
  width:100%;padding:14px;background:var(--red);color:#fff;
  border-radius:10px;font-size:.9rem;font-weight:700;margin-top:8px;transition:opacity .15s;
  letter-spacing:.02em;
}
.auth-submit:hover{opacity:.88;}
.auth-err{
  margin-top:12px;padding:10px 12px;background:rgba(254,44,85,.1);
  border:1px solid rgba(254,44,85,.3);border-radius:8px;color:#ff6b6b;
  font-size:.78rem;display:none;
}
.auth-err.show{display:block;}

/* ── APP ── */
#app{position:fixed;inset:0;display:none;flex-direction:column;}
#app.show{display:flex;}

/* ── TOP NAV ── */
#top-nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);z-index:50;
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,.85) 0%,transparent 100%);
  pointer-events:none;
}
#top-nav>*{pointer-events:auto;}
.nav-logo{display:flex;align-items:center;gap:8px;}
.nav-logo img{width:30px;height:30px;border-radius:8px;object-fit:contain;}
.nav-logo-text{
  font-size:1.3rem;font-weight:900;letter-spacing:-.04em;
  background:linear-gradient(135deg,#fff,var(--red));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.nav-right{display:flex;align-items:center;gap:8px;}
.nav-icon-btn{
  width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;color:#fff;background:rgba(0,0,0,.4);
  backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);transition:background .13s;
}
.nav-icon-btn:hover{background:rgba(255,255,255,.15);}

/* ── FEED ── */
#feed{position:fixed;inset:0;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;}
#feed::-webkit-scrollbar{display:none;}

.slide{
  height:100dvh;scroll-snap-align:start;
  position:relative;display:flex;align-items:center;justify-content:center;
  background:#000;overflow:hidden;
}
.slide video{height:100%;width:100%;object-fit:contain;display:block;cursor:pointer;}
.slide::before{
  content:'';position:absolute;top:0;left:0;right:0;height:200px;
  background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);z-index:2;pointer-events:none;
}
.slide::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:300px;
  background:linear-gradient(to top,rgba(0,0,0,.85),transparent);z-index:2;pointer-events:none;
}

.pause-flash{
  position:absolute;z-index:10;width:72px;height:72px;border-radius:50%;
  background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.pause-flash.show{opacity:1;}

/* ── SLIDE INFO ── */
.slide-info{
  position:absolute;bottom:calc(var(--bottom-h) + 14px);left:0;right:80px;
  padding:0 16px;z-index:5;
}
.si-author{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.si-avatar{
  width:40px;height:40px;border-radius:50%;border:2px solid #fff;
  background:var(--surface2);flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:.95rem;font-weight:700;cursor:pointer;
}
.si-avatar img{width:100%;height:100%;object-fit:cover;}
.si-name{font-weight:700;font-size:.95rem;cursor:pointer;text-shadow:0 1px 4px rgba(0,0,0,.7);}
.si-follow{
  background:var(--red);border:none;
  color:#fff;font-size:.72rem;font-weight:700;padding:5px 12px;border-radius:6px;transition:opacity .15s;
  letter-spacing:.04em;
}
.si-follow:hover{opacity:.85;}
.si-follow.active{background:transparent;border:1.5px solid rgba(255,255,255,.5);}
.si-desc{font-size:.84rem;color:#e8e8e8;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px;text-shadow:0 1px 3px rgba(0,0,0,.8);}
.si-music{display:flex;align-items:center;gap:7px;font-size:.78rem;color:#ccc;}
.si-music-disc{width:22px;height:22px;border-radius:50%;background:var(--surface2);border:2px solid #555;flex-shrink:0;display:flex;align-items:center;justify-content:center;animation:spin 4s linear infinite;}
.si-music-disc.paused{animation-play-state:paused;}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── SLIDE ACTIONS ── */
.slide-actions{
  position:absolute;right:0;bottom:calc(var(--bottom-h) + 14px);
  display:flex;flex-direction:column;align-items:center;gap:20px;
  padding:0 12px;z-index:5;
}
.sa-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.sa-icon{
  width:48px;height:48px;border-radius:50%;
  background:rgba(0,0,0,.45);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;transition:transform .15s,background .15s;
}
.sa-btn:active .sa-icon{transform:scale(.88);}
.sa-icon.liked{background:rgba(254,44,85,.3);border-color:rgba(254,44,85,.4);}
.sa-icon.saved{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);}
.sa-icon svg{color:#fff;}
.sa-icon.liked svg{color:var(--red);}
.sa-count{font-size:.67rem;color:#fff;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.8);}

.slide-progress{
  position:absolute;bottom:var(--bottom-h);left:0;right:0;
  height:2px;background:rgba(255,255,255,.12);z-index:5;cursor:pointer;
}
.slide-progress-bar{height:100%;background:var(--red);width:0;pointer-events:none;transition:width .1s linear;}

/* ── BOTTOM NAV ── */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;height:var(--bottom-h);
  background:rgba(0,0,0,.92);backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:space-around;
  z-index:50;padding-bottom:env(safe-area-inset-bottom);
}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 16px;cursor:pointer;color:var(--tx3);transition:color .15s;}
.bn-item.active{color:#fff;}
.bn-item.active svg{color:var(--red);}
.bn-label{font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.bn-refresh{
  width:42px;height:42px;background:var(--red);border-radius:12px;
  display:flex;align-items:center;justify-content:center;color:#fff;transition:transform .2s,opacity .15s;
}
.bn-refresh:hover{opacity:.85;}
.bn-refresh.spinning svg{animation:rotateSpin .6s linear;}
@keyframes rotateSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ── SEARCH OVERLAY ── */
#search-bar{
  display:none;position:fixed;inset:0;z-index:200;background:var(--bg);flex-direction:column;
}
#search-bar.show{display:flex;}
.search-top{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  padding-top:calc(14px + env(safe-area-inset-top));
  background:var(--surface);border-bottom:1px solid var(--border);
}
.search-input-wrap{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;transition:border-color .15s;
}
.search-input-wrap:focus-within{border-color:rgba(254,44,85,.4);}
#search-input{flex:1;background:transparent;border:none;color:var(--tx);font-size:.92rem;font-family:var(--font);outline:none;}
#search-input::placeholder{color:var(--tx3);}
.search-cancel{color:var(--tx2);font-size:.88rem;font-weight:600;flex-shrink:0;padding:4px 2px;transition:color .15s;}
.search-cancel:hover{color:var(--tx);}

.search-body{flex:1;overflow-y:auto;}
.search-section{padding:14px 14px 6px;font-size:.7rem;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);}
.search-empty{text-align:center;padding:60px 20px;color:var(--tx2);font-size:.88rem;}
.search-empty .se-icon{font-size:3rem;margin-bottom:12px;}
.search-video-card{
  display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .13s;
}
.search-video-card:hover{background:var(--surface);}
.svc-thumb{width:72px;height:100px;border-radius:8px;object-fit:cover;background:var(--surface2);flex-shrink:0;}
.svc-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:space-between;}
.svc-author{font-size:.78rem;color:var(--tx2);margin-bottom:4px;font-weight:500;}
.svc-desc{font-size:.85rem;font-weight:500;line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.svc-stats{display:flex;gap:10px;font-size:.75rem;color:var(--tx2);margin-top:6px;}
.search-loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:60px;}

/* ── PROFILE PANEL ── */
#profile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:199;display:none;}
#profile-overlay.show{display:block;}
#profile-panel{
  position:fixed;bottom:0;left:0;right:0;height:88vh;
  background:var(--surface);border-radius:20px 20px 0 0;
  z-index:200;display:flex;flex-direction:column;
  transform:translateY(110%);transition:transform .35s cubic-bezier(.32,.72,0,1);
  border-top:1px solid var(--border);
}
#profile-panel.open{transform:translateY(0);}
.pp-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.pp-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
.pp-user{display:flex;align-items:center;gap:12px;}
.pp-avatar{
  width:46px;height:46px;border-radius:50%;border:2px solid var(--red);
  background:var(--surface2);display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:700;color:var(--tx2);
}
.pp-name{font-weight:700;font-size:1rem;}
.pp-email{font-size:.75rem;color:var(--tx2);margin-top:2px;}
.pp-close{
  width:32px;height:32px;border-radius:50%;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:1rem;cursor:pointer;
  border:1px solid var(--border);transition:all .13s;
}
.pp-close:hover{background:var(--surface3);color:var(--tx);}
.pp-signout{
  background:rgba(254,44,85,.12);color:var(--red);border:1px solid rgba(254,44,85,.25);
  padding:7px 14px;border-radius:8px;font-size:.8rem;font-weight:700;transition:all .15s;
}
.pp-signout:hover{background:rgba(254,44,85,.2);}
.pp-tabs{display:flex;padding:0 18px;gap:0;border-bottom:1px solid var(--border);}
.pp-tab{flex:1;padding:12px 4px;font-size:.8rem;font-weight:600;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;text-align:center;transition:all .15s;letter-spacing:.02em;}
.pp-tab.active{color:#fff;border-bottom-color:var(--red);}
.pp-body{flex:1;overflow-y:auto;}
.pp-section{display:none;flex-direction:column;}
.pp-section.active{display:flex;}
.pp-empty{text-align:center;padding:48px 20px;color:var(--tx3);font-size:.85rem;}
.pp-empty span{font-size:2rem;display:block;margin-bottom:10px;}
.history-item{
  display:flex;align-items:center;gap:12px;padding:12px 18px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .13s;
}
.history-item:hover{background:var(--surface2);}
.hi-icon{width:38px;height:38px;border-radius:8px;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem;}
.hi-text{flex:1;min-width:0;}
.hi-label{font-size:.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hi-sub{font-size:.72rem;color:var(--tx2);margin-top:2px;}
.following-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);}
.fi-avatar{width:42px;height:42px;border-radius:50%;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;border:1.5px solid var(--border);}
.fi-name{flex:1;font-size:.9rem;font-weight:600;}
.fi-unfollow{background:transparent;border:1px solid var(--border);color:var(--tx2);padding:6px 12px;border-radius:6px;font-size:.75rem;font-weight:600;transition:all .15s;}
.fi-unfollow:hover{border-color:var(--red);color:var(--red);}
.saved-thumb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px;}
.saved-thumb{aspect-ratio:9/16;background:var(--surface2);overflow:hidden;cursor:pointer;position:relative;}
.saved-thumb img{width:100%;height:100%;object-fit:cover;transition:opacity .2s;}
.saved-thumb:hover img{opacity:.8;}
.liked-thumb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px;}
.liked-thumb{aspect-ratio:9/16;background:var(--surface2);overflow:hidden;cursor:pointer;position:relative;}
.liked-thumb img{width:100%;height:100%;object-fit:cover;}

/* ── LOADER DOTS ── */
.loader-dots{display:flex;align-items:center;gap:6px;}
.loader-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:bounce .8s infinite;}
.loader-dot:nth-child(2){animation-delay:.15s}
.loader-dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--bottom-h) + 16px);left:50%;
  transform:translateX(-50%) translateY(10px);opacity:0;
  background:rgba(20,20,20,.98);border:1px solid var(--border);
  color:#fff;padding:10px 20px;border-radius:24px;font-size:.82rem;font-weight:600;
  z-index:999;transition:all .2s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(12px);
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── CLEAR BTN ── */
.clear-history-btn{
  margin:12px 18px;padding:10px;background:rgba(254,44,85,.08);border:1px solid rgba(254,44,85,.2);
  color:var(--red);border-radius:10px;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;
}
.clear-history-btn:hover{background:rgba(254,44,85,.15);}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="ls-logo">
    <img src="logo3.png?v=2" alt="MatTok"/>
    <span class="ls-logo-name">MatTok</span>
  </div>
  <div class="ls-bars">
    <div class="ls-bar"></div>
    <div class="ls-bar"></div>
    <div class="ls-bar"></div>
    <div class="ls-bar"></div>
    <div class="ls-bar"></div>
    <div class="ls-bar"></div>
  </div>
  <div class="ls-text">Loading your feed…</div>
</div>

<!-- AUTH -->
<div id="auth-screen" class="hidden">
  <div class="auth-logo">
    <img src="logo3.png?v=2" alt="MatTok"/>
    <span class="auth-logo-name">MatTok</span>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="authTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-register" onclick="authTab('register')">Register</button>
    </div>
    <div id="name-field" class="auth-field" style="display:none">
      <label>Display Name</label>
      <input type="text" id="auth-name" placeholder="Your name"/>
    </div>
    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="auth-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doAuth()"/>
    </div>
    <div class="auth-field">
      <label>Password</label>
      <input type="password" id="auth-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()"/>
    </div>
    <button class="auth-submit" id="auth-btn" onclick="doAuth()">Sign In</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOP NAV -->
  <div id="top-nav">
    <div class="nav-logo">
      <img src="logo3.png?v=2" alt="MatTok"/>
      <span class="nav-logo-text">MatTok</span>
    </div>
    <div class="nav-right">
      <button class="nav-icon-btn" onclick="openSearch()" title="Search">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
  </div>

  <!-- SEARCH -->
  <div id="search-bar">
    <div class="search-top">
      <div class="search-input-wrap">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

<script>
const API_KEY = 'IZqo3P4uw2P5wnNvQD5q0GH9f5i1';
const BASE    = 'https://api.scrapecreators.com';

let cursor    = 0;
let loading   = false;
let seenIds   = new Set();
let currentVideoEl = null;

// Persistent data (localStorage)
let likedVideos   = new Set(JSON.parse(localStorage.getItem('mattok_likes')  ||'[]'));
let savedVideos   = new Set(JSON.parse(localStorage.getItem('mattok_saves')  ||'[]'));
let savedVideoData= JSON.parse(localStorage.getItem('mattok_saved_data')     ||'{}');
let likedVideoData= JSON.parse(localStorage.getItem('mattok_liked_data')     ||'{}');
let searchHistory = JSON.parse(localStorage.getItem('mattok_search_history') ||'[]');
let followingList = JSON.parse(localStorage.getItem('mattok_following')      ||'{}');

const feed = document.getElementById('feed');

// ── HELPERS ──
function fmt(n) {
  if (!n) return '0';
  if (n>=1e6) return (n/1e6).toFixed(1)+'M';
  if (n>=1e3) return (n/1e3).toFixed(1)+'K';
  return ''+n;
}
function timeAgo(ms) {
  const d = Date.now()-ms;
  if (d<60000) return 'Just now';
  if (d<3600000) return Math.floor(d/60000)+'m ago';
  if (d<86400000) return Math.floor(d/3600000)+'h ago';
  return Math.floor(d/86400000)+'d ago';
}
function showToast(msg, dur=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>t.classList.remove('show'), dur);
}
window.showToast = showToast;

// ── URL ROUTING ──
function getVideoIdFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('video') || params.get('id');
}
function setVideoURL(videoId) {
  const url = new URL(window.location.href);
  url.searchParams.set('video', videoId);
  history.replaceState({}, '', url.toString());
}

// ── SEARCH ──
window.openSearch = () => {
  document.getElementById('search-bar').classList.add('show');
  setTimeout(() => document.getElementById('search-input').focus(), 120);
  if (currentVideoEl) currentVideoEl.pause();
  renderSearchHistory();
};
window.closeSearch = () => {
  document.getElementById('search-bar').classList.remove('show');
  if (currentVideoEl) currentVideoEl.play().catch(()=>{});
};

// Show search history in the placeholder
function renderSearchHistory() {
  const sf = document.getElementById('search-feed');
  if (searchHistory.length === 0) {
    sf.innerHTML = `<div class="search-empty" id="search-placeholder"><div class="se-icon">🔍</div>Search for videos by keyword, hashtag, or creator username</div>`;
    return;
  }
  sf.innerHTML = `<div class="search-section">Recent Searches</div>` +
    searchHistory.slice(0,10).map(q => `
      <div class="history-item" style="cursor:pointer" onclick="runSearch(${JSON.stringify(q)})">
        <div class="hi-icon">🕐</div>
        <div class="hi-text">
          <div class="hi-label">${q}</div>
        </div>
      </div>`).join('');
}

// Save search query
function saveSearch(q) {
  searchHistory = [q, ...searchHistory.filter(h => h !== q)].slice(0, 20);
  localStorage.setItem('mattok_search_history', JSON.stringify(searchHistory));
}

window.clearSearchHistory = () => {
  searchHistory = [];
  localStorage.setItem('mattok_search_history', JSON.stringify([]));
  renderHistoryTab();
  renderSearchHistory();
  showToast('Search history cleared');
};

// Input triggers search on Enter
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = document.getElementById('search-input').value.trim();
    if (q) runSearch(q);
  }
});

window.runSearch = async (q) => {
  document.getElementById('search-input').value = q;
  saveSearch(q);
  renderHistoryTab();

  const sf = document.getElementById('search-feed');
  sf.innerHTML = `<div class="search-loading"><div class="loader-dots"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div></div>`;

  let videos = [];

  // Try multiple search approaches
  const endpoints = [
    `${BASE}/v1/tiktok/search?keyword=${encodeURIComponent(q)}&count=20`,
    `${BASE}/v1/tiktok/search/videos?keyword=${encodeURIComponent(q)}&count=20`,
    `${BASE}/v1/tiktok/hashtag/videos?hashtag=${encodeURIComponent(q.replace(/^#/,''))}&count=20`,
    `${BASE}/v1/tiktok/user/videos?username=${encodeURIComponent(q.replace(/^@/,''))}&count=20`,
  ];

  for (const url of endpoints) {
    if (videos.length > 0) break;
    try {
      const r = await fetch(url, { headers: { 'x-api-key': API_KEY } });
      if (!r.ok) continue;
      const data = await r.json();
      videos = data.aweme_list || data.data || data.videos || data.items || [];
    } catch(e) { continue; }
  }

  if (!videos.length) {
    sf.innerHTML = `<div class="search-empty"><div class="se-icon">😶</div>No results found for <strong>"${q}"</strong></div>`;
    return;
  }

  sf.innerHTML = `<div class="search-section">${videos.length} results for "${q}"</div>`;
  videos.forEach(v => {
    const author = v.author?.unique_id || v.author?.uniqueId || '?';
    const nick   = v.author?.nickname || author;
    const desc   = v.desc || '(no description)';
    const thumb  = v.video?.cover?.url_list?.[0] || v.video?.cover?.url || '';
    const views  = v.statistics?.play_count || 0;
    const likes  = v.statistics?.digg_count || 0;

    const card = document.createElement('div');
    card.className = 'search-video-card';
    card.innerHTML = `
      <img class="svc-thumb" src="${thumb}" alt="" loading="lazy" onerror="this.style.background='var(--surface3)'"/>
      <div class="svc-info">
        <div class="svc-author">@${author} · ${nick}</div>
        <div class="svc-desc">${desc}</div>
        <div class="svc-stats">
          <span>▶ ${fmt(views)}</span>
          <span>❤ ${fmt(likes)}</span>
        </div>
      </div>`;
    card.addEventListener('click', () => { closeSearch(); playSearchResult(v); });
    sf.appendChild(card);
  });
};

function playSearchResult(v) {
  const videoUrl = v.video?.play_addr_h264?.url_list?.[0] || v.video?.play_addr?.url_list?.[0] || '';
  if (!videoUrl) { showToast('Video not available.'); return; }
  if (currentVideoEl) { currentVideoEl.pause(); currentVideoEl.currentTime=0; }
  const existing = document.querySelector(`.slide[data-aweme="${v.aweme_id}"]`);
  if (existing) { existing.scrollIntoView({behavior:'smooth'}); return; }
  const slide = buildSlide(v);
  const firstSlide = feed.querySelector('.slide');
  if (firstSlide) feed.insertBefore(slide, firstSlide);
  else feed.prepend(slide);
  observer.observe(slide);
  slide.scrollIntoView({behavior:'smooth'});
}

// ── PROFILE ──
window.openProfile = () => {
  document.getElementById('profile-panel').classList.add('open');
  document.getElementById('profile-overlay').classList.add('show');
  if (currentVideoEl) currentVideoEl.pause();
  renderProfileTab('history');
};
window.closeProfile = () => {
  document.getElementById('profile-panel').classList.remove('open');
  document.getElementById('profile-overlay').classList.remove('show');
  if (currentVideoEl) currentVideoEl.play().catch(()=>{});
};

let currentProfileTab = 'history';
window.switchProfileTab = (tab) => {
  currentProfileTab = tab;
  document.querySelectorAll('.pp-tab').forEach((el, i) => {
    const tabs = ['history','following','liked','saved'];
    el.classList.toggle('active', tabs[i]===tab);
  });
  document.querySelectorAll('.pp-section').forEach(el => el.classList.remove('active'));
  document.getElementById('pp-'+tab).classList.add('active');
  renderProfileTab(tab);
};

function renderProfileTab(tab) {
  if (tab==='history') renderHistoryTab();
  else if (tab==='following') renderFollowingTab();
  else if (tab==='liked') renderLikedTab();
  else if (tab==='saved') renderSavedTab();
}

function renderHistoryTab() {
  const list = document.getElementById('history-list');
  if (!searchHistory.length) {
    list.innerHTML = `<div class="pp-empty"><span>🕐</span>No search history yet</div>`;
    return;
  }
  list.innerHTML = searchHistory.map(q => `
    <div class="history-item" onclick="closeProfile();runSearch(${JSON.stringify(q)});openSearch();">
      <div class="hi-icon">🔍</div>
      <div class="hi-text"><div class="hi-label">${q}</div></div>
    </div>`).join('');
}

function renderFollowingTab() {
  const list = document.getElementById('following-list');
  const keys = Object.keys(followingList);
  if (!keys.length) {
    list.innerHTML = `<div class="pp-empty"><span>👥</span>Not following anyone yet</div>`;
    return;
  }
  list.innerHTML = keys.map(author => `
    <div class="following-item">
      <div class="fi-avatar">${author[0].toUpperCase()}</div>
      <div class="fi-name">@${author}</div>
      <button class="fi-unfollow" onclick="unfollowUser('${author}')">Unfollow</button>
    </div>`).join('');
}

function renderLikedTab() {
  const grid = document.getElementById('liked-grid');
  if (!likedVideos.size) {
    grid.innerHTML = `<div style="grid-column:1/-1" class="pp-empty"><span>❤️</span>No liked videos yet</div>`;
    return;
  }
  grid.innerHTML = [...likedVideos].reverse().map(id => {
    const d = likedVideoData[id] || {};
    const thumb = d.thumb || '';
    return `<div class="liked-thumb" onclick="jumpToVideo('${id}','liked')">
      ${thumb ? `<img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'"/>` : ''}
    </div>`;
  }).join('');
}

function renderSavedTab() {
  const grid = document.getElementById('saved-grid');
  if (!savedVideos.size) {
    grid.innerHTML = `<div style="grid-column:1/-1" class="pp-empty"><span>🔖</span>No saved videos yet</div>`;
    return;
  }
  grid.innerHTML = [...savedVideos].reverse().map(id => {
    const d = savedVideoData[id] || {};
    const thumb = d.thumb || '';
    return `<div class="saved-thumb" onclick="jumpToVideo('${id}','saved')">
      ${thumb ? `<img src="${thumb}" alt="" loading="lazy" onerror="this.style.display='none'"/>` : ''}
    </div>`;
  }).join('');
}

window.jumpToVideo = (awemeId, from) => {
  closeProfile();
  const existing = document.querySelector(`.slide[data-aweme="${awemeId}"]`);
  if (existing) { existing.scrollIntoView({behavior:'smooth'}); return; }
  showToast('Scroll your feed to find this video');
};

window.unfollowUser = (author) => {
  delete followingList[author];
  localStorage.setItem('mattok_following', JSON.stringify(followingList));
  // Also update any visible follow buttons
  document.querySelectorAll(`.slide[data-author="${author}"] .si-follow`).forEach(btn => {
    btn.textContent = 'Follow';
    btn.classList.remove('active');
  });
  renderFollowingTab();
  showToast(`Unfollowed @${author}`);
};

// ── INTERSECTION OBSERVER ──
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    const slide = entry.target;
    const video = slide.querySelector('video');
    if (!video) return;
    if (entry.isIntersecting) {
      video.play().catch(()=>{});
      currentVideoEl = video;
      const disc = slide.querySelector('.si-music-disc');
      if (disc) disc.classList.remove('paused');
      const awemeId = slide.dataset.aweme;
      if (awemeId) setVideoURL(awemeId);
    } else {
      video.pause();
      video.currentTime = 0;
      const disc = slide.querySelector('.si-music-disc');
      if (disc) disc.classList.add('paused');
    }
  });
}, { threshold: 0.6 });

// ── BUILD SLIDE ──
function buildSlide(v) {
  const author   = v.author?.unique_id || v.author?.uniqueId || '?';
  const nickname = v.author?.nickname || author;
  const desc     = v.desc || '';
  const music    = v.music?.title || '';
  const likes    = v.statistics?.digg_count    || 0;
  const shares   = v.statistics?.share_count   || 0;
  const views    = v.statistics?.play_count    || 0;
  const awemeId  = v.aweme_id;
  const thumb    = v.video?.cover?.url_list?.[0] || v.video?.cover?.url || '';
  // Try multiple avatar sources
  const avatar   = v.author?.avatar_thumb?.url_list?.[0]
                || v.author?.avatar_medium?.url_list?.[0]
                || v.author?.avatar?.url_list?.[0]
                || '';
  const videoUrl = v.video?.play_addr_h264?.url_list?.[0] || v.video?.play_addr?.url_list?.[0] || '';
  const isLiked  = likedVideos.has(awemeId);
  const isSaved  = savedVideos.has(awemeId);
  const isFollowing = !!followingList[author];

  const slide = document.createElement('div');
  slide.className = 'slide';
  slide.dataset.aweme  = awemeId;
  slide.dataset.author = author;
  slide._videoData = v;

  const avatarHTML = avatar
    ? `<img src="${avatar}" alt="" loading="lazy" onerror="this.style.display='none';this.parentElement.textContent='${author[0]?.toUpperCase()||'?'}';"/>`
    : `<span>${author[0]?.toUpperCase()||'?'}</span>`;

  slide.innerHTML = `
    <video src="${videoUrl}" loop playsinline preload="none" webkit-playsinline poster="${thumb}"></video>
    <div class="pause-flash">
      <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
    </div>
    <div class="slide-info">
      <div class="si-author">
        <div class="si-avatar">${avatarHTML}</div>
        <span class="si-name">@${author}</span>
        <button class="si-follow${isFollowing?' active':''}">
          ${isFollowing?'Following':'Follow'}
        </button>
      </div>
      ${desc?`<div class="si-desc">${desc}</div>`:''}
      ${music?`<div class="si-music"><div class="si-music-disc">🎵</div><span>${music}</span></div>`:''}
    </div>
    <div class="slide-actions">
      <div class="sa-btn" id="like-${awemeId}">
        <div class="sa-icon${isLiked?' liked':''}">
          <svg width="24" height="24" fill="${isLiked?'currentColor':'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <span class="sa-count">${fmt(likes)}</span>
      </div>
      <div class="sa-btn sa-save-btn">
        <div class="sa-icon${isSaved?' saved':''}">
          <svg width="22" height="22" fill="${isSaved?'currentColor':'none'}" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span class="sa-count">${isSaved?'Saved':'Save'}</span>
      </div>
      <div class="sa-btn sa-share-btn">
        <div class="sa-icon">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        </div>
        <span class="sa-count">${fmt(shares)}</span>
      </div>
      <div class="sa-btn">
        <div class="sa-icon">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </div>
        <span class="sa-count">${fmt(views)}</span>
      </div>
    </div>
    <div class="slide-progress">
      <div class="slide-progress-bar"></div>
    </div>`;

  const video       = slide.querySelector('video');
  const pauseFlash  = slide.querySelector('.pause-flash');
  const progressBar = slide.querySelector('.slide-progress-bar');
  const likeBtn     = slide.querySelector(`#like-${awemeId}`);
  const saveBtn     = slide.querySelector('.sa-save-btn');
  const shareBtn    = slide.querySelector('.sa-share-btn');
  const followBtn   = slide.querySelector('.si-follow');
  const nameEl      = slide.querySelector('.si-name');

  // Tap to pause/play
  video.addEventListener('click', () => {
    const isPaused = video.paused;
    if (isPaused) {
      video.play().catch(()=>{});
      pauseFlash.querySelector('svg').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
    } else {
      video.pause();
      pauseFlash.querySelector('svg').innerHTML='<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>';
    }
    pauseFlash.classList.add('show');
    clearTimeout(pauseFlash._tid);
    pauseFlash._tid = setTimeout(()=>pauseFlash.classList.remove('show'), 500);
  });

  // Progress bar
  video.addEventListener('timeupdate', () => {
    if (video.duration) progressBar.style.width=(video.currentTime/video.duration*100)+'%';
  });
  slide.querySelector('.slide-progress').addEventListener('click', e => {
    if (!video.duration) return;
    const r = e.currentTarget.getBoundingClientRect();
    video.currentTime = ((e.clientX-r.left)/r.width)*video.duration;
  });

  // Like
  likeBtn.addEventListener('click', () => {
    const icon = likeBtn.querySelector('.sa-icon');
    const svg  = likeBtn.querySelector('svg');
    const isLk = likedVideos.has(awemeId);
    if (isLk) {
      likedVideos.delete(awemeId);
      delete likedVideoData[awemeId];
      icon.classList.remove('liked');
      svg.setAttribute('fill','none');
    } else {
      likedVideos.add(awemeId);
      likedVideoData[awemeId] = { thumb, author, desc };
      icon.classList.add('liked');
      svg.setAttribute('fill','currentColor');
      icon.animate([{transform:'scale(1)'},{transform:'scale(1.4)'},{transform:'scale(1)'}],{duration:280,easing:'ease-out'});
    }
    localStorage.setItem('mattok_likes', JSON.stringify([...likedVideos]));
    localStorage.setItem('mattok_liked_data', JSON.stringify(likedVideoData));
  });

  // Save
  saveBtn.addEventListener('click', () => {
    const icon = saveBtn.querySelector('.sa-icon');
    const svg  = saveBtn.querySelector('svg');
    const cnt  = saveBtn.querySelector('.sa-count');
    const isSv = savedVideos.has(awemeId);
    if (isSv) {
      savedVideos.delete(awemeId);
      delete savedVideoData[awemeId];
      icon.classList.remove('saved');
      svg.setAttribute('fill','none');
      cnt.textContent = 'Save';
      showToast('Removed from saved');
    } else {
      savedVideos.add(awemeId);
      savedVideoData[awemeId] = { thumb, author, desc, videoUrl };
      icon.classList.add('saved');
      svg.setAttribute('fill','currentColor');
      cnt.textContent = 'Saved';
      icon.animate([{transform:'scale(1)'},{transform:'scale(1.35)'},{transform:'scale(1)'}],{duration:260,easing:'ease-out'});
      showToast('✅ Video saved');
    }
    localStorage.setItem('mattok_saves', JSON.stringify([...savedVideos]));
    localStorage.setItem('mattok_saved_data', JSON.stringify(savedVideoData));
  });

  // Share — copy link
  shareBtn.addEventListener('click', () => {
    const url = new URL(window.location.href);
    url.searchParams.set('video', awemeId);
    const shareUrl = url.toString();
    if (navigator.clipboard) {
      navigator.clipboard.writeText(shareUrl).then(()=>showToast('✅ Link copied!')).catch(()=>showToast(shareUrl));
    } else showToast('Copy: '+shareUrl);
  });

  // Follow
  followBtn.addEventListener('click', e => {
    e.stopPropagation();
    const on = !followingList[author];
    if (on) {
      followingList[author] = { ts: Date.now() };
      followBtn.textContent = 'Following';
      followBtn.classList.add('active');
    } else {
      delete followingList[author];
      followBtn.textContent = 'Follow';
      followBtn.classList.remove('active');
    }
    localStorage.setItem('mattok_following', JSON.stringify(followingList));
    showToast(on ? `Following @${author}` : `Unfollowed @${author}`);
  });

  // Click author → search
  nameEl.addEventListener('click', e => {
    e.stopPropagation();
    document.getElementById('search-input').value = '@'+author;
    openSearch();
    runSearch('@'+author);
  });

  return slide;
}

function addSlide(v) {
  if (!v.aweme_id) return;
  if (seenIds.has(v.aweme_id)) return; // dedup
  const videoUrl = v.video?.play_addr_h264?.url_list?.[0] || v.video?.play_addr?.url_list?.[0] || '';
  if (!videoUrl) return;
  seenIds.add(v.aweme_id);

  const slide = buildSlide(v);
  const loader = document.getElementById('loader');
  if (loader) feed.insertBefore(slide, loader);
  else feed.appendChild(slide);
  observer.observe(slide);
}

// ── LOADER ──
function makeLoader() {
  const el = document.createElement('div');
  el.id = 'loader';
  el.style.cssText = 'height:100dvh;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;';
  el.innerHTML = `<div class="loader-dots"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>`;
  return el;
}

async function loadFeed() {
  if (loading) return;
  loading = true;
  const loaderEl = makeLoader();
  feed.appendChild(loaderEl);
  try {
    const r = await fetch(`${BASE}/v1/tiktok/get-trending-feed?cursor=${cursor}`, { headers:{'x-api-key':API_KEY} });
    if (!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    const videos = data.aweme_list || [];
    loaderEl.remove();
    // Filter dupes before adding
    const fresh = videos.filter(v => v.aweme_id && !seenIds.has(v.aweme_id));
    fresh.forEach(v => addSlide(v));
    cursor = data.nextCursor ?? data.cursor ?? (cursor + videos.length);
    if (cursor === 0) cursor = Date.now(); // force different cursor next time
  } catch(e) {
    loaderEl.remove();
    const err = document.createElement('div');
    err.style.cssText = 'height:100dvh;scroll-snap-align:start;display:flex;align-items:center;justify-content:center;color:#f87171;font-size:.85rem;padding:20px;text-align:center;flex-direction:column;gap:12px;';
    err.innerHTML = `<div>Could not load videos</div><div style="font-size:.75rem;color:var(--tx3)">${e.message}</div>`;
    feed.appendChild(err);
  }
  loading = false;
}

// ── REFRESH ──
window.refreshFeed = () => {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  setTimeout(()=>btn.classList.remove('spinning'), 650);

  cursor = 0;
  seenIds.clear();
  if (currentVideoEl) { currentVideoEl.pause(); currentVideoEl = null; }
  Array.from(feed.querySelectorAll('.slide')).forEach(s => { observer.unobserve(s); s.remove(); });
  Array.from(feed.querySelectorAll('#loader')).forEach(s => s.remove());
  loading = false;

  const url = new URL(window.location.href);
  url.searchParams.delete('video');
  history.replaceState({}, '', url.toString());

  loadFeed();
};

// ── INFINITE SCROLL ──
feed.addEventListener('scroll', () => {
  const nearBottom = feed.scrollTop + feed.clientHeight >= feed.scrollHeight - feed.clientHeight * 1.5;
  if (nearBottom) loadFeed();
});

// ── INIT ──
window.initApp = async () => {
  const sharedId = getVideoIdFromURL();
  if (sharedId) {
    await loadFeed();
    let slide = feed.querySelector(`.slide[data-aweme="${sharedId}"]`);
    if (slide) { slide.scrollIntoView({behavior:'smooth'}); }
    else {
      try {
        const r = await fetch(`${BASE}/v1/tiktok/video?aweme_id=${sharedId}`, { headers:{'x-api-key':API_KEY} });
        const data = await r.json();
        const v = data.aweme_detail || data.video || data;
        if (v && v.aweme_id) playSearchResult(v);
        else showToast('Shared video not found.');
      } catch(e) { showToast('Could not load shared video.'); }
    }
  } else {
    loadFeed();
  }
};
</script>
