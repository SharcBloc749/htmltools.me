<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>HTMLTools</title>
<link rel="icon" type="image/png" href="/logo3.png?v=2"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #0c0c0c;
  --surface:   #111;
  --panel:     #171717;
  --panel-2:   #1e1e1e;
  --editor-bg: #141414;
  --border:    #252525;
  --border-2:  #2e2e2e;
  --border-hi: #404040;
  --tx:        #e8e8e8;
  --tx-2:      #888;
  --tx-3:      #4a4a4a;
  --muted:     #3a3a3a;
  --white:     #fff;
  --wfg:       #0c0c0c;
  --green:     #16a34a;
  --green-hi:  #22c55e;
  --blue:      #2563eb;
  --blue-hi:   #3b82f6;
  --red:       #dc2626;
  --red-hi:    #ef4444;
  --yellow:    #ca8a04;
  --yellow-hi: #f59e0b;
  --r:    4px;
  --r-md: 7px;
  --r-lg: 10px;
  --r-xl: 14px;
  --nav-h:    48px;
  --font:     'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono:     'JetBrains Mono', 'SF Mono', Consolas, monospace;
  --code-sz:  12.5px;
  --code-lh:  21px;
  --code-pad: 14px 16px;
  --editor-font-size: 12.5px;
}

/* LIGHT MODE */
body.light-mode {
  --bg:        #f5f5f4;
  --surface:   #fafaf9;
  --panel:     #efefed;
  --panel-2:   #e8e8e5;
  --editor-bg: #f8f8f7;
  --border:    #d8d8d5;
  --border-2:  #c8c8c4;
  --border-hi: #a0a09c;
  --tx:        #1a1a18;
  --tx-2:      #5a5a56;
  --tx-3:      #9a9a95;
  --muted:     #b8b8b4;
  --white:     #1a1a18;
  --wfg:       #fafaf9;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{color:var(--tx);font-family:var(--font);font-size:13.5px;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;transition:background .2s,color .2s;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;text-decoration:none;}
::selection{background:rgba(255,255,255,.12);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--border-hi);}

#user-code {
  color: transparent !important;
  -webkit-text-fill-color: transparent !important;
  background: transparent !important;
  caret-color: #c0c0c0 !important;
}
body.light-mode #user-code { caret-color: #333 !important; }

#code-view,#high-code,#code-view *,#high-code * {
  font-family:      var(--mono) !important;
  font-size:        var(--editor-font-size) !important;
  line-height:      var(--code-lh) !important;
  letter-spacing:   0 !important;
  word-spacing:     0 !important;
  tab-size:         2 !important;
  -moz-tab-size:    2 !important;
  font-feature-settings: "liga" 0, "calt" 0 !important;
  font-variant-ligatures: none !important;
  -webkit-font-smoothing: auto !important;
  text-shadow:      none !important;
  background:       transparent !important;
  border:           none !important;
  border-radius:    0 !important;
  white-space:      pre !important;
  text-rendering:   auto !important;
  box-sizing:       border-box !important;
}
#high-code,#code-view *,#high-code * { padding:0 !important; margin:0 !important; }
.token,#high-code .token,pre[class*="language-"] .token,code[class*="language-"] .token {
  background:transparent !important; background-color:transparent !important;
  box-shadow:none !important; text-shadow:none !important;
}
#user-code {
  font-family:    var(--mono) !important;
  font-size:      var(--editor-font-size) !important;
  line-height:    var(--code-lh) !important;
  letter-spacing: 0 !important; word-spacing:0 !important; tab-size:2 !important;
  font-feature-settings:"liga" 0,"calt" 0 !important;
  font-variant-ligatures:none !important; -webkit-font-smoothing:auto !important;
}

/* BAN SCREEN */
#ban-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
#ban-screen.show{display:flex;}
.ban-icon{font-size:2.5rem;margin-bottom:1rem;color:var(--red-hi);}
.ban-title{font-size:1.4rem;font-weight:700;margin-bottom:.5rem;letter-spacing:-.02em;}
.ban-line{width:28px;height:1px;background:var(--border-2);margin:.75rem auto;}
.ban-sub{color:var(--tx-2);max-width:380px;line-height:1.7;font-size:.85rem;}
.ban-email{margin-top:.875rem;font-family:var(--mono);font-size:.72rem;color:var(--tx-3);padding:.45rem .75rem;border:1px solid var(--border);border-radius:var(--r);}

/* LOGIN GATE */
#login-gate{position:fixed;inset:0;background:var(--bg);z-index:8000;display:flex;align-items:center;justify-content:center;padding:1.5rem;overflow-y:auto;}
#login-gate::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:.35;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 65% 55% at 50% 50%,#000 20%,transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse 65% 55% at 50% 50%,#000 20%,transparent 80%);}
#login-gate.hidden{display:none;}
.lg-card{position:relative;width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--r-xl);padding:1.875rem;}
.lg-logo{width:38px;height:38px;margin:0 auto 1.125rem;background:var(--white);color:var(--wfg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:.875rem;}
.lg-h{font-weight:700;font-size:1.1rem;text-align:center;margin-bottom:.2rem;letter-spacing:-.025em;}
.lg-sub{font-size:.78rem;color:var(--tx-3);text-align:center;margin-bottom:1.375rem;}
.lg-tabs{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:3px;gap:2px;margin-bottom:1.125rem;}
.lg-tab{flex:1;padding:.45rem;background:transparent;border:none;color:var(--tx-3);font-family:var(--font);font-size:.68rem;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:.06em;text-transform:uppercase;border-radius:3px;min-height:32px;}
.lg-tab:hover:not(.active){color:var(--tx-2);}
.lg-tab.active{background:var(--white);color:var(--wfg);}
.lg-fg{margin-bottom:.8rem;}
.lg-fg label{display:block;font-size:.7rem;color:var(--tx-2);margin-bottom:.375rem;font-weight:500;}
.lg-fg input{width:100%;background:var(--panel);border:1px solid var(--border-2);color:var(--tx);font-family:var(--font);font-size:.85rem;padding:.6rem .8rem;border-radius:var(--r);outline:none;transition:border-color .15s;-webkit-appearance:none;}
.lg-fg input::placeholder{color:var(--tx-3);}
.lg-fg input:focus{border-color:var(--border-hi);}
.lg-btn{width:100%;padding:.68rem;background:var(--white);color:var(--wfg);font-family:var(--font);font-size:.82rem;font-weight:600;border:none;border-radius:var(--r);cursor:pointer;transition:opacity .15s;margin-top:.5rem;min-height:38px;}
.lg-btn:hover{opacity:.9;}
.lg-forgot{text-align:center;margin-top:.875rem;font-size:.75rem;color:var(--tx-3);}
.lg-forgot span{cursor:pointer;transition:color .15s;}
.lg-forgot span:hover{color:var(--tx);}
.lg-err,.lg-ok{margin-top:.75rem;padding:.6rem .8rem;border-radius:var(--r);font-size:.75rem;display:none;border:1px solid;}
.lg-err{color:var(--red-hi);border-color:rgba(220,38,38,.25);background:rgba(220,38,38,.06);}
.lg-ok{color:var(--green-hi);border-color:rgba(22,163,74,.25);background:rgba(22,163,74,.06);}
.lg-err.show,.lg-ok.show{display:block;}
.lg-lock{display:none;padding:.6rem .85rem;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);color:var(--tx-2);font-size:.75rem;text-align:center;margin-bottom:.875rem;}
.lg-lock.show{display:block;}

/* ANNOUNCE BANNER */
#announce-banner{background:rgba(202,138,4,.07);border-bottom:1px solid rgba(202,138,4,.18);padding:.45rem 1rem;display:none;align-items:center;gap:.75rem;font-size:.75rem;flex-shrink:0;}
#announce-banner.show{display:flex;}
.ann-pill{background:rgba(202,138,4,.15);color:var(--yellow-hi);font-size:.62rem;font-weight:600;padding:.15rem .5rem;border-radius:3px;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;}
#announce-text{flex:1;color:var(--tx-2);}
#announce-dismiss{background:none;border:none;color:var(--tx-3);cursor:pointer;padding:.2rem .4rem;border-radius:3px;font-size:.85rem;transition:color .15s;}
#announce-dismiss:hover{color:var(--tx);}

/* NAV */
nav{background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;height:var(--nav-h);gap:1px;flex-shrink:0;overflow-x:auto;overflow-y:visible;position:relative;z-index:100;-webkit-overflow-scrolling:touch;scrollbar-width:none;transition:background .2s,border-color .2s;}
nav::-webkit-scrollbar{height:0;}
.nav-brand{display:flex;align-items:center;gap:7px;padding-right:12px;margin-right:4px;border-right:1px solid var(--border);flex-shrink:0;}
.nav-mark{width:24px;height:24px;background:var(--white);color:var(--wfg);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:.65rem;letter-spacing:-.02em;flex-shrink:0;overflow:hidden;}
.nav-mark img{width:24px;height:24px;object-fit:contain;display:block;}
.nav-name{font-size:.78rem;font-weight:600;color:var(--tx-2);letter-spacing:-.01em;white-space:nowrap;}
.tab{padding:5px 10px;border-radius:var(--r);font-size:12.5px;font-weight:500;color:var(--tx-3);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:6px;border:1px solid transparent;user-select:none;min-height:29px;-webkit-tap-highlight-color:transparent;}
.tab:hover{color:var(--tx-2);background:var(--panel);}
.tab.active{color:var(--tx);background:var(--panel);border-color:var(--border);}
.tab-icon{font-size:10px;opacity:.55;}
.tab.active .tab-icon{opacity:.85;}
.tab-dynamic{border-color:var(--border);background:var(--panel);max-width:150px;cursor:grab;}
.tab-dynamic.dragging{opacity:.4;cursor:grabbing;}
.tab-text{overflow:hidden;text-overflow:ellipsis;}
.tab-close{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8.5px;opacity:.4;flex-shrink:0;transition:all .15s;}
.tab-close:hover{background:rgba(220,38,38,.15);opacity:1;color:var(--red-hi);}

#user-display{display:none;align-items:center;gap:.4rem;margin-left:auto;flex-shrink:0;padding-left:.5rem;}
.user-pip{width:5px;height:5px;border-radius:50%;background:var(--green-hi);flex-shrink:0;}
#user-name-label{max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.75rem;font-weight:500;color:var(--tx-2);}
#notif-btn,#settings-btn{position:relative;background:transparent;border:1px solid var(--border);color:var(--tx-3);width:29px;height:29px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10.5px;transition:all .15s;flex-shrink:0;}
#notif-btn:hover,#settings-btn:hover{border-color:var(--border-hi);color:var(--tx);background:var(--panel);}
#settings-btn.active-page{color:var(--tx);background:var(--panel);border-color:var(--border-hi);}
#notif-badge{position:absolute;top:-4px;right:-4px;background:var(--red-hi);color:#fff;font-size:8px;font-weight:700;border-radius:10px;min-width:14px;height:14px;display:none;align-items:center;justify-content:center;padding:0 3px;border:2px solid var(--bg);}
#signout-btn{background:transparent;border:1px solid var(--border);color:var(--tx-3);font-family:var(--font);font-size:.7rem;font-weight:500;padding:.3rem .65rem;border-radius:var(--r);cursor:pointer;transition:all .15s;white-space:nowrap;min-height:29px;}
#signout-btn:hover{background:var(--panel);border-color:var(--border-hi);color:var(--tx);}

/* NOTIFICATION PANEL */
#notif-panel{position:fixed;top:calc(var(--nav-h)+6px);right:10px;width:300px;max-height:400px;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--r-lg);box-shadow:0 20px 60px rgba(0,0,0,.85);z-index:5000;display:none;flex-direction:column;overflow:hidden;}
#notif-panel.open{display:flex;}
.np-head{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.np-head h4{font-size:12px;font-weight:600;}
#notif-mark-read{background:transparent;border:none;color:var(--tx-3);font-size:10.5px;font-weight:500;cursor:pointer;font-family:var(--font);transition:color .15s;}
#notif-mark-read:hover{color:var(--tx);}
.notif-list{overflow-y:auto;flex:1;}
.notif-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.notif-item:hover{background:var(--panel);}
.notif-item.unread{background:rgba(37,99,235,.04);border-left:2px solid var(--blue-hi);}
.ni-title{font-weight:600;font-size:11.5px;margin-bottom:2px;}
.ni-body{font-size:11px;color:var(--tx-2);line-height:1.5;margin-bottom:2px;}
.ni-time{font-size:9.5px;color:var(--tx-3);font-family:var(--mono);}
.notif-empty{padding:2.5rem 1rem;text-align:center;color:var(--tx-3);font-size:11.5px;}

/* BUTTON SYSTEM */
.btn{background:var(--panel);border:1px solid var(--border-2);color:var(--tx-2);padding:0 11px;border-radius:var(--r);font-size:12px;font-weight:500;font-family:var(--font);transition:all .13s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;height:28px;-webkit-tap-highlight-color:transparent;}
.btn:hover{background:var(--panel-2);border-color:var(--border-hi);color:var(--tx);}
.btn:active{opacity:.75;}
.btn i{font-size:9.5px;opacity:.7;}
.btn-run{background:var(--green);color:#fff;border-color:var(--green);font-weight:600;gap:7px;}
.btn-run:hover{background:#15803d;border-color:#15803d;color:#fff;}
.btn-run i{opacity:1;font-size:10px;}
.btn-prim{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-prim:hover{background:#1d4ed8;border-color:#1d4ed8;color:#fff;}
.btn-prim i{opacity:1;}
.btn-danger{color:var(--red-hi);border-color:rgba(220,38,38,.2);background:transparent;}
.btn-danger:hover{background:rgba(220,38,38,.06);border-color:var(--red-hi);}
.btn-ghost{background:transparent;border-color:transparent;color:var(--tx-3);}
.btn-ghost:hover{background:var(--panel);border-color:var(--border);color:var(--tx-2);}
.btn-icon{width:28px;padding:0;justify-content:center;}

/* PAGES */
.viewport{flex:1;position:relative;overflow:hidden;min-height:0;}
.page{position:absolute;inset:0;display:none;flex-direction:column;min-height:0;}
.page.active{display:flex;}
.pad-box{flex:1;padding:10px;display:flex;flex-direction:column;gap:8px;min-height:0;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:4px;padding:6px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);}
.tb-sep{width:1px;height:16px;background:var(--border);margin:0 3px;flex-shrink:0;}
.tb-spacer{flex:1;}

/* EDITOR */
.editor-shell{flex:1;display:flex;flex-direction:column;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden;min-height:0;background:var(--editor-bg);}
.editor-tabs{display:flex;align-items:stretch;background:var(--surface);border-bottom:1px solid var(--border);height:34px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.editor-tabs::-webkit-scrollbar{height:0;}
.e-tab{display:flex;align-items:center;gap:6px;padding:0 14px;font-size:11.5px;font-weight:500;color:var(--tx-3);border-right:1px solid var(--border);cursor:pointer;white-space:nowrap;transition:all .13s;position:relative;}
.e-tab.active{background:var(--editor-bg);color:var(--tx);border-bottom:1px solid var(--editor-bg);margin-bottom:-1px;}
.e-tab-dot{width:7px;height:7px;border-radius:50%;background:var(--blue-hi);flex-shrink:0;}
.e-tab-ext{color:var(--tx-3);font-size:11px;}
.editor-body{display:flex;flex:1;min-height:0;overflow:hidden;}
.edit-side{position:relative;flex:50%;display:flex;min-width:0;background:var(--editor-bg);}
#gutter{width:42px;background:var(--editor-bg);color:var(--tx-3);text-align:right;padding:14px 9px;font-family:var(--mono);font-size:var(--editor-font-size);line-height:var(--code-lh);border-right:1px solid var(--border);overflow:hidden;flex-shrink:0;user-select:none;font-variant-numeric:tabular-nums;}
.text-stack{position:relative;flex:1;overflow:hidden;}
#user-code,#code-view{position:absolute;inset:0;padding:var(--code-pad) !important;margin:0 !important;border:0 !important;box-sizing:border-box !important;white-space:pre;word-break:normal;word-wrap:normal;overflow-wrap:normal;hyphens:none;}
#user-code{z-index:5;resize:none;outline:none;overflow:auto;}
#code-view{z-index:1;pointer-events:none;overflow:hidden;}
#resizer{width:1px;background:var(--border);cursor:col-resize;z-index:10;position:relative;transition:background .13s;flex-shrink:0;}
#resizer::after{content:'';position:absolute;inset:0 -5px;}
#resizer:hover,#resizer.sizing{background:var(--blue-hi);}
#preview{flex:50%;background:#fff;border:none;}
.editor-status{display:flex;align-items:center;gap:0;height:22px;background:var(--blue);flex-shrink:0;font-family:var(--mono);font-size:10.5px;color:rgba(255,255,255,.85);overflow:hidden;}
.sb-item{padding:0 10px;height:100%;display:flex;align-items:center;gap:5px;border-right:1px solid rgba(255,255,255,.1);transition:background .12s;cursor:default;white-space:nowrap;}
.sb-item:hover{background:rgba(255,255,255,.08);}
.sb-item i{font-size:9px;opacity:.7;}
.sb-push{margin-left:auto;}
.mob-editor-toggle{display:none;gap:2px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:2px;}
.met-btn{flex:1;padding:5px;background:transparent;border:none;color:var(--tx-3);border-radius:3px;cursor:pointer;font-size:11px;font-weight:500;font-family:var(--font);transition:all .13s;min-height:30px;display:flex;align-items:center;justify-content:center;gap:5px;}
.met-btn.active{background:var(--white);color:var(--wfg);}

/* SCRAPE */
#scrape-out{flex:1;background:var(--editor-bg);color:var(--tx);padding:14px;border:1px solid var(--border);border-radius:var(--r-md);font-family:var(--mono);font-size:12px;line-height:1.7;resize:none;outline:none;min-height:0;}
#scrape-out:focus{border-color:var(--border-hi);}
.url-row{display:flex;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:3px;align-items:center;transition:border-color .13s;}
.url-row:focus-within{border-color:var(--border-hi);}
.url-row input{flex:1;background:transparent;border:none;color:var(--tx);font-size:12.5px;outline:none;font-family:var(--font);min-width:0;height:28px;padding:0 9px;}
.url-row input::placeholder{color:var(--tx-3);}

/* GAME STUDIO */
.studio-wrap{display:flex;flex:1;min-height:0;overflow:hidden;}
.studio-sidebar{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:14px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sb-brand{display:flex;align-items:center;gap:8px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.sb-brand-icon{width:28px;height:28px;background:var(--white);color:var(--wfg);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.sb-brand h2{font-size:13px;font-weight:600;letter-spacing:-.02em;}
.sb-btn{background:var(--panel);border:1px solid var(--border-2);color:var(--tx-2);padding:0 12px;border-radius:var(--r);font-weight:500;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .13s;font-family:var(--font);font-size:12px;height:30px;}
.sb-btn:hover{background:var(--panel-2);border-color:var(--border-hi);color:var(--tx);}
.sb-btn-prim{background:var(--white);color:var(--wfg);border-color:var(--white);font-weight:600;}
.sb-btn-prim:hover{opacity:.9;color:var(--wfg);border-color:var(--white);}
.sb-search{width:100%;padding:0 9px;background:var(--panel);border:1px solid var(--border-2);border-radius:var(--r);color:var(--tx);font-size:12px;height:28px;outline:none;font-family:var(--font);transition:border-color .13s;-webkit-appearance:none;}
.sb-search::placeholder{color:var(--tx-3);}
.sb-search:focus{border-color:var(--border-hi);}
.sb-stats{background:var(--panel);padding:10px 12px;border-radius:var(--r-md);border:1px solid var(--border);display:flex;flex-direction:column;gap:5px;}
.sb-stats .row{display:flex;justify-content:space-between;align-items:center;font-size:11px;}
.sb-stats .row span:first-child{color:var(--tx-3);}
.sb-stats .row span:last-child{color:var(--tx);font-weight:500;font-family:var(--mono);font-variant-numeric:tabular-nums;}
.studio-main{flex:1;padding:18px;overflow-y:auto;min-height:0;}
.studio-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
.studio-hdr-left{display:flex;align-items:center;gap:9px;}
.studio-hdr h1{font-size:17px;font-weight:700;letter-spacing:-.025em;}
.studio-controls{display:flex;align-items:center;gap:6px;}
.sort-select{background:var(--panel);border:1px solid var(--border-2);color:var(--tx-2);font-family:var(--font);font-size:11px;padding:0 8px;border-radius:var(--r);height:26px;outline:none;cursor:pointer;transition:all .13s;}
.sort-select:hover{border-color:var(--border-hi);}
.view-ctrl{display:flex;gap:1px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:2px;}
.vc-btn{background:transparent;border:none;color:var(--tx-3);padding:0 9px;border-radius:2px;cursor:pointer;font-size:10.5px;font-family:var(--font);transition:all .13s;height:24px;font-weight:500;}
.vc-btn:hover{color:var(--tx-2);}
.vc-btn.active{background:var(--white);color:var(--wfg);}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
.game-card{background:var(--surface);border-radius:var(--r-md);overflow:hidden;cursor:pointer;transition:all .18s;border:1px solid var(--border);display:flex;flex-direction:column;}
.game-card:hover{border-color:var(--border-hi);transform:translateY(-2px);box-shadow:0 10px 35px rgba(0,0,0,.5);}
.game-card.pinned{border-color:var(--yellow);}
.gc-header{position:relative;height:100px;background:var(--panel);display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);overflow:hidden;}
.gc-header::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.2));}
.game-logo{width:40px;height:40px;border-radius:8px;object-fit:cover;border:1px solid var(--border-2);position:relative;z-index:1;}
.gc-thumb{position:absolute;inset:0;width:100%;height:100%;border:none;pointer-events:none;}
.gc-actions{position:absolute;top:7px;right:7px;display:flex;gap:3px;opacity:0;transition:opacity .15s;z-index:2;}
.game-card:hover .gc-actions{opacity:1;}
.gc-act{width:24px;height:24px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(4px);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx-2);font-size:9px;transition:all .13s;}
.gc-act:hover{background:rgba(0,0,0,.9);color:var(--tx);}
.gc-del:hover{color:var(--red-hi);}
.gc-pin.pinned{color:var(--yellow-hi) !important;}
.gc-dup:hover{color:var(--blue-hi);}
.gc-body{padding:10px 12px;}
.gc-title{font-weight:600;font-size:12.5px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;letter-spacing:-.01em;}
.gc-date{font-size:10px;color:var(--tx-3);font-family:var(--mono);}
.empty-state{grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--tx-3);}
.empty-state i{font-size:26px;margin-bottom:10px;display:block;opacity:.3;}
.empty-state h3{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--tx-2);letter-spacing:-.015em;}
.empty-state p{font-size:12px;}

/* CREATOR */
.creator-scroll{flex:1;overflow-y:auto;padding:14px;}
.creator-inner{max-width:580px;margin:0 auto;display:flex;flex-direction:column;gap:14px;}
.creator-title{font-size:17px;font-weight:700;letter-spacing:-.025em;}
.creator-card{background:var(--surface);padding:16px;border-radius:var(--r-md);border:1px solid var(--border);}
.c-label{display:block;margin-bottom:6px;color:var(--tx-3);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.c-input{width:100%;background:var(--panel);border:1px solid var(--border-2);color:var(--tx);padding:0 10px;border-radius:var(--r);font-family:var(--font);font-size:12.5px;height:32px;outline:none;transition:border-color .13s;-webkit-appearance:none;margin-bottom:12px;}
.c-input:last-child{margin-bottom:0;}
.c-input::placeholder{color:var(--tx-3);}
.c-input:focus{border-color:var(--border-hi);}
.c-textarea{min-height:150px;padding:10px;height:auto;line-height:1.6;font-family:var(--mono)!important;font-size:12px!important;resize:vertical;}
.c-check{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);font-size:12px;color:var(--tx-2);margin-bottom:12px;}
.c-check input[type=checkbox]{width:14px;height:14px;accent-color:var(--white);cursor:pointer;}
.c-check label{cursor:pointer;user-select:none;}
.section-hdr{display:flex;justify-content:space-between;align-items:center;}
.section-label{font-size:10px;font-weight:600;color:var(--tx-3);text-transform:uppercase;letter-spacing:.08em;}
.hist-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 11px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);transition:all .13s;}
.hist-item:hover{background:var(--panel);border-color:var(--border-hi);}

/* SETTINGS */
.settings-scroll{flex:1;overflow-y:auto;padding:14px;}
.settings-inner{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:20px;padding-bottom:40px;}
.settings-title{font-size:17px;font-weight:700;letter-spacing:-.025em;}
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
.settings-section-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.settings-section-hdr i{font-size:11px;color:var(--tx-3);width:14px;text-align:center;}
.settings-section-hdr span{font-size:11.5px;font-weight:600;color:var(--tx-2);letter-spacing:.02em;text-transform:uppercase;}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 16px;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-row-left{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;}
.settings-row-label{font-size:13px;font-weight:500;color:var(--tx);}
.settings-row-sub{font-size:11.5px;color:var(--tx-3);line-height:1.5;}
.settings-row-right{flex-shrink:0;display:flex;align-items:center;gap:8px;}

/* TOGGLE */
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:var(--border-2);border-radius:20px;cursor:pointer;transition:background .2s;}
.toggle input:checked + .toggle-track{background:var(--green);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;}
.toggle input:checked ~ .toggle-thumb{transform:translateX(16px);}

/* KEYBIND */
.keybind-display{background:var(--panel);border:1px solid var(--border-2);border-radius:var(--r);padding:4px 10px;font-family:var(--mono);font-size:11.5px;color:var(--tx);min-width:100px;text-align:center;cursor:pointer;transition:all .15s;user-select:none;}
.keybind-display:hover{border-color:var(--border-hi);}
.keybind-display.recording{border-color:var(--blue-hi);background:rgba(59,130,246,.08);color:var(--blue-hi);animation:kb-pulse 1s infinite;}
@keyframes kb-pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* PROFILE */
.profile-avatar{width:42px;height:42px;border-radius:50%;background:var(--panel);border:1px solid var(--border-2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--tx-2);flex-shrink:0;}

/* FONT SIZE */
.font-slider{width:100px;accent-color:var(--blue-hi);cursor:pointer;}
.font-size-label{font-family:var(--mono);font-size:11px;color:var(--tx-3);min-width:32px;text-align:right;}

/* INLINE EDIT */
.inline-edit{background:var(--panel);border:1px solid var(--border-2);color:var(--tx);font-family:var(--font);font-size:12.5px;padding:0 9px;border-radius:var(--r);height:30px;outline:none;transition:border-color .13s;width:160px;}
.inline-edit:focus{border-color:var(--border-hi);}

/* DROP ZONE */
.drop-zone{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);z-index:7000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:.875rem;color:var(--tx);text-align:center;padding:2rem;}
.drop-zone.active{display:flex;}
.drop-zone i{font-size:2.5rem;color:var(--tx-2);}
.drop-zone p{font-size:.95rem;font-weight:500;color:var(--tx-2);}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--panel-2);border:1px solid var(--border-2);padding:8px 14px;border-radius:var(--r-md);color:var(--tx);font-size:12.5px;font-weight:500;z-index:9500;opacity:0;transition:all .2s cubic-bezier(.22,1,.36,1);box-shadow:0 8px 28px rgba(0,0,0,.6);pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* REDIRECT DROPDOWN */
.redir-wrap{position:relative;flex-shrink:0;}
.redir-toggle{background:transparent;border:1px solid transparent;color:var(--tx-3);padding:5px 9px;border-radius:var(--r);font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:5px;height:29px;transition:all .13s;}
.redir-toggle:hover{color:var(--tx-2);background:var(--panel);}
.redir-toggle.open{color:var(--tx);background:var(--panel);border-color:var(--border);}
.redir-arrow{font-size:7px;transition:transform .18s;}
.redir-toggle.open .redir-arrow{transform:rotate(180deg);}
.redir-menu{position:fixed;display:none;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--r-md);padding:4px;z-index:300;min-width:200px;box-shadow:0 16px 50px rgba(0,0,0,.8);animation:pop .14s cubic-bezier(.22,1,.36,1);}
@keyframes pop{from{opacity:0;transform:translateY(5px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.redir-menu.open{display:block;}
.redir-handle{display:none;}
.redir-item{display:flex;align-items:center;gap:8px;padding:7px 10px;color:var(--tx-2);font-size:12px;cursor:pointer;border-radius:3px;transition:background .1s;}
.redir-item:hover{background:var(--panel);color:var(--tx);}
.redir-item i:first-child{width:13px;text-align:center;font-size:11px;color:var(--tx-3);}
.redir-item.redir-item-advanced{border-top:1px solid var(--border);margin-top:3px;padding-top:10px;}
.redir-item.redir-item-advanced i:first-child{color:var(--blue-hi);}
.redir-item.redir-item-advanced:hover{background:rgba(59,130,246,.08);color:var(--tx);}
.redir-ext{margin-left:auto;font-size:8.5px;color:var(--tx-3);opacity:.6;}
.redir-item:hover .redir-ext{opacity:1;}
@media(max-width:639px){
  .redir-menu{position:fixed;left:10px!important;right:10px!important;top:auto!important;bottom:10px!important;min-width:0;}
  .redir-handle{display:block;width:30px;height:3px;background:var(--border-2);border-radius:2px;margin:4px auto 7px;}
}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
.modal-overlay.active{display:flex;}
@media(max-width:599px){
  .modal-overlay{align-items:flex-end;}
  .modal{border-radius:var(--r-xl) var(--r-xl) 0 0;max-height:92vh;width:100%;max-width:100%;}
}
.modal{background:var(--surface);border-radius:var(--r-xl);width:90%;max-width:440px;max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border-2);box-shadow:0 24px 80px rgba(0,0,0,.9);animation:pop .18s cubic-bezier(.22,1,.36,1);}
.modal-hdr{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-hdr h3{margin:0;font-size:13px;font-weight:600;letter-spacing:-.015em;}
.modal-close{background:transparent;border:none;color:var(--tx-3);cursor:pointer;font-size:14px;padding:3px 7px;border-radius:3px;transition:all .13s;line-height:1;}
.modal-close:hover{color:var(--tx);background:var(--panel);}
.modal-body{padding:16px;}
.modal-foot{padding:11px 16px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;}
.f-group{margin-bottom:12px;}
.f-label{display:block;margin-bottom:5px;color:var(--tx-3);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.f-input{width:100%;padding:0 10px;background:var(--panel);border:1px solid var(--border-2);border-radius:var(--r);color:var(--tx);font-size:12.5px;height:32px;font-family:var(--font);outline:none;transition:border-color .13s;-webkit-appearance:none;}
.f-input::placeholder{color:var(--tx-3);}
.f-input:focus{border-color:var(--border-hi);}
textarea.f-input{font-size:12px!important;font-family:var(--mono)!important;line-height:1.6;padding:9px 10px;height:auto;min-height:75px;}
.logo-prev{width:56px;height:56px;border:1px solid var(--border-2);border-radius:var(--r);background:var(--panel);display:flex;align-items:center;justify-content:center;margin-bottom:7px;overflow:hidden;}
.logo-btns{display:flex;gap:5px;flex-wrap:wrap;}
.logo-btn{background:var(--panel);border:1px solid var(--border-2);color:var(--tx-3);padding:0 10px;border-radius:var(--r);font-size:11.5px;font-weight:500;font-family:var(--font);cursor:pointer;display:flex;align-items:center;gap:5px;height:27px;transition:all .13s;}
.logo-btn:hover{border-color:var(--border-hi);color:var(--tx);}
.del-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);margin-bottom:5px;}
.del-info{display:flex;align-items:center;gap:9px;min-width:0;}
.del-logo{width:30px;height:30px;border-radius:5px;object-fit:cover;flex-shrink:0;border:1px solid var(--border-2);}
.del-name{font-weight:600;font-size:12.5px;}
.del-date{font-size:10px;color:var(--tx-3);margin-top:1px;font-family:var(--mono);}
.del-acts{display:flex;gap:5px;flex-shrink:0;}
.runner-modal{max-width:94vw!important;width:94vw!important;height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.runner-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--surface);}
.runner-title{display:flex;align-items:center;gap:9px;}
.runner-logo{width:26px;height:26px;border-radius:5px;object-fit:cover;border:1px solid var(--border-2);}
.runner-iframe{flex:1;border:none;background:#fff;}

/* MOBILE */
.sidebar-backdrop{display:none;}
.mob-sb-btn{display:none;}
@media(max-width:899px){
  .studio-sidebar{position:fixed;left:0;top:0;bottom:0;z-index:200;transform:translateX(-100%);transition:transform .22s cubic-bezier(.22,1,.36,1);box-shadow:0 0 50px rgba(0,0,0,.7);}
  .studio-sidebar.open{transform:translateX(0);}
  .sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:150;display:none;}
  .sidebar-backdrop.show{display:block;}
  .mob-sb-btn{display:flex;background:var(--panel);border:1px solid var(--border-2);color:var(--tx);width:30px;height:30px;border-radius:var(--r);align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
}
@media(max-width:639px){
  .mob-editor-toggle{display:flex !important;}
  .editor-body{flex-direction:column;}
  #preview{border-left:none;border-top:1px solid var(--border);}
  .edit-side{flex:1;}
  #resizer{display:none;}
  .editor-body.v-code .edit-side{flex:1;}
  .editor-body.v-code #preview{display:none;}
  .editor-body.v-preview .edit-side{display:none;}
  .editor-body.v-preview #preview{flex:1;}
  .pad-box{padding:8px;gap:7px;}
}

.custom-frame{width:100%;height:100%;border:none;display:block;}
footer{padding:6px 14px;font-size:10.5px;color:var(--tx-3);background:var(--bg);border-top:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:.5rem;font-family:var(--mono);letter-spacing:.01em;}
footer strong{color:var(--tx-2);font-weight:500;}
footer .f-dot{color:var(--border-hi);}
</style>
</head>
<body>
