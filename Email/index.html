<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTMLTools Mail</title>
<link rel="icon" type="image/png" href="/logo3.png?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
  :root {
    --black:   #0a0a0a;
    --ink:     #111111;
    --ink2:    #1a1a1a;
    --ink3:    #222222;
    --rule:    #2a2a2a;
    --rule2:   #333333;
    --muted:   #555555;
    --dim:     #888888;
    --silver:  #aaaaaa;
    --fog:     #cccccc;
    --white:   #f2f0eb;
    --pure:    #ffffff;
    --red:     #e03030;
    --green:   #27a85a;
    --amber:   #c87c10;
    --blue:    #2060c0;
    --mono:    'DM Mono', monospace;
    --sans:    'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  ::-webkit-scrollbar { width: 2px; }
  ::-webkit-scrollbar-thumb { background: var(--rule2); }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--sans);
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─────────────── GATE ─────────────── */
  #gate { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 0; }
  #gate.hidden { display: none; }

  .gate-top {
    border: 1px solid var(--rule2);
    border-bottom: none;
    border-radius: 2px 2px 0 0;
    padding: 2rem 2rem 1.5rem;
    background: var(--ink);
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .gate-logo-img { width: 36px; height: 36px; object-fit: contain; }
  .gate-wordmark { display: flex; flex-direction: column; gap: 0; }
  .gate-wordmark-top { font-family: var(--mono); font-size: .6rem; font-weight: 400; color: var(--muted); letter-spacing: .15em; text-transform: uppercase; }
  .gate-wordmark-main { font-family: var(--mono); font-size: 1rem; font-weight: 500; color: var(--white); letter-spacing: -.01em; }

  .gate-body {
    border: 1px solid var(--rule2);
    border-radius: 0 0 2px 2px;
    padding: 1.75rem 2rem 2rem;
    background: var(--ink2);
    display: flex;
    flex-direction: column;
    gap: .75rem;
  }
  .gate-heading { font-size: 1.3rem; font-weight: 600; letter-spacing: -.03em; color: var(--white); margin-bottom: .25rem; }
  .gate-sub { font-family: var(--mono); font-size: .68rem; color: var(--muted); letter-spacing: .03em; margin-bottom: .5rem; }

  .g-field { display: flex; flex-direction: column; gap: .35rem; }
  .g-label { font-family: var(--mono); font-size: .6rem; font-weight: 500; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
  .g-input {
    padding: .72rem .9rem;
    background: var(--black);
    border: 1px solid var(--rule2);
    border-radius: 2px;
    color: var(--white);
    font-size: .88rem;
    font-family: var(--mono);
    outline: none;
    transition: border-color .15s;
  }
  .g-input:focus { border-color: var(--fog); }
  .g-input::placeholder { color: var(--muted); }
  .g-btn {
    margin-top: .25rem;
    padding: .82rem;
    background: var(--white);
    border: none;
    border-radius: 2px;
    color: var(--black);
    font-size: .85rem;
    font-weight: 700;
    font-family: var(--sans);
    cursor: pointer;
    letter-spacing: .01em;
    transition: background .15s, transform .1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
  }
  .g-btn:hover { background: var(--pure); transform: translateY(-1px); }
  .g-err {
    display: none;
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--red);
    padding: .55rem .75rem;
    border: 1px solid rgba(224,48,48,.25);
    border-radius: 2px;
    background: rgba(224,48,48,.06);
  }

  /* ─────────────── SHELL ─────────────── */
  #shell { display: none; width: 100vw; height: 100vh; flex-direction: column; }
  #shell.show { display: flex; }

  /* ─────────────── TOPBAR ─────────────── */
  .topbar {
    height: 48px;
    min-height: 48px;
    background: var(--ink);
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    padding: 0 1rem;
    gap: 1rem;
  }
  .tbar-brand {
    display: flex;
    align-items: center;
    gap: .55rem;
    border-right: 1px solid var(--rule);
    padding-right: 1rem;
    margin-right: .25rem;
    height: 100%;
  }
  .tbar-logo { width: 22px; height: 22px; object-fit: contain; }
  .tbar-name { font-family: var(--mono); font-size: .75rem; font-weight: 500; color: var(--white); letter-spacing: .02em; white-space: nowrap; }
  .tbar-name span { color: var(--dim); }

  .tbar-search {
    flex: 1;
    max-width: 420px;
    position: relative;
  }
  .tbar-search input {
    width: 100%;
    padding: .38rem .9rem .38rem 2.1rem;
    background: var(--ink2);
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--white);
    font-size: .78rem;
    font-family: var(--mono);
    outline: none;
    transition: border-color .15s;
  }
  .tbar-search input:focus { border-color: var(--rule2); }
  .tbar-search input::placeholder { color: var(--muted); }
  .tbar-search .si { position: absolute; left: .72rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: .7rem; pointer-events: none; }
  .tbar-right { margin-left: auto; display: flex; align-items: center; gap: .65rem; }
  .tbar-status {
    display: flex;
    align-items: center;
    gap: .35rem;
    font-family: var(--mono);
    font-size: .6rem;
    color: var(--muted);
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  .tbar-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
  .tbar-user {
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--dim);
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: .28rem .65rem;
  }
  .tbar-signout {
    font-family: var(--mono);
    font-size: .65rem;
    color: var(--muted);
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: .28rem .65rem;
    cursor: pointer;
    transition: color .15s, border-color .15s;
    letter-spacing: .04em;
  }
  .tbar-signout:hover { color: var(--red); border-color: rgba(224,48,48,.4); }

  /* ─────────────── MAIN LAYOUT ─────────────── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ─────────────── SIDEBAR ─────────────── */
  .sidebar {
    width: 200px;
    min-width: 200px;
    background: var(--ink);
    border-right: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    padding: 1rem .75rem;
  }
  .compose-btn {
    margin-bottom: .85rem;
    padding: .7rem 1rem;
    background: var(--white);
    border: none;
    border-radius: 2px;
    color: var(--black);
    font-size: .78rem;
    font-weight: 700;
    font-family: var(--sans);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: .45rem;
    justify-content: center;
    letter-spacing: .02em;
    transition: background .15s, transform .1s;
  }
  .compose-btn:hover { background: var(--pure); transform: translateY(-1px); }

  .nav-section-label {
    font-family: var(--mono);
    font-size: .55rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: .5rem .5rem .35rem;
    margin-top: .25rem;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: .6rem;
    padding: .48rem .6rem;
    border-radius: 2px;
    font-size: .78rem;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: color .12s, background .12s;
    user-select: none;
    border: 1px solid transparent;
    letter-spacing: .01em;
  }
  .nav-item:hover { color: var(--silver); background: var(--ink2); }
  .nav-item.active { color: var(--white); background: var(--ink2); border-color: var(--rule); }
  .nav-item .ni { width: 13px; text-align: center; font-size: .72rem; opacity: .7; }
  .nav-item.active .ni { opacity: 1; }
  .nav-badge {
    margin-left: auto;
    background: var(--white);
    color: var(--black);
    font-family: var(--mono);
    font-size: .55rem;
    font-weight: 500;
    padding: .1rem .35rem;
    border-radius: 1px;
    min-width: 16px;
    text-align: center;
    display: none;
  }
  .nav-badge.show { display: block; }
  .sb-rule { height: 1px; background: var(--rule); margin: .65rem 0; }

  /* ─────────────── LIST PANE ─────────────── */
  .list-pane {
    width: 300px;
    min-width: 260px;
    border-right: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--ink);
  }
  .list-header {
    padding: .65rem 1rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: .5rem;
    min-height: 44px;
  }
  .list-title {
    font-family: var(--mono);
    font-size: .7rem;
    font-weight: 500;
    color: var(--silver);
    letter-spacing: .08em;
    text-transform: uppercase;
    flex: 1;
  }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--muted);
    padding: .25rem .5rem;
    font-size: .65rem;
    cursor: pointer;
    font-family: var(--mono);
    transition: color .12s, border-color .12s;
  }
  .refresh-btn:hover { color: var(--silver); border-color: var(--rule2); }
  .refresh-btn.spin i { animation: spin .55s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .email-list { flex: 1; overflow-y: auto; }
  .email-row {
    padding: .85rem 1rem;
    border-bottom: 1px solid var(--rule);
    cursor: pointer;
    transition: background .08s;
    position: relative;
  }
  .email-row:hover { background: var(--ink2); }
  .email-row.active { background: var(--ink2); border-left: 2px solid var(--white); padding-left: calc(1rem - 2px); }
  .er-top { display: flex; align-items: center; gap: .4rem; margin-bottom: .28rem; }
  .er-unread { width: 5px; height: 5px; border-radius: 50%; background: var(--white); flex-shrink: 0; }
  .er-from { font-size: .76rem; font-weight: 600; color: var(--fog); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .er-from.read { font-weight: 400; color: var(--dim); }
  .er-date { font-family: var(--mono); font-size: .6rem; color: var(--muted); flex-shrink: 0; }
  .er-subject { font-size: .72rem; color: var(--silver); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: .2rem; font-weight: 400; }
  .er-subject.bold { font-weight: 600; color: var(--white); }
  .er-snippet { font-family: var(--mono); font-size: .62rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .er-pill {
    display: inline-flex;
    align-items: center;
    gap: .2rem;
    font-family: var(--mono);
    font-size: .55rem;
    font-weight: 500;
    padding: .1rem .38rem;
    border-radius: 1px;
    margin-top: .3rem;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .er-pill.delivered { background: rgba(39,168,90,.12); color: var(--green); border: 1px solid rgba(39,168,90,.2); }
  .er-pill.sent { background: rgba(242,240,235,.07); color: var(--dim); border: 1px solid var(--rule); }
  .er-pill.bounced { background: rgba(224,48,48,.1); color: var(--red); border: 1px solid rgba(224,48,48,.2); }

  .empty-list { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty-list i { font-size: 1.5rem; display: block; margin-bottom: .6rem; opacity: .3; }
  .empty-list p { font-family: var(--mono); font-size: .68rem; letter-spacing: .04em; }

  /* ─────────────── DETAIL PANE ─────────────── */
  .detail-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--black);
  }
  .detail-scroll { flex: 1; overflow-y: auto; }
  .detail-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: .75rem;
    color: var(--rule2);
  }
  .detail-empty i { font-size: 2.5rem; }
  .detail-empty p { font-family: var(--mono); font-size: .68rem; letter-spacing: .06em; color: var(--muted); }

  .detail-hero {
    padding: 1.5rem 1.75rem 1.25rem;
    border-bottom: 1px solid var(--rule);
  }
  .detail-subject {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: -.025em;
    line-height: 1.3;
    color: var(--white);
    margin-bottom: .85rem;
  }
  .detail-meta-grid { display: grid; grid-template-columns: auto 1fr; gap: .3rem .8rem; align-items: baseline; margin-bottom: .65rem; }
  .dm-key { font-family: var(--mono); font-size: .58rem; font-weight: 500; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
  .dm-val { font-size: .76rem; color: var(--silver); }
  .dm-val strong { color: var(--fog); font-weight: 500; }
  .detail-date-row { display: flex; align-items: center; gap: 1rem; }
  .detail-date { font-family: var(--mono); font-size: .62rem; color: var(--muted); }
  .detail-status-chip {
    display: inline-flex;
    align-items: center;
    gap: .25rem;
    font-family: var(--mono);
    font-size: .58rem;
    font-weight: 500;
    padding: .18rem .5rem;
    border-radius: 1px;
    letter-spacing: .05em;
    text-transform: uppercase;
  }
  .detail-status-chip.delivered { background: rgba(39,168,90,.1); color: var(--green); border: 1px solid rgba(39,168,90,.2); }
  .detail-status-chip.sent { background: rgba(242,240,235,.05); color: var(--dim); border: 1px solid var(--rule); }
  .detail-status-chip.bounced { background: rgba(224,48,48,.1); color: var(--red); border: 1px solid rgba(224,48,48,.2); }

  .detail-body { padding: 1.5rem 1.75rem; }
  .detail-body iframe { width: 100%; border: none; border-radius: 2px; background: var(--pure); display: block; }
  .plain-body { font-family: var(--mono); font-size: .82rem; line-height: 1.8; color: var(--silver); white-space: pre-wrap; word-break: break-word; }
  .plain-body a { color: var(--fog); text-decoration: underline; text-decoration-color: var(--rule2); text-underline-offset: 3px; }
  .plain-body a:hover { color: var(--white); }

  /* ─────────────── COMPOSE MODAL ─────────────── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.8);
    z-index: 100;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 1rem;
  }
  .overlay.show { display: flex; }
  .compose-modal {
    width: 100%;
    max-width: 500px;
    background: var(--ink);
    border: 1px solid var(--rule2);
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    max-height: 88vh;
    box-shadow: 0 30px 80px rgba(0,0,0,.9);
    animation: riseUp .18s cubic-bezier(.16,1,.3,1);
  }
  @keyframes riseUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .cm-head {
    padding: .65rem 1rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--ink2);
  }
  .cm-title { font-family: var(--mono); font-size: .62rem; font-weight: 500; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
  .cm-x { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: .85rem; padding: .15rem; transition: color .12s; }
  .cm-x:hover { color: var(--white); }

  .cm-field { display: flex; align-items: center; border-bottom: 1px solid var(--rule); padding: .52rem 1rem; gap: .6rem; }
  .cm-label { font-family: var(--mono); font-size: .58rem; font-weight: 500; color: var(--muted); min-width: 46px; letter-spacing: .1em; text-transform: uppercase; }
  .cm-field input, .cm-field select { flex: 1; background: transparent; border: none; color: var(--white); font-size: .82rem; font-family: var(--sans); outline: none; }
  .cm-field input::placeholder { color: var(--muted); }
  .cm-field select option { background: var(--ink); color: var(--white); }

  /* suffix hint for the From field */
  .cm-from-wrap { flex: 1; display: flex; align-items: center; gap: .3rem; }
  .cm-from-suffix { font-family: var(--mono); font-size: .78rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

  .cm-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .cm-type-row { display: flex; gap: .3rem; padding: .5rem 1rem; border-bottom: 1px solid var(--rule); }
  .cm-tab {
    padding: .25rem .6rem;
    border: 1px solid var(--rule);
    border-radius: 1px;
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: .65rem;
    cursor: pointer;
    transition: all .12s;
    letter-spacing: .04em;
  }
  .cm-tab.active { border-color: var(--rule2); color: var(--white); background: var(--ink2); }

  .cm-toolbar { display: flex; gap: .25rem; padding: .42rem 1rem; border-bottom: 1px solid var(--rule); flex-wrap: wrap; }
  .cm-tb {
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 1px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: .63rem;
    padding: .25rem .55rem;
    cursor: pointer;
    transition: all .12s;
    display: flex;
    align-items: center;
    gap: .25rem;
  }
  .cm-tb:hover { color: var(--white); border-color: var(--rule2); }

  .cm-chips { display: flex; flex-wrap: wrap; gap: .3rem; padding: 0 1rem .4rem; }
  .cm-chip { background: var(--ink2); border: 1px solid var(--rule); border-radius: 1px; padding: .18rem .45rem; font-family: var(--mono); font-size: .62rem; color: var(--dim); display: flex; align-items: center; gap: .3rem; }
  .cm-chip img { width: 14px; height: 14px; border-radius: 1px; object-fit: cover; }
  .cm-chip-rm { color: var(--muted); cursor: pointer; transition: color .12s; }
  .cm-chip-rm:hover { color: var(--red); }

  .cm-textarea {
    flex: 1;
    width: 100%;
    min-height: 170px;
    padding: .9rem 1rem;
    background: transparent;
    border: none;
    color: var(--white);
    font-size: .84rem;
    font-family: var(--sans);
    outline: none;
    resize: none;
    line-height: 1.65;
  }
  .cm-textarea::placeholder { color: var(--muted); }
  .cm-preview-frame { width: 100%; border: none; border-top: 1px solid var(--rule); background: var(--pure); min-height: 130px; display: none; }
  .cm-preview-frame.show { display: block; }

  .cm-footer { display: flex; align-items: center; gap: .5rem; padding: .7rem 1rem; border-top: 1px solid var(--rule); background: var(--ink2); }
  .cm-send {
    padding: .58rem 1.1rem;
    background: var(--white);
    border: none;
    border-radius: 2px;
    color: var(--black);
    font-size: .78rem;
    font-weight: 700;
    font-family: var(--sans);
    cursor: pointer;
    transition: background .12s, transform .1s;
    display: flex;
    align-items: center;
    gap: .38rem;
    letter-spacing: .01em;
  }
  .cm-send:hover { background: var(--pure); transform: translateY(-1px); }
  .cm-send:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .cm-prev-btn {
    padding: .58rem .8rem;
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: .65rem;
    cursor: pointer;
    transition: all .12s;
  }
  .cm-prev-btn:hover { color: var(--white); border-color: var(--rule2); }
  .cm-status { flex: 1; font-family: var(--mono); font-size: .65rem; padding: .3rem .6rem; border-radius: 1px; display: none; }
  .cm-status.ok { display: block; background: rgba(39,168,90,.1); color: var(--green); border: 1px solid rgba(39,168,90,.2); }
  .cm-status.err { display: block; background: rgba(224,48,48,.08); color: var(--red); border: 1px solid rgba(224,48,48,.2); }

  /* ─────────────── ACCESS PANEL ─────────────── */
  .access-pane { flex: 1; overflow-y: auto; padding: 1.5rem 1.75rem; display: flex; flex-direction: column; gap: 1.5rem; }
  .access-block { display: flex; flex-direction: column; gap: .75rem; }
  .access-block-title {
    font-family: var(--mono);
    font-size: .62rem;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: .12em;
    text-transform: uppercase;
    padding-bottom: .55rem;
    border-bottom: 1px solid var(--rule);
  }
  .af-input {
    width: 100%;
    padding: .62rem .85rem;
    background: var(--ink);
    border: 1px solid var(--rule);
    border-radius: 2px;
    color: var(--white);
    font-size: .82rem;
    font-family: var(--mono);
    outline: none;
    transition: border-color .12s;
  }
  .af-input:focus { border-color: var(--rule2); }
  .af-input::placeholder { color: var(--muted); }
  .af-hint { font-family: var(--mono); font-size: .62rem; color: var(--muted); letter-spacing: .02em; }
  .af-btn {
    padding: .6rem 1.1rem;
    background: var(--white);
    border: none;
    border-radius: 2px;
    color: var(--black);
    font-size: .78rem;
    font-weight: 700;
    font-family: var(--sans);
    cursor: pointer;
    align-self: flex-start;
    transition: background .12s;
    display: flex;
    align-items: center;
    gap: .35rem;
  }
  .af-btn:hover { background: var(--pure); }
  .af-status { font-family: var(--mono); font-size: .65rem; padding: .3rem .6rem; border-radius: 1px; display: none; }
  .af-status.ok { display: block; background: rgba(39,168,90,.1); color: var(--green); border: 1px solid rgba(39,168,90,.2); }
  .af-status.err { display: block; background: rgba(224,48,48,.08); color: var(--red); border: 1px solid rgba(224,48,48,.2); }

  .user-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .75rem;
    padding: .72rem .9rem;
    border: 1px solid var(--rule);
    border-radius: 2px;
    background: var(--ink);
    transition: border-color .12s;
  }
  .user-row:hover { border-color: var(--rule2); }
  .ur-email { font-size: .78rem; font-weight: 500; color: var(--fog); margin-bottom: .18rem; }
  .ur-senders { font-family: var(--mono); font-size: .6rem; color: var(--muted); }
  .ur-revoke {
    padding: .25rem .6rem;
    border: 1px solid rgba(224,48,48,.25);
    background: transparent;
    color: var(--red);
    font-family: var(--mono);
    font-size: .62rem;
    border-radius: 1px;
    cursor: pointer;
    transition: background .12s;
    white-space: nowrap;
  }
  .ur-revoke:hover { background: rgba(224,48,48,.08); }
  .access-empty {
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--muted);
    text-align: center;
    padding: 1.5rem;
    border: 1px dashed var(--rule);
    border-radius: 2px;
    letter-spacing: .04em;
  }
</style>
</head>
<body>

<!-- ── GATE ── -->
<div id="gate">
  <div class="gate-top">
    <img src="/logo3.png?v=2" class="gate-logo-img" alt="logo" onerror="this.style.display='none'">
    <div class="gate-wordmark">
      <div class="gate-wordmark-top">HTMLTools</div>
      <div class="gate-wordmark-main">Mail</div>
    </div>
  </div>
  <div class="gate-body">
    <div class="gate-heading">Sign in</div>
    <div class="gate-sub">Access restricted to authorised users.</div>
    <div class="g-field">
      <label class="g-label">Email</label>
      <input type="email" id="g-email" class="g-input" placeholder="you@example.com" />
    </div>
    <div class="g-field">
      <label class="g-label">Password</label>
      <input type="password" id="g-pass" class="g-input" placeholder="••••••••" />
    </div>
    <button class="g-btn" id="login-btn"><i class="fas fa-arrow-right"></i> Continue</button>
    <div class="g-err" id="g-err"></div>
  </div>
</div>

<!-- ── SHELL ── -->
<div id="shell">
  <div class="topbar">
    <div class="tbar-brand">
      <img src="/logo3.png?v=2" class="tbar-logo" alt="logo" onerror="this.style.display='none'">
      <span class="tbar-name">HTML<span>Tools</span> Mail</span>
    </div>
    <div class="tbar-search">
      <i class="fas fa-search si"></i>
      <input type="text" id="search-input" placeholder="search mail..." oninput="filterEmails()" />
    </div>
    <div class="tbar-right">
      <div class="tbar-status"><span class="tbar-dot"></span> live</div>
      <div class="tbar-user" id="user-label"></div>
      <button class="tbar-signout" id="signout-btn">sign out</button>
    </div>
  </div>

  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <button class="compose-btn" onclick="openCompose()"><i class="fas fa-pen"></i> Compose</button>
      <div class="nav-section-label">Mailbox</div>
      <div class="nav-item active" id="nav-inbox" onclick="switchView('inbox')">
        <i class="fas fa-inbox ni"></i> Inbox
        <span class="nav-badge" id="inbox-badge"></span>
      </div>
      <div class="nav-item" id="nav-sent" onclick="switchView('sent')">
        <i class="fas fa-paper-plane ni"></i> Sent
      </div>
      <div class="sb-rule"></div>
      <div class="nav-item" id="nav-access" onclick="switchView('access')" style="display:none;">
        <i class="fas fa-users-cog ni"></i> Access
      </div>
    </div>

    <!-- LIST PANE -->
    <div class="list-pane">
      <div class="list-header">
        <span class="list-title" id="list-title">Inbox</span>
        <button class="refresh-btn" id="refresh-btn" onclick="loadCurrentView()"><i class="fas fa-rotate-right"></i></button>
      </div>
      <div class="email-list" id="email-list">
        <div class="empty-list"><i class="fas fa-circle-notch fa-spin"></i><p>Loading...</p></div>
      </div>
    </div>

    <!-- DETAIL PANE -->
    <div class="detail-pane" id="detail-pane">
      <div class="detail-empty">
        <i class="fas fa-envelope-open"></i>
        <p>No message selected</p>
      </div>
    </div>
  </div>
</div>

<!-- ── COMPOSE ── -->
<div class="overlay" id="compose-overlay" onclick="overlayClick(event)">
  <div class="compose-modal">
    <div class="cm-head">
      <span class="cm-title">New Message</span>
      <button class="cm-x" onclick="closeCompose()"><i class="fas fa-times"></i></button>
    </div>
    <div class="cm-field">
      <span class="cm-label">From</span>
      <div class="cm-from-wrap">
        <input type="text" id="cm-from" placeholder="username" autocomplete="off" autocapitalize="off" spellcheck="false" />
        <span class="cm-from-suffix">@htmltools.me</span>
      </div>
    </div>
    <div class="cm-field">
      <span class="cm-label">To</span>
      <input type="email" id="cm-to" placeholder="recipient@example.com" />
    </div>
    <div class="cm-field">
      <span class="cm-label">Subject</span>
      <input type="text" id="cm-subject" placeholder="Subject..." />
    </div>
    <div class="cm-scroll">
      <div class="cm-type-row">
        <button class="cm-tab active" id="cm-tab-normal" onclick="setCmType('normal')">Normal</button>
        <button class="cm-tab" id="cm-tab-html" onclick="setCmType('html')">HTML</button>
      </div>
      <div class="cm-toolbar" id="cm-toolbar">
        <button class="cm-tb" onclick="cmLink()"><i class="fas fa-link"></i> Link</button>
        <button class="cm-tb" onclick="document.getElementById('cm-img-in').click()"><i class="fas fa-image"></i> Image</button>
        <input type="file" id="cm-img-in" accept="image/*" multiple style="display:none" onchange="cmHandleImages(event)" />
      </div>
      <div class="cm-chips" id="cm-chips"></div>
      <textarea class="cm-textarea" id="cm-body" placeholder="Write your message..."></textarea>
      <iframe class="cm-preview-frame" id="cm-preview" sandbox="allow-same-origin"></iframe>
    </div>
    <div class="cm-footer">
      <button class="cm-send" id="cm-send-btn" onclick="cmSend()"><i class="fas fa-paper-plane"></i> Send</button>
      <button class="cm-prev-btn" id="cm-prev-btn" onclick="cmTogglePreview()" style="display:none;">Preview</button>
      <div class="cm-status" id="cm-status"></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const SUPER_ADMIN = 'matthewbozhe@gmail.com';
  const WORKER = 'https://htmltools-reset.bozhetarnikmatthew.workers.dev/';

  const firebaseConfig = {
    apiKey: "AIzaSyD8KINd1CV5wl3TEisGliE4R5ng_w-apjA",
    authDomain: "htmltools2.firebaseapp.com",
    databaseURL: "https://htmltools2-default-rtdb.firebaseio.com",
    projectId: "htmltools2",
    storageBucket: "htmltools2.firebasestorage.app",
    messagingSenderId: "61467480060",
    appId: "1:61467480060:web:4f964a671a5623d10e2c79",
    measurementId: "G-5KJ8DE63ZC"
  };

  const fbApp = initializeApp(firebaseConfig);
  const auth = getAuth(fbApp);
  const db = getDatabase(fbApp);

  let currentView = 'inbox';
  let allEmails = [];
  let readIds = new Set(JSON.parse(localStorage.getItem('ht_readIds') || '[]'));
  let currentEmail = null;
  let cmType = 'normal';
  let cmImgs = [];
  let cmPreviewOpen = false;
  let allowedSenders = [];
  let isSuperAdmin = false;

  // ── Auth ──
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('g-email').value.trim();
    const pass = document.getElementById('g-pass').value;
    const err = document.getElementById('g-err');
    err.style.display = 'none';
    if (!email || !pass) { err.textContent = 'Please fill in both fields.'; err.style.display = 'block'; return; }
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch(e) { err.textContent = e.message.replace('Firebase: ','').replace(/\(.*\)/,'').trim(); err.style.display = 'block'; }
  });
  document.getElementById('g-pass').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-btn').click(); });
  document.getElementById('signout-btn').addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, async user => {
    if (!user) {
      document.getElementById('gate').classList.remove('hidden');
      document.getElementById('shell').classList.remove('show');
      return;
    }
    const email = user.email.toLowerCase();
    if (email === SUPER_ADMIN.toLowerCase()) {
      isSuperAdmin = true;
      allowedSenders = ['noreply', 'matthew', 'kovan'];
      showShell(user);
      document.getElementById('nav-access').style.display = 'flex';
    } else {
      const key = dbKey(email);
      const snap = await get(ref(db, `mailAccess/${key}`));
      if (snap.exists()) {
        allowedSenders = snap.val().senders || [];
        showShell(user);
        onValue(ref(db, `mailAccess/${key}`), s => {
          if (!s.exists()) { signOut(auth); alert('Your access has been revoked.'); }
          else { allowedSenders = s.val().senders || []; rebuildFrom(); }
        });
      } else {
        await signOut(auth);
        const err = document.getElementById('g-err');
        err.textContent = 'You do not have access to this tool.';
        err.style.display = 'block';
      }
    }
  });

  function dbKey(email) { return email.replace(/\./g, '_').replace(/@/g, '__at__'); }

  function showShell(user) {
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('shell').classList.add('show');
    document.getElementById('user-label').textContent = user.email;
    rebuildFrom();
    loadInbox();
  }

  function rebuildFrom() {
    // Set a default username in the From input based on the first allowed sender
    const senders = isSuperAdmin ? ['noreply', 'matthew', 'kovan'] : allowedSenders;
    const input = document.getElementById('cm-from');
    if (input && !input.value && senders.length > 0) {
      input.value = senders[0];
    }
  }

  // ── Views ──
  window.switchView = function(view) {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-' + view)?.classList.add('active');
    document.getElementById('list-title').textContent = { inbox: 'Inbox', sent: 'Sent', access: 'Access' }[view] || view;
    clearDetail();
    if (view === 'inbox') loadInbox();
    else if (view === 'sent') loadSent();
    else if (view === 'access') loadAccess();
  };
  window.loadCurrentView = function() { switchView(currentView); };

  function clearDetail() {
    currentEmail = null;
    document.getElementById('detail-pane').innerHTML = '<div class="detail-empty"><i class="fas fa-envelope-open"></i><p>No message selected</p></div>';
  }

  async function api(body) {
    const r = await fetch(WORKER, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return r.json();
  }
  function spin(on) { document.getElementById('refresh-btn').classList.toggle('spin', on); }

  async function loadInbox() {
    spin(true);
    document.getElementById('email-list').innerHTML = '<div class="empty-list"><i class="fas fa-circle-notch fa-spin"></i><p>Loading...</p></div>';
    try {
      const data = await api({ type: 'get_inbox' });
      allEmails = (data.emails || []).sort((a,b) => new Date(b.date)-new Date(a.date));
      renderList();
    } catch(e) { document.getElementById('email-list').innerHTML = `<div class="empty-list"><i class="fas fa-triangle-exclamation"></i><p>${e.message}</p></div>`; }
    spin(false);
  }

  async function loadSent() {
    spin(true);
    document.getElementById('email-list').innerHTML = '<div class="empty-list"><i class="fas fa-circle-notch fa-spin"></i><p>Loading...</p></div>';
    try {
      const data = await api({ type: 'get_sent' });
      allEmails = (data.emails || []).sort((a,b) => new Date(b.date)-new Date(a.date));
      renderList();
    } catch(e) { document.getElementById('email-list').innerHTML = `<div class="empty-list"><i class="fas fa-triangle-exclamation"></i><p>${e.message}</p></div>`; }
    spin(false);
  }

  function renderList(q) {
    const el = document.getElementById('email-list');
    let list = allEmails;
    if (q) { const lq = q.toLowerCase(); list = list.filter(e => [e.from,e.subject,e.snippet,e.to].some(f=>(f||'').toLowerCase().includes(lq))); }
    if (!list.length) { el.innerHTML = '<div class="empty-list"><i class="fas fa-inbox"></i><p>Nothing here.</p></div>'; updateBadge(0); return; }
    if (currentView === 'inbox') updateBadge(list.filter(e => !readIds.has(e.id)).length);
    else updateBadge(0);
    el.innerHTML = '';
    list.forEach(email => {
      const unread = currentView === 'inbox' && !readIds.has(email.id);
      const row = document.createElement('div');
      row.className = 'email-row' + (currentEmail?.id === email.id ? ' active' : '');
      const fromDisplay = currentView === 'sent' ? (email.to || '') : (email.from || '');
      let pillHtml = '';
      if (currentView === 'sent' && email.status) pillHtml = `<div class="er-pill ${email.status}">${email.status}</div>`;
      row.innerHTML = `
        <div class="er-top">
          ${unread ? '<span class="er-unread"></span>' : ''}
          <span class="er-from${unread ? '' : ' read'}">${esc(fromDisplay)}</span>
          <span class="er-date">${fmtDate(email.date)}</span>
        </div>
        <div class="er-subject${unread ? ' bold' : ''}">${esc(email.subject || '(no subject)')}</div>
        <div class="er-snippet">${esc(email.snippet || '')}</div>
        ${pillHtml}
      `;
      row.addEventListener('click', () => openEmail(email, row));
      el.appendChild(row);
    });
  }

  function updateBadge(n) {
    const b = document.getElementById('inbox-badge');
    if (n > 0) { b.textContent = n > 99 ? '99+' : n; b.classList.add('show'); }
    else b.classList.remove('show');
  }
  window.filterEmails = function() { renderList(document.getElementById('search-input').value.trim() || undefined); };

  async function openEmail(email, row) {
    document.querySelectorAll('.email-row').forEach(r => r.classList.remove('active'));
    row.classList.add('active');
    currentEmail = email;
    if (currentView === 'inbox' && !readIds.has(email.id)) {
      readIds.add(email.id);
      localStorage.setItem('ht_readIds', JSON.stringify([...readIds]));
      renderList(document.getElementById('search-input').value.trim() || undefined);
    }
    const pane = document.getElementById('detail-pane');
    pane.innerHTML = '<div class="detail-empty"><i class="fas fa-circle-notch fa-spin"></i><p>Loading...</p></div>';
    let full = { ...email };
    try { const d = await api({ type: 'get_email', id: email.id }); if (d.success && d.email) full = { ...email, ...d.email }; } catch(e) {}

    const toVal = Array.isArray(full.to) ? full.to.join(', ') : (full.to || '');
    const dateStr = full.date ? new Date(full.date).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' }) : '';
    const hasHtml = !!(full.html);
    const rawBody = full.html || full.text || '';
    let statusHtml = '';
    if (currentView === 'sent' && full.status) {
      statusHtml = `<span class="detail-status-chip ${full.status}">${full.status}</span>`;
    }

    pane.innerHTML = `
      <div class="detail-scroll">
        <div class="detail-hero">
          <div class="detail-subject">${esc(full.subject || '(no subject)')}</div>
          <div class="detail-meta-grid">
            <span class="dm-key">From</span><span class="dm-val"><strong>${esc(full.from || '')}</strong></span>
            <span class="dm-key">To</span><span class="dm-val">${esc(toVal)}</span>
          </div>
          <div class="detail-date-row">
            <span class="detail-date">${dateStr}</span>
            ${statusHtml}
          </div>
        </div>
        <div class="detail-body" id="detail-body"></div>
      </div>
    `;

    const bodyEl = document.getElementById('detail-body');
    if (rawBody) {
      if (hasHtml) {
        const frame = document.createElement('iframe');
        frame.style.cssText = 'width:100%;border:none;border-radius:2px;background:#fff;min-height:300px;display:block;';
        frame.sandbox = 'allow-same-origin allow-popups allow-popups-to-escape-sandbox';
        bodyEl.appendChild(frame);
        const doc = frame.contentDocument || frame.contentWindow.document;
        const injected = rawBody.includes('<head>') ? rawBody.replace('<head>', '<head><base target="_blank">') : '<base target="_blank">' + rawBody;
        doc.open(); doc.write(injected); doc.close();
        setTimeout(() => {
          try {
            frame.contentDocument.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.rel = 'noopener noreferrer'; });
            frame.style.height = (frame.contentDocument.body.scrollHeight + 40) + 'px';
          } catch(e) {}
        }, 300);
      } else {
        const linked = rawBody.replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
        bodyEl.innerHTML = `<div class="plain-body">${linked}</div>`;
      }
    } else {
      bodyEl.innerHTML = '<p style="font-family:var(--mono);font-size:.72rem;color:var(--muted);">No content.</p>';
    }
  }

  // ── Access ──
  function loadAccess() {
    document.getElementById('email-list').innerHTML = '<div class="empty-list"><i class="fas fa-users-cog"></i><p>Manage in panel →</p></div>';
    renderAccessPane();
    onValue(ref(db, 'mailAccess'), snap => {
      window._accessSnap = snap.val() || {};
      if (currentView === 'access') renderAccessPane();
    });
  }

  function renderAccessPane() {
    const data = window._accessSnap || {};
    const entries = Object.entries(data);
    const pane = document.getElementById('detail-pane');
    pane.innerHTML = `
      <div class="access-pane">
        <div class="access-block">
          <div class="access-block-title">Grant Access</div>
          <input type="email" id="ac-email" class="af-input" placeholder="user@gmail.com" />
          <input type="text" id="ac-senders" class="af-input" placeholder="noreply,matthew,kovan" />
          <div class="af-hint">Comma-separated usernames — no @htmltools.me needed</div>
          <button class="af-btn" onclick="grantAccess()"><i class="fas fa-plus"></i> Grant Access</button>
          <div class="af-status" id="af-status"></div>
        </div>
        <div class="access-block">
          <div class="access-block-title">Active Users — ${entries.length}</div>
          <div id="ac-list">
            ${entries.length === 0
              ? '<div class="access-empty">No users granted access yet.</div>'
              : entries.map(([key, val]) => `
                <div class="user-row">
                  <div>
                    <div class="ur-email">${esc(val.email)}</div>
                    <div class="ur-senders">${(val.senders||[]).map(s => s + '@htmltools.me').join(' · ')}</div>
                  </div>
                  <button class="ur-revoke" onclick="revokeAccess('${key}','${esc(val.email)}')">Revoke</button>
                </div>
              `).join('')}
          </div>
        </div>
      </div>
    `;
  }

  window.grantAccess = async function() {
    const emailVal = document.getElementById('ac-email').value.trim().toLowerCase();
    const sendersRaw = document.getElementById('ac-senders').value.trim();
    const statusEl = document.getElementById('af-status');
    statusEl.className = 'af-status'; statusEl.textContent = '';
    if (!emailVal) { statusEl.textContent = 'Enter a user email.'; statusEl.className = 'af-status err'; return; }
    if (!sendersRaw) { statusEl.textContent = 'Enter at least one sender.'; statusEl.className = 'af-status err'; return; }
    const senders = sendersRaw.split(',').map(s => s.trim().toLowerCase().replace('@htmltools.me','')).filter(Boolean);
    const key = dbKey(emailVal);
    try {
      await set(ref(db, `mailAccess/${key}`), { email: emailVal, senders });
      statusEl.textContent = `Access granted to ${emailVal}`; statusEl.className = 'af-status ok';
      document.getElementById('ac-email').value = '';
      document.getElementById('ac-senders').value = '';
      const snap = await get(ref(db, 'mailAccess'));
      window._accessSnap = snap.val() || {};
      renderAccessPane();
    } catch(e) { statusEl.textContent = e.message; statusEl.className = 'af-status err'; }
  };

  window.revokeAccess = async function(key, email) {
    if (!confirm(`Revoke access for ${email}?`)) return;
    try {
      await remove(ref(db, `mailAccess/${key}`));
      const snap = await get(ref(db, 'mailAccess'));
      window._accessSnap = snap.val() || {};
      renderAccessPane();
    } catch(e) { alert('Error: ' + e.message); }
  };

  // ── Compose ──
  window.openCompose = function() { document.getElementById('compose-overlay').classList.add('show'); setTimeout(() => document.getElementById('cm-to').focus(), 80); };
  window.closeCompose = function() { document.getElementById('compose-overlay').classList.remove('show'); };
  window.overlayClick = function(e) { if (e.target === document.getElementById('compose-overlay')) closeCompose(); };

  window.setCmType = function(t) {
    cmType = t;
    document.getElementById('cm-tab-normal').classList.toggle('active', t==='normal');
    document.getElementById('cm-tab-html').classList.toggle('active', t==='html');
    document.getElementById('cm-toolbar').style.display = t==='normal' ? 'flex' : 'none';
    document.getElementById('cm-chips').style.display = t==='normal' ? 'flex' : 'none';
    document.getElementById('cm-prev-btn').style.display = t==='html' ? 'block' : 'none';
    document.getElementById('cm-body').placeholder = t==='html' ? '<h1>Hello</h1>\n<p>...</p>' : 'Write your message...';
    if (t==='normal') { document.getElementById('cm-preview').classList.remove('show'); cmPreviewOpen=false; document.getElementById('cm-prev-btn').textContent = 'Preview'; }
  };

  window.cmLink = function() {
    const url = prompt('URL:'); if (!url) return;
    const text = prompt('Link text:') || url;
    const ta = document.getElementById('cm-body');
    const p = ta.selectionStart;
    ta.value = ta.value.slice(0,p)+`[${text}](${url})`+ta.value.slice(p);
  };

  window.cmHandleImages = function(e) {
    Array.from(e.target.files).forEach(f => { const r = new FileReader(); r.onload = ev => { cmImgs.push({name:f.name,data:ev.target.result}); renderChips(); }; r.readAsDataURL(f); });
    e.target.value='';
  };

  function renderChips() {
    const c = document.getElementById('cm-chips'); c.innerHTML='';
    cmImgs.forEach((img,i) => {
      const d = document.createElement('div'); d.className='cm-chip';
      d.innerHTML=`<img src="${img.data}"><span>${img.name}</span><span class="cm-chip-rm" data-i="${i}">✕</span>`;
      c.appendChild(d);
    });
    c.querySelectorAll('.cm-chip-rm').forEach(b => b.addEventListener('click', () => { cmImgs.splice(+b.dataset.i,1); renderChips(); }));
  }

  function buildHtml() {
    if (cmType==='html') return document.getElementById('cm-body').value;
    let t = document.getElementById('cm-body').value;
    t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2">$1</a>');
    t = t.replace(/(^|[^"'=])(https?:\/\/[^\s<>"]+)/g,'$1<a href="$2">$2</a>');
    t = t.replace(/\n/g,'<br>');
    let h = `<div style="font-family:sans-serif;font-size:14px;line-height:1.7;color:#111;max-width:600px;">${t}`;
    cmImgs.forEach(img => { h += `<br><img src="${img.data}" style="max-width:100%;border-radius:4px;margin-top:12px;display:block;">`; });
    return h+'</div>';
  }

  window.cmTogglePreview = function() {
    cmPreviewOpen = !cmPreviewOpen;
    const f = document.getElementById('cm-preview');
    const btn = document.getElementById('cm-prev-btn');
    if (cmPreviewOpen) {
      f.classList.add('show');
      const doc = f.contentDocument||f.contentWindow.document;
      doc.open(); doc.write(buildHtml()); doc.close();
      setTimeout(()=>{ try{f.style.height=(f.contentDocument.body.scrollHeight+20)+'px';}catch(e){} },150);
      btn.textContent = 'Hide';
    } else {
      f.classList.remove('show');
      btn.textContent = 'Preview';
    }
  };

  window.cmSend = async function() {
    // Build the full from address from the text input + domain suffix
    const fromUsername = document.getElementById('cm-from').value.trim().toLowerCase().replace('@htmltools.me','');
    const from = fromUsername + '@htmltools.me';
    const to = document.getElementById('cm-to').value.trim();
    const subject = document.getElementById('cm-subject').value.trim();
    const body = document.getElementById('cm-body').value.trim();
    const btn = document.getElementById('cm-send-btn');
    const st = document.getElementById('cm-status');
    st.className='cm-status'; st.textContent='';
    if (!fromUsername) { st.textContent='Enter a sender username.'; st.className='cm-status err'; return; }
    if (!to) { st.textContent='Enter a recipient.'; st.className='cm-status err'; return; }
    if (!subject) { st.textContent='Enter a subject.'; st.className='cm-status err'; return; }
    if (!body) { st.textContent='Write a message.'; st.className='cm-status err'; return; }
    btn.disabled=true; btn.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Sending...';
    try {
      const d = await api({ type:'send_email', from, to, subject, html:buildHtml() });
      if (d.success) {
        st.textContent='Sent from '+from; st.className='cm-status ok';
        document.getElementById('cm-to').value='';
        document.getElementById('cm-subject').value='';
        document.getElementById('cm-body').value='';
        cmImgs=[]; renderChips();
        setTimeout(closeCompose, 1600);
      } else { st.textContent=(d.error||JSON.stringify(d.data)); st.className='cm-status err'; }
    } catch(e) { st.textContent=e.message; st.className='cm-status err'; }
    btn.disabled=false; btn.innerHTML='<i class="fas fa-paper-plane"></i> Send';
  };

  // ── Helpers ──
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso), now = new Date();
    if (now-d < 86400000 && now.getDate()===d.getDate()) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if (now.getFullYear()===d.getFullYear()) return d.toLocaleDateString([],{month:'short',day:'numeric'});
    return d.toLocaleDateString([],{month:'short',day:'numeric',year:'2-digit'});
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
