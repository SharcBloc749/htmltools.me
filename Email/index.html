<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTMLTools Mail</title>
<link rel="icon" type="image/png" href="/logo3.png?v=2" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c12;
    --s1: #0d1016;
    --s2: #111520;
    --s3: #161c2a;
    --b1: #1a2235;
    --b2: #222d42;
    --accent: #4da6ff;
    --adim: rgba(77,166,255,0.10);
    --aglow: rgba(77,166,255,0.22);
    --green: #30d97a;
    --red: #f04060;
    --rdim: rgba(240,64,96,0.08);
    --gold: #f5a623;
    --text: #d0daea;
    --t2: #6a7f96;
    --t3: #3a4f62;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

  /* ── GATE ── */
  #gate { width: 100%; max-width: 360px; }
  #gate.hidden { display: none; }
  .gate-inner { background: var(--s1); border: 1px solid var(--b1); border-radius: 18px; padding: 2.25rem 2rem; text-align: center; }
  .gate-icon { font-size: 2rem; margin-bottom: .6rem; }
  .gate-title { font-size: 1.3rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: .25rem; }
  .gate-title span { color: var(--accent); }
  .gate-sub { font-size: .72rem; color: var(--t3); margin-bottom: 1.5rem; }
  .g-input { width: 100%; padding: .75rem 1rem; background: var(--bg); border: 1px solid var(--b1); border-radius: 10px; color: var(--text); font-size: .88rem; outline: none; margin-bottom: .55rem; transition: border-color .2s; font-family: inherit; }
  .g-input:focus { border-color: var(--accent); }
  .g-btn { width: 100%; padding: .85rem; background: var(--accent); border: none; border-radius: 10px; color: #fff; font-size: .88rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s, transform .15s; }
  .g-btn:hover { opacity: .88; transform: translateY(-1px); }
  .g-err { display: none; margin-top: .6rem; font-size: .7rem; color: var(--red); background: var(--rdim); border: 1px solid rgba(240,64,96,.15); border-radius: 8px; padding: .45rem .7rem; }

  /* ── SHELL ── */
  #shell { display: none; width: 100vw; height: 100vh; flex-direction: column; }
  #shell.show { display: flex; }

  /* ── TOPBAR ── */
  .topbar { height: 52px; min-height: 52px; background: var(--s1); border-bottom: 1px solid var(--b1); display: flex; align-items: center; padding: 0 1.1rem; gap: .75rem; z-index: 10; }
  .tbar-logo { font-weight: 800; font-size: .95rem; letter-spacing: -.02em; display: flex; align-items: center; gap: .35rem; white-space: nowrap; }
  .tbar-logo span { color: var(--accent); }
  .tbar-logo .logo-icon { font-size: 1.1rem; }
  .tbar-search { flex: 1; max-width: 480px; position: relative; }
  .tbar-search input { width: 100%; padding: .5rem 1rem .5rem 2.3rem; background: var(--s2); border: 1px solid var(--b1); border-radius: 24px; color: var(--text); font-size: .83rem; outline: none; font-family: inherit; transition: border-color .2s, background .2s; }
  .tbar-search input:focus { border-color: var(--accent); background: var(--s3); }
  .tbar-search .si { position: absolute; left: .85rem; top: 50%; transform: translateY(-50%); color: var(--t3); font-size: .75rem; pointer-events: none; }
  .tbar-right { margin-left: auto; display: flex; align-items: center; gap: .6rem; }
  .live-pill { display: flex; align-items: center; gap: .35rem; font-size: .68rem; color: var(--t2); background: var(--s2); border: 1px solid var(--b1); border-radius: 20px; padding: .28rem .7rem; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(48,217,122,.4); } 50% { box-shadow: 0 0 0 4px rgba(48,217,122,0); } }
  .user-chip { font-size: .68rem; color: var(--t2); background: var(--s2); border: 1px solid var(--b1); border-radius: 20px; padding: .28rem .75rem; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .signout-btn { background: transparent; border: 1px solid rgba(240,64,96,.3); color: var(--red); font-size: .68rem; padding: .28rem .65rem; border-radius: 7px; cursor: pointer; font-family: inherit; font-weight: 600; transition: background .15s; }
  .signout-btn:hover { background: var(--rdim); }

  /* ── LAYOUT ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar { width: 210px; min-width: 210px; background: var(--s1); border-right: 1px solid var(--b1); display: flex; flex-direction: column; padding: .85rem .65rem; gap: .1rem; }
  .compose-btn { margin-bottom: .65rem; padding: .78rem 1rem; background: var(--accent); border: none; border-radius: 11px; color: #fff; font-size: .83rem; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: .45rem; justify-content: center; transition: opacity .15s, box-shadow .15s, transform .15s; box-shadow: 0 3px 14px var(--aglow); }
  .compose-btn:hover { opacity: .88; box-shadow: 0 5px 20px var(--aglow); transform: translateY(-1px); }
  .nav-item { display: flex; align-items: center; gap: .65rem; padding: .52rem .9rem; border-radius: 9px; font-size: .8rem; font-weight: 500; cursor: pointer; color: var(--t2); transition: all .15s; border: 1px solid transparent; user-select: none; }
  .nav-item:hover { background: var(--s2); color: var(--text); }
  .nav-item.active { background: var(--adim); color: var(--accent); border-color: rgba(77,166,255,.18); }
  .nav-item .ni { width: 14px; text-align: center; font-size: .8rem; }
  .nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: .58rem; font-weight: 700; padding: .12rem .38rem; border-radius: 10px; min-width: 17px; text-align: center; display: none; }
  .nav-badge.show { display: block; }
  .sb-sep { height: 1px; background: var(--b1); margin: .4rem 0; }

  /* ── LIST PANE ── */
  .list-pane { width: 320px; min-width: 260px; border-right: 1px solid var(--b1); display: flex; flex-direction: column; overflow: hidden; background: var(--s1); }
  .list-header { padding: .7rem 1rem; border-bottom: 1px solid var(--b1); display: flex; align-items: center; gap: .5rem; min-height: 46px; }
  .list-title { font-size: .82rem; font-weight: 700; flex: 1; }
  .refresh-btn { background: transparent; border: 1px solid var(--b1); border-radius: 7px; color: var(--t3); padding: .28rem .55rem; font-size: .7rem; cursor: pointer; font-family: inherit; transition: all .15s; display: flex; align-items: center; gap: .3rem; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spin i { animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .email-list { flex: 1; overflow-y: auto; }
  .email-row { padding: .82rem 1rem; border-bottom: 1px solid var(--b1); cursor: pointer; transition: background .1s; position: relative; }
  .email-row:hover { background: var(--s2); }
  .email-row.active { background: var(--adim); border-left: 2px solid var(--accent); padding-left: calc(1rem - 2px); }
  .er-top { display: flex; align-items: center; gap: .35rem; margin-bottom: .22rem; }
  .er-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .er-from { font-size: .74rem; font-weight: 600; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .er-date { font-size: .62rem; color: var(--t3); flex-shrink: 0; }
  .er-subject { font-size: .74rem; color: var(--t2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: .18rem; }
  .er-subject.unread { font-weight: 700; color: var(--text); }
  .er-snippet { font-size: .67rem; color: var(--t3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .er-status { display: inline-flex; align-items: center; gap: .2rem; font-size: .58rem; font-weight: 700; padding: .12rem .38rem; border-radius: 4px; margin-top: .25rem; }
  .er-status.delivered { background: rgba(48,217,122,.1); color: var(--green); }
  .er-status.sent { background: var(--adim); color: var(--accent); }
  .er-status.bounced { background: var(--rdim); color: var(--red); }
  .empty-list { text-align: center; padding: 3rem 1rem; color: var(--t3); }
  .empty-list i { font-size: 1.8rem; display: block; margin-bottom: .5rem; opacity: .5; }
  .empty-list p { font-size: .75rem; }

  /* ── DETAIL PANE ── */
  .detail-pane { flex: 1; overflow-y: auto; display: flex; flex-direction: column; background: var(--bg); }
  .detail-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--t3); gap: .5rem; }
  .detail-empty i { font-size: 2.5rem; opacity: .2; }
  .detail-empty p { font-size: .78rem; }
  .detail-top { padding: 1.4rem 1.6rem 1rem; border-bottom: 1px solid var(--b1); }
  .detail-subject { font-size: 1.05rem; font-weight: 800; letter-spacing: -.015em; line-height: 1.3; margin-bottom: .7rem; }
  .detail-chips { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; margin-bottom: .7rem; }
  .detail-chip { display: inline-flex; align-items: center; gap: .3rem; font-size: .65rem; font-weight: 700; padding: .2rem .5rem; border-radius: 20px; }
  .detail-chip.status-delivered { background: rgba(48,217,122,.1); color: var(--green); border: 1px solid rgba(48,217,122,.2); }
  .detail-chip.status-sent { background: var(--adim); color: var(--accent); border: 1px solid rgba(77,166,255,.2); }
  .detail-chip.status-bounced { background: var(--rdim); color: var(--red); border: 1px solid rgba(240,64,96,.2); }
  .detail-meta { display: flex; flex-direction: column; gap: .25rem; }
  .detail-meta-row { display: flex; gap: .5rem; font-size: .74rem; align-items: baseline; }
  .dml { color: var(--t3); min-width: 30px; font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; }
  .dmv { color: var(--t2); }
  .dmv strong { color: var(--text); font-weight: 600; }
  .detail-date { font-size: .65rem; color: var(--t3); margin-top: .4rem; }
  .detail-body { padding: 1.4rem 1.6rem; flex: 1; }
  .detail-body iframe { width: 100%; border: none; border-radius: 10px; background: #fff; display: block; }
  .detail-body .plain-body { font-size: .86rem; line-height: 1.75; color: var(--t2); white-space: pre-wrap; word-break: break-word; }
  .detail-body .plain-body a { color: var(--accent); }

  /* ── COMPOSE MODAL ── */
  .compose-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 100; align-items: flex-end; justify-content: flex-end; padding: 1rem; }
  .compose-overlay.show { display: flex; }
  .compose-modal { width: 100%; max-width: 520px; background: var(--s1); border: 1px solid var(--b2); border-radius: 16px; display: flex; flex-direction: column; max-height: 90vh; box-shadow: 0 24px 60px rgba(0,0,0,.6); animation: slideUp .2s ease; }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .cm-head { padding: .72rem 1rem; background: var(--s2); border-bottom: 1px solid var(--b1); border-radius: 16px 16px 0 0; display: flex; align-items: center; justify-content: space-between; }
  .cm-title { font-size: .78rem; font-weight: 700; color: var(--t2); letter-spacing: .04em; text-transform: uppercase; }
  .cm-x { background: transparent; border: none; color: var(--t3); cursor: pointer; font-size: .9rem; padding: .2rem .4rem; border-radius: 5px; transition: color .15s; }
  .cm-x:hover { color: var(--red); }
  .cm-field { display: flex; align-items: center; border-bottom: 1px solid var(--b1); padding: .5rem 1rem; gap: .5rem; }
  .cm-field label { font-size: .65rem; font-weight: 700; color: var(--t3); min-width: 42px; text-transform: uppercase; letter-spacing: .06em; }
  .cm-field input, .cm-field select { flex: 1; background: transparent; border: none; color: var(--text); font-size: .85rem; outline: none; font-family: inherit; }
  .cm-field select option { background: var(--s1); }
  .cm-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .cm-type-row { display: flex; gap: .35rem; padding: .5rem 1rem; border-bottom: 1px solid var(--b1); }
  .cm-tab { padding: .28rem .65rem; border: 1px solid var(--b1); border-radius: 6px; background: transparent; color: var(--t3); font-size: .7rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all .15s; }
  .cm-tab.active { border-color: var(--accent); color: var(--accent); background: var(--adim); }
  .cm-toolbar { display: flex; gap: .3rem; padding: .42rem 1rem; border-bottom: 1px solid var(--b1); flex-wrap: wrap; }
  .cm-tb { background: transparent; border: 1px solid var(--b1); border-radius: 6px; color: var(--t3); font-size: .7rem; padding: .28rem .6rem; cursor: pointer; font-family: inherit; transition: all .15s; display: flex; align-items: center; gap: .25rem; }
  .cm-tb:hover { border-color: var(--accent); color: var(--accent); }
  .cm-chips { display: flex; flex-wrap: wrap; gap: .32rem; padding: 0 1rem .45rem; }
  .cm-chip { background: var(--s2); border: 1px solid var(--b1); border-radius: 5px; padding: .22rem .48rem; font-size: .67rem; display: flex; align-items: center; gap: .32rem; color: var(--t2); }
  .cm-chip img { width: 16px; height: 16px; border-radius: 3px; object-fit: cover; }
  .cm-chip-rm { color: var(--red); cursor: pointer; opacity: .7; }
  .cm-chip-rm:hover { opacity: 1; }
  .cm-textarea { flex: 1; width: 100%; min-height: 180px; padding: .9rem 1rem; background: transparent; border: none; color: var(--text); font-size: .86rem; font-family: inherit; outline: none; resize: none; line-height: 1.65; }
  .cm-preview-frame { width: 100%; border: none; border-top: 1px solid var(--b1); background: #fff; min-height: 140px; display: none; }
  .cm-preview-frame.show { display: block; }
  .cm-footer { display: flex; align-items: center; gap: .55rem; padding: .75rem 1rem; border-top: 1px solid var(--b1); }
  .cm-send { padding: .62rem 1.2rem; background: var(--accent); border: none; border-radius: 9px; color: #fff; font-size: .82rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s, transform .15s; display: flex; align-items: center; gap: .4rem; }
  .cm-send:hover { opacity: .88; transform: translateY(-1px); }
  .cm-send:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .cm-prev-btn { padding: .62rem .9rem; background: transparent; border: 1px solid var(--b1); border-radius: 9px; color: var(--t3); font-size: .76rem; cursor: pointer; font-family: inherit; transition: all .15s; }
  .cm-prev-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cm-status { flex: 1; font-size: .7rem; padding: .32rem .6rem; border-radius: 6px; display: none; }
  .cm-status.ok { display: block; background: rgba(48,217,122,.1); color: var(--green); border: 1px solid rgba(48,217,122,.2); }
  .cm-status.err { display: block; background: var(--rdim); color: var(--red); border: 1px solid rgba(240,64,96,.18); }

  /* ── ACCESS PANEL ── */
  .access-wrap { flex: 1; overflow-y: auto; padding: 1.5rem 1.6rem; display: flex; flex-direction: column; gap: 1.25rem; }
  .access-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 12px; padding: 1.1rem 1.25rem; }
  .access-card-title { font-size: .8rem; font-weight: 700; margin-bottom: .85rem; }
  .af-input { width: 100%; padding: .62rem .9rem; background: var(--bg); border: 1px solid var(--b1); border-radius: 9px; color: var(--text); font-size: .83rem; font-family: inherit; outline: none; transition: border-color .2s; margin-bottom: .5rem; }
  .af-input:focus { border-color: var(--accent); }
  .af-hint { font-size: .63rem; color: var(--t3); margin-bottom: .65rem; }
  .af-btn { padding: .62rem 1.1rem; background: var(--green); border: none; border-radius: 9px; color: #fff; font-size: .78rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s; display: flex; align-items: center; gap: .35rem; }
  .af-btn:hover { opacity: .88; }
  .af-status { font-size: .7rem; padding: .32rem .6rem; border-radius: 6px; display: none; margin-top: .5rem; }
  .af-status.ok { display: block; background: rgba(48,217,122,.1); color: var(--green); }
  .af-status.err { display: block; background: var(--rdim); color: var(--red); }
  .user-card { background: var(--bg); border: 1px solid var(--b1); border-radius: 9px; padding: .75rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: .5rem; margin-bottom: .45rem; }
  .uc-email { font-size: .78rem; font-weight: 600; color: var(--text); }
  .uc-senders { font-size: .63rem; color: var(--t3); margin-top: .15rem; }
  .uc-revoke { padding: .26rem .6rem; border: 1px solid rgba(240,64,96,.3); background: transparent; color: var(--red); font-size: .67rem; font-weight: 600; border-radius: 6px; cursor: pointer; font-family: inherit; transition: background .15s; }
  .uc-revoke:hover { background: var(--rdim); }
  .access-empty { font-size: .75rem; color: var(--t3); padding: 1.25rem; text-align: center; background: var(--bg); border: 1px dashed var(--b1); border-radius: 9px; }
  .access-section-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--t3); margin-bottom: .55rem; }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-inner">
    <div class="gate-icon">✉️</div>
    <div class="gate-title">HTML<span>Tools</span> Mail</div>
    <div class="gate-sub">Sign in to access your inbox.</div>
    <input type="email" id="g-email" class="g-input" placeholder="your@email.com" />
    <input type="password" id="g-pass" class="g-input" placeholder="••••••••" />
    <button class="g-btn" id="login-btn">Sign In</button>
    <div class="g-err" id="g-err"></div>
  </div>
</div>

<!-- SHELL -->
<div id="shell">
  <div class="topbar">
    <div class="tbar-logo"><span class="logo-icon">✉️</span> HTML<span>Tools</span> Mail</div>
    <div class="tbar-search">
      <i class="fas fa-search si"></i>
      <input type="text" id="search-input" placeholder="Search mail..." oninput="filterEmails()" />
    </div>
    <div class="tbar-right">
      <div class="live-pill"><span class="live-dot"></span> Live</div>
      <span class="user-chip" id="user-label"></span>
      <button class="signout-btn" id="signout-btn">Sign out</button>
    </div>
  </div>

  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <button class="compose-btn" onclick="openCompose()"><i class="fas fa-pen"></i> Compose</button>
      <div class="nav-item active" id="nav-inbox" onclick="switchView('inbox')">
        <i class="fas fa-inbox ni"></i> Inbox
        <span class="nav-badge" id="inbox-badge"></span>
      </div>
      <div class="nav-item" id="nav-sent" onclick="switchView('sent')">
        <i class="fas fa-paper-plane ni"></i> Sent
      </div>
      <div class="sb-sep"></div>
      <div class="nav-item" id="nav-access" onclick="switchView('access')" style="display:none;">
        <i class="fas fa-users-cog ni"></i> Access
      </div>
    </div>

    <!-- LIST PANE -->
    <div class="list-pane">
      <div class="list-header">
        <span class="list-title" id="list-title">Inbox</span>
        <button class="refresh-btn" id="refresh-btn" onclick="loadCurrentView()"><i class="fas fa-sync-alt"></i> Refresh</button>
      </div>
      <div class="email-list" id="email-list">
        <div class="empty-list"><i class="fas fa-circle-notch fa-spin"></i><p>Loading...</p></div>
      </div>
    </div>

    <!-- DETAIL PANE -->
    <div class="detail-pane" id="detail-pane">
      <div class="detail-empty">
        <i class="fas fa-envelope"></i>
        <p>Select an email to read</p>
      </div>
    </div>
  </div>
</div>

<!-- COMPOSE OVERLAY -->
<div class="compose-overlay" id="compose-overlay" onclick="overlayClick(event)">
  <div class="compose-modal" id="compose-modal">
    <div class="cm-head">
      <span class="cm-title">New Message</span>
      <button class="cm-x" onclick="closeCompose()"><i class="fas fa-times"></i></button>
    </div>
    <div class="cm-field">
      <label>From</label>
      <select id="cm-from"></select>
    </div>
    <div class="cm-field">
      <label>To</label>
      <input type="email" id="cm-to" placeholder="recipient@example.com" />
    </div>
    <div class="cm-field">
      <label>Subject</label>
      <input type="text" id="cm-subject" placeholder="Subject..." />
    </div>
    <div class="cm-scroll">
      <div class="cm-type-row">
        <button class="cm-tab active" id="cm-tab-normal" onclick="setCmType('normal')">✏️ Normal</button>
        <button class="cm-tab" id="cm-tab-html" onclick="setCmType('html')">🧩 HTML</button>
      </div>
      <div class="cm-toolbar" id="cm-toolbar">
        <button class="cm-tb" onclick="cmLink()"><i class="fas fa-link"></i> Link</button>
        <button class="cm-tb" onclick="document.getElementById('cm-img-in').click()"><i class="fas fa-image"></i> Image</button>
        <input type="file" id="cm-img-in" accept="image/*" multiple style="display:none" onchange="cmHandleImages(event)" />
      </div>
      <div class="cm-chips" id="cm-chips"></div>
      <textarea class="cm-textarea" id="cm-body" placeholder="Write your message here... URLs become clickable automatically."></textarea>
      <iframe class="cm-preview-frame" id="cm-preview" sandbox="allow-same-origin"></iframe>
    </div>
    <div class="cm-footer">
      <button class="cm-send" id="cm-send-btn" onclick="cmSend()"><i class="fas fa-paper-plane"></i> Send</button>
      <button class="cm-prev-btn" id="cm-prev-btn" onclick="cmTogglePreview()" style="display:none;"><i class="fas fa-eye"></i> Preview</button>
      <div class="cm-status" id="cm-status"></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const SUPER_ADMIN = 'matthewbozhe@gmail.com';
  const WORKER = 'https://htmltools-reset.bozhetarnikmatthew.workers.dev/';

  const firebaseConfig = {
    apiKey: "AIzaSyD8KINd1CV5wl3TEisGliE4R5ng_w-apjA",
    authDomain: "htmltools2.firebaseapp.com",
    databaseURL: "https://htmltools2-default-rtdb.firebaseio.com",
    projectId: "htmltools2",
    storageBucket: "htmltools2.firebasestorage.app",
    messagingSenderId: "61467480060",
    appId: "1:61467480060:web:4f964a671a5623d10e2c79",
    measurementId: "G-5KJ8DE63ZC"
  };

  const fbApp = initializeApp(firebaseConfig);
  const auth = getAuth(fbApp);
  const db = getDatabase(fbApp);

  // ── State ──
  let currentView = 'inbox';
  let allEmails = [];
  let readIds = new Set(JSON.parse(localStorage.getItem('ht_readIds') || '[]'));
  let currentEmail = null;
  let cmType = 'normal';
  let cmImgs = [];
  let cmPreviewOpen = false;
  let allowedSenders = [];
  let isSuperAdmin = false;

  // ── Login ──
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('g-email').value.trim();
    const pass = document.getElementById('g-pass').value;
    const err = document.getElementById('g-err');
    err.style.display = 'none';
    if (!email || !pass) { err.textContent = 'Please fill in both fields.'; err.style.display = 'block'; return; }
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch(e) { err.textContent = '⛔ ' + e.message.replace('Firebase: ','').replace(/\(.*\)/,'').trim(); err.style.display = 'block'; }
  });
  document.getElementById('g-pass').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-btn').click(); });
  document.getElementById('signout-btn').addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, async user => {
    if (!user) {
      document.getElementById('gate').classList.remove('hidden');
      document.getElementById('shell').classList.remove('show');
      return;
    }
    const email = user.email.toLowerCase();
    if (email === SUPER_ADMIN.toLowerCase()) {
      isSuperAdmin = true;
      allowedSenders = ['noreply', 'matthew', 'kovan'];
      showShell(user);
      document.getElementById('nav-access').style.display = 'flex';
    } else {
      const key = dbKey(email);
      const snap = await get(ref(db, `mailAccess/${key}`));
      if (snap.exists()) {
        allowedSenders = snap.val().senders || [];
        showShell(user);
        onValue(ref(db, `mailAccess/${key}`), s => {
          if (!s.exists()) { signOut(auth); alert('Your access has been revoked.'); }
          else { allowedSenders = s.val().senders || []; rebuildFrom(); }
        });
      } else {
        await signOut(auth);
        const err = document.getElementById('g-err');
        err.textContent = '⛔ You do not have access to this tool.';
        err.style.display = 'block';
      }
    }
  });

  function dbKey(email) {
    return email.replace(/\./g, '_').replace(/@/g, '__at__');
  }

  function showShell(user) {
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('shell').classList.add('show');
    document.getElementById('user-label').textContent = user.email;
    rebuildFrom();
    loadInbox();
  }

  function rebuildFrom() {
    const sel = document.getElementById('cm-from');
    sel.innerHTML = '';
    const list = isSuperAdmin ? ['noreply', 'matthew', 'kovan'] : allowedSenders;
    list.forEach(s => sel.add(new Option(s + '@htmltools.me', s + '@htmltools.me')));
  }

  // ── Views ──
  window.switchView = function(view) {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-' + view)?.classList.add('active');
    document.getElementById('list-title').textContent = { inbox: 'Inbox', sent: 'Sent', access: 'Access' }[view] || view;
    clearDetail();
    if (view === 'inbox') loadInbox();
    else if (view === 'sent') loadSent();
    else if (view === 'access') loadAccess();
  };

  window.loadCurrentView = function() { switchView(currentView); };

  function clearDetail() {
    currentEmail = null;
    document.getElementById('detail-pane').innerHTML = '<div class="detail-empty"><i class="fas fa-envelope"></i><p>Select an email to read</p></div>';
  }

  async function api(body) {
    const r = await fetch(WORKER, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return r.json();
  }

  function spin(on) {
    document.getElementById('refresh-btn').classList.toggle('spin', on);
  }

  async function loadInbox() {
    spin(true);
    document.getElementById('email-list').innerHTML = '<div class="empty-list"><i class="fas fa-circle-notch fa-spin"></i><p>Loading...</p></div>';
    try {
      const data = await api({ type: 'get_inbox' });
      allEmails = (data.emails || []).sort((a,b) => new Date(b.date)-new Date(a.date));
      renderList();
    } catch(e) { document.getElementById('email-list').innerHTML = `<div class="empty-list"><i class="fas fa-triangle-exclamation"></i><p>${e.message}</p></div>`; }
    spin(false);
  }

  async function loadSent() {
    spin(true);
    document.getElementById('email-list').innerHTML = '<div class="empty-list"><i class="fas fa-circle-notch fa-spin"></i><p>Loading...</p></div>';
    try {
      const data = await api({ type: 'get_sent' });
      allEmails = (data.emails || []).sort((a,b) => new Date(b.date)-new Date(a.date));
      renderList();
    } catch(e) { document.getElementById('email-list').innerHTML = `<div class="empty-list"><i class="fas fa-triangle-exclamation"></i><p>${e.message}</p></div>`; }
    spin(false);
  }

  function renderList(q) {
    const el = document.getElementById('email-list');
    let list = allEmails;
    if (q) { const lq = q.toLowerCase(); list = list.filter(e => [e.from,e.subject,e.snippet,e.to].some(f=>(f||'').toLowerCase().includes(lq))); }
    if (!list.length) { el.innerHTML = '<div class="empty-list"><i class="fas fa-envelope-open"></i><p>No emails here yet.</p></div>'; updateBadge(0); return; }
    if (currentView === 'inbox') updateBadge(list.filter(e => !readIds.has(e.id)).length);
    else updateBadge(0);
    el.innerHTML = '';
    list.forEach(email => {
      const unread = currentView === 'inbox' && !readIds.has(email.id);
      const row = document.createElement('div');
      row.className = 'email-row' + (currentEmail?.id === email.id ? ' active' : '');
      const fromDisplay = currentView === 'sent' ? (email.to || '') : (email.from || '');
      let statusHtml = '';
      if (currentView === 'sent' && email.status) {
        statusHtml = `<div class="er-status ${email.status}"><i class="fas fa-circle" style="font-size:.4rem;"></i> ${email.status}</div>`;
      }
      row.innerHTML = `
        <div class="er-top">
          ${unread ? '<span class="er-dot"></span>' : ''}
          <span class="er-from">${esc(fromDisplay)}</span>
          <span class="er-date">${fmtDate(email.date)}</span>
        </div>
        <div class="er-subject${unread ? ' unread' : ''}">${esc(email.subject || '(no subject)')}</div>
        <div class="er-snippet">${esc(email.snippet || '')}</div>
        ${statusHtml}
      `;
      row.addEventListener('click', () => openEmail(email, row));
      el.appendChild(row);
    });
  }

  function updateBadge(n) {
    const b = document.getElementById('inbox-badge');
    if (n > 0) { b.textContent = n > 99 ? '99+' : n; b.classList.add('show'); }
    else b.classList.remove('show');
  }

  window.filterEmails = function() { renderList(document.getElementById('search-input').value.trim() || undefined); };

  async function openEmail(email, row) {
    document.querySelectorAll('.email-row').forEach(r => r.classList.remove('active'));
    row.classList.add('active');
    currentEmail = email;

    if (currentView === 'inbox' && !readIds.has(email.id)) {
      readIds.add(email.id);
      localStorage.setItem('ht_readIds', JSON.stringify([...readIds]));
      renderList(document.getElementById('search-input').value.trim() || undefined);
    }

    const pane = document.getElementById('detail-pane');
    pane.innerHTML = '<div class="detail-empty"><i class="fas fa-circle-notch fa-spin"></i><p>Loading...</p></div>';

    let full = { ...email };
    try {
      const d = await api({ type: 'get_email', id: email.id });
      if (d.success && d.email) full = { ...email, ...d.email };
    } catch(e) {}

    const toVal = Array.isArray(full.to) ? full.to.join(', ') : (full.to || '');
    const dateStr = full.date ? new Date(full.date).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' }) : '';
    const hasHtml = !!(full.html);
    const rawBody = full.html || full.text || '';

    let statusHtml = '';
    if (currentView === 'sent' && full.status) {
      statusHtml = `<div class="detail-chip status-${full.status}"><i class="fas fa-circle" style="font-size:.4rem;"></i> ${full.status}</div>`;
    }

    pane.innerHTML = `
      <div class="detail-top">
        <div class="detail-subject">${esc(full.subject || '(no subject)')}</div>
        <div class="detail-chips">${statusHtml}</div>
        <div class="detail-meta">
          <div class="detail-meta-row"><span class="dml">From</span><span class="dmv"><strong>${esc(full.from || '')}</strong></span></div>
          <div class="detail-meta-row"><span class="dml">To</span><span class="dmv">${esc(toVal)}</span></div>
        </div>
        <div class="detail-date">${dateStr}</div>
      </div>
      <div class="detail-body" id="detail-body"></div>
    `;

    const bodyEl = document.getElementById('detail-body');
    if (rawBody) {
      if (hasHtml) {
        const frame = document.createElement('iframe');
        frame.style.cssText = 'width:100%;border:none;border-radius:10px;background:#fff;min-height:300px;display:block;';
        // allow-popups is key so links open in new tab
        frame.sandbox = 'allow-same-origin allow-popups allow-popups-to-escape-sandbox';
        bodyEl.appendChild(frame);
        const doc = frame.contentDocument || frame.contentWindow.document;
        // Inject base target so all links open in _blank
        const injected = rawBody.replace(/<head>/i, '<head><base target="_blank">');
        doc.open(); doc.write(injected.includes('<head>') ? injected : '<base target="_blank">' + rawBody); doc.close();
        // Also patch any links that already loaded
        setTimeout(() => {
          try {
            frame.contentDocument.querySelectorAll('a').forEach(a => {
              a.target = '_blank';
              a.rel = 'noopener noreferrer';
            });
            frame.style.height = (frame.contentDocument.body.scrollHeight + 40) + 'px';
          } catch(e) {}
        }, 300);
      } else {
        const linked = rawBody.replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
        bodyEl.innerHTML = `<div class="plain-body">${linked}</div>`;
      }
    } else {
      bodyEl.innerHTML = '<p style="color:var(--t3);font-size:.8rem;">No content available.</p>';
    }
  }

  // ── Access ──
  function loadAccess() {
    document.getElementById('email-list').innerHTML = '<div class="empty-list"><i class="fas fa-users-cog" style="opacity:.3;"></i><p>Manage access<br>on the right</p></div>';
    renderAccessPane();
    // Live updates
    onValue(ref(db, 'mailAccess'), snap => {
      window._accessSnap = snap.val() || {};
      if (currentView === 'access') renderAccessPane();
    });
  }

  function renderAccessPane() {
    const data = window._accessSnap || {};
    const entries = Object.entries(data);
    const pane = document.getElementById('detail-pane');
    pane.innerHTML = `
      <div class="access-wrap">
        <div class="access-card">
          <div class="access-card-title">✨ Grant Access to User</div>
          <input type="email" id="ac-email" class="af-input" placeholder="user@gmail.com" />
          <input type="text" id="ac-senders" class="af-input" placeholder="noreply,matthew,kovan" />
          <div class="af-hint">Comma-separated usernames (without @htmltools.me)</div>
          <button class="af-btn" onclick="grantAccess()"><i class="fas fa-plus"></i> Grant Access</button>
          <div class="af-status" id="af-status"></div>
        </div>
        <div>
          <div class="access-section-label">Users with Access (${entries.length})</div>
          <div id="ac-list">
            ${entries.length === 0
              ? '<div class="access-empty">No users have been granted access yet.</div>'
              : entries.map(([key, val]) => `
                <div class="user-card">
                  <div>
                    <div class="uc-email">${esc(val.email)}</div>
                    <div class="uc-senders">${(val.senders||[]).map(s=>s+'@htmltools.me').join(' · ')}</div>
                  </div>
                  <button class="uc-revoke" onclick="revokeAccess('${key}','${esc(val.email)}')"><i class="fas fa-times"></i> Revoke</button>
                </div>
              `).join('')
            }
          </div>
        </div>
      </div>
    `;
  }

  window.grantAccess = async function() {
    const emailVal = document.getElementById('ac-email').value.trim().toLowerCase();
    const sendersRaw = document.getElementById('ac-senders').value.trim();
    const statusEl = document.getElementById('af-status');
    statusEl.className = 'af-status'; statusEl.textContent = '';
    if (!emailVal) { statusEl.textContent = '⛔ Enter a user email.'; statusEl.className = 'af-status err'; return; }
    if (!sendersRaw) { statusEl.textContent = '⛔ Enter at least one sender.'; statusEl.className = 'af-status err'; return; }
    const senders = sendersRaw.split(',').map(s => s.trim().toLowerCase().replace('@htmltools.me','')).filter(Boolean);
    const key = dbKey(emailVal);
    try {
      await set(ref(db, `mailAccess/${key}`), { email: emailVal, senders });
      statusEl.textContent = `✅ Access granted to ${emailVal}`; statusEl.className = 'af-status ok';
      document.getElementById('ac-email').value = '';
      document.getElementById('ac-senders').value = '';
      // Refresh
      const snap = await get(ref(db, 'mailAccess'));
      window._accessSnap = snap.val() || {};
      renderAccessPane();
    } catch(e) { statusEl.textContent = '❌ ' + e.message; statusEl.className = 'af-status err'; }
  };

  window.revokeAccess = async function(key, email) {
    if (!confirm(`Revoke access for ${email}?`)) return;
    try {
      await remove(ref(db, `mailAccess/${key}`));
      const snap = await get(ref(db, 'mailAccess'));
      window._accessSnap = snap.val() || {};
      renderAccessPane();
    } catch(e) { alert('Error: ' + e.message); }
  };

  // ── Compose ──
  window.openCompose = function() { document.getElementById('compose-overlay').classList.add('show'); setTimeout(()=>document.getElementById('cm-to').focus(),80); };
  window.closeCompose = function() { document.getElementById('compose-overlay').classList.remove('show'); };
  window.overlayClick = function(e) { if (e.target===document.getElementById('compose-overlay')) closeCompose(); };

  window.setCmType = function(t) {
    cmType = t;
    document.getElementById('cm-tab-normal').classList.toggle('active', t==='normal');
    document.getElementById('cm-tab-html').classList.toggle('active', t==='html');
    document.getElementById('cm-toolbar').style.display = t==='normal' ? 'flex' : 'none';
    document.getElementById('cm-chips').style.display = t==='normal' ? 'flex' : 'none';
    document.getElementById('cm-prev-btn').style.display = t==='html' ? 'inline-flex' : 'none';
    document.getElementById('cm-body').placeholder = t==='html' ? '<h1>Hello!</h1>\n<p>Your message...</p>' : 'Write your message here... URLs become clickable automatically.';
    if (t==='normal') { document.getElementById('cm-preview').classList.remove('show'); cmPreviewOpen=false; document.getElementById('cm-prev-btn').innerHTML='<i class="fas fa-eye"></i> Preview'; }
  };

  window.cmLink = function() {
    const url = prompt('Enter URL:'); if (!url) return;
    const text = prompt('Link text:') || url;
    const ta = document.getElementById('cm-body');
    const p = ta.selectionStart;
    ta.value = ta.value.slice(0,p)+`[${text}](${url})`+ta.value.slice(p);
  };

  window.cmHandleImages = function(e) {
    Array.from(e.target.files).forEach(f => { const r = new FileReader(); r.onload = ev => { cmImgs.push({name:f.name,data:ev.target.result}); renderChips(); }; r.readAsDataURL(f); });
    e.target.value = '';
  };

  function renderChips() {
    const c = document.getElementById('cm-chips'); c.innerHTML='';
    cmImgs.forEach((img,i) => {
      const d = document.createElement('div'); d.className='cm-chip';
      d.innerHTML=`<img src="${img.data}"><span>${img.name}</span><span class="cm-chip-rm" data-i="${i}">✕</span>`;
      c.appendChild(d);
    });
    c.querySelectorAll('.cm-chip-rm').forEach(b => b.addEventListener('click', () => { cmImgs.splice(+b.dataset.i,1); renderChips(); }));
  }

  function buildHtml() {
    if (cmType==='html') return document.getElementById('cm-body').value;
    let t = document.getElementById('cm-body').value;
    t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" style="color:#4da6ff;">$1</a>');
    t = t.replace(/(^|[^"'=])(https?:\/\/[^\s<>"]+)/g,'$1<a href="$2" style="color:#4da6ff;">$2</a>');
    t = t.replace(/\n/g,'<br>');
    let h = `<div style="font-family:sans-serif;font-size:14px;line-height:1.7;color:#222;max-width:600px;">${t}`;
    cmImgs.forEach(img => { h += `<br><img src="${img.data}" style="max-width:100%;border-radius:8px;margin-top:12px;display:block;">`; });
    return h+'</div>';
  }

  window.cmTogglePreview = function() {
    cmPreviewOpen = !cmPreviewOpen;
    const f = document.getElementById('cm-preview');
    if (cmPreviewOpen) {
      f.classList.add('show');
      const doc = f.contentDocument||f.contentWindow.document;
      doc.open(); doc.write(buildHtml()); doc.close();
      setTimeout(()=>{ try{f.style.height=(f.contentDocument.body.scrollHeight+20)+'px';}catch(e){} },150);
      document.getElementById('cm-prev-btn').innerHTML='<i class="fas fa-eye-slash"></i> Hide';
    } else {
      f.classList.remove('show');
      document.getElementById('cm-prev-btn').innerHTML='<i class="fas fa-eye"></i> Preview';
    }
  };

  window.cmSend = async function() {
    const from = document.getElementById('cm-from').value;
    const to = document.getElementById('cm-to').value.trim();
    const subject = document.getElementById('cm-subject').value.trim();
    const body = document.getElementById('cm-body').value.trim();
    const btn = document.getElementById('cm-send-btn');
    const st = document.getElementById('cm-status');
    st.className='cm-status'; st.textContent='';
    if (!to) { st.textContent='Please enter a recipient.'; st.className='cm-status err'; return; }
    if (!subject) { st.textContent='Please enter a subject.'; st.className='cm-status err'; return; }
    if (!body) { st.textContent='Please write a message.'; st.className='cm-status err'; return; }
    btn.disabled=true; btn.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Sending...';
    try {
      const d = await api({ type:'send_email', from, to, subject, html:buildHtml() });
      if (d.success) {
        st.textContent='✅ Sent from '+from+'!'; st.className='cm-status ok';
        document.getElementById('cm-to').value='';
        document.getElementById('cm-subject').value='';
        document.getElementById('cm-body').value='';
        cmImgs=[]; renderChips();
        setTimeout(closeCompose, 1800);
      } else { st.textContent='❌ '+(d.error||JSON.stringify(d.data)); st.className='cm-status err'; }
    } catch(e) { st.textContent='❌ '+e.message; st.className='cm-status err'; }
    btn.disabled=false; btn.innerHTML='<i class="fas fa-paper-plane"></i> Send';
  };

  // ── Helpers ──
  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso), now = new Date();
    if (now-d < 86400000 && now.getDate()===d.getDate()) return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if (now.getFullYear()===d.getFullYear()) return d.toLocaleDateString([],{month:'short',day:'numeric'});
    return d.toLocaleDateString([],{month:'short',day:'numeric',year:'2-digit'});
  }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
