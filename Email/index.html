<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTMLTools Mail</title>
<link rel="icon" type="image/png" href="/logo3.png?v=2" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
:root {
  --bg: #080b10;
  --surface: #0d1117;
  --surface2: #111720;
  --surface3: #161e2c;
  --border: #1c2538;
  --border2: #243047;
  --accent: #3b82f6;
  --accent-light: #60a5fa;
  --accent-dim: rgba(59,130,246,0.10);
  --accent-glow: rgba(59,130,246,0.22);
  --green: #22d3a0;
  --green-dim: rgba(34,211,160,0.1);
  --red: #f43f5e;
  --red-dim: rgba(244,63,94,0.10);
  --amber: #f59e0b;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #475569;
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* scrollbars */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── GATE ── */
#gate {
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2.5rem 2.25rem;
  animation: fadeUp .4s ease;
}
#gate.hidden { display: none; }
@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

.gate-brand {
  display: flex;
  align-items: center;
  gap: .6rem;
  margin-bottom: 1.75rem;
}
.gate-logo-mark {
  width: 38px; height: 38px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.gate-brand-name { font-size: 1.1rem; font-weight: 700; letter-spacing: -.025em; }
.gate-brand-name em { color: var(--accent-light); font-style: normal; }
.gate-brand-sub { font-size: .65rem; color: var(--text3); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; }

.gate-heading { font-size: 1.5rem; font-weight: 700; letter-spacing: -.03em; margin-bottom: .35rem; }
.gate-sub { font-size: .8rem; color: var(--text3); margin-bottom: 1.75rem; }

.field-group { display: flex; flex-direction: column; gap: .75rem; }
.field-label { font-size: .7rem; font-weight: 600; color: var(--text2); letter-spacing: .05em; text-transform: uppercase; margin-bottom: .3rem; display: block; }
.g-input {
  width: 100%; padding: .8rem 1rem;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text); font-size: .875rem; font-family: var(--font);
  outline: none; transition: border-color var(--transition), box-shadow var(--transition);
}
.g-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.g-btn {
  width: 100%; padding: .875rem;
  background: var(--accent);
  border: none; border-radius: var(--radius);
  color: #fff; font-size: .875rem; font-weight: 600; font-family: var(--font);
  cursor: pointer; margin-top: .25rem;
  transition: opacity var(--transition), box-shadow var(--transition);
  box-shadow: 0 4px 14px var(--accent-glow);
  display: flex; align-items: center; justify-content: center; gap: .5rem;
}
.g-btn:hover { opacity: .88; box-shadow: 0 6px 20px var(--accent-glow); }
.g-err {
  display: none; margin-top: .75rem; font-size: .75rem;
  color: var(--red); background: var(--red-dim);
  border: 1px solid rgba(244,63,94,.2);
  border-radius: 8px; padding: .6rem .85rem;
}

/* ── SHELL ── */
#shell { display: none; width: 100vw; height: 100vh; flex-direction: column; }
#shell.show { display: flex; }

/* ── TOPBAR ── */
.topbar {
  height: 54px; min-height: 54px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 1.25rem; gap: 1rem; z-index: 100;
}
.topbar-brand {
  display: flex; align-items: center; gap: .6rem;
  text-decoration: none; user-select: none; flex-shrink: 0;
}
.topbar-logo-mark {
  width: 30px; height: 30px;
  background: var(--accent); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: .85rem; box-shadow: 0 2px 8px var(--accent-glow);
}
.topbar-name { font-size: .9rem; font-weight: 700; letter-spacing: -.02em; color: var(--text); }
.topbar-name em { color: var(--accent-light); font-style: normal; }

.topbar-search {
  flex: 1; max-width: 460px; margin: 0 auto; position: relative;
}
.topbar-search input {
  width: 100%; padding: .55rem 1rem .55rem 2.5rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 24px; color: var(--text); font-size: .835rem; font-family: var(--font);
  outline: none; transition: all var(--transition);
}
.topbar-search input:focus { border-color: var(--accent); background: var(--surface3); box-shadow: 0 0 0 3px var(--accent-dim); }
.topbar-search .si { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: .78rem; pointer-events: none; }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: .75rem; flex-shrink: 0; }
.live-badge {
  display: flex; align-items: center; gap: .35rem;
  font-size: .68rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
  color: var(--green); background: var(--green-dim);
  border: 1px solid rgba(34,211,160,.2); border-radius: 20px; padding: .3rem .7rem;
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.user-chip {
  display: flex; align-items: center; gap: .45rem;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: .3rem .75rem .3rem .45rem;
}
.user-avatar {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: .65rem; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-email-text { font-size: .7rem; color: var(--text2); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.signout {
  background: transparent; border: 1px solid var(--border2);
  color: var(--text3); font-size: .7rem; font-weight: 500;
  padding: .35rem .7rem; border-radius: 8px;
  cursor: pointer; font-family: var(--font);
  transition: all var(--transition); display: flex; align-items: center; gap: .35rem;
}
.signout:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

/* ── MAIN LAYOUT ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── SIDEBAR ── */
.sidebar {
  width: 230px; min-width: 230px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 1rem .75rem; gap: .2rem;
}
.compose-btn {
  margin-bottom: .75rem; padding: .8rem 1rem;
  background: var(--accent);
  border: none; border-radius: var(--radius);
  color: #fff; font-size: .84rem; font-weight: 600; font-family: var(--font);
  cursor: pointer; display: flex; align-items: center; gap: .5rem; justify-content: center;
  transition: all var(--transition);
  box-shadow: 0 2px 10px var(--accent-glow);
}
.compose-btn:hover { opacity: .88; box-shadow: 0 4px 18px var(--accent-glow); transform: translateY(-1px); }
.nav-section-label {
  font-size: .62rem; font-weight: 700; color: var(--text3);
  letter-spacing: .08em; text-transform: uppercase;
  padding: .5rem .65rem .25rem;
}
.nav-item {
  display: flex; align-items: center; gap: .65rem;
  padding: .6rem .75rem; border-radius: 8px;
  font-size: .825rem; font-weight: 500;
  cursor: pointer; color: var(--text2);
  transition: all var(--transition);
  border: 1px solid transparent; user-select: none;
  position: relative;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-dim); color: var(--accent-light); border-color: rgba(59,130,246,.2); }
.nav-item .ni { width: 16px; text-align: center; font-size: .82rem; opacity: .8; }
.nav-item.active .ni { opacity: 1; }
.nav-badge {
  margin-left: auto;
  background: var(--accent); color: #fff;
  font-size: .58rem; font-weight: 700; letter-spacing: .02em;
  padding: .15rem .4rem; border-radius: 10px;
  min-width: 18px; text-align: center; display: none;
}
.nav-badge.show { display: block; }
.sidebar-sep { height: 1px; background: var(--border); margin: .5rem 0; }

/* ── EMAIL LIST PANE ── */
.email-list-pane {
  width: 340px; min-width: 280px;
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--bg);
}
.list-header {
  padding: .75rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: .5rem;
  min-height: 50px; background: var(--surface);
}
.list-title { font-size: .88rem; font-weight: 700; flex: 1; letter-spacing: -.01em; }
.list-count { font-size: .7rem; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: .15rem .55rem; }
.refresh-btn {
  background: transparent; border: 1px solid var(--border);
  border-radius: 7px; color: var(--text3);
  padding: .3rem .65rem; font-size: .72rem; font-weight: 500;
  cursor: pointer; font-family: var(--font);
  transition: all var(--transition);
  display: flex; align-items: center; gap: .3rem;
}
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
.refresh-btn.spinning i { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.email-list { flex: 1; overflow-y: auto; }
.email-row {
  padding: .9rem 1rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background var(--transition);
  position: relative;
}
.email-row:hover { background: var(--surface2); }
.email-row.active { background: rgba(59,130,246,.08); border-left: 2px solid var(--accent); }
.email-row.unread { background: var(--surface); }
.email-row.unread .er-subject { font-weight: 700; color: var(--text); }
.er-from {
  font-size: .78rem; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: .2rem; display: flex; align-items: center; gap: .4rem;
}
.er-from .unread-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
.er-subject { font-size: .78rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .25rem; }
.er-snippet { font-size: .7rem; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.er-meta { position: absolute; top: .9rem; right: 1rem; font-size: .65rem; color: var(--text3); font-variant-numeric: tabular-nums; }
.er-to-tag {
  display: inline-block; font-size: .6rem; font-weight: 600; padding: .1rem .4rem;
  background: var(--accent-dim); color: var(--accent-light);
  border-radius: 4px; margin-left: .35rem; flex-shrink: 0;
}
.empty-list { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: .8rem; }
.empty-list i { font-size: 1.75rem; display: block; margin-bottom: .6rem; opacity: .4; }

/* ── EMAIL DETAIL PANE ── */
.email-detail-pane {
  flex: 1; overflow-y: auto;
  display: flex; flex-direction: column;
  background: var(--bg);
}
.detail-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text3); gap: .6rem;
}
.detail-empty i { font-size: 2.5rem; opacity: .2; }
.detail-empty p { font-size: .82rem; }
.detail-empty span { font-size: .7rem; color: var(--text3); opacity: .6; }

.detail-header { padding: 1.5rem 1.75rem 1rem; border-bottom: 1px solid var(--border); }
.detail-subject { font-size: 1.15rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: 1rem; line-height: 1.35; color: var(--text); }
.detail-meta-table { display: flex; flex-direction: column; gap: .45rem; }
.detail-meta-row { display: flex; gap: .75rem; font-size: .78rem; align-items: flex-start; }
.detail-meta-label { color: var(--text3); width: 34px; flex-shrink: 0; font-weight: 600; padding-top: 1px; }
.detail-meta-val { color: var(--text2); flex: 1; line-height: 1.4; }
.detail-meta-val strong { color: var(--text); font-weight: 600; }
.detail-date { font-size: .7rem; color: var(--text3); margin-top: .5rem; }
.detail-body { padding: 1.5rem 1.75rem; flex: 1; }
.detail-body .text-body { font-size: .875rem; line-height: 1.75; color: var(--text2); white-space: pre-wrap; word-break: break-word; }
.detail-body iframe { width: 100%; border: none; border-radius: 10px; background: #fff; display: block; }

.status-pill {
  display: inline-flex; align-items: center; gap: .35rem;
  font-size: .68rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
  padding: .25rem .65rem; border-radius: 20px; margin-top: .5rem;
}
.status-pill.delivered { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,211,160,.2); }
.status-pill.sent { background: var(--accent-dim); color: var(--accent-light); border: 1px solid rgba(59,130,246,.2); }
.status-pill.bounced { background: var(--red-dim); color: var(--red); border: 1px solid rgba(244,63,94,.2); }
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* ── COMPOSE MODAL ── */
.compose-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
  z-index: 200; align-items: flex-end; justify-content: flex-end;
  padding: 1rem;
}
.compose-overlay.show { display: flex; }
.compose-modal {
  width: 100%; max-width: 560px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 18px;
  display: flex; flex-direction: column;
  max-height: 92vh;
  box-shadow: 0 24px 64px rgba(0,0,0,.7), 0 0 0 1px rgba(59,130,246,.08);
  animation: slideUp .22s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.cm-header {
  padding: .85rem 1.25rem;
  background: var(--surface2);
  border-radius: 18px 18px 0 0;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.cm-title { font-size: .82rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: .5rem; }
.cm-title-icon { color: var(--accent-light); }
.cm-close {
  background: var(--surface3); border: 1px solid var(--border);
  color: var(--text3); cursor: pointer; font-size: .8rem;
  padding: .3rem .5rem; border-radius: 6px;
  transition: all var(--transition);
}
.cm-close:hover { color: var(--red); border-color: var(--red); background: var(--red-dim); }

.cm-fields { display: flex; flex-direction: column; }
.cm-field {
  display: flex; align-items: flex-start;
  border-bottom: 1px solid var(--border);
  padding: .65rem 1.25rem; gap: .75rem;
}
.cm-field label { font-size: .68rem; font-weight: 700; color: var(--text3); min-width: 48px; padding-top: .5rem; letter-spacing: .06em; text-transform: uppercase; }
.cm-field input, .cm-field select, .cm-field textarea {
  flex: 1; background: transparent; border: none;
  color: var(--text); font-size: .855rem; outline: none; font-family: var(--font); resize: none;
}
.cm-field select option { background: var(--surface2); }
.cm-tag-input-wrapper { flex: 1; display: flex; flex-wrap: wrap; gap: .3rem; align-items: center; min-height: 32px; }
.to-tag {
  display: inline-flex; align-items: center; gap: .3rem;
  background: var(--accent-dim); border: 1px solid rgba(59,130,246,.25);
  color: var(--accent-light); font-size: .75rem; font-weight: 500;
  padding: .2rem .55rem .2rem .45rem; border-radius: 6px; white-space: nowrap;
}
.to-tag-rm { cursor: pointer; opacity: .6; font-size: .65rem; }
.to-tag-rm:hover { opacity: 1; color: var(--red); }
.to-input {
  flex: 1; min-width: 140px; background: transparent; border: none;
  color: var(--text); font-size: .855rem; outline: none; font-family: var(--font);
  padding: 0;
}

/* Compose body */
.cm-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.cm-type-tabs {
  display: flex; padding: .6rem 1.25rem;
  gap: .4rem; border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.cm-tab {
  padding: .3rem .75rem; border: 1px solid var(--border);
  border-radius: 7px; background: transparent;
  color: var(--text3); font-size: .72rem; font-weight: 600;
  cursor: pointer; font-family: var(--font); transition: all var(--transition);
}
.cm-tab:hover { border-color: var(--accent); color: var(--accent-light); }
.cm-tab.active { border-color: var(--accent); color: var(--accent-light); background: var(--accent-dim); }

.cm-toolbar {
  display: flex; gap: .3rem; padding: .55rem 1.25rem;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
  background: rgba(255,255,255,.01);
}
.cm-tb-group { display: flex; gap: .2rem; }
.cm-tb-sep { width: 1px; background: var(--border); margin: .1rem .25rem; align-self: stretch; }
.cm-tb {
  background: transparent; border: 1px solid var(--border);
  border-radius: 6px; color: var(--text3);
  font-size: .72rem; padding: .3rem .55rem;
  cursor: pointer; font-family: var(--font);
  transition: all var(--transition);
  display: flex; align-items: center; gap: .25rem;
  user-select: none;
}
.cm-tb:hover { border-color: var(--accent); color: var(--accent-light); background: var(--accent-dim); }
.cm-tb.active-fmt { border-color: var(--accent-light); color: var(--accent-light); background: var(--accent-dim); }

.cm-img-chips { display: flex; flex-wrap: wrap; gap: .35rem; padding: .5rem 1.25rem; }
.cm-img-chip {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: .25rem .6rem;
  font-size: .68rem; display: flex; align-items: center; gap: .35rem; color: var(--text2);
}
.cm-img-chip img { width: 18px; height: 18px; border-radius: 3px; object-fit: cover; }
.cm-img-chip-rm { color: var(--red); cursor: pointer; opacity: .7; }
.cm-img-chip-rm:hover { opacity: 1; }

.cm-textarea {
  width: 100%; flex: 1; min-height: 180px;
  padding: .9rem 1.25rem; background: transparent; border: none;
  color: var(--text); font-size: .875rem; font-family: var(--font);
  outline: none; resize: none; line-height: 1.7;
}
.cm-preview {
  width: 100%; border: none;
  border-top: 1px solid var(--border); background: #fff;
  min-height: 150px; display: none;
}
.cm-preview.show { display: block; }

.cm-footer {
  display: flex; align-items: center; gap: .6rem;
  padding: .85rem 1.25rem; border-top: 1px solid var(--border);
  background: var(--surface2); border-radius: 0 0 18px 18px;
}
.cm-send {
  padding: .65rem 1.25rem; background: var(--accent);
  border: none; border-radius: 8px; color: #fff;
  font-size: .835rem; font-weight: 600; font-family: var(--font);
  cursor: pointer; transition: all var(--transition);
  display: flex; align-items: center; gap: .4rem;
  box-shadow: 0 2px 8px var(--accent-glow);
}
.cm-send:hover { opacity: .88; }
.cm-send:disabled { opacity: .4; cursor: not-allowed; }
.cm-preview-btn {
  padding: .65rem .9rem; background: transparent;
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text3); font-size: .78rem; font-family: var(--font);
  cursor: pointer; transition: all var(--transition);
}
.cm-preview-btn:hover { border-color: var(--accent); color: var(--accent-light); }
.cm-status {
  flex: 1; font-size: .75rem; padding: .4rem .75rem;
  border-radius: 7px; display: none;
}
.cm-status.ok { display: block; background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,211,160,.2); }
.cm-status.err { display: block; background: var(--red-dim); color: var(--red); border: 1px solid rgba(244,63,94,.2); }

/* ── ACCESS PANEL ── */
.access-detail {
  padding: 1.75rem; display: flex; flex-direction: column; gap: 1.25rem; overflow-y: auto;
}
.access-section-title { font-size: .82rem; font-weight: 700; color: var(--text); letter-spacing: -.01em; margin-bottom: .75rem; }
.access-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.25rem; display: flex; flex-direction: column; gap: .75rem;
}
.access-input {
  width: 100%; padding: .7rem .9rem;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text); font-size: .845rem; font-family: var(--font);
  outline: none; transition: all var(--transition);
}
.access-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.access-input::placeholder { color: var(--text3); }
.access-label { font-size: .7rem; font-weight: 600; color: var(--text2); letter-spacing: .04em; text-transform: uppercase; margin-bottom: .3rem; }
.sender-tags-wrap { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .35rem; }
.sender-tag {
  display: flex; align-items: center; gap: .3rem;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 6px; padding: .3rem .65rem;
  font-size: .72rem; font-family: var(--mono); color: var(--text2);
}
.sender-tag input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }
.access-grant-btn {
  padding: .7rem 1.25rem; background: var(--green);
  border: none; border-radius: 8px; color: #fff;
  font-size: .82rem; font-weight: 700; font-family: var(--font);
  cursor: pointer; align-self: flex-start; transition: all var(--transition);
  box-shadow: 0 2px 8px rgba(34,211,160,.25);
}
.access-grant-btn:hover { opacity: .88; }
.ac-status { font-size: .75rem; padding: .4rem .75rem; border-radius: 7px; }
.ac-status.ok { background: var(--green-dim); color: var(--green); }
.ac-status.err { background: var(--red-dim); color: var(--red); }
.access-user-row {
  padding: .8rem 1rem; border-radius: 9px;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; gap: .75rem;
  transition: border-color var(--transition);
}
.access-user-row:hover { border-color: var(--border2); }
.access-user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent-dim); border: 1px solid rgba(59,130,246,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 700; color: var(--accent-light); flex-shrink: 0;
}
.access-user-info { flex: 1; min-width: 0; }
.access-user-email { font-size: .78rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.access-user-senders { font-size: .66rem; color: var(--text3); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.revoke-btn {
  background: transparent; border: 1px solid rgba(244,63,94,.3);
  color: var(--red); font-size: .68rem; font-weight: 600; font-family: var(--font);
  padding: .3rem .65rem; border-radius: 6px; cursor: pointer;
  transition: all var(--transition); white-space: nowrap;
}
.revoke-btn:hover { background: var(--red-dim); }

/* Access mini list in sidebar */
.access-mini { padding: .75rem 1rem; font-size: .75rem; }
.access-mini-title { font-size: .72rem; font-weight: 700; color: var(--text); margin-bottom: .6rem; }
.access-mini-item { padding: .4rem 0; border-bottom: 1px solid var(--border); color: var(--text2); }
.access-mini-item:last-child { border-bottom: none; }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-brand">
    <div class="gate-logo-mark">✉️</div>
    <div>
      <div class="gate-brand-name">HTML<em>Tools</em> Mail</div>
      <div class="gate-brand-sub">Workspace</div>
    </div>
  </div>
  <div class="gate-heading">Welcome back</div>
  <div class="gate-sub">Sign in to your mail account</div>
  <div class="field-group">
    <div>
      <label class="field-label">Email</label>
      <input type="email" id="g-email" class="g-input" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div>
      <label class="field-label">Password</label>
      <input type="password" id="g-pass" class="g-input" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="g-btn" id="login-btn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
  </div>
  <div class="g-err" id="g-err"></div>
</div>

<!-- SHELL -->
<div id="shell">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo-mark">✉️</div>
      <div class="topbar-name">HTML<em>Tools</em> Mail</div>
    </div>
    <div class="topbar-search">
      <i class="fas fa-search si"></i>
      <input type="text" id="search-input" placeholder="Search emails, senders, subjects…" oninput="filterEmails()" />
    </div>
    <div class="topbar-right">
      <div class="live-badge"><span class="live-dot"></span> Live</div>
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-email-text" id="user-label"></span>
      </div>
      <button class="signout" id="signout-btn"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </div>
  </div>

  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <button class="compose-btn" onclick="openCompose()"><i class="fas fa-pen-to-square"></i> Compose</button>
      <div class="nav-section-label">Mailbox</div>
      <div class="nav-item active" id="nav-inbox" onclick="switchView('inbox')">
        <i class="fas fa-inbox ni"></i> Inbox
        <span class="nav-badge" id="inbox-badge">0</span>
      </div>
      <div class="nav-item" id="nav-sent" onclick="switchView('sent')">
        <i class="fas fa-paper-plane ni"></i> Sent
      </div>
      <div class="sidebar-sep"></div>
      <div class="nav-item" id="nav-access" onclick="switchView('access')" style="display:none;">
        <i class="fas fa-users-gear ni"></i> Access Control
      </div>
    </div>

    <!-- EMAIL LIST -->
    <div class="email-list-pane">
      <div class="list-header">
        <span class="list-title" id="list-title">Inbox</span>
        <span class="list-count" id="list-count">0</span>
        <button class="refresh-btn" id="refresh-btn" onclick="loadCurrentView()"><i class="fas fa-arrows-rotate"></i> Refresh</button>
      </div>
      <div class="email-list" id="email-list">
        <div class="empty-list"><i class="fas fa-circle-notch fa-spin"></i>Loading…</div>
      </div>
    </div>

    <!-- EMAIL DETAIL -->
    <div class="email-detail-pane" id="email-detail-pane">
      <div class="detail-empty">
        <i class="fas fa-envelope-open-text"></i>
        <p>Select an email to read</p>
        <span>Nothing selected</span>
      </div>
    </div>
  </div>
</div>

<!-- COMPOSE MODAL -->
<div class="compose-overlay" id="compose-overlay" onclick="overlayClick(event)">
  <div class="compose-modal" id="compose-modal">
    <div class="cm-header">
      <span class="cm-title"><i class="fas fa-pen cm-title-icon"></i> New Message</span>
      <button class="cm-close" onclick="closeCompose()" title="Close"><i class="fas fa-times"></i></button>
    </div>
    <div class="cm-fields">
      <div class="cm-field">
        <label>From</label>
        <select id="cm-from"></select>
      </div>
      <div class="cm-field" id="to-field">
        <label>To</label>
        <div class="cm-tag-input-wrapper" id="to-tags-wrap">
          <input type="text" class="to-input" id="cm-to-input" placeholder="recipient@example.com — press Enter or comma" autocomplete="off" />
        </div>
      </div>
      <div class="cm-field">
        <label>Subject</label>
        <input type="text" id="cm-subject" placeholder="Subject…" />
      </div>
    </div>
    <div class="cm-body">
      <div class="cm-type-tabs">
        <button class="cm-tab active" id="cm-tab-normal" onclick="setCmType('normal')"><i class="fas fa-pencil"></i> Normal</button>
        <button class="cm-tab" id="cm-tab-html" onclick="setCmType('html')"><i class="fas fa-code"></i> HTML</button>
      </div>
      <div class="cm-toolbar" id="cm-toolbar">
        <div class="cm-tb-group">
          <button class="cm-tb" id="tb-bold" onclick="cmFormat('bold')" title="Bold (Ctrl+B)"><b>B</b></button>
          <button class="cm-tb" id="tb-italic" onclick="cmFormat('italic')" title="Italic (Ctrl+I)"><i>I</i></button>
          <button class="cm-tb" id="tb-underline" onclick="cmFormat('underline')" title="Underline (Ctrl+U)"><u>U</u></button>
        </div>
        <div class="cm-tb-sep"></div>
        <div class="cm-tb-group">
          <button class="cm-tb" onclick="cmInsertLink()" title="Insert link (Ctrl+K)"><i class="fas fa-link"></i></button>
          <button class="cm-tb" onclick="document.getElementById('cm-img-input').click()" title="Insert image"><i class="fas fa-image"></i></button>
          <input type="file" id="cm-img-input" accept="image/*" multiple style="display:none" onchange="cmHandleImages(event)" />
        </div>
      </div>
      <div class="cm-img-chips" id="cm-img-chips"></div>
      <textarea class="cm-textarea" id="cm-body" placeholder="Write your message here…&#10;&#10;**bold**  *italic*  __underline__  [link text](https://url)"></textarea>
      <iframe class="cm-preview" id="cm-preview" sandbox="allow-same-origin"></iframe>
    </div>
    <div class="cm-footer">
      <button class="cm-send" id="cm-send-btn" onclick="cmSend()"><i class="fas fa-paper-plane"></i> Send</button>
      <button class="cm-preview-btn" id="cm-preview-btn" onclick="cmTogglePreview()" style="display:none;"><i class="fas fa-eye"></i> Preview</button>
      <div class="cm-status" id="cm-status"></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const SUPER_ADMIN = 'matthewbozhe@gmail.com';
  const WORKER = 'https://htmltools-reset.bozhetarnikmatthew.workers.dev/';

  // Auth uses htmltools-library firebase
  const authApp = initializeApp({
    apiKey: "AIzaSyDke6bGfoJdP4U5lfA9hWHGFFTcDpWNNC8",
    authDomain: "htmltools-library.firebaseapp.com",
    projectId: "htmltools-library",
  }, 'auth-app');
  const auth = getAuth(authApp);

  // Database uses the RTDB from the second firebase project
  // Using the same project's RTDB since it was provided in the original code
  const dbApp = initializeApp({
    apiKey: "AIzaSyDke6bGfoJdP4U5lfA9hWHGFFTcDpWNNC8",
    authDomain: "htmltools-library.firebaseapp.com",
    databaseURL: "https://htmltools-library-default-rtdb.firebaseio.com",
    projectId: "htmltools-library",
  }, 'db-app');
  const db = getDatabase(dbApp);

  // All known senders
  const ALL_SENDERS = ['noreply', 'matthew', 'kovan'];

  // ── State ──
  let currentView = 'inbox';
  let allEmails = [];
  let readIds = new Set(JSON.parse(localStorage.getItem('readIds') || '[]'));
  let currentEmail = null;
  let cmType = 'normal';
  let cmImages = [];
  let cmPreviewOpen = false;
  let allowedSenders = [];
  let isSuperAdmin = false;
  let toRecipients = [];

  // ── Login ──
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('g-email').value.trim();
    const pass = document.getElementById('g-pass').value;
    const err = document.getElementById('g-err');
    const btn = document.getElementById('login-btn');
    err.style.display = 'none';
    if (!email || !pass) { showGateErr('Please fill in both fields.'); return; }
    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Signing in…'; btn.disabled = true;
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch(e) { showGateErr('⛔ ' + e.message.replace('Firebase: ','').replace(/\(.*\)/,'').trim()); }
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In'; btn.disabled = false;
  });
  document.getElementById('g-pass').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-btn').click(); });
  document.getElementById('signout-btn').addEventListener('click', () => signOut(auth));

  function showGateErr(msg) {
    const err = document.getElementById('g-err');
    err.textContent = msg; err.style.display = 'block';
  }

  onAuthStateChanged(auth, async user => {
    if (!user) {
      document.getElementById('gate').classList.remove('hidden');
      document.getElementById('shell').classList.remove('show');
      return;
    }
    const email = user.email.toLowerCase();
    if (email === SUPER_ADMIN.toLowerCase()) {
      isSuperAdmin = true;
      allowedSenders = ALL_SENDERS;
      showShell(user);
      document.getElementById('nav-access').style.display = 'flex';
    } else {
      try {
        const snap = await get(ref(db, `mailAccess/${email.replace(/\./g,'_')}`));
        if (snap.exists()) {
          allowedSenders = snap.val().senders || [];
          showShell(user);
          onValue(ref(db, `mailAccess/${email.replace(/\./g,'_')}`), s => {
            if (!s.exists()) { signOut(auth); alert('Your access has been revoked.'); }
            else { allowedSenders = s.val().senders || []; rebuildFromSelect(); }
          });
        } else {
          await signOut(auth);
          showGateErr('⛔ You do not have access to this tool.');
        }
      } catch(e) {
        await signOut(auth);
        showGateErr('⛔ Database error: ' + e.message + '. Check Firebase RTDB rules.');
      }
    }
  });

  function showShell(user) {
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('shell').classList.add('show');
    const email = user.email;
    document.getElementById('user-label').textContent = email;
    document.getElementById('user-avatar').textContent = email.charAt(0).toUpperCase();
    rebuildFromSelect();
    loadInbox();
  }

  function rebuildFromSelect() {
    const sel = document.getElementById('cm-from');
    sel.innerHTML = '';
    allowedSenders.forEach(s => {
      const opt = new Option(s + '@htmltools.me', s + '@htmltools.me');
      sel.add(opt);
    });
  }

  // ── View switching ──
  window.switchView = function(view) {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-' + view)?.classList.add('active');
    const titles = { inbox: 'Inbox', sent: 'Sent', access: 'Access Control' };
    document.getElementById('list-title').textContent = titles[view] || view;
    document.getElementById('email-detail-pane').innerHTML = '<div class="detail-empty"><i class="fas fa-envelope-open-text"></i><p>Select an email to read</p></div>';
    currentEmail = null;
    if (view === 'inbox') loadInbox();
    else if (view === 'sent') loadSent();
    else if (view === 'access') loadAccessPanel();
  };

  window.loadCurrentView = function() { switchView(currentView); };

  async function apiPost(body) {
    const res = await fetch(WORKER, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return res.json();
  }

  async function loadInbox() {
    setRefreshSpinning(true);
    document.getElementById('email-list').innerHTML = '<div class="empty-list"><i class="fas fa-circle-notch fa-spin"></i><br>Loading…</div>';
    try {
      const data = await apiPost({ type: 'get_inbox' });
      allEmails = (data.emails || []).sort((a,b) => new Date(b.date) - new Date(a.date));
      renderList();
    } catch(e) {
      document.getElementById('email-list').innerHTML = `<div class="empty-list"><i class="fas fa-triangle-exclamation"></i><br>${e.message}</div>`;
    }
    setRefreshSpinning(false);
  }

  async function loadSent() {
    setRefreshSpinning(true);
    document.getElementById('email-list').innerHTML = '<div class="empty-list"><i class="fas fa-circle-notch fa-spin"></i><br>Loading…</div>';
    try {
      const data = await apiPost({ type: 'get_sent' });
      allEmails = (data.emails || []).sort((a,b) => new Date(b.date) - new Date(a.date));
      renderList();
    } catch(e) {
      document.getElementById('email-list').innerHTML = `<div class="empty-list"><i class="fas fa-triangle-exclamation"></i><br>${e.message}</div>`;
    }
    setRefreshSpinning(false);
  }

  function setRefreshSpinning(on) {
    document.getElementById('refresh-btn').classList.toggle('spinning', on);
  }

  function renderList(query) {
    const list = document.getElementById('email-list');
    let emails = allEmails;
    if (query) {
      const q = query.toLowerCase();
      emails = emails.filter(e =>
        (e.from||'').toLowerCase().includes(q) ||
        (e.subject||'').toLowerCase().includes(q) ||
        (e.snippet||'').toLowerCase().includes(q) ||
        (e.to||'').toLowerCase().includes(q)
      );
    }

    document.getElementById('list-count').textContent = emails.length;

    if (!emails.length) {
      list.innerHTML = `<div class="empty-list"><i class="fas fa-envelope-open"></i><br>No emails found.</div>`;
      document.getElementById('inbox-badge').classList.remove('show');
      return;
    }

    if (currentView === 'inbox') {
      const unreadCount = emails.filter(e => !readIds.has(e.id)).length;
      const badge = document.getElementById('inbox-badge');
      if (unreadCount > 0) { badge.textContent = unreadCount; badge.classList.add('show'); }
      else badge.classList.remove('show');
    }

    list.innerHTML = '';
    emails.forEach(email => {
      const isUnread = currentView === 'inbox' && !readIds.has(email.id);
      const row = document.createElement('div');
      row.className = 'email-row' + (isUnread ? ' unread' : '') + (currentEmail?.id === email.id ? ' active' : '');
      row.dataset.id = email.id;
      const date = formatDate(email.date);
      const toRaw = Array.isArray(email.to) ? email.to.join(', ') : (email.to || '');
      const fromRaw = email.from || '';
      const fromDisplay = currentView === 'sent' ? toRaw : fromRaw;
      const snippet = email.snippet || (currentView === 'sent' ? toRaw : '');

      row.innerHTML = `
        <div class="er-meta">${escHtml(date)}</div>
        <div class="er-from">
          ${isUnread ? '<span class="unread-dot"></span>' : ''}
          ${escHtml(fromDisplay)}
          ${currentView === 'sent' ? `<span class="er-to-tag">sent</span>` : ''}
        </div>
        <div class="er-subject">${escHtml(email.subject || '(no subject)')}</div>
        <div class="er-snippet">${escHtml(snippet)}</div>
      `;
      row.addEventListener('click', () => openEmail(email, row));
      list.appendChild(row);
    });
  }

  window.filterEmails = function() {
    renderList(document.getElementById('search-input').value.trim() || undefined);
  };

  async function openEmail(email, row) {
    document.querySelectorAll('.email-row').forEach(r => r.classList.remove('active'));
    row.classList.add('active');
    currentEmail = email;

    if (currentView === 'inbox' && !readIds.has(email.id)) {
      readIds.add(email.id);
      localStorage.setItem('readIds', JSON.stringify([...readIds]));
      row.classList.remove('unread');
      row.querySelector('.unread-dot')?.remove();
      renderList(document.getElementById('search-input').value.trim() || undefined);
    }

    const pane = document.getElementById('email-detail-pane');
    pane.innerHTML = '<div class="detail-empty"><i class="fas fa-circle-notch fa-spin"></i><p>Loading…</p></div>';

    let fullEmail = email;
    try {
      const data = await apiPost({ type: 'get_email', id: email.id });
      if (data.success && data.email) fullEmail = { ...email, ...data.email };
    } catch(e) {}

    const dateStr = fullEmail.date ? new Date(fullEmail.date).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' }) : '';
    const toVal = Array.isArray(fullEmail.to) ? fullEmail.to.join(', ') : (fullEmail.to || '');
    const fromVal = fullEmail.from || '';
    const rawHtml = fullEmail.html || fullEmail.text || '';
    const hasHtml = !!(fullEmail.html);

    let statusBadge = '';
    if (currentView === 'sent' && fullEmail.status) {
      const sc = fullEmail.status === 'delivered' ? 'delivered' : fullEmail.status === 'bounced' ? 'bounced' : 'sent';
      const icons = { delivered: 'fa-circle-check', bounced: 'fa-circle-xmark', sent: 'fa-circle-dot' };
      statusBadge = `<span class="status-pill ${sc}"><i class="fas ${icons[sc] || 'fa-circle-dot'}" style="font-size:.65rem;"></i> ${fullEmail.status}</span>`;
    }

    pane.innerHTML = `
      <div class="detail-header">
        <div class="detail-subject">${escHtml(fullEmail.subject || '(no subject)')}</div>
        ${statusBadge}
        <div class="detail-meta-table" style="margin-top:.75rem;">
          <div class="detail-meta-row">
            <span class="detail-meta-label">From</span>
            <span class="detail-meta-val"><strong>${escHtml(fromVal)}</strong></span>
          </div>
          <div class="detail-meta-row">
            <span class="detail-meta-label">To</span>
            <span class="detail-meta-val">${escHtml(toVal)}</span>
          </div>
          <div class="detail-date">${escHtml(dateStr)}</div>
        </div>
      </div>
      <div class="detail-body" id="detail-body-area"></div>
    `;

    const bodyArea = document.getElementById('detail-body-area');
    if (rawHtml) {
      if (hasHtml) {
        const frame = document.createElement('iframe');
        frame.style.cssText = 'width:100%;border:none;border-radius:10px;background:#fff;min-height:300px;display:block;';
        frame.sandbox = 'allow-same-origin allow-popups';
        bodyArea.appendChild(frame);
        const doc = frame.contentDocument || frame.contentWindow.document;
        doc.open(); doc.write(rawHtml); doc.close();
        setTimeout(() => {
          try { frame.style.height = (frame.contentDocument.body.scrollHeight + 32) + 'px'; } catch(e) {}
        }, 200);
      } else {
        const linked = rawHtml.replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" style="color:#60a5fa;">$1</a>');
        bodyArea.innerHTML = `<div class="text-body">${linked}</div>`;
      }
    } else {
      bodyArea.innerHTML = '<p style="color:var(--text3);font-size:.82rem;padding-top:.5rem;">No content available.</p>';
    }
  }

  // ── Access panel ──
  function loadAccessPanel() {
    const list = document.getElementById('email-list');
    list.innerHTML = '<div class="access-mini"><div class="access-mini-title"><i class="fas fa-users-gear" style="margin-right:.4rem;"></i>Users with access</div><div id="access-mini-list" style="font-size:.75rem;color:var(--text3);">Loading…</div></div>';

    const pane = document.getElementById('email-detail-pane');
    pane.innerHTML = `
      <div class="access-detail">
        <div>
          <div class="access-section-title">Grant Access</div>
          <div class="access-card">
            <div>
              <div class="access-label">User Email</div>
              <input type="email" id="ac-email" class="access-input" placeholder="user@example.com" />
            </div>
            <div>
              <div class="access-label">Sender Access</div>
              <div class="sender-tags-wrap" id="ac-senders-checks">
                ${ALL_SENDERS.map(s => `
                  <label class="sender-tag">
                    <input type="checkbox" value="${s}" checked /> ${s}@htmltools.me
                  </label>
                `).join('')}
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;">
              <button class="access-grant-btn" onclick="grantAccess()"><i class="fas fa-plus"></i> Grant Access</button>
              <div id="ac-status" style="font-size:.75rem;"></div>
            </div>
          </div>
        </div>
        <div>
          <div class="access-section-title">Current Users</div>
          <div id="access-user-list" style="display:flex;flex-direction:column;gap:.5rem;">
            <div style="color:var(--text3);font-size:.8rem;">Loading…</div>
          </div>
        </div>
      </div>
    `;

    onValue(ref(db, 'mailAccess'), snap => {
      const data = snap.val() || {};
      const entries = Object.entries(data);

      // Update sidebar mini list
      const ml = document.getElementById('access-mini-list');
      if (ml) {
        if (!entries.length) { ml.innerHTML = 'No users with access yet.'; }
        else { ml.innerHTML = entries.map(([,v]) => `<div class="access-mini-item">${escHtml(v.email)}</div>`).join(''); }
      }

      // Update main list
      const ul = document.getElementById('access-user-list');
      if (!ul) return;
      if (!entries.length) { ul.innerHTML = '<div style="color:var(--text3);font-size:.8rem;">No users with access yet.</div>'; return; }
      ul.innerHTML = entries.map(([key, val]) => {
        const initials = (val.email || '?').charAt(0).toUpperCase();
        const senderStr = (val.senders||[]).map(s=>s+'@htmltools.me').join(', ') || 'No senders';
        return `
          <div class="access-user-row">
            <div class="access-user-avatar">${escHtml(initials)}</div>
            <div class="access-user-info">
              <div class="access-user-email">${escHtml(val.email)}</div>
              <div class="access-user-senders">${escHtml(senderStr)}</div>
            </div>
            <button class="revoke-btn" onclick="revokeAccess('${key}','${escHtml(val.email)}')">Revoke</button>
          </div>
        `;
      }).join('');
    });
  }

  window.grantAccess = async function() {
    const email = document.getElementById('ac-email').value.trim().toLowerCase();
    const status = document.getElementById('ac-status');
    if (!email) { setAcStatus('⛔ Enter a user email.', 'err'); return; }

    const checkboxes = document.querySelectorAll('#ac-senders-checks input[type=checkbox]:checked');
    const senders = Array.from(checkboxes).map(cb => cb.value);
    if (!senders.length) { setAcStatus('⛔ Select at least one sender.', 'err'); return; }

    const key = email.replace(/\./g,'_');
    try {
      await set(ref(db, `mailAccess/${key}`), { email, senders });
      document.getElementById('ac-email').value = '';
      setAcStatus('✅ Access granted!', 'ok');
      setTimeout(() => setAcStatus('', ''), 3000);
    } catch(e) { setAcStatus('❌ ' + e.message, 'err'); }
  };

  function setAcStatus(msg, cls) {
    const el = document.getElementById('ac-status');
    if (!el) return;
    el.textContent = msg;
    el.className = 'ac-status' + (cls ? ' ' + cls : '');
  }

  window.revokeAccess = async function(key, email) {
    if (!confirm(`Revoke access for ${email}?`)) return;
    try { await remove(ref(db, `mailAccess/${key}`)); }
    catch(e) { alert('Error: ' + e.message); }
  };

  // ── To field (multi-recipient) ──
  function addRecipient(email) {
    if (!email || toRecipients.includes(email)) return;
    toRecipients.push(email);
    renderToTags();
  }
  function removeRecipient(email) {
    toRecipients = toRecipients.filter(r => r !== email);
    renderToTags();
  }
  function renderToTags() {
    const wrap = document.getElementById('to-tags-wrap');
    const input = document.getElementById('cm-to-input');
    // Remove old tags
    wrap.querySelectorAll('.to-tag').forEach(t => t.remove());
    toRecipients.forEach(email => {
      const tag = document.createElement('span');
      tag.className = 'to-tag';
      tag.innerHTML = `${escHtml(email)} <span class="to-tag-rm" data-email="${escHtml(email)}">✕</span>`;
      tag.querySelector('.to-tag-rm').addEventListener('click', () => removeRecipient(email));
      wrap.insertBefore(tag, input);
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    const toInput = document.getElementById('cm-to-input');
    if (toInput) {
      toInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ',') {
          e.preventDefault();
          const val = toInput.value.trim().replace(/,$/,'');
          if (val) { addRecipient(val); toInput.value = ''; }
        } else if (e.key === 'Backspace' && !toInput.value && toRecipients.length) {
          removeRecipient(toRecipients[toRecipients.length - 1]);
        }
      });
      toInput.addEventListener('blur', () => {
        const val = toInput.value.trim().replace(/,$/,'');
        if (val) { addRecipient(val); toInput.value = ''; }
      });
    }
  });

  // ── Compose ──
  window.openCompose = function() {
    toRecipients = [];
    const inp = document.getElementById('cm-to-input');
    if (inp) inp.value = '';
    renderToTags();
    document.getElementById('compose-overlay').classList.add('show');
    document.getElementById('cm-to-input').focus();
  };
  window.closeCompose = function() {
    document.getElementById('compose-overlay').classList.remove('show');
    cmImages = []; renderCmChips();
    cmPreviewOpen = false;
    document.getElementById('cm-preview').classList.remove('show');
    document.getElementById('cm-preview-btn').innerHTML = '<i class="fas fa-eye"></i> Preview';
    document.getElementById('cm-status').className = 'cm-status';
    document.getElementById('cm-body').value = '';
    document.getElementById('cm-subject').value = '';
    toRecipients = [];
    renderToTags();
  };
  window.overlayClick = function(e) {
    if (e.target === document.getElementById('compose-overlay')) closeCompose();
  };

  window.setCmType = function(type) {
    cmType = type;
    document.getElementById('cm-tab-normal').classList.toggle('active', type === 'normal');
    document.getElementById('cm-tab-html').classList.toggle('active', type === 'html');
    document.getElementById('cm-toolbar').style.display = type === 'normal' ? 'flex' : 'none';
    document.getElementById('cm-img-chips').style.display = type === 'normal' ? 'flex' : 'none';
    document.getElementById('cm-preview-btn').style.display = type === 'html' ? 'inline-flex' : 'none';
    document.getElementById('cm-body').placeholder = type === 'html'
      ? '<h1>Hello!</h1>\n<p>Your message here…</p>'
      : 'Write your message…\n\n**bold**  *italic*  __underline__  [link text](https://url)';
    if (type === 'normal') { document.getElementById('cm-preview').classList.remove('show'); cmPreviewOpen = false; }
  };

  // ── Formatting helpers ──
  window.cmFormat = function(cmd) {
    const ta = document.getElementById('cm-body');
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    const selected = ta.value.slice(start, end);
    const markers = { bold: '**', italic: '*', underline: '__' };
    const m = markers[cmd];
    if (!m) return;

    const before = ta.value.slice(0, start);
    const after = ta.value.slice(end);
    const wrapped = `${m}${selected || 'text'}${m}`;
    ta.value = before + wrapped + after;
    const newCursor = start + m.length;
    ta.setSelectionRange(newCursor, newCursor + (selected || 'text').length);
    ta.focus();
  };

  window.cmInsertLink = function() {
    const ta = document.getElementById('cm-body');
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    const selected = ta.value.slice(start, end);
    const url = prompt('Enter URL:', 'https://');
    if (!url) return;
    const text = selected || prompt('Link text:', 'Click here') || url;
    const insert = `[${text}](${url})`;
    ta.value = ta.value.slice(0, start) + insert + ta.value.slice(end);
    ta.setSelectionRange(start, start + insert.length);
    ta.focus();
  };

  // Keyboard shortcuts for compose
  document.addEventListener('keydown', e => {
    if (!document.getElementById('compose-overlay').classList.contains('show')) return;
    if (e.target.id !== 'cm-body') return;
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 'b') { e.preventDefault(); cmFormat('bold'); }
      else if (e.key === 'i') { e.preventDefault(); cmFormat('italic'); }
      else if (e.key === 'u') { e.preventDefault(); cmFormat('underline'); }
      else if (e.key === 'k') { e.preventDefault(); cmInsertLink(); }
    }
  });

  window.cmHandleImages = function(e) {
    Array.from(e.target.files).forEach(file => {
      const r = new FileReader();
      r.onload = ev => { cmImages.push({ name: file.name, data: ev.target.result }); renderCmChips(); };
      r.readAsDataURL(file);
    });
    e.target.value = '';
  };

  function renderCmChips() {
    const c = document.getElementById('cm-img-chips');
    c.innerHTML = '';
    cmImages.forEach((img, i) => {
      const d = document.createElement('div');
      d.className = 'cm-img-chip';
      d.innerHTML = `<img src="${img.data}" alt=""><span>${escHtml(img.name)}</span><span class="cm-img-chip-rm" data-i="${i}">✕</span>`;
      c.appendChild(d);
    });
    c.querySelectorAll('.cm-img-chip-rm').forEach(btn => {
      btn.addEventListener('click', () => { cmImages.splice(parseInt(btn.dataset.i), 1); renderCmChips(); });
    });
  }

  function parseMarkdown(text) {
    // Bold: **text** or __text__
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic: *text* (single asterisk, not double)
    text = text.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
    // Underline: __text__
    text = text.replace(/__(.+?)__/g, '<u>$1</u>');
    // Links: [text](url)
    text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" style="color:#60a5fa;text-decoration:underline;">$1</a>');
    // Auto-link bare URLs (not already in href)
    text = text.replace(/(^|[^"'=\(])(https?:\/\/[^\s<>"]+)/g, '$1<a href="$2" style="color:#60a5fa;text-decoration:underline;">$2</a>');
    // Newlines
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function buildCmHtml() {
    if (cmType === 'html') return document.getElementById('cm-body').value;
    let text = document.getElementById('cm-body').value;
    let html = `<div style="font-family:'Segoe UI',sans-serif;font-size:14px;line-height:1.75;color:#1e293b;max-width:600px;padding:8px 0;">`;
    html += parseMarkdown(text);
    cmImages.forEach(img => { html += `<br><img src="${img.data}" style="max-width:100%;border-radius:8px;margin-top:12px;display:block;">`; });
    return html + '</div>';
  }

  window.cmTogglePreview = function() {
    cmPreviewOpen = !cmPreviewOpen;
    const frame = document.getElementById('cm-preview');
    if (cmPreviewOpen) {
      frame.classList.add('show');
      const doc = frame.contentDocument || frame.contentWindow.document;
      doc.open(); doc.write(buildCmHtml()); doc.close();
      setTimeout(() => { try { frame.style.height = (frame.contentDocument.body.scrollHeight + 20) + 'px'; } catch(e){} }, 150);
      document.getElementById('cm-preview-btn').innerHTML = '<i class="fas fa-eye-slash"></i> Hide';
    } else {
      frame.classList.remove('show');
      document.getElementById('cm-preview-btn').innerHTML = '<i class="fas fa-eye"></i> Preview';
    }
  };

  window.cmSend = async function() {
    // Flush any pending input
    const rawInput = document.getElementById('cm-to-input').value.trim().replace(/,$/,'');
    if (rawInput) { addRecipient(rawInput); document.getElementById('cm-to-input').value = ''; }

    const from = document.getElementById('cm-from').value;
    const to = toRecipients.join(', ');
    const subject = document.getElementById('cm-subject').value.trim();
    const body = document.getElementById('cm-body').value.trim();
    const btn = document.getElementById('cm-send-btn');
    const status = document.getElementById('cm-status');
    status.className = 'cm-status'; status.textContent = '';

    if (!toRecipients.length) { status.textContent = 'Please add at least one recipient.'; status.className = 'cm-status err'; return; }
    if (!subject) { status.textContent = 'Please enter a subject.'; status.className = 'cm-status err'; return; }
    if (!body) { status.textContent = 'Please write a message.'; status.className = 'cm-status err'; return; }

    btn.disabled = true; btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Sending…';
    try {
      const data = await apiPost({ type: 'send_email', from, to, subject, html: buildCmHtml() });
      if (data.success) {
        status.textContent = `✅ Sent from ${from} to ${toRecipients.join(', ')}!`;
        status.className = 'cm-status ok';
        setTimeout(closeCompose, 2200);
      } else {
        status.textContent = '❌ ' + (data.error || JSON.stringify(data.data));
        status.className = 'cm-status err';
      }
    } catch(e) { status.textContent = '❌ ' + e.message; status.className = 'cm-status err'; }
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send';
  };

  // ── Helpers ──
  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const isToday = now.toDateString() === d.toDateString();
    if (isToday) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const isThisYear = now.getFullYear() === d.getFullYear();
    if (isThisYear) return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: '2-digit' });
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
