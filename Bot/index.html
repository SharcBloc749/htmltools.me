<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTMLTools Mail</title>
<link rel="icon" type="image/png" href="/logo3.png?v=2" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
  :root {
    --bg: #0a0c10;
    --surface: #0e1117;
    --surface2: #13181f;
    --surface3: #1a2030;
    --border: #1e2535;
    --border2: #252d3d;
    --accent: #4da6ff;
    --accent-dim: rgba(77,166,255,0.12);
    --accent-glow: rgba(77,166,255,0.25);
    --green: #34d97b;
    --red: #f04060;
    --red-dim: rgba(240,64,96,0.1);
    --text: #d0daea;
    --text2: #7a8ba0;
    --text3: #4a5a6a;
    --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

  /* ── GATE ── */
  #gate { width: 100%; max-width: 360px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2.25rem 2rem; text-align: center; }
  #gate.hidden { display: none; }
  .gate-icon { font-size: 2.2rem; margin-bottom: .6rem; }
  .gate-title { font-size: 1.35rem; font-weight: 800; letter-spacing: -.02em; }
  .gate-title span { color: var(--accent); }
  .gate-sub { font-size: .72rem; color: var(--text3); margin: .3rem 0 1.6rem; }
  .g-input { width: 100%; padding: .75rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: .9rem; outline: none; margin-bottom: .55rem; transition: border-color .2s; font-family: inherit; }
  .g-input:focus { border-color: var(--accent); }
  .g-btn { width: 100%; padding: .85rem; background: var(--accent); border: none; border-radius: 10px; color: #fff; font-size: .88rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s; }
  .g-btn:hover { opacity: .88; }
  .g-err { display: none; margin-top: .6rem; font-size: .7rem; color: var(--red); background: var(--red-dim); border-radius: 6px; padding: .4rem .6rem; }

  /* ── SHELL ── */
  #shell { display: none; width: 100vw; height: 100vh; flex-direction: column; }
  #shell.show { display: flex; }

  .topbar { height: 52px; min-height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 1rem; gap: .75rem; z-index: 10; }
  .topbar-logo { font-weight: 800; font-size: 1rem; letter-spacing: -.02em; display: flex; align-items: center; gap: .3rem; }
  .topbar-logo span { color: var(--accent); }
  .topbar-logo .icon { font-size: 1.2rem; }
  .topbar-search { flex: 1; max-width: 500px; position: relative; }
  .topbar-search input { width: 100%; padding: .5rem 1rem .5rem 2.4rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 24px; color: var(--text); font-size: .85rem; outline: none; font-family: inherit; transition: border-color .2s, background .2s; }
  .topbar-search input:focus { border-color: var(--accent); background: var(--surface3); }
  .topbar-search .si { position: absolute; left: .85rem; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: .8rem; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: .75rem; }
  .online-pill { display: flex; align-items: center; gap: .35rem; font-size: .7rem; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: .3rem .7rem; }
  .online-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .user-email { font-size: .7rem; color: var(--text2); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .signout { background: transparent; border: 1px solid rgba(240,64,96,.3); color: var(--red); font-size: .68rem; padding: .3rem .65rem; border-radius: 6px; cursor: pointer; font-family: inherit; transition: background .15s; }
  .signout:hover { background: var(--red-dim); }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── SIDEBAR ── */
  .sidebar { width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 1rem 0; gap: .25rem; }
  .compose-btn { margin: 0 .75rem .75rem; padding: .8rem 1rem; background: var(--accent); border: none; border-radius: 12px; color: #fff; font-size: .85rem; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: .5rem; justify-content: center; transition: opacity .15s, box-shadow .15s; box-shadow: 0 2px 12px var(--accent-glow); }
  .compose-btn:hover { opacity: .88; box-shadow: 0 4px 20px var(--accent-glow); }
  .nav-item { display: flex; align-items: center; gap: .7rem; padding: .55rem 1rem; margin: 0 .5rem; border-radius: 8px; font-size: .83rem; cursor: pointer; color: var(--text2); transition: all .15s; border: 1px solid transparent; user-select: none; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(77,166,255,.2); }
  .nav-item .ni { width: 16px; text-align: center; font-size: .85rem; }
  .nav-item .badge { margin-left: auto; background: var(--accent); color: #fff; font-size: .6rem; font-weight: 700; padding: .15rem .4rem; border-radius: 10px; min-width: 18px; text-align: center; display: none; }
  .nav-item .badge.show { display: block; }
  .sidebar-sep { height: 1px; background: var(--border); margin: .5rem .75rem; }

  /* ── EMAIL LIST ── */
  .email-list-pane { width: 340px; min-width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .list-header { padding: .75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .5rem; min-height: 48px; }
  .list-title { font-size: .85rem; font-weight: 700; flex: 1; }
  .refresh-btn { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--text3); padding: .3rem .6rem; font-size: .72rem; cursor: pointer; font-family: inherit; transition: all .15s; display: flex; align-items: center; gap: .3rem; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .refresh-btn.spinning i { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .email-list { flex: 1; overflow-y: auto; }
  .email-list::-webkit-scrollbar { width: 4px; }
  .email-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .email-row { padding: .85rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; position: relative; }
  .email-row:hover { background: var(--surface2); }
  .email-row.active { background: var(--accent-dim); }
  .email-row.unread .er-subject { font-weight: 700; color: var(--text); }
  .er-from { font-size: .75rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .2rem; display: flex; align-items: center; gap: .4rem; }
  .er-from .unread-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }
  .er-subject { font-size: .78rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .2rem; }
  .er-snippet { font-size: .7rem; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .er-meta { position: absolute; top: .85rem; right: 1rem; font-size: .65rem; color: var(--text3); }
  .empty-list { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: .8rem; }
  .empty-list i { font-size: 2rem; display: block; margin-bottom: .5rem; }

  /* ── EMAIL DETAIL ── */
  .email-detail-pane { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .email-detail-pane::-webkit-scrollbar { width: 5px; }
  .email-detail-pane::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .detail-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); gap: .5rem; }
  .detail-empty i { font-size: 3rem; opacity: .3; }
  .detail-empty p { font-size: .8rem; }
  .detail-header { padding: 1.25rem 1.5rem .75rem; border-bottom: 1px solid var(--border); }
  .detail-subject { font-size: 1.1rem; font-weight: 700; letter-spacing: -.01em; margin-bottom: .75rem; line-height: 1.3; }
  .detail-meta { display: flex; flex-direction: column; gap: .3rem; }
  .detail-meta-row { display: flex; gap: .5rem; font-size: .75rem; }
  .detail-meta-label { color: var(--text3); min-width: 32px; }
  .detail-meta-val { color: var(--text2); }
  .detail-meta-val strong { color: var(--text); }
  .detail-date { font-size: .7rem; color: var(--text3); margin-top: .25rem; }
  .detail-body { padding: 1.25rem 1.5rem; flex: 1; }
  .detail-body iframe { width: 100%; border: none; border-radius: 10px; background: #fff; }
  .detail-body .text-body { font-size: .88rem; line-height: 1.7; color: var(--text2); white-space: pre-wrap; word-break: break-word; }
  .sent-status { display: inline-flex; align-items: center; gap: .35rem; font-size: .68rem; padding: .25rem .55rem; border-radius: 20px; font-weight: 600; margin-top: .5rem; }
  .sent-status.delivered { background: rgba(52,217,123,.1); color: var(--green); }
  .sent-status.sent { background: var(--accent-dim); color: var(--accent); }
  .sent-status.bounced { background: var(--red-dim); color: var(--red); }

  /* ── COMPOSE MODAL ── */
  .compose-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: flex-end; justify-content: flex-end; padding: 1rem; }
  .compose-overlay.show { display: flex; }
  .compose-modal { width: 100%; max-width: 520px; background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; display: flex; flex-direction: column; max-height: 90vh; box-shadow: 0 20px 60px rgba(0,0,0,.6); animation: slideUp .2s ease; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .cm-header { padding: .75rem 1rem; background: var(--surface3); border-radius: 16px 16px 0 0; display: flex; align-items: center; justify-content: space-between; cursor: move; }
  .cm-title { font-size: .82rem; font-weight: 700; color: var(--text2); }
  .cm-close { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 1rem; padding: .2rem .4rem; border-radius: 4px; transition: color .15s; }
  .cm-close:hover { color: var(--red); }
  .cm-fields { display: flex; flex-direction: column; }
  .cm-field { display: flex; align-items: center; border-bottom: 1px solid var(--border); padding: .5rem 1rem; gap: .5rem; }
  .cm-field label { font-size: .7rem; color: var(--text3); min-width: 44px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
  .cm-field input, .cm-field select { flex: 1; background: transparent; border: none; color: var(--text); font-size: .85rem; outline: none; font-family: inherit; }
  .cm-field select option { background: var(--surface); }
  .cm-body { flex: 1; overflow-y: auto; }
  .cm-body::-webkit-scrollbar { width: 3px; }
  .cm-body::-webkit-scrollbar-thumb { background: var(--border2); }
  .cm-type-tabs { display: flex; padding: .5rem 1rem; gap: .4rem; border-bottom: 1px solid var(--border); }
  .cm-tab { padding: .3rem .7rem; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text3); font-size: .72rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
  .cm-tab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .cm-toolbar { display: flex; gap: .3rem; padding: .4rem 1rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .cm-tb { background: transparent; border: 1px solid var(--border); border-radius: 5px; color: var(--text3); font-size: .7rem; padding: .3rem .6rem; cursor: pointer; font-family: inherit; transition: all .15s; display: flex; align-items: center; gap: .25rem; }
  .cm-tb:hover { border-color: var(--accent); color: var(--accent); }
  .cm-textarea { width: 100%; min-height: 200px; padding: 1rem; background: transparent; border: none; color: var(--text); font-size: .88rem; font-family: inherit; outline: none; resize: none; line-height: 1.6; }
  .cm-img-chips { display: flex; flex-wrap: wrap; gap: .35rem; padding: 0 1rem .5rem; }
  .cm-img-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: .25rem .5rem; font-size: .68rem; display: flex; align-items: center; gap: .35rem; }
  .cm-img-chip img { width: 18px; height: 18px; border-radius: 3px; object-fit: cover; }
  .cm-img-chip-rm { color: var(--red); cursor: pointer; }
  .cm-preview { width: 100%; border: none; border-top: 1px solid var(--border); background: #fff; min-height: 150px; display: none; }
  .cm-preview.show { display: block; }
  .cm-footer { display: flex; align-items: center; gap: .6rem; padding: .75rem 1rem; border-top: 1px solid var(--border); }
  .cm-send { padding: .65rem 1.25rem; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: .83rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s; display: flex; align-items: center; gap: .4rem; }
  .cm-send:hover { opacity: .88; }
  .cm-send:disabled { opacity: .5; cursor: not-allowed; }
  .cm-preview-btn { padding: .65rem .9rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text3); font-size: .78rem; cursor: pointer; font-family: inherit; transition: all .15s; }
  .cm-preview-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cm-status { flex: 1; font-size: .72rem; padding: .35rem .65rem; border-radius: 5px; display: none; }
  .cm-status.ok { display: block; background: rgba(52,217,123,.1); color: var(--green); }
  .cm-status.err { display: block; background: var(--red-dim); color: var(--red); }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-icon">✉️</div>
  <div class="gate-title">HTML<span>Tools</span> Mail</div>
  <div class="gate-sub">Sign in to access the mail tool.</div>
  <input type="email" id="g-email" class="g-input" placeholder="your@email.com" />
  <input type="password" id="g-pass" class="g-input" placeholder="••••••••" />
  <button class="g-btn" id="login-btn">Sign In</button>
  <div class="g-err" id="g-err"></div>
</div>

<!-- SHELL -->
<div id="shell">
  <div class="topbar">
    <div class="topbar-logo"><span class="icon">✉️</span> HTML<span>Tools</span> Mail</div>
    <div class="topbar-search">
      <i class="fas fa-search si"></i>
      <input type="text" id="search-input" placeholder="Search mail..." oninput="filterEmails()" />
    </div>
    <div class="topbar-right">
      <div class="online-pill"><span class="online-dot"></span> Live</div>
      <span class="user-email" id="user-label"></span>
      <button class="signout" id="signout-btn">Sign Out</button>
    </div>
  </div>
  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <button class="compose-btn" onclick="openCompose()"><i class="fas fa-pen"></i> Compose</button>
      <div class="nav-item active" id="nav-inbox" onclick="switchView('inbox')">
        <i class="fas fa-inbox ni"></i> Inbox
        <span class="badge" id="inbox-badge">0</span>
      </div>
      <div class="nav-item" id="nav-sent" onclick="switchView('sent')">
        <i class="fas fa-paper-plane ni"></i> Sent
      </div>
      <div class="sidebar-sep"></div>
      <div class="nav-item" id="nav-access" onclick="switchView('access')" style="display:none;">
        <i class="fas fa-users-cog ni"></i> Access
      </div>
    </div>

    <!-- EMAIL LIST -->
    <div class="email-list-pane">
      <div class="list-header">
        <span class="list-title" id="list-title">Inbox</span>
        <button class="refresh-btn" id="refresh-btn" onclick="loadCurrentView()"><i class="fas fa-sync-alt"></i> Refresh</button>
      </div>
      <div class="email-list" id="email-list">
        <div class="empty-list"><i class="fas fa-envelope-open"></i>Loading...</div>
      </div>
    </div>

    <!-- EMAIL DETAIL -->
    <div class="email-detail-pane" id="email-detail-pane">
      <div class="detail-empty">
        <i class="fas fa-envelope"></i>
        <p>Select an email to read</p>
      </div>
    </div>
  </div>
</div>

<!-- COMPOSE MODAL -->
<div class="compose-overlay" id="compose-overlay" onclick="overlayClick(event)">
  <div class="compose-modal" id="compose-modal">
    <div class="cm-header">
      <span class="cm-title">New Message</span>
      <button class="cm-close" onclick="closeCompose()"><i class="fas fa-times"></i></button>
    </div>
    <div class="cm-fields">
      <div class="cm-field">
        <label>From</label>
        <select id="cm-from"></select>
      </div>
      <div class="cm-field">
        <label>To</label>
        <input type="email" id="cm-to" placeholder="recipient@example.com" />
      </div>
      <div class="cm-field">
        <label>Subject</label>
        <input type="text" id="cm-subject" placeholder="Subject..." />
      </div>
    </div>
    <div class="cm-body">
      <div class="cm-type-tabs">
        <button class="cm-tab active" id="cm-tab-normal" onclick="setCmType('normal')">✏️ Normal</button>
        <button class="cm-tab" id="cm-tab-html" onclick="setCmType('html')">🧩 HTML</button>
      </div>
      <div class="cm-toolbar" id="cm-toolbar">
        <button class="cm-tb" onclick="cmInsertLink()"><i class="fas fa-link"></i> Link</button>
        <button class="cm-tb" onclick="document.getElementById('cm-img-input').click()"><i class="fas fa-image"></i> Image</button>
        <input type="file" id="cm-img-input" accept="image/*" multiple style="display:none" onchange="cmHandleImages(event)" />
      </div>
      <div class="cm-img-chips" id="cm-img-chips"></div>
      <textarea class="cm-textarea" id="cm-body" placeholder="Write your message here..."></textarea>
      <iframe class="cm-preview" id="cm-preview" sandbox="allow-same-origin"></iframe>
    </div>
    <div class="cm-footer">
      <button class="cm-send" id="cm-send-btn" onclick="cmSend()"><i class="fas fa-paper-plane"></i> Send</button>
      <button class="cm-preview-btn" id="cm-preview-btn" onclick="cmTogglePreview()" style="display:none;"><i class="fas fa-eye"></i> Preview</button>
      <div class="cm-status" id="cm-status"></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const SUPER_ADMIN = 'matthewbozhe@gmail.com';
  const WORKER = 'https://htmltools-reset.bozhetarnikmatthew.workers.dev/';
  const firebaseConfig = {
    apiKey: "AIzaSyDke6bGfoJdP4U5lfA9hWHGFFTcDpWNNC8",
    authDomain: "htmltools-library.firebaseapp.com",
    databaseURL: "https://htmltools-library-default-rtdb.firebaseio.com",
    projectId: "htmltools-library",
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // ── State ──
  let currentView = 'inbox';
  let allEmails = [];
  let readIds = new Set(JSON.parse(localStorage.getItem('readIds') || '[]'));
  let currentEmail = null;
  let cmType = 'normal';
  let cmImages = [];
  let cmPreviewOpen = false;
  let allowedSenders = ['noreply', 'matthew', 'kovan'];
  let isSuperAdmin = false;

  // ── Login ──
  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('g-email').value.trim();
    const pass = document.getElementById('g-pass').value;
    const err = document.getElementById('g-err');
    err.style.display = 'none';
    if (!email || !pass) { err.textContent = 'Please fill in both fields.'; err.style.display = 'block'; return; }
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch(e) { err.textContent = '⛔ ' + e.message.replace('Firebase: ','').replace(/\(.*\)/,'').trim(); err.style.display = 'block'; }
  });
  document.getElementById('g-pass').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-btn').click(); });
  document.getElementById('signout-btn').addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, async user => {
    if (!user) {
      document.getElementById('gate').classList.remove('hidden');
      document.getElementById('shell').classList.remove('show');
      return;
    }
    const email = user.email.toLowerCase();
    if (email === SUPER_ADMIN.toLowerCase()) {
      isSuperAdmin = true;
      allowedSenders = ['noreply', 'matthew', 'kovan'];
      showShell(user);
      document.getElementById('nav-access').style.display = 'flex';
    } else {
      const snap = await get(ref(db, `mailAccess/${email.replace(/\./g,'_')}`));
      if (snap.exists()) {
        allowedSenders = snap.val().senders || [];
        showShell(user);
        onValue(ref(db, `mailAccess/${email.replace(/\./g,'_')}`), s => {
          if (!s.exists()) { signOut(auth); alert('Your access has been revoked.'); }
          else { allowedSenders = s.val().senders || []; rebuildFromSelect(); }
        });
      } else {
        await signOut(auth);
        const err = document.getElementById('g-err');
        err.textContent = '⛔ You do not have access to this tool.';
        err.style.display = 'block';
      }
    }
  });

  function showShell(user) {
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('shell').classList.add('show');
    document.getElementById('user-label').textContent = user.email;
    rebuildFromSelect();
    loadInbox();
  }

  function rebuildFromSelect() {
    const sel = document.getElementById('cm-from');
    sel.innerHTML = '';
    allowedSenders.forEach(s => {
      const opt = new Option(s + '@htmltools.me', s + '@htmltools.me');
      sel.add(opt);
    });
    if (isSuperAdmin) {
      // Add custom option for super admin
      const opt = new Option('✏️ Custom...', 'custom');
      sel.add(opt);
    }
  }

  // ── View switching ──
  window.switchView = function(view) {
    currentView = view;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-' + view)?.classList.add('active');
    document.getElementById('list-title').textContent = view === 'inbox' ? 'Inbox' : view === 'sent' ? 'Sent' : 'Access';
    document.getElementById('email-detail-pane').innerHTML = '<div class="detail-empty"><i class="fas fa-envelope"></i><p>Select an email to read</p></div>';
    currentEmail = null;
    if (view === 'inbox') loadInbox();
    else if (view === 'sent') loadSent();
    else if (view === 'access') loadAccessPanel();
  };

  window.loadCurrentView = function() { switchView(currentView); };

  async function apiPost(body) {
    const res = await fetch(WORKER, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return res.json();
  }

  async function loadInbox() {
    setRefreshSpinning(true);
    document.getElementById('email-list').innerHTML = '<div class="empty-list"><i class="fas fa-spinner fa-spin"></i><br>Loading...</div>';
    try {
      const data = await apiPost({ type: 'get_inbox' });
      allEmails = (data.emails || []).sort((a,b) => new Date(b.date) - new Date(a.date));
      renderList();
    } catch(e) {
      document.getElementById('email-list').innerHTML = `<div class="empty-list"><i class="fas fa-exclamation-triangle"></i><br>${e.message}</div>`;
    }
    setRefreshSpinning(false);
  }

  async function loadSent() {
    setRefreshSpinning(true);
    document.getElementById('email-list').innerHTML = '<div class="empty-list"><i class="fas fa-spinner fa-spin"></i><br>Loading...</div>';
    try {
      const data = await apiPost({ type: 'get_sent' });
      allEmails = (data.emails || []).sort((a,b) => new Date(b.date) - new Date(a.date));
      renderList();
    } catch(e) {
      document.getElementById('email-list').innerHTML = `<div class="empty-list"><i class="fas fa-exclamation-triangle"></i><br>${e.message}</div>`;
    }
    setRefreshSpinning(false);
  }

  function setRefreshSpinning(on) {
    document.getElementById('refresh-btn').classList.toggle('spinning', on);
  }

  function renderList(query) {
    const list = document.getElementById('email-list');
    let emails = allEmails;
    if (query) {
      const q = query.toLowerCase();
      emails = emails.filter(e =>
        (e.from||'').toLowerCase().includes(q) ||
        (e.subject||'').toLowerCase().includes(q) ||
        (e.snippet||'').toLowerCase().includes(q) ||
        (e.to||'').toLowerCase().includes(q)
      );
    }
    if (!emails.length) {
      list.innerHTML = `<div class="empty-list"><i class="fas fa-envelope-open"></i><br>No emails found.</div>`;
      document.getElementById('inbox-badge').classList.remove('show');
      return;
    }

    // Update unread badge for inbox
    if (currentView === 'inbox') {
      const unreadCount = emails.filter(e => !readIds.has(e.id)).length;
      const badge = document.getElementById('inbox-badge');
      if (unreadCount > 0) { badge.textContent = unreadCount; badge.classList.add('show'); }
      else badge.classList.remove('show');
    }

    list.innerHTML = '';
    emails.forEach(email => {
      const isUnread = currentView === 'inbox' && !readIds.has(email.id);
      const row = document.createElement('div');
      row.className = 'email-row' + (isUnread ? ' unread' : '') + (currentEmail?.id === email.id ? ' active' : '');
      row.dataset.id = email.id;
      const date = formatDate(email.date);
      const fromDisplay = currentView === 'sent' ? (email.to || '') : (email.from || '');
      row.innerHTML = `
        <div class="er-meta">${date}</div>
        <div class="er-from">${isUnread ? '<span class="unread-dot"></span>' : ''} ${escHtml(fromDisplay)}</div>
        <div class="er-subject">${escHtml(email.subject || '(no subject)')}</div>
        <div class="er-snippet">${escHtml(email.snippet || (currentView === 'sent' ? '→ ' + email.to : ''))}</div>
      `;
      row.addEventListener('click', () => openEmail(email, row));
      list.appendChild(row);
    });
  }

  window.filterEmails = function() {
    renderList(document.getElementById('search-input').value.trim());
  };

  async function openEmail(email, row) {
    // Mark active row
    document.querySelectorAll('.email-row').forEach(r => r.classList.remove('active'));
    row.classList.add('active');
    currentEmail = email;

    // Mark read
    if (currentView === 'inbox' && !readIds.has(email.id)) {
      readIds.add(email.id);
      localStorage.setItem('readIds', JSON.stringify([...readIds]));
      row.classList.remove('unread');
      row.querySelector('.unread-dot')?.remove();
      renderList(document.getElementById('search-input').value.trim() || undefined);
    }

    const pane = document.getElementById('email-detail-pane');
    pane.innerHTML = '<div class="detail-empty"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div>';

    // Fetch full email
    let fullEmail = email;
    try {
      const data = await apiPost({ type: 'get_email', id: email.id });
      if (data.success && data.email) fullEmail = { ...email, ...data.email };
    } catch(e) {}

    const dateStr = fullEmail.date ? new Date(fullEmail.date).toLocaleString() : '';
    const toVal = Array.isArray(fullEmail.to) ? fullEmail.to.join(', ') : (fullEmail.to || '');
    const fromVal = fullEmail.from || '';

    let bodyHtml = '';
    const rawHtml = fullEmail.html || fullEmail.text || '';
    const hasHtml = !!(fullEmail.html);

    let statusBadge = '';
    if (currentView === 'sent' && fullEmail.status) {
      const statusClass = fullEmail.status === 'delivered' ? 'delivered' : fullEmail.status === 'bounced' ? 'bounced' : 'sent';
      statusBadge = `<span class="sent-status ${statusClass}"><i class="fas fa-circle" style="font-size:.5rem;"></i> ${fullEmail.status}</span>`;
    }

    pane.innerHTML = `
      <div class="detail-header">
        <div class="detail-subject">${escHtml(fullEmail.subject || '(no subject)')}</div>
        ${statusBadge}
        <div class="detail-meta">
          <div class="detail-meta-row"><span class="detail-meta-label">From</span><span class="detail-meta-val"><strong>${escHtml(fromVal)}</strong></span></div>
          <div class="detail-meta-row"><span class="detail-meta-label">To</span><span class="detail-meta-val">${escHtml(toVal)}</span></div>
          <div class="detail-date">${dateStr}</div>
        </div>
      </div>
      <div class="detail-body" id="detail-body-area"></div>
    `;

    const bodyArea = document.getElementById('detail-body-area');
    if (rawHtml) {
      if (hasHtml) {
        const frame = document.createElement('iframe');
        frame.style.cssText = 'width:100%;border:none;border-radius:10px;background:#fff;min-height:300px;';
        frame.sandbox = 'allow-same-origin allow-popups';
        bodyArea.appendChild(frame);
        const doc = frame.contentDocument || frame.contentWindow.document;
        doc.open(); doc.write(rawHtml); doc.close();
        // Auto-resize
        setTimeout(() => {
          try { frame.style.height = (frame.contentDocument.body.scrollHeight + 32) + 'px'; } catch(e) {}
        }, 200);
      } else {
        // Plain text — linkify
        const linked = rawHtml.replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" style="color:#4da6ff;">$1</a>');
        bodyArea.innerHTML = `<div class="text-body">${linked}</div>`;
      }
    } else {
      bodyArea.innerHTML = '<p style="color:var(--text3);font-size:.82rem;">No content available.</p>';
    }
  }

  // ── Access panel (super admin only) ──
  function loadAccessPanel() {
    const list = document.getElementById('email-list');
    list.innerHTML = '<div class="empty-list" style="text-align:left;padding:1rem;"><div style="font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:.75rem;">👥 Access Manager</div><div id="access-mini-list" style="font-size:.75rem;color:var(--text3);">Loading...</div></div>';
    const pane = document.getElementById('email-detail-pane');
    pane.innerHTML = `
      <div style="padding:1.5rem;display:flex;flex-direction:column;gap:1rem;">
        <div style="font-size:.95rem;font-weight:700;">Grant Access</div>
        <div style="display:flex;flex-direction:column;gap:.5rem;">
          <input type="email" id="ac-email" placeholder="User email" style="padding:.65rem .9rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;outline:none;font-family:inherit;" />
          <input type="text" id="ac-senders" placeholder="noreply,matthew,kovan" style="padding:.65rem .9rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;outline:none;font-family:inherit;" />
          <div style="font-size:.65rem;color:var(--text3);">Comma-separated usernames (without @htmltools.me)</div>
          <button onclick="grantAccess()" style="padding:.7rem 1.25rem;background:var(--green);border:none;border-radius:8px;color:#fff;font-size:.82rem;font-weight:700;cursor:pointer;font-family:inherit;align-self:flex-start;">Grant Access</button>
          <div id="ac-status" style="font-size:.72rem;"></div>
        </div>
      </div>
    `;
    onValue(ref(db, 'mailAccess'), snap => {
      const data = snap.val() || {};
      const ml = document.getElementById('access-mini-list');
      if (!ml) return;
      const entries = Object.entries(data);
      if (!entries.length) { ml.innerHTML = 'No users with access.'; return; }
      ml.innerHTML = entries.map(([key, val]) =>
        `<div style="padding:.5rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-weight:600;color:var(--text);">${escHtml(val.email)}</div>
            <div style="font-size:.65rem;color:var(--text3);">${(val.senders||[]).map(s=>s+'@htmltools.me').join(', ')}</div>
          </div>
          <button onclick="revokeAccess('${key}','${val.email}')" style="padding:.25rem .5rem;border:1px solid rgba(240,64,96,.4);background:transparent;color:var(--red);border-radius:5px;font-size:.65rem;cursor:pointer;font-family:inherit;">Revoke</button>
        </div>`
      ).join('');
    });
  }

  window.grantAccess = async function() {
    const email = document.getElementById('ac-email').value.trim().toLowerCase();
    const sendersRaw = document.getElementById('ac-senders').value.trim();
    const status = document.getElementById('ac-status');
    if (!email || !sendersRaw) { status.textContent = '⛔ Fill both fields.'; status.style.color = 'var(--red)'; return; }
    const senders = sendersRaw.split(',').map(s => s.trim().toLowerCase().replace('@htmltools.me','')).filter(Boolean);
    const key = email.replace(/\./g,'_');
    try {
      await set(ref(db, `mailAccess/${key}`), { email, senders });
      document.getElementById('ac-email').value = '';
      document.getElementById('ac-senders').value = '';
      status.textContent = '✅ Access granted!'; status.style.color = 'var(--green)';
    } catch(e) { status.textContent = '❌ ' + e.message; status.style.color = 'var(--red)'; }
  };

  window.revokeAccess = async function(key, email) {
    if (!confirm(`Revoke access for ${email}?`)) return;
    await remove(ref(db, `mailAccess/${key}`));
  };

  // ── Compose ──
  window.openCompose = function() {
    document.getElementById('compose-overlay').classList.add('show');
    document.getElementById('cm-to').focus();
  };
  window.closeCompose = function() {
    document.getElementById('compose-overlay').classList.remove('show');
  };
  window.overlayClick = function(e) {
    if (e.target === document.getElementById('compose-overlay')) closeCompose();
  };

  window.setCmType = function(type) {
    cmType = type;
    document.getElementById('cm-tab-normal').classList.toggle('active', type === 'normal');
    document.getElementById('cm-tab-html').classList.toggle('active', type === 'html');
    document.getElementById('cm-toolbar').style.display = type === 'normal' ? 'flex' : 'none';
    document.getElementById('cm-img-chips').style.display = type === 'normal' ? 'flex' : 'none';
    document.getElementById('cm-preview-btn').style.display = type === 'html' ? 'inline-flex' : 'none';
    document.getElementById('cm-body').placeholder = type === 'html'
      ? '<h1>Hello!</h1>\n<p>Your message here...</p>'
      : 'Write your message here... URLs become clickable automatically.';
    if (type === 'normal') { document.getElementById('cm-preview').classList.remove('show'); cmPreviewOpen = false; }
  };

  window.cmInsertLink = function() {
    const url = prompt('Enter URL:'); if (!url) return;
    const text = prompt('Link text:') || url;
    const ta = document.getElementById('cm-body');
    const pos = ta.selectionStart;
    ta.value = ta.value.slice(0, pos) + `[${text}](${url})` + ta.value.slice(pos);
  };

  window.cmHandleImages = function(e) {
    Array.from(e.target.files).forEach(file => {
      const r = new FileReader();
      r.onload = ev => { cmImages.push({ name: file.name, data: ev.target.result }); renderCmChips(); };
      r.readAsDataURL(file);
    });
    e.target.value = '';
  };

  function renderCmChips() {
    const c = document.getElementById('cm-img-chips');
    c.innerHTML = '';
    cmImages.forEach((img, i) => {
      const d = document.createElement('div');
      d.className = 'cm-img-chip';
      d.innerHTML = `<img src="${img.data}"><span>${img.name}</span><span class="cm-img-chip-rm" data-i="${i}">✕</span>`;
      c.appendChild(d);
    });
    c.querySelectorAll('.cm-img-chip-rm').forEach(btn => {
      btn.addEventListener('click', () => { cmImages.splice(parseInt(btn.dataset.i),1); renderCmChips(); });
    });
  }

  function buildCmHtml() {
    if (cmType === 'html') return document.getElementById('cm-body').value;
    let text = document.getElementById('cm-body').value;
    text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" style="color:#4da6ff;">$1</a>');
    text = text.replace(/(^|[^"'=])(https?:\/\/[^\s<>"]+)/g, '$1<a href="$2" style="color:#4da6ff;">$2</a>');
    text = text.replace(/\n/g, '<br>');
    let html = `<div style="font-family:sans-serif;font-size:14px;line-height:1.7;color:#222;max-width:600px;">${text}`;
    cmImages.forEach(img => { html += `<br><img src="${img.data}" style="max-width:100%;border-radius:8px;margin-top:12px;display:block;">`; });
    return html + '</div>';
  }

  window.cmTogglePreview = function() {
    cmPreviewOpen = !cmPreviewOpen;
    const frame = document.getElementById('cm-preview');
    if (cmPreviewOpen) {
      frame.classList.add('show');
      const doc = frame.contentDocument || frame.contentWindow.document;
      doc.open(); doc.write(buildCmHtml()); doc.close();
      setTimeout(() => { try { frame.style.height = (frame.contentDocument.body.scrollHeight + 20) + 'px'; } catch(e){} }, 150);
      document.getElementById('cm-preview-btn').innerHTML = '<i class="fas fa-eye-slash"></i> Hide';
    } else {
      frame.classList.remove('show');
      document.getElementById('cm-preview-btn').innerHTML = '<i class="fas fa-eye"></i> Preview';
    }
  };

  window.cmSend = async function() {
    const fromSel = document.getElementById('cm-from');
    let from = fromSel.value;
    if (from === 'custom') {
      from = prompt('Enter full sender address (must be @htmltools.me):');
      if (!from) return;
    }
    const to = document.getElementById('cm-to').value.trim();
    const subject = document.getElementById('cm-subject').value.trim();
    const body = document.getElementById('cm-body').value.trim();
    const btn = document.getElementById('cm-send-btn');
    const status = document.getElementById('cm-status');
    status.className = 'cm-status'; status.textContent = '';

    if (!to) { status.textContent = 'Please enter a recipient.'; status.className = 'cm-status err'; return; }
    if (!subject) { status.textContent = 'Please enter a subject.'; status.className = 'cm-status err'; return; }
    if (!body) { status.textContent = 'Please write a message.'; status.className = 'cm-status err'; return; }

    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
    try {
      const data = await apiPost({ type: 'send_email', from, to, subject, html: buildCmHtml() });
      if (data.success) {
        status.textContent = '✅ Sent from ' + from + '!'; status.className = 'cm-status ok';
        document.getElementById('cm-to').value = '';
        document.getElementById('cm-subject').value = '';
        document.getElementById('cm-body').value = '';
        cmImages = []; renderCmChips();
        setTimeout(closeCompose, 1800);
      } else {
        status.textContent = '❌ ' + (data.error || JSON.stringify(data.data)); status.className = 'cm-status err';
      }
    } catch(e) { status.textContent = '❌ ' + e.message; status.className = 'cm-status err'; }
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send';
  };

  // ── Helpers ──
  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    if (diff < 86400000 && now.getDate() === d.getDate()) {
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
