<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTMLTools Mail</title>
    		<link rel="icon" type="image/png" href="/logo.png?v=2" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0c12; color: #dce6f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }

        /* ── GATE ── */
        #gate { width: 100%; max-width: 360px; background: #0d1016; border: 1px solid #1a2333; border-radius: 18px; padding: 2rem; text-align: center; }
        #gate.hidden { display: none; }
        .gate-logo { font-size: 2rem; margin-bottom: .75rem; }
        .gate-title { font-size: 1.3rem; font-weight: 800; margin-bottom: .25rem; }
        .gate-title span { color: #4da6ff; }
        .gate-sub { font-size: .72rem; color: #506070; margin-bottom: 1.25rem; }
        .g-input { width: 100%; padding: .75rem 1rem; background: #080a0f; border: 1px solid #1a2333; border-radius: 10px; color: #dce6f5; font-size: .9rem; outline: none; margin-bottom: .6rem; transition: border-color .2s; }
        .g-input:focus { border-color: #4da6ff; }
        .g-btn { width: 100%; padding: .85rem; background: #4da6ff; border: none; border-radius: 10px; color: #fff; font-size: .85rem; font-weight: 700; cursor: pointer; }
        .g-btn:hover { opacity: .88; }
        .g-err { display: none; margin-top: .6rem; font-size: .7rem; color: #f04060; background: rgba(240,64,96,.08); border-radius: 6px; padding: .4rem; }

        /* ── APP ── */
        #app { display: none; width: 100%; max-width: 620px; flex-direction: column; gap: 0; }
        #app.show { display: flex; }

        .app-header { background: #0d1016; border: 1px solid #1a2333; border-radius: 14px 14px 0 0; padding: .9rem 1.25rem; display: flex; align-items: center; justify-content: space-between; }
        .app-header-left { display: flex; align-items: center; gap: .5rem; font-weight: 700; font-size: .95rem; }
        .app-header-left span { color: #4da6ff; }
        .app-header-right { display: flex; align-items: center; gap: .5rem; font-size: .7rem; color: #506070; }
        .online-dot { width: 7px; height: 7px; border-radius: 50%; background: #30d97a; }
        .signout { background: transparent; border: 1px solid rgba(240,64,96,.3); color: #f04060; font-size: .65rem; padding: .3rem .6rem; border-radius: 6px; cursor: pointer; }
        .signout:hover { background: rgba(240,64,96,.1); }

        .app-body { background: #0d1016; border: 1px solid #1a2333; border-top: none; border-radius: 0 0 14px 14px; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }

        .field { display: flex; flex-direction: column; gap: .35rem; }
        .field label { font-size: .62rem; color: #506070; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }
        .field input, .field textarea { padding: .7rem .9rem; background: #080a0f; border: 1px solid #1a2333; border-radius: 8px; color: #dce6f5; font-size: .88rem; font-family: inherit; outline: none; transition: border-color .2s; width: 100%; }
        .field input:focus, .field textarea:focus { border-color: #4da6ff; }
        .field textarea { resize: vertical; min-height: 140px; line-height: 1.6; }

        /* ── TYPE TABS ── */
        .type-tabs { display: flex; background: #080a0f; border: 1px solid #1a2333; border-radius: 8px; overflow: hidden; }
        .type-tab { flex: 1; padding: .6rem; background: transparent; border: none; color: #506070; font-size: .75rem; font-weight: 700; cursor: pointer; transition: all .15s; font-family: inherit; }
        .type-tab.active { background: rgba(77,166,255,.12); color: #4da6ff; }

        /* ── TOOLBAR ── */
        .toolbar { display: flex; gap: .4rem; flex-wrap: wrap; }
        .tb { padding: .4rem .75rem; background: #080a0f; border: 1px solid #1a2333; border-radius: 6px; color: #506070; font-size: .72rem; cursor: pointer; transition: all .15s; font-family: inherit; display: flex; align-items: center; gap: .3rem; }
        .tb:hover { border-color: #4da6ff; color: #4da6ff; }

        /* ── IMAGES ── */
        .img-chips { display: flex; flex-wrap: wrap; gap: .4rem; }
        .img-chip { background: #111722; border: 1px solid #1a2333; border-radius: 6px; padding: .3rem .6rem; font-size: .7rem; display: flex; align-items: center; gap: .4rem; }
        .img-chip img { width: 20px; height: 20px; border-radius: 3px; object-fit: cover; }
        .img-chip-remove { color: #f04060; cursor: pointer; font-size: .75rem; }

        /* ── PREVIEW ── */
        #preview-wrap { display: none; flex-direction: column; gap: .35rem; }
        #preview-wrap.show { display: flex; }
        #preview-wrap label { font-size: .62rem; color: #506070; text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }
        #preview-frame { width: 100%; min-height: 160px; border: 1px solid #1a2333; border-radius: 8px; background: #fff; }

        /* ── SEND ── */
        .send-row { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }
        .send-btn { padding: .8rem 1.75rem; background: #4da6ff; border: none; border-radius: 10px; color: #fff; font-size: .88rem; font-weight: 700; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: .5rem; font-family: inherit; }
        .send-btn:hover { opacity: .88; transform: translateY(-1px); }
        .send-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .preview-btn { padding: .8rem 1.25rem; background: #111722; border: 1px solid #1a2333; border-radius: 10px; color: #506070; font-size: .8rem; font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit; display: none; }
        .preview-btn:hover { border-color: #4da6ff; color: #4da6ff; }
        .status { display: none; font-size: .75rem; padding: .45rem .8rem; border-radius: 6px; }
        .status.ok { display: block; background: rgba(48,217,122,.1); color: #30d97a; }
        .status.err { display: block; background: rgba(240,64,96,.08); color: #f04060; }
    </style>
</head>
<body>

<!-- GATE -->
<div id="gate">
    <div class="gate-logo">✉️</div>
    <div class="gate-title">HTML<span>Tools</span> Mail</div>
    <div class="gate-sub">Admin only. Sign in to continue.</div>
    <input type="email" id="g-email" class="g-input" placeholder="your@email.com" />
    <input type="password" id="g-pass" class="g-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')gateLogin()" />
    <button class="g-btn" onclick="gateLogin()">Sign In</button>
    <div class="g-err" id="g-err"></div>
</div>

<!-- APP -->
<div id="app">
    <div class="app-header">
        <div class="app-header-left">✉️ HTML<span>Tools</span> Mail</div>
        <div class="app-header-right">
            <span class="online-dot"></span>
            <span id="user-label"></span>
            <button class="signout" onclick="doLogout()">Sign Out</button>
        </div>
    </div>
    <div class="app-body">
        <div class="field">
            <label>To</label>
            <input type="email" id="to" placeholder="recipient@example.com" />
        </div>
        <div class="field">
            <label>Subject</label>
            <input type="text" id="subject" placeholder="Email subject..." />
        </div>
        <div class="field">
            <label>Type</label>
            <div class="type-tabs">
                <button class="type-tab active" id="tab-normal" onclick="setType('normal')">✏️ Normal</button>
                <button class="type-tab" id="tab-html" onclick="setType('html')">🧩 HTML</button>
            </div>
        </div>
        <div class="toolbar" id="normal-toolbar">
            <button class="tb" onclick="insertLink()"><i class="fas fa-link"></i> Insert Link</button>
            <button class="tb" onclick="document.getElementById('img-input').click()"><i class="fas fa-image"></i> Attach Image</button>
            <input type="file" id="img-input" accept="image/*" multiple style="display:none" onchange="handleImages(event)" />
        </div>
        <div class="img-chips" id="img-chips"></div>
        <div class="field">
            <label id="body-label">Message</label>
            <textarea id="body" placeholder="Write your message here... URLs become clickable automatically."></textarea>
        </div>
        <div id="preview-wrap">
            <label>Preview</label>
            <iframe id="preview-frame" sandbox="allow-same-origin"></iframe>
        </div>
        <div class="send-row">
            <button class="send-btn" id="send-btn" onclick="sendEmail()"><i class="fas fa-paper-plane"></i> Send</button>
            <button class="preview-btn" id="preview-btn" onclick="togglePreview()"><i class="fas fa-eye"></i> Preview</button>
            <div class="status" id="status"></div>
        </div>
    </div>
</div>

<!-- Firebase Auth -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const ALLOWED = 'matthewbozhe@gmail.com';
    const auth = getAuth(initializeApp({
        apiKey: "AIzaSyDke6bGfoJdP4U5lfA9hWHGFFTcDpWNNC8",
        authDomain: "htmltools-library.firebaseapp.com",
        projectId: "htmltools-library",
    }));

    onAuthStateChanged(auth, user => {
        if (user && user.email.toLowerCase() === ALLOWED) {
            document.getElementById('gate').classList.add('hidden');
            document.getElementById('app').classList.add('show');
            document.getElementById('user-label').textContent = user.email;
        } else if (user) {
            signOut(auth);
            document.getElementById('g-err').textContent = '⛔ Access denied.';
            document.getElementById('g-err').style.display = 'block';
        }
    });

    window.gateLogin = async function() {
        const email = document.getElementById('g-email').value.trim();
        const pass = document.getElementById('g-pass').value;
        const err = document.getElementById('g-err');
        err.style.display = 'none';
        if (email.toLowerCase() !== ALLOWED) { err.textContent = '⛔ Access denied. Admins only.'; err.style.display = 'block'; return; }
        if (!pass) { err.textContent = 'Please enter your password.'; err.style.display = 'block'; return; }
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch(e) {
            err.textContent = '⛔ ' + e.message.replace('Firebase: ','').replace(/\(.*\)/,'').trim();
            err.style.display = 'block';
        }
    };

    window.doLogout = async function() {
        await signOut(auth);
        document.getElementById('gate').classList.remove('hidden');
        document.getElementById('app').classList.remove('show');
    };
</script>

<script>
    const WORKER = 'https://htmltools-reset.bozhetarnikmatthew.workers.dev/';
    let emailType = 'normal';
    let images = [];
    let previewOpen = false;

    function setType(type) {
        emailType = type;
        document.getElementById('tab-normal').classList.toggle('active', type === 'normal');
        document.getElementById('tab-html').classList.toggle('active', type === 'html');
        document.getElementById('normal-toolbar').style.display = type === 'normal' ? 'flex' : 'none';
        document.getElementById('img-chips').style.display = type === 'normal' ? 'flex' : 'none';
        document.getElementById('preview-btn').style.display = type === 'html' ? 'block' : 'none';
        document.getElementById('body').placeholder = type === 'html'
            ? '<h1>Hello!</h1>\n<p>Your message...</p>'
            : 'Write your message here... URLs become clickable automatically.';
        document.getElementById('body-label').textContent = type === 'html' ? 'HTML Code' : 'Message';
        if (type === 'normal') {
            document.getElementById('preview-wrap').classList.remove('show');
            previewOpen = false;
            document.getElementById('preview-btn').innerHTML = '<i class="fas fa-eye"></i> Preview';
        }
    }

    function insertLink() {
        const url = prompt('Enter URL:');
        if (!url) return;
        const text = prompt('Link text (leave blank to use URL):') || url;
        const ta = document.getElementById('body');
        const pos = ta.selectionStart;
        ta.value = ta.value.slice(0, pos) + `[${text}](${url})` + ta.value.slice(pos);
    }

    function handleImages(e) {
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = ev => { images.push({ name: file.name, data: ev.target.result }); renderChips(); };
            reader.readAsDataURL(file);
        });
        e.target.value = '';
    }

    function renderChips() {
        const c = document.getElementById('img-chips');
        c.innerHTML = '';
        images.forEach((img, i) => {
            const chip = document.createElement('div');
            chip.className = 'img-chip';
            chip.innerHTML = `<img src="${img.data}"><span>${img.name}</span><span class="img-chip-remove" onclick="removeImg(${i})">✕</span>`;
            c.appendChild(chip);
        });
    }

    window.removeImg = function(i) { images.splice(i, 1); renderChips(); };

    function buildHtml() {
        if (emailType === 'html') return document.getElementById('body').value;
        let text = document.getElementById('body').value;
        text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" style="color:#4da6ff;">$1</a>');
        text = text.replace(/(^|[^"'=])(https?:\/\/[^\s<>"]+)/g, '$1<a href="$2" style="color:#4da6ff;">$2</a>');
        text = text.replace(/\n/g, '<br>');
        let html = `<div style="font-family:sans-serif;font-size:14px;line-height:1.7;color:#222;max-width:600px;">${text}`;
        images.forEach(img => { html += `<br><img src="${img.data}" style="max-width:100%;border-radius:8px;margin-top:12px;display:block;" alt="${img.name}">`; });
        html += '</div>';
        return html;
    }

    function togglePreview() {
        previewOpen = !previewOpen;
        const wrap = document.getElementById('preview-wrap');
        const frame = document.getElementById('preview-frame');
        if (previewOpen) {
            wrap.classList.add('show');
            const doc = frame.contentDocument || frame.contentWindow.document;
            doc.open(); doc.write(buildHtml()); doc.close();
            document.getElementById('preview-btn').innerHTML = '<i class="fas fa-eye-slash"></i> Hide';
        } else {
            wrap.classList.remove('show');
            document.getElementById('preview-btn').innerHTML = '<i class="fas fa-eye"></i> Preview';
        }
    }

    window.sendEmail = async function() {
        const to = document.getElementById('to').value.trim();
        const subject = document.getElementById('subject').value.trim();
        const body = document.getElementById('body').value.trim();
        const btn = document.getElementById('send-btn');

        if (!to) { showStatus('Please enter a recipient.', 'err'); return; }
        if (!subject) { showStatus('Please enter a subject.', 'err'); return; }
        if (!body) { showStatus('Please write a message.', 'err'); return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

        try {
            const res = await fetch(WORKER, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'send_email', to, subject, html: buildHtml() })
            });
            const data = await res.json();
            if (data.success) {
                showStatus('✅ Sent!', 'ok');
                document.getElementById('to').value = '';
                document.getElementById('subject').value = '';
                document.getElementById('body').value = '';
                images = []; renderChips();
            } else {
                showStatus('❌ Failed: ' + (data.error || JSON.stringify(data.data)), 'err');
            }
        } catch(e) {
            showStatus('❌ ' + e.message, 'err');
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send';
    };

    function showStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status ' + type;
    }
</script>
</body>
</html>
